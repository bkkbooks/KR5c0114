front:
  text: 道德眞經廣聖義卷之三十五景十一
  hash: sha256:2590f48c0742c7c63702c5e7dacf6c7159ce5442eaf7bf26beccbb4c2c69ead6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0114_HFL_036-001a, image: hfl/0446/0446-044.png}
body:
  text: 唐廣成先生杜光庭述天下有道章第四十六䟽前章明五大之行用廣修學之門此章明三大之愆以彰可欲之弊初標有道無道之損益次明爲罪爲咎之所由後結知足之爲德以戒貪求之爲患義曰天聖人之御宇也身斧扆而南面前巫後史卜筮瞽侑列於左右無爲而守至正也三公在朝三老在學百辟奉職修文德以懷遠敷道化而育人使俗洽和平家興禮讓來琛賮於四塞息征戌於三邊倒載干戈休牛歸馬然後樂耕耨糞田疇多稼如雲餘糧栖畝苟或違此則怨敵交侵戎馬載馳甲兵復用夫何故哉以其上有貪得可欲之非恣拓土無厭之禍窮兵瀆武必致自焚老君戒以知足之文欲使安其分分既常足可以言於理道歟天下有道却走馬以糞注天下有道之主無爲化行既不貪求固無交戰屏却走馬之事人得糞除田園䟽却屏却也糞謂理田也天下有道謂以道爲理無爲化行守在四夷疆場無事不得多貪土地以困黎元所以屏却兵車走馬之事人得俶載南畝以糞理田園也義曰古人有言曰君猶舟也人猶水也人非君不理舟非水不行舟水相須不可暫失故理國之本養人爲先有道之君守在四夷外無兵寇戈楯不用鋒鏑不施却甲馬於三邊闢田疇於四野深耕淺種家給國肥食爲人天邦之大務也俶載南畝者詩小雅甫田篇之詞也俶始也載事也春作既興始事南畝南畝田名也詩云南東其畝畝百歩也廣六尺長六百尺言可以母養於物故云畝也修道之士以意爲馬以情爲田却意馬之奔馳神將靜矣使情田之逸暇心將泰矣而後道可修也禮記云人者天地之德陰陽之交鬼神之會五行之秀故聖人作則必以天地爲本陰陽爲端四時爲柄日星爲紀鬼神以爲徒五行以爲質禮義以爲器人情以爲田四靈以爲畜故人情者聖王之田也情田無爲幾於道矣天下者統言理國矣天下無道戎馬生於郊注天下無道之君縱欲攻取故兵士戎馬寄生於郊境之上矣䟽郊者交也謂二國郊境之際拒守之地天下無道之君則荒塞有不賔之虜故兵戎軍馬生育於郊境之上謂乆而不還義曰理國不以道則開拓邊土侵伐戎夷封域不寧征役無已或貪蒟醬起番禺之役好名馬起大宛之師骨委窮荒血塗草莽營魄流飄於異域戎車淪滯於遠郊綿歳月以長征及瓜時而不返轉輸莫息杼軸其空人怨國亡禍非天與所宜深戒也豈若宇内不擾諸侯咸賔君民協和上下相保使壯士無所施其力辯士無所衒其詞武士無所鋭其鋒智士無所申其策鑄劍㦸以爲犁鋤貨佩刀而市耕犢無爲無役以全永圖也罪莫大於可欲注心見可欲爲罪大矣䟽犯法爲罪貪求爲欲言戎馬生郊之罪由人君貪求土地見土地可欲欲心興動將起貪求此罪之大者故云罪莫大於可欲義曰法者所以禁民戢亂懲惡繩違干而犯之斯爲罪矣罪字從罔下非言網羅以制其非法也罪之大者欲莫大乎因心起貪謂之欲也興可欲之心於富貴者則雕墻峻宇瀆貨稱兵外禽内色之荒迷而莫返鴈塞龍堆之役困而莫休以至于天下離心舟中敵國然後傾敗其何惑歟興可欲之心於其身者騁利馳名躭聲滯色悅黼黻雕華之觀彌目不迴徇輕肥音酒之娱終身不寤以至於筋骸疲耳目聾盲然後喪身何其愚也故春秋僖公二十年宋襄公欲合諸侯魯大夫臧文仲聞之曰以欲從人則可以人從欲鮮濟言屈已之欲從衆善也眀年宋公爲鹿上之盟宋公子目夷曰小國爭盟幸而後敗是年秋楚人執宋公遂伐宋此言以人從欲乖其道也老君設教垂訓明此罪之因申能刳可欲之心必享無涯之祉理國可期於九五理身可企於神仙勉而行之道之要也禍莫大於不知足注求取不已爲禍大矣䟽禍害也神不祐也大亡敗之禍縁何而來由貪土地求而無猒不知止足致神道不祐而嬰禍害人之有過過非一途貪之爲禍禍之大也義曰夫罪之與禍皆起於身身之生惡由于心想故身心口爲三業焉三業之中共生十惡十惡之内貪罪愈深故生死忿爭皆因貪致貪者心業之一也人君貪則外殘四境下困羣生既上求取不休則下供應致闕人怨神怒由此而興國將亡敗矣理身而貪則嗜欲無猒魂馳神逝福善不祐年天身殂茍能内制貪源外息貪取既無仇怨身安國昌即知足常足終身不辱者矣咎莫大於欲得注殃咎之大莫大於欲所欲必令皆得皆得則禍深故云咎也䟽咎殃咎也夫貪冒之雄欲心增侈得之不已而又求之非道得之敗不旋踵自招殃咎不亦宜乎可欲謂欲而未得初起貪心罪輕於禍不知足者得之更須禍重於罪莫甚於欲得者謂已得欲心尚未猒足則咎之爲過斯又甚於禍也義曰得而復求求之不已民則應之以怒而兵寇興焉仇敵起焉爲殃爲咎於斯爲大罪者言人違於禁令初犯其非名之爲罪老君悔過經曰初犯爲罪亦名爲過過言誤也犯過一千八十爲禍禍重於罪矣犯千二百六十過爲咎咎又重於禍矣夫欲者莫過於色言愛重而可欲也禍者莫過於財言貪不知足也咎者莫甚於名言苦求欲得也人之過罪條目甚多財色與名三者爲大傾家殞命亡國殺身職此之由可爲明戒也知足之足常足矣注物足者非知足心足者乃知足也若心知足此足常足矣䟽此結有道之君也言有道之君無欲廣大不貪土地故於本分而知足則爲天下樂推身安國理此知足之足乃至于交讓而常足也注云物足者非知足心足者乃知足知足者謂足在於心不在於物循涯守分雖少而多有欲無猒雖多亦少矣義曰貪之與足皆出於心心足則物常有餘心貪則物常不足貪者雖四海萬乘之廣尚欲旁求足者雖一簞環堵之資不忘其樂適分知足惟在於心所宜勗也不出戶章第四十七䟽前章明天下有道欲令知足常足此章明教不出户示以不爲而成初兩句標不出則能知次兩句明人和則天順又兩句示彌出之爲失後四句結無爲而化成義曰聖人達觀不出户庭上士冥心玄契天地玄契則無遠不察目繫則雖遠益達不行而知斯之謂矣不岀户知天下䟽有道聖君無爲而理言教不出於户外淳風自洽於寰區此可謂知理天下之道爾又解云人君善教天下應之以善則不煩出户而天下可知故易曰君子出其言善則千里之外應之況其邇者乎此之謂矣義曰聖人之理以身觀身身正則天下皆正身理則天下皆理故曰恭己南面而已矣夫何爲哉且既闢混元是生萬物羣分類聚魚沉鳥翔尊卑定矣天地位矣雖六合之繁九有之廣亦猶四支百體耳可以心鑒豈在足行不出户而知之信矣君子出其言善者易上繫之詞期謂言出乎身加乎民行發乎邇見乎遠言行君子之樞機也樞機之發榮辱之主也遠猶若此况於近者乎不窺牖見天道注垂拱無爲不出教令於户外是知理天下之道人事和則天象順故不煩窺牖而天道可知也䟽人天相應精氣交通人君爲政以德則象緯以之不迷威侮五行陰陽由其舛候故書曰休徵則肅時雨若咎徵則蒙恒風若是知行發心已象著于天豈俟窺牖然後能見易曰言行君子所以動天地也義曰帝王之理也法天之覆法地之載曆象日月敬授人時璿璣玉衡以齊七政所以順天之道也天垂象聖人則之所以法天之行也既法順天象正己而行則人君所爲天道交應吉凶在我理亂在心得不乾乾而夕惕耶象緯者垂文謂之象占揆謂之緯自大慢法謂之威侮躔次差錯謂之舛候此由人君行之所感也風若雨若者尚書洪範傳曰休徵則肅時雨若休善也言人君行敬而時雨順也肅敬也咎徴則蒙恒風若咎凶也蒙暗也恒常也若順也言人君蒙暗則常風順之也言行動天地者易上繫曰言行君子所以動天地可不慎乎此謂君子出處默語不違其中其迹雖異道同則應也其出彌遠其知彌少注若不能無爲假使出令彌遠其所知理天下之道彌少也䟽此明失道之君也不能處無爲而恭己將欲申教令以化人令出彌遠既失無爲所知政理更爲寡少義曰其身正者不令而行其身不正雖令不從人君不能拱默謙光融心體道無爲以化天下雖廣行威令人不從之豈若任賢勿疑從善不倦恭己於上推誠於下不言而化不令而行哉是以聖人不行而知注不出户故云不行無爲淳朴而知爲理之道也䟽此覆釋不出户而知天下也無事無爲教令不出故云不行近取諸身遂知來物故我無爲而人自化豈待言教出户然後謂之知乎義曰理國聖人率身從道道與天合冥契上玄萬方順之應猶響答不俟行化而後能知近取諸身者易下繫云古者庖羲氏之王天下也仰則觀象於天俯則觀法於地觀鳥獸之文與地之宜近取諸身遠取諸物始作八卦以通神明之德以類萬物之情此言以身之耳目鼻口與八卦相應身之所行吉則應之凶則違之禍福無門惟人所召我無爲而人自化者此經第五十七章之詞也不見而名注不窺牖故云不見人和天順而能名其太平䟽此覆釋不窺牖見天道也夫鶴鳴則子和行感則天動原小可以知大審己可以知物元吉所召在乎其人則太平之化可得而言爾何必窺見然後名乎故云不見而名也義曰天道坦坦去身不遠天人相感影響無差凶吉合符由乎其行身既理矣固亦宜然天應人和不俟窺牖矣鶴鳴子和者易繫云鶴鳴在陰其子和之此明擬議以成其變化之理也若擬議於善善來應之擬議於惡惡亦隨之鶴鳴則子和脩誠則物應鶴鳴幽陰之中子猶和之人欺於暗室物必知之憂悔吝者存乎纖介定得失者在乎樞機君子擬而後言議而後動慎微之理也雖微必應夫何遠哉不見而名道既玄同心與道合萬物符契故不俟見之而後名也不爲而成注不爲言教而天下化成䟽此總結不出不窺之義也夫以上有所爲下必有優今聖人凝神端扆玄默朝堂君無爲人無事百姓家給萬化自成義曰凝靜定也端莊肅也扆龍屏也朝堂聽政之所也聖人無爲致理無事化人不出户而自知不窺牖而自見融神觀妙造化生乎身垂拱端旒宇宙在乎手民不知有君於上君無所求用於民倉庾豐盈家給人足夫何故耶以其上無爲而國泰神既凝寂故不言而化成矣扆謂倚也形若屏風畫爲斧文於明堂之中牖開而設之昔周公輔成王於明堂以朝諸侯負斧扆南面而立以正君臣之位焉道徳眞經廣聖義卷之三十五
