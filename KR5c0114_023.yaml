front:
  text: 道德真經廣聖義卷之二十二羊十一
  hash: sha256:36baf9d4769420489ca70b1e84b1fd354186036c32ababd3d0c5ee4c3c62acbe
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0114_HFL_023-001a, image: hfl/0443/0443-130.png}
body:
  text: 唐廣成先生杜光庭述重為輕根章第二十六疏前章舉域中稱大終令法道自然此章明重靜為君以戒身輕天下首兩句標宗以示義次兩句舉喻以却明又四句傷人君之失道末兩句述輕躁以為戒也義曰前以人君為理體道法天今示重靜之文戒輕與躁將明重靜之益舉喻以申詞又述輕躁之傷垂文而深歎夫至人修道聖主垂旒必重慎為先安靜為本以重靜為國則俗和而化行以重靜保身則道通而神泰若其輕而守器躁以處身君輕躁而民無所遵心輕躁而神無所保神散則身逝民潰則國危固為深戒矣重為輕根靜為躁君注重者制輕故重為根靜者持躁故靜為君爾疏根本也草木根蒂重花葉輕花葉稟根蒂而生則根蒂為花葉之本故曰重為輕根夫重則靜輕則躁既重為輕者根則靜為躁者君矣是知重有制輕之功靜有持躁之力故權重則屬鼻之纊斯舉心靜則朵頤之求自息義曰重者安靜而合道躁者輕浮而喪真舉喻則花葉為輕根蒂為重花葉輕則易敗根蒂重則難傷此比於行也若夫重靜於國則民安重靜於身則神泰故政將亂也積德以鎮之心將躁也積和以制之可謂得制輕持躁之術無朵頤貪婪之誚所以周勃以嚴重而蒙顧託邾莊以辨急而委炎爐惟君惟臣此乃明戒朵頤者易頤卦初九之辭也言人之開發言語咀嚼飲食皆當動頤君子觀此頤象故謹慎言語裁節飲食也先儒曰禍從口出患從口入宜慎於頤也初九朵頤言陽處於下而為動始不能使物賴己而養在自動以求養是躁求損己是以凶也頤養也頤者口之樞機故曰樞機之發榮辱之主得不戒哉是以君子終日行不離輜重注輜車也重者所載之物也輕躁者貴重靜亦由行者之守輜重失輜重則遭凍餒好輕躁則生禍亂疏君子者謂人主也言其德可以君人子物故云君子輜屏車也重者所載之物也此舉喻也言人君常守重靜猶如行者之不離輜重行者若失輜重則無所取給必遭凍餒人君若好輕躁則臣下離散必生禍亂故云終日行不離輜重也義曰人君之重靜也則事省而理求寡而贍不施而仁不言而信不求而得不為而成懷自然抱真朴而天下泰矣人身之重靜也則和氣積心慮平視聽不惑於外情欲不攖於內而壽命延矣雖有榮觀燕處超然注人君守重靜故雖有榮觀當須燕安而處超然不顧疏夫人君好重靜則百姓不煩勞若高臺深池撞鐘舞女以為榮觀則人力凋盡亂亡斯作故戒云雖有榮觀當須燕爾安居超然遠離而不顧也義曰榮觀華盛也若人君飾榮觀於耳目竭人力於淫奢麗色冶容以蕩其志則國亡身辱不俟旋踵乎有崇臺榮觀之盛當忽之而不顧勿以蕩心也燕安也超遠也雖有榮觀其可樂之乎高臺深池者春秋昭公二十年冬十月齊景公疥遂痁期而不瘳諸侯之賔問疾者多在梁丘據與裔款二大夫言於公曰吾事鬼神豐於先君有加矣今君疾病為諸侯憂是祝史之罪也諸侯不知其謂我不敬君盍誅於祝固史囂以辭賔公悅告晏子晏子曰宋之盟屈建問范會之德於趙武趙武曰夫子之家事治言於晉國竭情無私其祝史祭祝陳信不愧其家事無猜其祝史不祈建以語康王康王曰神人無怨宜夫子之光輔五君以為諸侯王也五君文襄靈成景也公曰據與款謂寡人能事鬼神故欲誅於祝史子稱是語何故對曰若有德之君外內不廢上下無怨動無違事其祝史薦信無愧心矣是以鬼神用饗國受其福祝史與焉其所以蕃祉老壽者為信君使也其言忠信於鬼神其適遇淫君外內頗邪上下怨疾動作僻違縱欲猒私高臺深池撞鐘舞女斬艾民力輸掠其聚以成其違不恤後人暴虐淫縱肆行非度無所避忌不思謗讟不憚鬼神神怒民痛無悛於心其祝史薦信是言罪也其蓋失數美是矯誣也進退無辭則虛以求媚是以鬼神不饗其國以禍之祝史與焉所以夭昏孤疾者為暴君使也其言僣嫚於鬼神公曰然則若之何對曰不可為山林之木衡鹿守之澤之萑蒲舟鮫守之藪之薪蒸虞候守之海之鹽蜃祈望守之縣鄙之人入從其政福介之關暴征其私承嗣大夫強易其賄市當無藝徵斂無度宫室日更淫樂弗違內寵之妾肆奪於巿外寵之臣僣令於鄙私欲養求不給則應民人若病夫婦皆詛呪若有益詛亦有損聊攝以東姑尤以西其為人也多矣雖其善祝豈能違億兆人之詛君若欲誅於祝史修德而後可公悅使有司寬政毁關去禁薄斂已責十二月景公畋于沛此言晏子言之所利而景公從諫修德而疾遠愈遽能畋獵也奈何萬乘之主而以身輕天下注奈何者傷歎之詞也天下者大寶之位也言人君奈何以身從欲輕用其身令亡其位乎疏天子提封百萬出賦六十四萬出戎馬百萬匹兵車萬乘天子是為萬乘之主奈何者傷歎之詞也天下者大寶之位也夫萬乘之主四海必同當令子孫千億本枝百代善建則無為偃化善抱則有截歸仁奈何承此重器耽樂是從以身充欲淪胥以敗是以一身之欲而輕大寶之位甚可傷歎故曰奈何義曰天子父天而母地告類上帝承統昊天謂之天子亦云法天行道子育萬人謂之天子提封者疆土四方之內也萬井者井田也方里為井百萬井則辟十萬里出戎馬百萬匹兵車萬乘輿賦之多富有四海故云萬乘之主也齊大司馬田穰苴為兵法有車乘之賦其法起於步人舉一足曰跬跬三尺也兩足曰步步六尺也百步為畝即其地廣六尺長百步六百尺為一畝畝者母也既長百步可植苗稼有母養之功曰畝也百畝為夫夫者農夫也王制云上農夫食田百畝也三夫為屋並而言之則長百步廣三百步謂之屋者言人一家有夫婦兒三百具則為家為屋也三屋為井一屋長百步廣一里則三屋之地方一里也名井者因夫間有遂水縱橫相通為井字何者畝廣六尺長百步用耜耕之耜廣五寸兩耜為耦耦廣一尺長沮桀溺耦而耕是也畝廣六尺以一尺耦耕垈為畎以通水流畎然因名畎也而夫田田首倍之廣二尺深二尺謂之為遂九夫為井井間廣深四尺謂之為溝取其遂相通如井字故謂之井田十井為通並之其地長一里廣十里合三十里相通共出士一人徒二人十通為城者地方十里謂之為城言兵賦一乘成也城出革車一乘士十人徒二十人千乘之國則其地千城出士一萬人徒二萬人也萬乘之國地方萬城出兵車萬乘士十萬人徒二十萬人此司馬法所出也王制云一城之地九萬頃出兵車一乘甲士三人步卒七十二人萬乘之地甲士三萬步卒七十二萬人王制與司馬法不同故兩存之大寶之位者易繫云聖人之大寶曰位言大寶可愛者天下之位也位是有用之地寶是有用之物以居盛大之位能廣用無疆故稱大寶何以守位曰仁言人居此大寶之位當須保守之以仁愛為心道德為體重靜為用儉約為基令四海同文萬方述職天枝帝葉傳於子孫善崇建於根蒂善抱守其淳朴使天下慕其仁而歸之不可以耽樂畋遊荒禽惑色斂天下之力以養其身率天下之怨以充其欲使運窮祚滅衆叛親離以天下之大而一身輕失之如夏癸殷辛周赧漢獻以萬乘之尊死匹夫之手故傷歎之曰奈何也輕則失臣躁則失君注君輕易則人離散故失臣臣躁求則主不齒故失君疏夫君多輕易則必煩擾煩擾則人散誰與為臣故云輕則失臣此戒人君也義曰人君懷輕易之行不重靜其心或畋獵為荒或巡遊不息或朝令夕改或變法易常事多則政煩政煩則人困人困則兵戈四起户口流亡人散民流失臣之謂也則如夏后洛汭之畋十旬不返隋煬遼東之役百萬淪亡蓋此謂也疏為人臣者當量能受爵無速官謗若矯迹干祿飾詐祈榮躁求若斯禍敗尋至坐招竄殛焉得事君故云躁則失君此申誡人臣也義曰謗誹也干求也詐誑也竄逃也殛殺也申重也人臣貪榮躁進亂侮國常大則有誅殛之凶小則有竄逐之戾非天作孽自失其君况習道之人懷輕躁之行則恬和虛寂之旨安所容其窺伺哉申者重戒之也竄三苗殛鯀之例是也道德真經廣聖義卷之二十二
