  text: 道德真經廣聖義卷之三十一景七
  hash: sha256:125866b835ad4a78ffb567c0da4ad5adfe852ff1d778889d5a252c583d4cd8c6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0114_HFL_032-001a, image: hfl/0445/0445-046.png}
body:
  text: 唐廣成先生杜光庭述昔之得一章第三十九疏前章明上德下禮淳漓不同故舉丈夫去取之行示物向方此章明物得道用而成履道則存矜之則喪故敘侯王謙卑之德以為戒者義曰夫天地神谷萬物之得一者所以明用道則安失道則危戒王侯履道則吉違道則凶也而侯王故履道者在於謙卑抑損積德為基不欲如玉顯明以為至戒矣昔之得一者注一者道之和謂沖氣也以其妙用在物為一故謂之一爾疏昔往古也一者沖和之氣也稱為一者以其與物合同古今不二是謂之一故易繫曰一陰一陽之謂道蓋明道氣在陰與陰合一在陽與陽合一爾言昔者將欲原始要終抑末歸本引昔得以證今得得一之數略於下文義曰老君將欲明沖和道氣通生萬物歷敘得一之妙以明生化之由道之生化無終無始借古昔久遠之義以為布化之源所以謂道為一者萬物之生也道氣皆降之氣存則物生氣亡則物死物之稟道所稟不殊在物皆一古今雖移一乃無變故云不二是謂之一道非陰陽也在陽則陽在陰則陰亦由在天則清在地則寧所在皆合道無不在非陰陽也而能陰能陽非天地也而能天能地非一也而能一周旋反覆無不能焉昔既得之今猶昔也是知虛心則道合冥寂則一歸能冥寂虛心者是謂抑末歸本矣一陰一陽之謂道易繫之辭也一謂之無無陰無陽乃為之道一得為無者是虛無太空不可分别惟一而已故一為無也若其有境彼此相形有二有三不得為一故在陰之時而不見為陰之功在陽之時而不見為陽之力陰陽自然無所營為此則道之謂也以一言之為數以數言之謂一以體言之謂無而物得間通之道微妙不測謂之神變化應機謂之易總而言之皆無謂之道故聖人以人事隨其義理立其名號不一而一故能常一常一非一亦非非一而為一者蓋天地之始萬物之元生化之本有生之尊也自一而能陰能陽所以一生二也原始要終者原本也要明也本其始而眀其終易繫詞也天得一以清疏氣象之大者莫大乎乾元故先標之為得一之首純陽之氣由得一故能穹隆廣覆資始萬物義曰陽氣浩大乾體廣遠又以元大始生萬物萬象之物皆資取乾元而得其生故易曰大哉乾元萬物資始也夫天積氣也故為氣象之大形如倚蓋故曰穹隆是有穹天之説言天穹隆高大而圓包覆萬物天乃純陽虛無之象非有礙之質然夫天也非沖和道氣所運則不能清浮而不息矣易繫曰乾天下之至健也夫乾確然示人易矣正義云此明天之得一剛質確然示人以和易由其得一無為物由以生示人易也若乾不確然或有隤裂是不能示其得一簡易之道也地得一以寧疏形質之大者莫大乎坤儀純陰之質由得一故故能盤礴厚載資生萬物義曰陰氣浩大坤體廣厚生長載物合會無疆地積形也故為形質之大柔順安靜萬物資生焉然夫地也非沖和道氣所運則不能厚載而安寧矣易繫曰坤天下之至順也夫坤隤然示人簡矣正義曰此明地之得一以其得一故坤隤然而柔自然無為以成萬物是以示人簡矣坤不隤然或有確然則不能示人以簡是乖其得一也神得一以靈疏神者妙萬物以為言由得一故能通變無方不可形詰義曰在天曰神在地曰祇在人曰鬼通而言之謂之神也神者陰陽不測隱顯無方然夫神也非沖和道氣所運則不能變化通靈矣不能變化無方通靈不測是乖其得一也谷得一以盈疏水注川為溪汪溪為谷言谷得一故能泉源流潤盈滿不竭義曰溪谷得沖和道氣所運而水注盈滿道氣去之則深谷將為陵矣若深谷為陵水涸川竭是乖其得一之用也萬物得一以生疏物者通該動植有識無情總謂之物得沖和故能生成運動而不歇滅義曰萬者舉其大數也春秋曰萬數之大也物者有質可見總謂之物該約也動者謂鱗甲羽毛裸蟲飛走之屬也植者謂山川草木之屬有情者謂有形而有情識者也無情者謂有其形而無情識者也此物之衆拘於億兆之類然不得沖和道氣所運則不能生不能成矣侯王得一以為天下正疏侯王人主也侯者五等之爵王者萬乘之主言侯王得一故能永有天下無思不服而為天下正平也本或作貞字者貞即正也義曰王者人君之通號也管子曰通德曰王古之製字者三畫象天地人連其中畫以通其道故曰通德為王亦云人所歸往曰王居尊位統三才三畫而中畫通之以貫天地人而為之主故為王字春秋曰今之王古之帝也昔堯舜之前皆稱為帝舜授於禹禹以謙讓自云德不及帝故去帝稱王亦云禹殁襌位於益禹之子啓居於箕山啓賢故諸侯去益而朝啓禹雖有襌益之名而天下之人皆歸於啓啓以德不及五帝乃自稱王自是之後皆以王為號至秦並天下吞滅諸侯獨為一統乃上採三皇下兼五帝通為皇帝之號焉今之王爵居五等之上漢法非劉氏不王非功臣不侯自是相承以天子之衆子為王嫡為太子自周有天下王之子為王子王之孫為王孫國朝定法以皇帝之孫姪為郡王承嗣者為嗣王異姓有功則封王或别錫美號或封郡王然皆無列土之位矣侯者五等之爵公侯伯子男也言侯王者取文之順而舉其一餘可知也然夫侯王既居尊極富有萬民當用沖和之道無為之理以守其位乃能長為人主理化平正故經曰聖人抱一以為天下式也無思不服者詩文王之風言文王之德東西南北之人皆感其德心無不歸服也其致之疏物得道用因用立名道存則名立用失而實喪矣故天清地寧神靈谷盈皆資妙用以致之爾故云其致之疏此總釋前義而生後文致得也言天之清澄地之寧靜神之靈變谷之盈滿物之生成侯王之正平者何以致其然耶皆得道之妙用爾此明得道之為益下文明失道之為損義曰言天地神谷萬物侯王六者能保其常安其所者何哉由得沖和道氣而各臻其妙也天以之清地以之寧神靈谷盈萬物以生侯王正平能不失其道則各當其分矣其有失者如下文所明矣天無以清將恐裂疏無以者致誠之詞也以用也夫矜存者喪執得者失言天得道用則致清浮若不守道沖和而但矜用其清將恐至於破裂不成象也義曰天陽氣也人君象之陽氣亢極則為災衰沖和氣散則致破裂矣故占云天裂者陽氣不足君德衰微天乃開裂晉惠帝元康年中人君德衰天示災變天裂數丈殷然有聲是失沖和得一之道氣也自此西晉版蕩惠帝哀帝皆罹其咎君象於天氣之相感信矣地無以寧將恐發疏言地得道用而致寧靜當須忘其寧靜若矜用其寧靜將恐至於發泄不成形也義曰地陰氣也人臣象之亦主妃后女主之位陰氣既極沖和氣散則有發泄之變矣史記云周幽王二年辛酉西周三川皆震岐山崩老君曰夫天地之氣不失其序若過其序人亂之也陽伏而不能出陰迫而不能蒸於是有地震今川實震是陽失其所而鎮陰也陽失而在陰源必塞源塞國必亡夫水土衍而人用也土無所衍人乏財用不亡何待斯乃失沖和道氣之用矣春秋二百四十二年地震有五又有梁山崩沙鹿崩石言等妖異洎秦漢已降不可勝紀大則淪陷城邑小則摧圮廬舍皆分野為災人罹其咎矣神無以靈將恐歇疏言神得道用而能靈變無方當須忘其精靈若矜用其靈將恐至於歇絶不能妙用也義曰夫天地質象萬物稟形皆有神明主之神明者乃氣中之精靈者感化而為神焉其大主天地其小主邦國山川若守常循和則能變化不測若肆其威福見怪於人乖其道氣將致歇滅矣春秋僖公三十二年七月神降于莘虢公享之周惠王問內史過曰是何故也對曰國之將興明神降之鑒其德也將亡神亦降之觀其惡也故有得神以興亦有得神以亡虞夏啇周皆有之矣虢名涼德其將亡乎後虢國遂滅昔河神為虐娶女於人西門豹投巫於河其害遂息神亦歇滅是乃神不守道氣肆害于人自取殄滅矣谷無以盈將恐竭疏言谷得道用而能虛受當須忘其盈滿將恐至於枯竭不能流潤也義曰谷之所以虛受不竭者由其得沖和道氣而能無竭道氣去之則為變怪繫於邦國廢興也老君曰伊雒竭而夏亡河竭而啇亡周幽王辛酉川竭山崩周亡之徵也亡不過十年數之紀也數及於十紀猶極也十一年庚申西周為犬戎所滅平王東遷是矣萬物無以生將恐滅疏言萬物得道用而能生若矜而用之將恐至於死滅不為生靈也義曰有形之物有情無情之衆稟沖和道氣則生失沖和道氣則死也西升經曰氣散生者死內觀經云氣來入身謂之生神去於形謂之死神與氣皆道之一謂也道存則生道去則死信哉侯王無以貴高將恐蹶注蹶顛仆也言侯王得道之用而能為天下之王當須忘其尊崇謙以自牧若矜其尊貴將恐至於顛仆不能正定天下也疏得一者不可矜其用故戒天無以其清而矜之將恐分裂地無以其寧而矜之將恐發泄神矜則靈歇谷矜則盈竭物矜則生滅侯王矜其貴則將顛蹶矣聖教垂代本為生靈雖遠舉天地之清寧而會歸只在於侯王守雌用道爾故下文云義曰侯王用道化民所以安其尊位貴居人先高居人上若守謙沖之志戒盈滿之非因百姓之心行清靜之化則享祚長久天下樂而推之欣而戴之矣易謙卦曰謙謙君子卑以自牧若違道反常肆行凶德失沖和之妙乖執一之方則身喪國亡顛蹶殞仆矣侯則晉靈公夷皋宋昭公杵白齊懿公啇人陳靈公平國是也王則夏之太康殷之武乙周之幽厲漢之桓靈是也皆違逆天常反道敗德以取滅亡矣疏注云聖教垂代本為生靈者書云天生萬物惟人為靈元后作人父母是知聖教所屬在乎一人雖始戒天地使忘清寧之功終戒侯王無矜化育之德用謙之道具如下文義曰惟人萬物之靈者尚書泰誓篇武王十三年大會盟津誓衆之詞也聖教者指此上下經垂文於代本為愛養生靈令遂其性故戒王侯使取則此經清靜行化生靈者言人為有生之最靈也元長也后君也一人天子所稱也尚書曰在余一人是也天子應天順人為人父母當法於道化愛育于人如父母之愛子爾先引天地清寧發裂之義以戒侯王守謙慎靜之規言天地至大失於道氣猶致其禍况人君乎故貴以賤為本高以下為基注侯王貴高兆人賤下為國者以人為本基當勞謙以聚之令樂其愷悌之化不然者離散矣疏貴高斥侯王賤下謂黎庶言侯王因黎庶得貴是知賤下為貴高之本基也義曰夫理國者功在一人不可一人以為理必資於衆然後侯王得深嚴其居尊崇其位行其教令布其恩威而理於衆焉黎庶者皆衆也疏書曰人惟邦本本固則邦寧人君務謙聚人可謂固邦之本也義曰人惟邦本者尚書五子之歌太康在位畋遊無度畋于有雒之表十旬不返厥弟五人御其母以從述大禹之戒以作歌曰皇祖有訓民可近不可下民惟邦本本固邦寧豫視天下愚婦愚夫一能勝子言天子當畏敬小民所以得衆心也太康啓之長子啓乃禹之子此言太康失德以遠滅敗故有窮氏因人不忍距之于河不克反國夏祚遽亡及少康年長方復社稷矣務謙者言人君當以謙下為務易曰謙德之枘也謙尊而光又曰天道虧盈而益謙鬼神害盈而福謙人道惡盈而好謙謙以下人故為德柄如刀斧之有柄然可執而用之人君執謙可御天下位既尊矣而能守謙益致光大謙則人衆歸往故曰聚人邦者國也本者基也人為國之本基豈可不愛而育之乎疏注云令樂其愷悌之化者詩云愷悌君子民之父母愷樂也悌易也君子有樂易之德愛養於人故百姓思之如子之於父母也若為德反是者則人離散矣義曰詩者大雅洞酌篇之詞也召康公戒成王言皇天親有德饗有道也侯王有道則天饗之有德則天親之與天相通則民歸之如子之親父母矣若違道敗德則衆叛親離不能克有其位也是以侯王自謂孤寡不穀此其以賤為本耶非乎注孤寡不穀凡情所惡侯王自稱以謙為本非乎者則是以賤為本也疏是以者結前義也侯王自為孤寡不穀者按春秋云孤與二三臣悼心失圖是也義曰孤與二三臣者春秋昭公七年二月楚子成章華之臺願與諸侯落之宫室始成祭之為落也太宰蒍啓疆曰臣能得魯侯薳啓疆來召公辭曰昔先君成公命我大夫嬰齊曰吾不忘先君之好將使衡父照臨楚國鎮撫其社稷以輯寧爾民嬰齊受命于蜀盟蜀盟在成二年奉承以來弗敢失殞而致諸宗祧自我先君恭王引領北望日月以冀傳序相授於今四王矣謂恭康郟敖靈王也嘉惠未至唯襄公之辱臨我喪孤與二三臣悼心失圖社稷之不遑泛能懷思君德今君若步玉趾辱見寡君寵靈楚國以信蜀之役致君之嘉惠是寡君既受貺矣何蜀之敢望其先君鬼神實嘉類之豈惟寡君若不來使臣請問行期寡君將承贄帛而見于蜀以請先君之貺公將往夢襄公祖梓慎曰公不果行襄卑讓為基故經云欲上人以其言下之欲先人以其身後之處上而人不重處前而人不害天下樂推而不厭此其謂歟古人有言曰有道之君以樂樂人無道之君以樂樂身樂人者衆悅而身安樂身者衆怨而身殞理國理人之主得不戒哉疏此其以賤為本耶者言若此豈非以賤為本非乎者假間之辭應答云實是以賤為本爾義曰老君欲顯明貴以賤為本高以下為基故發問答之辭用彰其義夫有問即答有唱即和亦猶形分即影見聲出即響隨假為問答之端重彰戒勸之意爾故致數輿無輿注數輿則無輿輪轅為輿本數貴則無貴賤下為貴本轅為輿本當存轅以定輿賤為貴本當守賤以安貴將戒侯王以賤為本故致此數輿之談疏故者仍上之辭前明侯王因賤得貴貴無定相其理難明故借數輿以況之極輿之數竟無輿名乃是輪轅假合為輿之名本以喻侯王數侯王之貴竟無貴名乃是賤下假借為侯王之貴本輪轅為輿本當存本則有輿無本則無輿賤為貴本當存本則有位無本則無位言此者欲戒侯王愛養下人不棄惸獨爾義曰聖人説經義有多種或直指事理徑入法門或假借諭辭用符玄意欲明侯王貴位以賤為本輪轅衆名為輿之號意欲存輪轅則有成輿總號存卑賤則有侯王尊名不忘其源不棄其本爾所云貴無定相者自混淪之始逮澆季之前變化殊方立名著號德有優劣世有盛衰民命不同風離俗異故有冥寂玄默無名無稱即有鴻蒙廣大而為皇潢然沐浴而為帝或廓然昭顯而稱王或通達參錯而稱霸其下則后辟公侯子男卿相大夫元士皆因時立名隨世興號紛綸等級卑高不同皆貴而牧人者也既處其上臨御于人不宜以尊極自高抑人矜己自高必傾覆侮物必危身當以謙下持心損抑為志故聖人立號垂戒以孤寡惸獨之義不穀非善之名使以為稱表其以賤為本貴不忘賤尊不忘卑則可以天祿永終爾景福者矣違於此者未或不忘又與無輿字或云車無車亦指就車而求無車之實但有廂轂雜號轅軛衆名總而為車爾莊子則陽篇曰太公調答少知曰合異以為同散同以為異今指馬之百體而不得馬立其馬於前總其百體而謂之馬此明合皮毛蹄尾則為馬總輪轅廂轂則為輿與此義同矣或云譽無譽者欲尊位之人尚其質朴不貴浮譽此義雖異亦戒勸之旨也又想爾注云故致數譽俗人貪名譽也無譽不欲俗人無有不欲名譽者也此析句分理亦申戒勸之人惟當恭己下心愛人恤物以從玄元之教也不欲琭琭如玉硌硌如石注琭琭玉貌硌硌石貌以賤為本疏夫玉貴而石賤如玉者自貴也如石者自謙也侯王既以賤為本不欲琭琭如玉而自尊貴當硌硌如石以守謙卑也義曰夫玉與石者所以明貴賤也車與輿者所以諭總衆也此兩句重結侯王以賤為本之義夫上德之君託神太虛隱貌玄冥動反柔弱靜歸和平戴規履矩鏡視太清而不以名稱自尊亢極自大也下世德衰君有九重之尊萬乘之貴四海之富六合之殷崇高擬天地光明配日月出令象寒暑震威象雷霆不以萬物為心不以羣生為念繁奢自處尊極自居雖有孤寡不穀之言而不達其意洎秦始皇虎噬天下鯨吞諸侯並滅海內總為一統而鄙斥孤寡不穀之名自稱曰朕朕余吾我也以此為號失其謙光之旨而彰尊大之名矣自此人君矜尚浮譽比堯舜以稱榮輕陋賤名將瓦石而同棄斯則輾敗亡之轍踐凋落之塗可不痛也太上格言殷勤垂戒者欲使冥心於玉石之間不多不少不貴不賤以一為紀綱以道為楨幹德制天下而不為有理身之士其志若此則處貴而無樂處賤而無憂高而不殆卑而愈泰得不勉而修之乎道德真經廣聖義卷之三十一
