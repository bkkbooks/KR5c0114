body:
  text: 唐廣成先生杜光庭述反者道之動章第四十䟽前章明天地得一以戒矜執之弊此章眀權實兩行將申反經之美不矜則全夫貴本合義則方可與權欲令深悟道元所以再明沖用義曰夫沖用之道妙本之元包括有無貫穿天地天地得之以寧以永萬物得之以生以成理國之君當法道化以無爲不可徇名稱而矜執必矣故戒之以賤下爲基忘元喪本故示之以權變爲用權變以反本合沖用於玄功矣此章之大㫖也反者道之動注此明權也反者取其反經合義反經合義者是聖人之行權行權者是道之運動故云反者道之動䟽反以反俗爲義動是變動之名謂權道也言衆生矜執其生而失於道故聖人變動設權令物反俗順道爾義曰夫物順道則生失道則死其故何哉道本無事無爲人尚有爲有事道本無情無欲人尚有欲有情故俗與道反而去生從死也經云動之死地以其生生之厚又云人之輕死以其求生之厚是以輕死所謂求生之厚者躭欲羡利徇俗趨名役性勞神圖功慕賞本爲養身之具不知求非其分反喪其生吴子云天地之生禽鳥也猶衣之以毛羽供之以蟲粒況於人乎衣食者雖養身之所切亦可委心任運豈在躁求乎不能體道全生委心順命者是謂執其生而失於道矣若能祛躁求之妄安順命之懷體彼恬愉生可全矣理國者任物之性順天之時息苛暴以惠人輕賦傜而育物無拓土開疆之欲自戢五兵無崇臺峻宇之奢自清庶務躋生靈於壽域斯可謂反俗順道乎䟽注云反經合義者經常也義宜也令貴以賤爲本高以下爲基有以無爲用初則乖反常情而後順合於道故謂此之爲運動也義曰經者常法也垂訓而不移義者通理也因宜而適用世以高貴爲重卑賤爲輕咸慕高而弃卑捨輕而從重經文垂教言高因下而顯貴假賤而明故以賤下爲高貴之基孤寡爲侯王之稱使其貴不忘賤受福於無窮高不忘卑保身於不殆斯爲道之動用使反常俗之情各復自然之道也䟽孔子曰可與立未可與權道反常而難曉故舉當隸之喻言其華反而後合以喻權道先逆而後順也義曰論語子罕篇孔子曰可與共學未可與適道可與適道未可與立可與立未可與權此言人適於學或得異端未能之於道或能之於道未能有所立未必能權權者量其輕重也棠棣之華偏其反而豈不爾思室是遠而此逸詩也棠棣栘也其花先反而後合賦此詩意蓋喻權道先逆思後至於大順也思其人而不得見者其室遠也以言思權而不得見者其道遠也子曰未之思也夫何遠之有言思者當其反是不思所以爲遠能思其反何遠之有言權可思知惟不知思耳思之有次序斯可知也故謂權道者爲國之利器用須得其人得其人則反俗而合道非其人則反而爲亂矣弱者道之用注此明實也弱者取其柔弱雌靜柔弱雌靜者是聖人之所實處實道之常用故云弱者道之用䟽此明實道也人皆賤弱而貴强是知强梁雄躁者是俗之用也道以和柔而勝剛是知柔弱雌靜者是道之常用故云弱者道之用義曰道先柔弱俗貴强梁柔弱爲保生之徒强梁爲取敗之本經云强梁者不得其死吾將以爲教父執此以訓使人棄强守柔捨躁歸靜也夫教有權實兩門上士達識以實教示之自然冥合中於道智下士則以權教悟之亦猶將欲奪之必固與之之義耳理國之道務先愛民民爲國本不可棄也然而上古淳朴與道相符故以實教教之末代澆季奸詐互興則以權教教之權教者先以善道誘之不從以恩賞勸之勸之不從以法令齊之齊之不從以科律威之威之不從以刑辟禁之刑辟者所謂五刑之屬也謂刻其顙而涅之爲墨刑截其鼻爲劓刑男子去其勢婦人幽閉次於死也禁其淫也曰宫刑刖其足曰剕刑處死曰大辟五刑者先定其兩造之詞兩造具備聽於五辟五辟簡字正于五刑五刑不簡正於五罰言從輕也五罰不服正于五過不應罰者正於五過而從赦免五過之疵其罪惟均刑疑從罰罰宜從赦將用刑猶當嚴敬天威不可輕用刑也故墨刑之罰百鍰劓刑二百鍰剕刑五百鍰宫刑六百鍰大辟千鍰所謂金作贖刑是也墨劓之屬各千剕刑之屬五百宫刑之屬三百大辟之屬二百故五刑之屬三千其言鍰者黄鐵爲之鍰重六兩書云功宜惟重罪宜惟輕雖權法以禁勸於人而聖人哀矜之道好生之心亦云至矣故勸教之所不及而後用刑也是故刑之使民懼賞之使人勸勸以趣善懼以止惡雖刑之及人謂爲害也而懲一勸百被刑者寡而從善者衆如櫛髮焉惜而不櫛踰旬而一櫛則棄者多矣旦旦櫛之理者多矣權教者帝王南面之術也理身者體柔順之道去剛强之心乆而勤之長生何遠乎天下之物生於有有生於無注實之於權猶無之生有故行權者貴反於實用有者必資於無然至道冲寂離於名稱諸法性空不相因待若能兩忘權實雙泯有無數輿無輿可謂超出矣䟽言天下有形之物莫不以形相襌故云生於有窮其有體必資於無義曰無者道之本有者道之末因本而生末故天地萬物形焉形而相生是生於有矣考其所以察其所由皆資道而生是萬有生於妙無矣能自有而復無者幾於道矣若執有而不移者趣於終矣莊子知北遊篇夫子謂冉求曰未有子而有孫可乎是祖父子孫世世相續形形相生天地萬物皆形而相生者也理身養神以存形形可長乆勞形而役神神將不守神因形而生神從道而禀神形俱全可以得道形滅神遊道何求哉理國者執法以訓人人趣善矣人趣於善而和氣應之國泰民和隆昌之道也䟽故列子曰形動不能生形而生影無動不能生無而生有故曰虚者天地之根無者天地之源言此者欲令衆生窮源識本而悟道爾權實亦然故注云實之於權猶無之生有也義曰形動不能生形者列子天瑞篇曰黃帝書云形動不能生形而生影聲動不能生聲而生響此言有形必有影有聲必有響自然而並生俱出俱没豈相資先後而差哉非謂影隨形生響因聲出而立爲喻此自然相感因待之理也道以妙無生成萬物謂之自然物之生物形之生形謂之因縁言物之形兆大若天地微若昆虫皆資自然妙道氣化而成然而因形縁類更相生更相成修道者縱心虚漠抱一復元則能存已有之形致無涯之壽形與道合反於無形變化適其宜死生不能累則可謂自有而歸無也吴子曰修道之士道與俗反自老而反壯自壯而還嬰自嬰而得道此所謂捨其麤有歸其妙無還元復本也世人不能察道之元窮道之本自人於死淪化隨時故可傷矣聖人憫之設以權教使去奢從儉去偽從眞去有欲有爲行無爲無欲徇此權教漸階實門默契眞修可以得道矣理人爲政以權實化俗理亦然哉䟽又云至道沖寂離於名稱諸法性空不相因待者言道至極之體沖虚凝寂非權亦復非實何可稱名諸法實性理中不有亦復不無事絶因待所言物生於有有生於無者皆是約代法而言爾若知數輿無輿即知數諸法無諸法豈有權實而可言相生乎悟斯理者可謂了出矣義曰道惟冲寂不可名稱隨代化凡假說言教言教者即諸法也法以約人使革惡爲善垂之訓俗事有多門故云諸法爾因有法故得悟於道悟既得道諸法亦無教立權門國垂權法權以化俗除其惡根惡既已除俗歸正理因正爲善權法亦忘若執權實而不移局教法而無改者不可與言道矣能忘權實而達道者可謂了然明悟出代登眞者矣莊子秋水篇海若語河伯曰知道者必達於理達於理者必明於權明於權者不以物害己此言道以循理守常權以臨機制變大人通理誰害之焉上士聞道章第四十一䟽前章明權實兩門是道之動用此章明明道若昧唯上士勤行初明三士聞道信毁不同次建言下明道德之行門後夫唯下結善貸之功用義曰至理幽玄非下士能曉明道若昧唯上智勤行既性識之不同彰信毁之無爽要在設權教以善誘俾建德之有歸不可任性識之所拘求沉淪而無教故下文開悟令入法門斯謂善貸之功矣上士聞道勤而行之注了悟故勤行䟽上智之士深識洞鑒聞道權則微明實則柔弱聞斯行諸曾不懈怠故云勤而行之義曰人之生也氣有清濁性有智愚雖大塊肇分元精育物富貴貧賤壽夭妍媸得之自然賦以定分皆不可移也然道無棄物常善救人故當設教以誘之垂法以訓之使啓迪昏蒙叅悟眞正琢玉成器披沙得金斯之謂矣按孔子所云生而知之者上也學而知之者次也困而不學民斯下矣此與三士事理玄同又論語雍也篇云子曰中人已上可以語上中人已下不可以語上也此謂教化之法也師說云就人之品識大判有三謂上中下也細而分之則有九品上上品者即是聖人聖人自知不勞於教下下品者即是愚人愚人不移教之不入所可教者謂上中以下下中以上凡有七品之人可教之耳所謂中人已上可以語上者即以上道語於上分也是則以孔子之道教顔回以顔回之道教閔損是中人已上可以語上也其中人已下不可以語上者猶可語之以中及語人以下如以閔損之道可以教中品之上此乃中人亦可以語上也又以中品上道教中品之中以中品之中道教中品之下斯則中人亦可以語之中也又以中品之下道教下品之上斯則中人已下亦可以語中又以下品之上道教下品之中斯則中人已下可以語下也此中人已下大略言之耳既有九品則第五品爲正中人也其二三四爲上六七八爲下惟下下之士教而不移聞道則笑矣吴先生曰上士不教而自知下士雖教而不移神道設教爲中士耳夫中士者語之以善則遷善導之以惡則趣惡故教之所設爲中士之人可上可下也太上之㫖誘以多方教以善道俾其遷革漸脱愚迷俾有向風進善之門則所謂人無棄人矣上士既悟之於自然故勤行不怠也中士聞道若存若亡注中士可上可下故疑疑則若存若亡䟽中庸之士明昩未分聞說妙道或信或否謂明則若存而信奉昩則若亡而疑或未果决志故謂若存若亡義曰若存若亡者可上可下之意未果决也代俗之情爲富貴所誘利害所牽娱樂難忘驕奢自恣聞玄默之道孰肯勤勵而修之遂乃五色瞽其明五聲聵其耳迷情溺性自掇敗亡苟能聞惡如探湯慕善如不及知過必改見賢思齊效上士之所修捨中庸之所樂皆可以躡景淩虚矣下士聞道大笑之注迷而不信故笑之䟽下士識不及理聞道不信謂爲虚誕則嗤笑之亦猶章甫致賤於越人和璞見遺於楚國故莊子云曲士不可以語於道爾義曰大笑者謂愚昩之士智識昏庸不聞聖人之言聞亦不曉不見先王之教見亦不知所謂識不及理也聞眞眞之道能生成天地孕育乾坤包舉陰陽彌綸造化修身則延生乆視理國則凝拱垂衣反爲虚誕相與嗤笑故云大笑之章甫者鄒魯之冠也越人者百越之國也夏禹理水極于東夷子孫居之遂以爲國其舊俗被髮文身至勾踐平吴方通中國既不尚冠冕則章甫非彼所好也故云致賤爾和璞者卞和楚人居荆山之下得玉璞焉以獻楚王使玉工視之曰石也以爲欺妄刖一足如此歷二王再獻之刖其兩足和抱玉璞哭於荆山之下楚王知而召之使玉工琢石得玉因而寳之後傳入趙自趙入于秦秦皇平天下廢諸侯爲郡縣刻其玉爲傳國璽焉言卞和三獻其璞方爲時主所知故云見遺於楚也莊子秋水篇海若語河伯曰井蛙不可語於海拘於墟也曲士不可語於道束於教也所謂曲士者執一家之偏見滯彼有爲河伯恃秋水之滂流不知其小海若曰天下之水莫大於海萬川歸之不知何時止而不盈尾閭泄之不知何時止而不虚春秋不變水旱不知此其過江河之流不可爲量矣而吾未嘗以此自多者自以此形於天地受氣於陰陽計四海之在天地間猶罍空之在大澤耳夫雖越俗賤冠楚人遺璞泊乎刻秦皇寳篆襲中國衣瓔垂範後王同軌六合和璧章甫何賤乎理化之端隨機設教道之從善引之向方雖下士至愚亦可以語於道矣不笑不足以爲道注不爲下士所笑不足以爲玄妙至道䟽至道幽玄深不可識明而若昩理反常情所以致笑若不爲下士所笑未得精微乃是淺俗之法不足以爲道道非代間法故爲凡愚所笑是以爲妙道也義曰道惟潜還寂默希夷不察察以繩人不昭昭而顯狀體道之士其行亦然内合虚無外混塵滓故至明若昧人所不知豈惟順俗和光兼亦守卑處下所以下士侮而笑之然至人之隱身修道不爲下士所笑未合乎大道也理國行化亦在乎澄澹無爲任物自化以慈柔潜布恩煦周行使其民也日出而作日入而息昏昏默默不知帝力不知其上之有君也雖下民不知帝力而聖德遐被玄風普覃所以爲至化矣建言有之注建立也將欲立言明此三士於道不同也䟽建立也將立言釋上士勤行之道中士存亡之致下士大笑之由有之指下明道等也義曰太上將立言顯道以表三士不同之由故有此句明道若昧䟽明照了昩昏暗也謂道德行人以昩養明遺形去智而實明了故云若昩言上士勤行於明若昩下士不達是以笑之中士初聞明道故若存後聞如昩故若亡爾義曰夫大道之君體道而處神與化合處於自然萬彙任眞莫有聞見性合道之玄妙命得一之精微動作順於太和取捨合於天理無思無慮冥寂鴻蒙齊日月之照而民不以爲明均雨露之恩而民不以爲惠其至明也而若昏默焉上士修道隱智藏輝含見匿知反視内照而外若嬰兒此固非中士之所及乃爲下士之所嗤也若有若亡抑亦其冥矣又言天之德也雖赫赫在上常如冥昩耳進道若退䟽進道之人内心不起外事都忘功名日損大成若缺下士觀之似如退敗義曰弘道之君也天下童蒙四海爲一務其損而不益其事然而不作所爲者寡所守者約民忠厚而敦信世和順而質朴王如天地民如草木不以萬乘爲尊不以九重爲樂謙弱撝退恬和無欲而其道博施其德恢廓此若退之道也上士以此理身而玄德潜施而不矜不衒陰功默運而不識不知讓善於人退身度物而其丹籙之名克著青華之簡昇聞李意期乞食於人寰陰長生受辱於都市侯道華寓跡於傭保皇甫獺示疾於丘林聲子伴狂壼公韜晦皆卑躬損志乃者習景冲眞也又言地之德也雖蒸蒸在下常如卑退也夷道若纇注上士勤行於進若退於夷若纇故中士疑而下士笑䟽夷平也纇絲之不匀者夫識心清淨塵欲不生坦然平易與物無際而外若絲之有纇義曰絲之無纇即爲人所用齊紈楚練霧縠雲羅皆入彼化機忘其本質以至靡壞不復爲絲矣人之捨道即爲俗所運馳各競禄滯色躭聲流浪惡縁迷喪眞性以至淪滅不保其生矣達士理身内則夷坦外示同塵履苦遇樂隨時應跡若絲之有纇也仲尼大聖之德而伐樹削跡歷聘諸邦玄元大聖之尊而伏柱藏書行化絶域此其内懷至道外若有纇焉又言君之德也雖法地則天不敢標異常若有滯纇焉上德若谷注虚縁而容物也䟽言勤行之士謂之上德德用光備無不含容故云若谷義曰有道之君託神太漠隱貌玄冥被道含德無不包括萬國之廣貯於胸中不恃其有萬物自化曠乎域中不矜其大豈若谷之可諭乎又言國君含垢如溪谷之受汙也上士體道德無不周固亦然矣大白若辱注純潔而含垢也䟽白純净也辱塵垢也得純净之道者混迹同塵故稱若辱而實純白獨全備爾義曰堯湯之德至明也而時有襄陵鑠石之數民無墊溺菜色之憂亦大白之有塵垢矣修道之士外汙若干吉託形而齒劍惠風示跡以沉泉内明道功旁混塵濁亦斯義也廣德若不足注大成而執謙䟽言至人德無不被廣也守柔用謙故常若不足史記曰良賈深藏若虚君子盛德容皃若愚義曰上德之君化被九圍不恃其德九圍自化不知其功固若不足爾修道之士功濟幽顯德洽昆虫立功不息崇德不倦常若不足良賈深藏者史記云孔子與南宫敬叔適周問禮於老君老君曰子之所言其人骨已朽矣獨其言在爾吾聞之良賈深藏外若虚君子盛德容貌若愚去子之驕氣與多慾態色與淫志皆無益於子之身吾所以告子者若是也此蓋責孔子以三綱五常之教汨亂於人不尚大道矯飾禮義豈若善爲賈販之人藏寳積貨外畏人知常若虚匱之者耳建德若偷注立功而不衒也䟽建立也偷盜也言建立陰德之人潜修密行如彼盈竊當畏人知故曰若偷義曰人君施德行道潜育於人不伐不矜惟冲惟寂不令天下知覺故云若偷上士修身常持密行故有若偷之義又偷薄也論語大伯篇孔子曰君子篤於親則民興於仁故舊不遺則民不偷包氏注云興起也君能厚於親屬則人皆化之起爲仁厚之行不偷薄也此言建立陰德之人所行之行有功則立不計其名有善必行不務其厚吴子曰功不在大遇物斯拯是也質眞若渝注淳一而和光也䟽眞淳一也渝變改也言道德行人其德淳一而無假飾若可渝變與物同波而和光也義曰質素也眞淳也眞淳質素之人惟善是適方圓任器不局一隅若可渝變爾大方無隅注不小立圭角䟽方正也隅角也夫砥礪名節以作廉隅此爲束教之人非曰大方之士磨而不磷在涅不緇大方也而能和光同塵不自殊異無隅也故曰大方無隅義曰至道之君玄德浩邈無不包容籠虚無而不爲大亘天地而不爲遠若鳴鳳之升寥廓若神龍之逸層霄豈隅可以圍測哉上士弘道異夫儒術不局名分不拘廉隅坦然其量也眇若太虚泛然其志也杳若冥鴻不緇不磷有在於是矣論語陽貨篇佛肸召孔子孔子欲往子路曰昔者由也聞諸夫子曰親於其身爲不善者君子不及入也佛肸以中牟叛子之往也如之何子曰然有是言也不曰堅乎磨而不磷不曰白乎涅而不緇磷薄也至堅之物磨之而不薄緇黑也至白之物涅之而不黑喻君子雖在濁世不能汙也聖人不爲世俗所染如至堅至白之物也上士之行聖人之德固無方隅可拘矣大器晚成注且無近功䟽備物之用曰器以晩故能成大是以上士勤行積功而證得之於漸非一朝一夕故曰晩成義曰積和而成人積功而成道非朝夕之可就故曰晩成用道之君化於人也抱無爲任因循忽忽昩昩而不苛察純純悶悶而不滋彰任物自然而四海之内臻於道矣理身之士積功累行不其然乎故曰功滿三千白日昇天弘道無已自致不死非朝行而夕至也備物之用曰器者春秋定公九年夏陽虎歸寳玉夏后氏之璜封父之繁弱大弓書之曰得器用也凡獲器用曰得得用曰獲故器者備物之用也大音希聲注不飾小說䟽夫道能應衆音大音也聽之無聲希聲也以況聖人開演一乘則法音廣被待感而應故曰希聲義曰大音若雷不可以四時震擊聖人微㫖不可以終日諠傳此明道不可聞也必在滅智内求灰心默𢍆然後聽之非耳聞之以神得無聲之聲證眞道矣一乘者大乘之道也道貫萬法而演爲三乘初法以戒檢心以律檢行以存修靜其内以齊潔嚴其外然漸進中道習於無爲隳體黜聰忘形絶念而次登大乘之行次來次滅隨念隨忘不滯有無玄𢍆中道證此道者鍊凡以登仙超俗而度世淩倒景之上享無窮之齡天地有傾淪而眞道無渝壞法音周普拯度羣生此聖人一乘之用也大象無形注故能應萬類䟽夫涉形器者則滯於一方矣惟大象之道本無形質隨感而應能狀衆形故曰大象無形義曰大象道也道非象故摶之則微豈善清浮爲天濁厚爲地大爲日月小爲星辰而昭昭可見乎必在乎反視内明含光中朗然後見非色之色睹無形之形也夫道惟大象寂寥無形能成生衆形彫刻萬象萬象生化在大象之中矣唯得道者能窺其形兆焉道隱無名注功用不彰無名氏也䟽語其通生則强謂之道忘其功用則隱無名氏欲明名以詔體而妙本無象則體不可名故曰道隱無名義曰道無名稱本非有法法既非有故曰隱焉能忘强名之名可階衆妙之妙道生萬有不矜其功是忘其功用也道應一切不爲主宰是隱無名氏也是曰無象之象無名之道自非反神内鑒胡可得而言之夫惟道善貸且成注雖隱無名氏而實善以沖和妙用資貸萬物且成熟之䟽此結道之功用夫歎也唯獨也貸施與也歎美此道雖復無名無氏無形無聲獨能布氣施化貸施萬物且成熟之故曰善貸且成義曰道之功也生成不息運用無窮秋毫之微庶類之衆皆資道氣假借而後能生能成貸假借於物也無名無氏爲萬有之根無聲無形爲萬物之源布氣十方成就一切非妙本之道孰能與於此乎道徳眞經廣聖義卷之三十二
