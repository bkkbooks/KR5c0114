front:
  text: 道德真經廣聖義卷之十三
  hash: sha256:43fd97c20cc9a773e01f2c46dd759ab44067db746ce67e18491e87a16b4489d2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0114_HFL_014-001a, image: hfl/0442/0442-058.png}
body:
  text: 唐廣成先生杜光庭述寵辱若驚章第十三疏前章明染逐塵境馳騁則發狂此章明寵辱皆驚貴身故為患本首兩句標宗以起問次十句因問以明理故貴下假寄託以結成義曰馳騁貪貨既戒於前寵辱大患故明於此凡情得寵則喜遇辱方驚殊不知寵有辱隨辱為寵末禍福倚伏寵辱循環聖人了知故寵辱皆驚棄而不取若外身抱道方免寵辱之來徇世貪榮難逃福禍之至非獨爵位為戒亦以天下為憂故桎梏紱冕而粳粃億兆或不獲己而處其位則撝謙為本雌靜為心故申寄託之喻用明安危之旨爾寵辱若驚注操之則栗捨之則悲未忘寵辱故須驚也疏若如也言寵辱之驚相如也夫操之則寵捨之則辱言人不能心齊榮辱矜徇功名執權既以為光寵失位自驚於卑辱光寵則矜徇卑辱則驚嗟故陳戒使其若驚欲令齊其寵辱義曰聖人睿鑒得喪混同尚以死生為一條豈復寵榮而辱懼故戒之曰得寵亦驚此則寵辱齊一得失混同也所以言驚者寵為辱本安得無驚且人君富有天下尊繼百王告類上玄君臨萬有亦當馭朽自戒納隍軫憂乃能享此大年保其遐祚矣人臣之遭遇也九遷三接之澤既已厚矣兵符相印之任亦已重矣高冠大旆長轂朱輪氣壓伊臯權傾衛霍亦當夙興夜寐履薄臨深乃能克保福祥免貽覆餗矣故令尹三已而無愠考父三命而益恭達其理也夫富與貴是人之所欲不以其道得之不處也貪與賤是人之所惡不以其道得之不去也苟能達道則富貴貧賤寵辱得失無所驚也易繫曰吉凶與民同患正義謂非獨凶者人之所憂患吉者亦人之所憂患也何哉既得其吉又患失之此亦寵辱若驚之旨爾貴大患若身注身為患本故矜貴其身即如貴大患矣此答云貴身如貴大患而乃云貴大患如身者欲明起心貴身即是大患有貴即身是大患故云貴大患如身若如也此上兩句正標疏貴矜也若亦如也身者禍患之源夫耽玩聲色矜競榮華皆為有身遂成患本即貴其身者復何貴乎貴大患矣即身是患等無有異未能無患只為有身即此貴身同貴大患若能無患亦復忘身是知患猶貴生身為患有故云貴大患若身義曰夫至人順道忘患忘身內忘肝膽外遺耳目倣徨乎塵垢之外逍遙乎無事之業此即有身亦猶無也豈復憂其患乎所以世人之身內則飢渴苦惱晝夜相攻外則風寒暑濕循環相害疼酸痛癢聲色繁華嗜欲是非利名得喪六情中撓萬境旁牽皆為患本矣西升經曰身為惱本痛癢寒溫意為形思愁惱憂煩吾拘於身知為大患觀古視今誰存形完是也患隨身立身存則患生寵與辱偕寵極則辱至老君恐世人不曉故兩舉以明之將細指陳復下句發問矣列子天瑞篇云人自生至終大化有四嬰兒也少壯也老耄也死亡也其在嬰兒神專志一德充氣和善莫偕也其在少壯血充氣溢欲盛心侈德殆衰矣其在老耄也欲慮柔焉體將休焉物莫先焉方於少壯氣已間矣其在死亡也則之於息焉反其極也此四者相須而行相待而成惟得道者反之矣理身之士其自勗焉爾何謂寵辱寵為下注前標寵辱如驚恐人不了故問何謂寵辱夫得寵則憍盈無不生禍是知寵為辱本故答云寵為下疏前標寵辱若驚恐人不曉故設問云何謂寵辱自答云寵為下所以明寵為下者夫恃寵則憍盈憍盈即生禍因寵獲禍則寵為辱本故知寵為下也義曰老君恐人未曉前義舉問欲以重明既立問者之詞乃為對答之理云寵為下者辱因寵至寵是禍階世人視寵以為榮聖人觀之以為下也恃寵憍盈者春秋隱公四年衛公子州吁恃寵而好兵其臣石碏諫衛莊公曰臣聞愛子教之義方不納於邪憍奢淫佚所自邪也四者之來寵祿過也夫寵者不憍憍而能降降而不憾憾而能眕者鮮矣公不聽明年桓公立州吁弒桓公衛人殺州吁焉是則因寵獲禍可謂寵為下矣得之若驚失之若驚是謂寵辱若驚注寵辱循環寵為辱本凡情惑滯驚辱而不驚寵故聖人戒云汝之得寵當如汝之失寵得辱亦如吾戒汝得寵而驚懼也故結云是謂寵辱若驚疏得則為寵失則為辱若驚者夫寵辱循環寵為辱本代間衆生得寵則欣喜得辱則驚懼聖人戒云禍福循環譬之糾纏寵辱無定豈可獨驚辱來既驚其禍患寵至亦驚其憍逸其驚相若故結云寵辱若驚義曰得寵不驚得辱則懼者常情也寵至而懼其憍逸辱來而知其禍患者君子也得寵而驚日慎一日即無禍患之辱矣得寵不戒以憍以矜必有危亡之辱焉人君恃天之寵不恤於人則景命遷革矣人臣恃君之寵持權傲下則刑悔將及矣纏索也糾結也糾纏相循之貌也何謂貴大患若身注恐人不曉即身是患本故問也疏恐人不曉故設問以明義曰亦如何謂寵辱之義世人得寵而不思其辱故辱至則驚老君欲戒於恃寵之人故重自發問爾吾所以有大患者為吾有身注身相虛幻本無真實為患本者為吾執有其身痛癢寒溫故為身患疏吾所以有此大患者為吾執有身相好榮惡辱辨是與非不得則大憂以懼心神內竭於貪欲形體外勞於奔競苶然疲役非患而何義曰苶疲役也吾我也指名身也身相既有患纍隨之勢利相高故好榮防慮亡危故惡辱若夫強干人事妄辨是非得則憍侈以恣情失則憂驚以損性損性則心神內竭恣情則奔競外勞或憔悴江濱或恓惶澤畔形疲心役為患深焉及吾無身吾有何患注能知天地委和皆非我有離形去智了身非身同於大通夫有何患疏無身者謂能體了身相虛幻本非真實即當坐忘遺照隳體黜聰同大通之無主均委和之非我自然榮辱之途泯愛惡之心息所謂帝之懸解復何繫於大患乎哉故云及吾無身吾有何患注云委和者莊子承答舜問云身非汝有是天地之委和者也義曰無身者非頓無此身也但修道之士能忘其身爾業報經云衆生苦惱常為有身生死輪回不能自出以何方便妄想得除太上曰妄想顛倒皆從心起強生分别繫念我身觸境生迷舉心皆妄以此流浪淪乎生死但當定志觀身盡皆虛假既知虛假妄想漸除妄想既除內外清淨自悟真道謂之忘身既忘其身患纍息矣莊子曰適來者夫子時也時自生耳適去者夫子順也理當死耳安時處順憂樂不入此達人之忘身也幻者假妄變化之謂也真實者契道之謂也坐忘遣照者安坐忘身之謂也外忘萬境內息一心心若死灰形如稿木不知肢體之有不知視聽之用隳肢體黜聰明遺形去智以至於大通通無不通泛然無主此達人之忘心也顔回得之以告於夫子焉如此則天地之大吾不知也日月之明吾不有也何榮辱愛惡之可滯哉帝之懸解者性命之情得矣寧復繫於大患乎則無身無患養生之要也委和者莊子知北遊篇承答為曰身非汝有天地之委形也生非汝有天地之委和也性命非汝有天地之委順也言天地結氣而生氣上氣下曰順爾若身是汝有美惡生死當制之由汝今氣聚而生汝不能禁也氣散而死汝不能止也明其委結而自成非汝有也故行不知所往處不知所持食不知所味皆在自然中也達此則近於道矣何大患之可憂乎故貴以身為天下者若可寄天下愛以身為天下者若可託天下注此章首標寵辱之戒後以寄託結成者夫寵辱若驚未忘寵辱貴愛以為未忘貴愛故以辱校寵則辱不如寵以貴方愛則貴不如愛驚寵辱者尚有寵辱介懷存貴愛者未為兼忘天下故初則使寵如辱後欲令寵辱俱忘假寄託之近名辨兼忘之極致忘寵辱則無復驚忘身則無患本忘天下則無寄託之近名也疏言人君自矜貴其身以為天下之主者貴身則淩人人故不附可暫寄爾義曰夫人君自貴其身而為天下者必自尊自大作福作威以臨於人以肆其欲窮華侈之飾極奢麗之求外則殘物虐人窮兵縱武內則瑶臺瓊室酒池肉林斂天下之怨嗟資一身之逸豫尊其名號深其溝隍賞有臺榭陂池宿以妃嬙嬪御不知人之離心離德而欲為萬世之基淪滅不暇若暫寄於天下爾疏若自愛其身以為天下之主者愛身則慈人慈人則推樂故可託身於萬人之上長為之主矣義曰夫人君自愛其身而為天下者必以恭以謙以儉以約謙恭則怨敵不起儉約則嗜好不行無怨敵則人安無嗜好則人富如此內睦九族下親萬民遠懷近悅上下交愛却千里之馬惜十家之財菲飲食卑宫室外無征伐境無勞人享祚久長可以永託於天下疏然此一章首驚寵辱結以寄託者欲明驚寵辱不若忘寵辱存貴愛不若忘貴愛寄托天下不若忘天下故為大患為吾有身驚寵辱則未能無我都忘則百慮一致矜有則萬殊爭長故忘寵辱則無所復驚忘身則無為患本忘天下則無寄託之近名然後上有太上之君下有下知之臣無為無不為不德為有德矣義曰身為患本寵辱由身而生能忘其身則忘寵辱矣忘寵辱者寵至不喜時之來也辱至不驚時之去也不充詘於富貴不隕獲於貧賤非至達之士孰能與於此乎忘身者身與道合升為雲天與道無為當有何患乎非至道之士孰能造於此哉忘天下者遊心淡漠冥神虛無任物自然而然不以汨其慮無私而天下理然後目無所見耳無所聞心無所知氣無所滯神將守形形乃長生功蓋萬國而不自已化貸品物而不為有無名無稱使物自遂立乎不測而遊乎無有與萬物為體而歸乎虛無故黃帝得之以登天太皡得之以升玄此聖人忘天下而至乎道也太上之君下知之臣解在十七章矣道德真經廣聖義卷之十三
