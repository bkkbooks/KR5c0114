front:
  text: 道德眞經廣聖義卷之四十二行五
  hash: sha256:9d8274c7aea7480111896c0fc47d66b34ccdac4772b8cfb29b622f0bf483b7ca
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0114_SJB_043-140526c, image: sjb/14/140526c.png}
body:
  text: 唐廣成先生杜光庭述大國者下流章第六十一䟽前章明以道莅物則其德交歸此章明以德下人則物歸謙讓初標大國用謙故能攝化次故大國下叙大小各得所欲後故大國者偏戒大國特宜用謙義曰謙乃德基下爲貴本大國以謙爲用則小國歸仁巨海以下爲資則百川朝會故喻牝以柔勝政以靜彰故大國以謙下聚人小國以卑順奉上各安其位互得其宜理國理身斯爲至訓矣春秋昭公三十年鄭游吉對晋大夫士景伯曰小國事大在恭其時命大國宇小在恤其所無先王之制也取備而已所以交其好也此固大國切於用謙不在乎以大制小矣大國者下流天下之交注下流者謙德大國當下流開納則天下之人交至䟽江海處衆流之下百川委輸故曰下流施之於人是謙德也夫人君者有道則國存無德則人散故處大國者當下流開納令天下之人交會而至則能全其大故曰下流天下之交義曰蠢蠢群生君爲司牧開邦立國道德爲先德以下人道以育物國益大而心益下人愈歸而君愈謙億兆樂推遐邇交會不其韙歟天下之交牝牝常以靜勝牡注天下之交疊出前文以結下流之義也䟽天下之人所以交會至者由大國謙下之故喻如牝者常以雌靜爲牡動所求此云以靜爲下則明牝常以雌靜而能勝牡者由以安靜爲下故爾義曰靜以理身必氣和而神暢靜以理國必德廣而人歸以靜爲下斯之謂矣故大國以下小國則取小國䟽故者仍上之文以結成前義也言大國之君所以不事威武而用謙卑之德以柔服之者將欲懷來附庸之君取其小國之人而爲臣妾爾義曰大國以謙靜率人人所親附不施威武不恃權謀故小國懐仁求爲臣妾國愈廣而衆愈繁矣大國能安撫小國如晋爲盟主而衛國逐其君而立剽晋欲討其罪晋侯問故於中行獻子偃對曰不如因而定之伐之未必得志而動諸侯史供有言曰因重而撫之仲虺有言曰亡者撫之亂者取之推亡固存國之道也君其定衛以待時冬會于戚以定衛此所謂大國之撫小國也又大國之聚小國者謂群方朝會無代無之故夏啓有鈞臺之享在河南也啇湯有景亳之命在偃師也周武有孟津之誓成王有岐陽之蒐康王有酆官之朝在鄠杜也穆王有塗山之會在壽春也齊桓有邵陵之師晋文有踐土之盟皆以大國恤下小國事上各得其所也大國不能撫小國者如晋侯不能字育諸侯强令於鄭鄭子家與趙宣子書曰古人有言畏首畏尾身其餘幾又曰鹿死不擇音小國之事大國也德則其人不德則其鹿也鋋而走險急何能擇此言晋若虐命於鄭鄭將庇於楚矣命之罔極亦知亡矣將悉弊賦以待於儵叔晋之境也居大國之間而從於强令豈其罪也此由大國不能撫懷於小將致其叛故大國之於小國當謙和以下之柔靜以懷之取言聚也以聚於人也小國以下大國則取大國注大取小以爲臣妾小取大以爲援助也䟽言大國之君貺以卑謙之道而柔服小國小國之君則朝聘會盟不敢離叛以卑下之禮而事大國者則欲取大國之威以爲援助爾義曰小國謙卑推忠盡敬以事大國則大國懷而安之柔而服之若小國不能致禮竭誠奉事大國者如宋人爲鹿上之盟以求諸侯於楚楚人許之宋公子目夷曰小國事盟禍也宋其亡乎幸而後敗及盟目夷曰禍其在此乎君欲已甚其何以堪於是楚執宋公冬會于亳乃釋之目夷曰未也未足以懲君此小國不能事大國也夫小國能事大國者如隱公元年三月邾儀父盟于蔑魯地邾以附庸之君未王命故書名然其小國能適大國繼好息民書字以貴之是也朝聘者大國適小國爲聘大事小也小國適大國爲朝小事大也繼好結信也謀事補闕禮之大也孟子曰唯仁者能以大事小湯事葛伯文王事昆夷是也唯智者能以小事大大王事熏鬻句踐事吴是也大事小謂之樂天小事大謂之畏天樂天者保天下畏天者保其國詩曰畏天之畏于時保之此周頌美成王畏天之威能安其太平也故或下以取或下而取注以者大取小而者小取大䟽春秋曰師能左右之曰以或下以取者言大國用謙卑之道以取小國則令其可左可右故云以取或下而取者言小國用謙卑之道歸事大國但可承奉而求援助不能令左右隨意故云而取義曰師能左右之者春秋僖公二十六年秋宋叛楚而善於晋楚令尹子玉司馬子西帥師伐宋圍緡公以楚師伐齊取穀凡師能左右之曰以謂進退在己寘桓公之子雍於穀以爲魯援楚申公叔侯成之桓公之子七人爲七大夫於楚言齊孝公不能撫之故也二十八年楚子使申叔去穀也此言左右由己取捨固時也大國不過欲兼畜人小國不過欲入事人注大國謙德而下小國者不過欲兼畜小國爲臣妾小國執貢賦以下大國者不過欲入事大國爲援助也䟽言大國崇謙下以取小國者更無餘意不過兼畜小國之臣爲人君之長小國用謙陳薦贄幣而取大國者不過欲入事大國資爲援助爾義曰大國以小國内爲臣妾小國以大國外爲援助兩者其志不逾於此矣薦進也贄執也幣帛也諸侯觀王兩國交聘則必陳進珪玉貨帛執以爲禮故曰贄幣也小國求大國爲援助者春秋文公十四年秋鄭伯與魯公宴于棐鄭大夫歸生子家賦鴻鴈之什取其哀恤鰥寡之義使魯侯恤之又賦載馳之四章言鄭國寡弱取其小國有急欲引大國以爲援助是也兩者各得其所欲故大者宜爲下注一求臣妾一求援助是兩者各得其所欲然大國者常戒於滿盈故特云大者宜爲下䟽大欲畜養小欲入事兩遂所願故云各得其所欲大者宜爲下者夫物常以小輕大而必以大凌小將恐大國之君驕盈致禍鮮能下下故戒之大者特宜爲謙下爾義曰居匹夫之上亦以爲難况居國之上乎在上者承天順地撫衆和民不以國大自尊不以兵强自恃謙柔爲志畏慎在懐若履薄冰如馭朽索兢兢業業祇敬上玄然可以保其社稷矣老君恐其恃强爲失故特戒之也理身者在乎富貴不驕滿盈致戒謹身約己可以有終也若大國不能爲下或會之以侈示之以忲人必離之夏桀爲有仍之會而民叛之啇紂爲黎之蒐東夷叛之周幽爲太室之盟戎夷叛之宋襄爲鹿上之會而諸侯叛之楚子爲申之會而人心去之懷不以德綏不以禮人人各有心其可服乎道者萬物之奥章第六十三䟽前章眀以德下人則大小各得所欲此章明以道化物則善惡皆蒙所怙初標道體冲奥次眀立教化人後古之下歎道之功可謂尊貴爾義曰前以大國小國各在謙光此以所寳不保俱明道用美言尊行表以訓人開國設官俾之行教不貴拱璧不棄於人顯妙本深奥之功故爲天下之貴怙恃也道者萬物之奧注萬物皆資妙本以生成是萬物取給之所故興言爲萬物之奥奥内也䟽道者妙本之强名奥内也言道包含無外是萬物資始之所故爲萬物之奥内西昇經云道深甚奥虚無之淵此之謂也義曰道之深也無不吞納無不制圍圓蓋之高方輿之厚日月之照動植之繁皆道氣所育居大道之内故爲萬物之奥内西昇經者老君於周昭王二十五年癸丑四月於終南之陰尹喜草樓之内授道德二經既畢欲西化流沙尹喜問存三守一之方習道修身之要後以聖言編以昇入太微西化流沙之義西昇經凡三十六章九百七十二句四千二百七十八言其大㫖與道德經相出入言大道甚深甚奥爲虚無之淵藪也善人之寳注善人知守道者昌失道者亡故常寳貴之而無患累䟽寳者珍寳之謂也善人者體道無爲身心清淨故寳貴之無暫忘也義曰善人屬念運心與道符合故常寳貴於道矣子罕曰人以玉爲寳我以不貪爲寳又理國之君以賢爲寳況於善人心不遺忘道故以道爲寳也不善人之所保注保任也不善之人不能寳貴至道及有患難即欲以身保任於道自求免也䟽保任也倚也不善之徒心無明智惑於積習平居則忽道嬰難則求之以身保任於道倚以求安也義曰不善之人行與教違固遠於道矣雖欲保身倚道解難救危亦不可得矣又經或云不善人之所不寳言不善之人違反於道故不寳於道也何者道好柔弱不善人好强梁道好恬和不善人好剛躁道好沖寂不善人好諠譁道好謙卑不善人好格捍道好無事不善人好有爲道好生成不善人好傷害行與道違故不善之人不寳貴於道也美言可以市尊行可以加人注甘美其言可以求市尊高其行可以加人以況聖人以甘美法味之言尊高清靜之行以化不善之人亦如市賈之售相率而從善矣故下文云䟽此喻說也言不善之人亦在教之而已義曰道之立言澹泊無味不善之人安得而悦之故聖人設美言以誘之故從之者如求利之赴市矣示尊高之行以化之隨之者如慕羶而歸受矣不善之人因此所化亦皆修道所謂道無棄人也人之不善何棄之有注不善之人亦在化之而已何棄遺之有乎疏言人言行不善何棄遺之有乎當導之以善道冀從化而悛惡不可棄之而不化故云何棄之有義曰聖人弘慈道無棄物雖不善之人憫其未悟於道故甘詞以誘之善教以勸之使其從善無所遺弃悛改也故立天子置三公注共教不善之人疏故立三公謂太師太傅太保也天子無爲三公論道皆所以垂訓立教化不善之人書云天工人其代之此之謂也義曰四海之大萬有之殷厥初生人不可無主故立天子以牧之天子者尊事上帝父事於天母事於地謂天之子也一人不可以廣理置百官以臨之百官之長有三公焉尚書周官云其惟三公論道經邦太師者智足以爲泉源行足以爲儀表問焉則應求焉則得謂之太師亦曰尚父太言大也爲王之師安車青蓋金印紫綬太傅者訓也保也大戴禮云傅天子以德義若天子無恩於父母不惠於庶人失禮於大臣不中於制獄皆太傅之失職也太保者保倚也任也大戴禮曰天子處位不端受書不敬語不序聲音不中律進退即席無升降揖讓之禮皆太保失職也復置三公太尉司徒司空主佐天子理陰陽親爲人廣教化此其職也天工人其代之者尚書咎繇謨曰一日二日萬機無曠庶官天工人其代之曠空也庶衆也居其位者惟其人非其人則闕之言人代天理官不可以天官爲私用非其材也雖有拱璧以先駟馬不如坐進此道注三公輔佐雖有合拱之璧先導駟馬之乘以獻之猶不如坐進此無爲之道䟽合拱之璧璧之大者駟乘之馬馬之良者言三公輔相雖以璧馬獻之至尊未足珍貴不如坐進無爲之道令化惡歸善爾拱璧先駟馬者古者朝聘將進駟馬以璧爲導故稱先也春秋云乘韋先牛十二犒師之類是也義曰合拱者說文云兩手相合爲拱璧者瑞玉也合拱之璧瑞玉之大者也駟馬者馬四匹爲乘共駕一車也古者諸侯朝於天王會於大國聘於小國或遇於野兩君相見皆有贄幣之禮以先貨幣爲導謂之爲先今三公當以論道爲務經邦爲事雖欲以駟馬大璧獻之於君有益淫奢無禆政理不若此無爲清靜之道進之以化天下使不善者從善不悛者悛心道化周行帝德遐被何用璧馬之爲乎輔相者輔毗也相助也亦云視其善惡也天子象四輔之星以立輔相輔其闕失相其禮儀導以道德贊以政化也先牛十二者春秋僖公三十三年晋師伐鄭及滑鄭啇人弦高將市於周遇之以乘韋先牛十二犒師曰寡君聞吾子將出師於弊邑敢犒從者不腆幣賦爲從者之淹止則具一日之積行則備一夕之衛且使遽告于鄭因有備焉古之所以貴此道者何注何問辭也疏舉古證今令物生信古人即前寳道人也問其所以寳貴此道其意何也義曰拱璧不足以爲貴駟馬不足以爲珍自古及今唯貴於道者何也老君將明道之功用和寧天地濟佐邦家行之則理違之則亂重顯其利物之義更自詳問貴此道者何不日求以得有罪以免耶故爲天下貴注道在於悟不在於求不如財帛可以日日求而得故云不日求以得貺悟則無罪累豈得有罪方求免耶故可爲天下貴爾䟽此答釋貴道之意不日求以得者言道在於悟悟在了心非如有爲之法積日計年營求以致之爾但澄心窒俗則純白自生也故云不日求以得有罪以免耶者夫妄心起染則業累斯生若悟道虚心則罪因自滅豈如執滯之人動生悔吝嬰彼罪罰方求免耶以是之故故爲天下善人之所寳貴義曰道之所以爲天下貴者頓悟而得不在營求纔遣妄心即通正道妄心貺遣塵累亦消求可以得罪可以免故天下所共寳貴老君以至道玄邈了悟者稀發問贊明欲其悟入且爲俗學之士尚輕尺璧而重寸陰豈至道之君不崇妙本希微之功而貴合拱結駟之物乎道德眞經廣聖義卷之四十二
