body:
  text: 唐廣成先生杜光庭述夫佳兵章第三十一䟽前章明强兵好還不可果其矜伐此章明佳兵物惡不得已而用之首則陳戒不祥明有道者不處次云勝而不美示樂殺之爲非吉事下舉喻以明結以喪禮處之所以表非樂戰義曰先戒人臣以道佐國不以兵强今明佳兵乃是不祥之器以兵佐國必果於矜伐果矜伐則必敗亡所以直指佳兵物之所惡敵來侵己不得已而用之有道之人不處於此不以勝敵爲美而以正殺爲先此戒其樂殺也處之以喪禮非欲於戰也夫佳兵者不祥之器疏佳好也兵者韜略之屬也祥善也器材器也君子進德修業必慎厥初藏器於身俟時而動當遊心道德之囿閲思墳誥之林使光昭今古開濟成務義曰韜六韜也齊太公姜子牙釣於磻溪剖魚得玉璜中有此書一曰文韜經邦立國不越天常二曰武韜剋定禍亂威伏八方三曰龍韜燮理陰陽不逾時令四曰虎韜善用爪牙群凶自挫五曰豹韜膺時戡難智在權機六曰犬韜採聽至微或成奇變韜者藏也兵機權變不可輕以示人故以韜藏隱晦爲義略三略也三略者謂漢留侯張子房於下邳圮橋遇黃石公授以三略曰子得之可爲帝王之師亦機鈐用兵之術也子牙用之佐武王剋啇伐紂而成王業子房用之佐漢祖滅項籍而有帝圖進德者德冠五帝爲美行之一首修業者業兼六藝爲習學之先故君子務本本立而道生習學之業慎其初始習文儒道德則爲君子習貪驕殘暴則爲小人昔孟軻幼孤居近葬者乃學爲墓軻母賢見其所習非美徙居避之又近陶匠之家軻又學爲陶瓦之器母又徙居近儒學之家軻乃學習墳典後爲大儒道亞周孔名高韓墨昔孔子爲兒好以俎豆爲戲後爲禮樂之祖道冠百王化融四海后稷爲兒好以耕農爲戲後爲農正播植之業功濟天下漢張湯爲兒時因鼠竊肉爲父所責湯薰穴得鼠及所殘肉笞鼠訊鞫論報款占其辭如老獄吏後仕漢爲法官詳定刑律垂法著令所以習爲善者善功必著矣所慎善惡之習在厥初爾厥其也初始也藏器於身者易下繫曰公用射隼于高墉之上獲之無不利子曰隼者禽也弓矢者器也射之者人也君子藏器於身待時而動何不利之有言君子得時即有成功不得其時動有結閡之患故無功也註言公者無私也高墉喻高位也隼在高墉則難射人處高位即難除處高位而貪殘如隼將除之者在得其時無不尅矣言君子有可大之德可乆之業亦當得時而可動矣史記云君子得其時則駕不得其時則蓬累而行所謂邦有道危言危行邦無道危行言遜得其時則功濟天下失其時則獨善其身是明進退之度也遊心在乎道德閲思在乎典墳囿園囿也典謨典也墳三皇之書爲三墳也誥訓誥也如湯誥酒誥例也林叢木爲林言書史之多也光大也昭明也令善也乃能大明善美之名也開濟成務者易上繫云夫易開物成務謂天下之道如斯而已者也此言易道可以覆謂天下開濟萬物亦如君子之德業光大昭明爲世之範乃復遊心道德之園囿墳誥之叢林美名揚顯成其大務也春秋宋穆公屬其臣立殤公云先君以寡人爲能賢光昭令名是也修道之士亦當慎其所習遊心大道閲思無爲道可冀也若其滯是非之境束言教之墟迷嗜翫之津窺浮誕之牖其道彌遠矣人君理國習皇風帝道可叶於昇平傚王業霸圖罕偕其清靜矣况兵戰之術乎所宜戒也䟽而乃有以兵謀韜略爲佳好者夫謀略之設以正爲奇兵鈐之書先聲後實皆在乎攻取殺伐故爲不善之材器爾義曰謀圖度也奇變詐也攻擊也取言其易也言此六韜三略之書金版玉鈐之術皆圖度機謀之用非祥善之道兵法尚詐故以正爲奇先其虚聲後其實用開張詭譎非君子之所宜於國爲貪殘於身爲不善於物爲憎惡豈可習而行諸且人之所習務在有成業成而用用而求達習善器者進則利物退則全身用則懋功顯則彰德今習兵道以詭詐爲本欺譎爲能殺獲爲功誅伐爲事譎詐則非信殺伐則非仁佐於國則陷君爲征伐之主行於身則造跡於詭妄之徒固爲不善之事矣老君說經之時但有戰鬥之說則是版泉涿鹿丹浦用兵未有六韜三略之書然用兵亦以機討相譎詐相傾得勝爲功殺人爲美非爲道者所務故切戒之今引韜略之書取近而證遠爾物或惡之故有道者不處注佳好也兵者謀略也凡人修辭立誠不能以道德藏器而以兵謀韜略爲好謀略之用只在於攻取殺伐故爲不善之材器凡物尚或惡之是以有道之人不處身於此爾䟽畜德於身是爲能事既爲不祥之器是以凡物尚或惡之况有道之君子焉肯處身於此故云有道者不處義曰有道之士以德潤身以善救物動資簡正靜合虚無不萌殺伐之心肯尚兵謀之事兵以殺伐爲用凡物望而惡之矣修辭立誠者易乾九三之詞君子忠信所以修德也修辭立其誠所以居業也君子居則貴左用兵則貴右注左陽也陽和則發生故平居所貴右陰也陰凝則肅殺故用兵所貴也䟽左陽也右陰也陽好生陰好殺好生故平居所貴好殺故用兵所貴義曰帝出乎震物生於東春主發生夏爲長養天道左旋所以左爲陽而順生成之道也萬物肅殺於西秋主殺也藏伏於北冬主藏也月配陰而主刑金居西而主兵所以右爲陰而逆殺伐之道也君子體仁以利物故平居則貴左用兵法義而尚刑故貴右也兵者不祥之器注祥善也好兵者尚殺故爲不善之材器非君子之器注君子以道德爲材器不尚兵謀疏上文云佳兵者不祥之器所以明用兵則尚右而好殺有道者故不處之此云兵者不祥之器對結上文明非君子之器君子以道德爲材器故無利爾義曰君子所習也稽十三皇五帝之道德祖述唐虞夏殷之仁義憲章文武周孔之禮樂將以經天下濟萬物垂後王祐來世時之遇也則開物成務時之不也則卷而懷之故無所不利矣上云佳兵爲不祥之器有道者不處示其所習之初務在於道德不在於兵謀而習兵謀者非君子所務習之已成必將用之用兵之㫖明在下文不得已而用之恬淡爲上注戎狄來侵故不得已善勝不爭故恬淡爲上䟽夫文德者理伐之器兵謀者輔助之材也故云文則經緯天地武則剋定禍亂雖天生五材廢一不可而武功之用定節制宜是知用之有本末行之有逆順在乎事不得已然後應之謂四夷來侵王師薄伐所當示之以恩惠綏之以道德既同蚊蚋之螯故無憑怒之心推此而言是以恬淡爲上義曰聖人制法垂訓也隨時降殺與代污降太上之君以道爲化其次以德其次以仁道德既衰澆訛時扇故文武之道用焉文訓之以禮樂仁義武訓之以奇正權謀文經天地而武定禍亂文爲本而武爲末文爲體而武爲用夫子云不教民戰是謂棄民也有文事必有武備所以夾谷之會宣武備而斬俳優齊侯畏之歸龜陰之田成禮而退斯則武爲文之輔文爲武之主也經緯天地者南北爲經東西爲緯窮鬼神之情狀明造化之變通九流以清百度以貞所謂觀乎人文以化成天下故文王以爲謚焉尅定禍亂者謂凶暴及人曰禍反德肆逆曰亂得㑺曰克所以黃帝誅蚩尤舜誅三苗湯克桀周克紂秦殄六國漢定三秦除暴害之政剪亂逆之根拯活生靈非殺人以取勝也故武王以爲謚矣此則明本末審逆順不得已而乃用之矣四夷來侵者周宣之時犬戎數犯中國出師禦之故詩稱伐殺獫狁是也天生五材五者謂金木水火土也五行遞運帝王執而用之若用材器爾故曰五材言其所用互爲終始闕一不可也師禀帝王之命者謂之王師師衆也在易爲師卦坤上坎下薄伐者薄辭也言我伐於彼也凡曰王師有鍾鼓曰伐無鍾鼓曰侵王師所征先示武威取其畏伏兼示恩信使其懷來非逞志於梟擒非肆怒於剪撲師出有名曰順無名曰逆觀夫四夷侵斥類蚊蚋之膚非爲中國大患固無傷於道德所宜綏以恩惠化以淳和無憑怒之心是恬澹爲上也所以宜僚弄丸而解難叔敖安寢而投兵不舉干戈坐以制勝此其上也勝而不美而美之者是樂殺人䟽夫不能以德懷來而用兵求戰勝故雖尅勝猶慚德薄不以爲美夫勝必多殺故以勝爲美者是樂殺人義曰聖人之柔服四夷底平禍亂以文德懷之使其化善不在用兵今既德之不逮方以兵威取勝既勝於敵樂而美之無内慚之德無惻隱之心是樂殺人也昔季札觀大護之舞曰聖人之弘也猶有慚德聖人之難也言湯之伐桀始用干戈故有慚德論語曰武盡美矣未盡善也言以征伐取天下故曰未盡善也夫樂殺人者不可得志於天下注制勝於敵必喪其人故不以爲美也夫勝必多殺若以勝爲美者是樂多殺人也樂多殺人人必不附欲求得志不亦難乎䟽夫天地好生物皆含養仁人者當順天德以全濟爲務焉可茍逞詐力以快貪殘貪殘之人人必不附欲求得志不亦難乎故好樂殺人則不可得志於天下矣義曰夫仁者之心稱物平施順陽和以愛育行慈惠以撫安其於物類也尚懷憫護不欲一物失所禮云見其生不忍見其死聞其聲不忍食其肉又弊蓋埋狗弊帷埋馬弊車瘞牛陳安世暑月不行畏踐蟲蟻殺伐草木若其時昆蟲未蟄不以火田此皆仁憫之道也順天養物理在兹乎安肯勦衆命而取功名樂殺人而圖富貴哉若以伐殺之多爲美譎詐之勝爲能恣毒貪殘必爲人之所畏人畏則孰敢親附之矣既無親附之衆獨運暴横之心欲求得志於天下信爲難矣東昏歸命昌邑高洋禍敗滅亡足爲鑒戒吉事尚左凶事尚右䟽左陽而生則吉故吉事尚左右陰而殺則凶故凶事尚右禮記檀弓曰夫子與門人立栱而尚右二三子亦尚右夫子曰二三子之嗜學也我則有姊之喪故也二三子復尚左義曰左爲陽德主生故居常則尚左今人賔主之位及拱手之禮皆左爲上而尊也右爲陰主死今人喪禮皆尚右夫子有姊之喪拱而尚右弟子不知其故因而傚之夫子言其好學也如此及知非吉故復尚左檀弓禮記第四篇名也顔回習夫子之道首冠諸生稱爲亞聖嘗問於夫子曰夫子言回亦言夫子辯回亦辯夫子不言而信不比而周無器而成回不知所以然而然瞠視塵躅則不及矣弟子嗜好於學也如此尚不能盡夫子之道况於不學乎偏將軍處左上將軍處右注偏將軍卑而處左者不專殺也上將軍尊而處右者主以兵謀也言以喪禮處之注喪禮尚右今上將軍居右者是以喪禮處置之䟽上將軍專殺則處右偏將軍爲副不專殺故處左今左尊而右卑上將軍居右者言用兵之道同於喪禮喪禮尚右今上將軍居右是以喪禮處置之爾義曰喪禮尚右死事屬陰上將軍專殺故主死事國之出軍上將軍登壇天子齋戒授以斧鉞蓋使其專殺也鑿凶門而出主死事也故云兵者凶器又云兵者人之司命也將有謀則死者反生將無謀則生者反死況戰者危事投之死也豈非喪禮乎偏將軍既不專殺居吉位而處左也殺人衆多以悲哀泣之注以生靈之貴而交戰殺之有惻隱心故以悲哀傷泣之爾䟽夫戰而求勝必殺人衆多勝而不美故悲哀傷泣夫人惟邦本本固邦寧今交戰殺之故仁心惻隱爲之哀泣不亦宜乎義曰以戰而胜者則殺人衆多矣且人之生也九天分氣十月孕神含陰吐陽法天象地萬物之内人稱最靈國之得人猶魚之有水故尚書五子之歌曰皇祖有訓民可近不可下人惟邦本本固邦寧此言太康尸位盤遊無度有窮後羿因民不忍拒於河以其滅德民棄之而不固也所以民弱則國危民聚則國霸今圖功名而好戰貪土地而殺人驅彼生靈陷之死所有道之士君子之人安得不哀傷之乎故下經云抗兵相加哀者勝泣悲也戰勝以喪禮處之注勇士雄人戰而獲勝勝則受爵居於右位尚右非吉是以喪禮處置之但以爲不祥之器何必縞素爲質也䟽夫戰而獲勝勝則受爵武功居右是非吉位故云喪禮處之但以戰爲不祥之器爾亦何必服縗扶杖然後稱之爲喪禮乎諸注此義者皆云古有斯禮尋閲墳典既無所據今所未安故不録也又引秦伯向師而哭者此乃哀敗非戰勝也義曰獲勝受爵者功高遷上將之位亦是處以喪禮也兵爲不善之器戰爲殺伐之資勝則殺彼敗則殺此皆吾民也安不痛哉聖人以之悲傷君子以之惻憫故當處之以喪禮也縗杖者喪服也但殺於人即宜悲愍何必縗杖然後爲哀乎或者云古者出師天子素服泣而送之禮經之中墳典之内皆無此說以此無據疏特明之典者五帝之五典也墳者三皇之三墳也秦伯向師而哭者春秋僖三十二年秦伯伐鄭秦大夫杞子戍鄭使告于秦曰鄭人使我掌其北門之管籥若潜師而來國可得也秦伯訪於大夫蹇叔蹇叔曰勞師以襲遠非所聞也師勞力竭遠主備之無乃不可乎師之所爲鄭必知之且行千里其誰不知秦伯辭焉召孟明西乞白乙使出師于東門之外蹇叔哭之曰孟子吾見師之出而不見其入也秦伯使人謂之曰爾何知中壽爾墓之木拱矣蹇叔之子預於師哭而送之曰晋人禦師必於崤崤有二陵焉其南陵夏后皋之墓其北陵文王之所避風雨必死是間余收爾骨焉秦師遂東過周北門左右免冑而下超乘者三百乘王孫滿尚幼觀之言于襄王曰秦師輕而無禮必敗輕則寡謀無禮則脱入險而脱又不能謀能無敗乎及滑鄭商人弦高將市於周遇之以乘韋先牛十二犒師且使遽告于鄭鄭穆公使視客館則束載厲兵秣馬矣使之武子辭焉吾子淹冬於弊邑唯是脯資餼牽竭矣爲吾子之將行也鄭之有原圃猶秦之有具囿吾子取其麋鹿以間弊邑若何杞子奔齊逢孫楊孫奔宋孟明曰鄭有備矣不可冀也攻之不克圍之不繼吾其還也滅滑而還晋原軫曰秦違蹇叔而以貪勤民天奉我也奉不可失敵不可縱縱敵患生違天不祥必伐秦師欒枝曰未報秦施而伐其師其爲死君乎先軫曰秦不哀吾喪而伐吾同姓秦則無禮何施之有吾聞之一日縱敵數世之患也謀及子孫可謂死君乎遂發命遽興姜戎襄公墨縗梁弘御戎萊駒爲右夏四月辛巳敗秦師于崤獲百里孟明視西乞術白乙丙以歸遂墨以葬文公晋於是始墨文嬴請三帥曰彼實搆吾二君寡君若得而食之不猒君何辱討焉使歸就戮于秦以逞寡君之志若何公許之先軫問秦囚公曰夫人請之吾舍之矣先軫怒曰武夫力而拘諸原婦人暫而免諸國隳軍實而長寇讎亡無日矣不顧而唾公使陽處父追之及諸河則在舟中矣釋左驂以公命贈孟明孟明稽首曰君之惠不以縲臣舋鼓使歸就戮于秦寡君之以爲戮死且不朽若從君惠而免之三年將拜君賜秦伯素服郊次向師而哭曰孤違蹇叔以辱二三子孤之罪也不替孟明孤之過也大夫何罪且吾不以一眚掩大德蹇叔之哭知其師必敗也秦伯之哭哀其師之敗也皆非胜而哭之矣聖㫖制疏委曲明之恐後人增飾其謬耳夫用兵好殺君子不爲大道好生聖賢是則但戰之勝敗皆害於人自可戒之而戢兵豈必殺之而後哭理身者五欲内侵則五神疲散六情中盛則六識交爭氣喪神疲將虞殞謝當固抑情斬欲克保恬和亦猶理國之君不尚佳兵之美也道徳眞經廣聖義卷之二十六
