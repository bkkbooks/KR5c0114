front:
  text: 道德眞經廣聖義卷之四十一行四
  hash: sha256:7f79593b96899128b7e0635b0005d27669b7a1e94a8d8d4850535f9ed66fb623
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0114_SJB_042-140521c, image: sjb/14/140521c.png}
body:
  text: 唐廣成先生杜光庭述治人事天章第五十九䟽前章明無爲之政人致淳和此章明理人事天無過用儉初標理人事天莫先乎嗇次夫唯下轉通前義是謂下舉深根之喻以況長乆之道義曰前章舉方廉直光聖人四德以教理國此章明用嗇四翻以教事天善理國其祚延洪善事天其壽長乆此續前章之義也治人事天莫若嗇注嗇愛也人君將欲理人事天莫若愛費使倉廪實人知禮節三時不害則天降之嘉祥人和可以理人天保可以事天也䟽嗇愛也言人君將欲理化下人敬事上帝爲德之先無如愛費即儉德也儉即足用可以聚人粢盛豐備天享明德故云莫若嗇義曰夫儉者理務之先財者聚人之本故易曰何以聚人曰財則財者非儉約則易散民者非豐財則難聚所以節財則省費省費則人豐人豐則國安而力足矣國之大用有四一曰祭祀二曰戎事三曰賔客四曰庖膳祭祀者昭事上帝也天子郊祀上帝宗祀明堂言有尊也得不蠲潔恭恪乎粢盛豐備者春秋桓公六年楚武王侵隨使其大夫薳章求成焉軍於隨之瑕地以待之隨人使少師董成鬬伯比言於楚子曰吾不得志於漢東也我則使然我張吾三軍而被吾甲兵以武臨之彼則懼矣而和協以謀我故難聞也漢東之國以隨爲大隨張必棄小國小國離楚之利也少師侈請贏師以張之熊率音律且十余切比曰隨賢臣季良在何益鬬伯比曰以爲後圖季良諫不過一見從少師得其君行少師之計王毁軍而納少師少師歸請追楚師隨侯將許之季良止之曰天方授楚楚羸其師誘我也君何急焉臣聞小之能敵大也小道大淫所謂道者忠於民而信於神上思利民忠也祝史正詞信也令民餒而君逞欲祝史矯舉以祭臣不知其可也隨侯曰吾牲牷肥腯粢盛豐備何則不信對曰夫民神之主也是以聖王先成民而後致力於神故奉牲以告曰博碩肥腯謂民力之普存也謂其畜之碩大蕃滋也謂其不疾瘯𤼠也謂其備物咸有也奉粢盛而告曰潔粢豐盛謂其三時不害而民和年豐也奉酒醴以告曰嘉栗㫖酒謂其上下皆有嘉德而無違心所謂三時無讒慝也務其三時修其教親其九族以致其禋祀於是乎民和而神降之福故動則有成今民各有心而鬼神乏主君雖獨豐其何福之有君姑修政而親兄弟之國庶免於難隨侯懼而修政楚不敢伐矣三時者春耕夏種秋收農之三時也夫唯嗇是謂早服注何以聚人曰財故能儉愛則四方之人將襁負而至早服事其君矣服事也䟽夫唯嗇疊出上文也是謂早服釋儉嗇之義凡有七轉義皆倣此夫唯者發語之詞也服者事也夫唯能儉愛之君理人事天以儉爲政是以普天之下亦當早服事於君矣義曰儉嗇爲政國必豐財上無甚貴之奢下無箕歛之怨以此理人則人順事天則天明天下之人相率而歸其德矣何以聚人曰財者易下繫云天地之大德曰生聖人之大寳曰位何以守位曰仁何以聚人曰財財所以資生者也將聚於衆必先有財財豐則人可聚若財用有節正而理之民不爲非則可聚而安之也早服謂之重積德注夫能儉嗇已是有德人歸有德早事其君故云重積德䟽何故普天仰化率土歸仁由行節儉節儉則百姓早服事之是重積其德爾義曰君行節儉是重積其德民益歸之普天率土者詩北山篇云普天之下莫非王土率土之濱莫非王民是也溥大也率循也濱涯也重積德則無不克注聖人積德四海歸仁則無有不能制伏者矣克能也䟽克能也君若厚積其德者其爲政也人力普存其事天也吉無不利則四方向化無有不能制伏者矣義曰儉以理國敬以事天重積其德四方率化無思不服矣無不克則莫知其極注人君之德無有不能制御者則無遠不至故四方莫知其窮極也䟽此謂君德無有不能制服者則殊俗慕化絶域觀風無遠不至故莫知窮極義曰君積厚德國有豐財萬寓歸王九圍貢賮人服德化豈有限極耶殊俗絶域者皆要荒之外與中國殊庭邊域夐絶也言異域之人思戀聖人之化自遠而至由道德所服也觀風者十洲記云聚窟洲在西海中申未之地地方三千里去中國三十萬里國中常占東風入律百旬不休則中國將有好道之君故漢武延和三年其國遣使貢返魂香猛獸乘飛車而濟弱水策天驥而度飛砂一十三年方達中國此觀風而慕化也莫知其極可以有國注莫知窮極然後可以爲有國矣䟽言人君德化無遠不及萬人所歸往神明所福享然後可稱爲有國易曰王假有廟有家是也過此以去豈有國乎義曰有國者車軌所及書文所同人服其德遠懷其化可以謂之有國矣或以武威所制詭道所臨苟有其邦人所未服或承平統曆嗣位守圖厥德有愆恩化不浹者皆非謂其國矣王假有廟有家者易萃卦云王假有廟致孝享也假聚也王以聚人至於有廟有廟乃能致其孝享故曰利見大人聚以正也觀其所聚則天地萬物之情可見矣義曰天下崩離則民怨雖有享祀與無廟同王至大聚之時孝德乃洽始可謂之有廟矣以此而用大牲神明降福聚道既合以至有廟能致孝享爾王假有家者易家人卦九五詞云王假有家勿恤象曰王假有家交相愛也王能有家道在下莫不化之天下既化六親和睦故曰交相愛也涣卦亦云王假有廟其義同也有國之母可以長乆注有國而茂養百姓者則其福祚可以長乆䟽母者道也以茂養爲義夫所以得稱有國者祇縁有道而茂養蒼生若爾福祚永昌可以長乆義曰積德臨御用道養人萬方歸之若子之親於母也則天道所覆神明感通卜年八百未足爲永固可以長乆享國矣是謂深根固蔕長生乆視之道注積德有國則根深蔕固矣深固者是長生乆視之道䟽夫積德之君以道爲國則可以長乆故舉根蔕之喻以申其義理也蔕花趺也夫草木根深則榮茂蔕固則不落乃長乆也以喻積德之君埋根於道固蔕於德命延謂之長生恒照謂之乆視故云深根固蔕長生乆視之道義曰人君以道德養生靈以儉嗇理天下豐財則國富積德則祚隆遠近歸心華戎率服又能母養萬物子愛群生根深則祚曆無疆蔕固則子孫延永長生乆視弈葉重光不可得而倫矣修道之士嗇神以安體積氣以全和内固三關外祛萬慮百神率服衆行周圓變化莫窮享年長乆固蔕於混元之域深根於何有之庭與夫九老七元差肩接武矣治大國章第六十䟽前章明理人儉愛則萬方早服此章明莅物不擾則其德交歸初舉理國之喻不可有爲次明德及鬼神兩無傷害後結歎交歸之德以勸有國之君義曰大國者有二其一天子之國其二公侯之國夫天子君臨大國子育萬民緩之則不恭急之則離散以烹鮮爲喻理固然矣莅之以道則鬼神賔服幽明各遂德善交歸此勸人君用道理化之㫖也天子之國四海之内有九州州方九千里每州建百里之國三十七十里之國六十五十里之國百有二十凡二百一十國名山大澤不以封其餘以爲附庸閑田大國三十者三公之國也次國六十者六卿之國也小國百二十者十二小卿之國也名山大澤與民同財不得障管立賦稅而已此古制也殷制天子之國地方九千里中一千里爲天子之畿餘八爲州也周公所制九州大界方七千里方千里者四十有九其一爲王畿餘四十八爲八州各有方千里者六也殷法凡一州封地方五百里者不過四謂之大國又封四百里者十一謂之次國方二百里者不過二十五其餘方百里者謂之小國並四十六國一州二百二十國則餘方百里者百六十四凡處地方千里者五方百里者五十九其餘方百里者四十一爲附庸地也天子畿内方百里之國有九方七十里之國有二十一方五十里之國有六十三凡九十三國名山大澤不以叙班其餘以禄士爲閑田天子所居亦謂之縣亦謂之畿凡九州千七百七十三國堯舜禹時諸侯之國有方百里七十里五十里禹時要服内地方七十里周公復堯舜舊域以五服爲九州要服之内方七千里又云周以千八百諸侯列布於五千里内也天子百里之内供官千里之内以爲御衣食千里之外設方伯五國以爲屬屬有長十國爲連連有帥三十國爲卒卒有正二百一十國爲州州有伯八州有八伯五十六正一百六十八連帥三百三十六長八百各以其屬屬於天子之老二人以爲天子左右曰二伯即周公召伯分理於陜是也千里之内曰甸甸理也千里之外曰采采取其美物也亦謂之流或貢或否天子置三公九卿二十七大夫八十一元十大國三卿皆命於天子下大夫五人上士二十七人次國三卿二卿命於天子一卿命於其君下大夫五人上士二十七小國卿二人命於其君下大夫五人上士二十七人斯乃周約唐虞夏殷之法而增减之以爲國之制度也成王在豐既黜殷命滅淮夷乃作周官立太師太傅太保兹惟三公論道經邦燮理陰陽少師少傅少保曰三孤貳公弘化寅亮天地天官冢宰掌邦理統百官均四海司徒掌邦教敷五典擾兆民宗伯掌邦禮理神人和上下司馬掌邦政統六師平邦國司寇掌邦禁詰奸慝刑暴亂司空掌邦土居四民時地利六卿分職各率其屬以倡九牧阜成兆人此周制也唐虞設官惟百夏商官倍倍於唐虞周官備故天下乃理矣治大國若烹小鮮注烹小鮮者不可撓理大國者不可煩煩則人勞撓則魚爛䟽此喻說也烹煮也小鮮小魚也言烹小魚不可撓撓則魚潰喻理大國不可煩煩則人亂皆須用道所以成功爾義曰言理國之難喻烹鮮之㫖不煩則人化不撓則魚全務在安舒漸臻其化矣以道莅天下其鬼不神注以道臨位天下不求有妄之福故鬼無以見其神明也䟽以用也莅臨也人神處幽爲鬼神者靈效之謂夫人求則神爲應今若上德之化人自安全豈惟上忘帝力亦不旁請鬼神故處幽之鬼無以效其明靈也義曰爲君以道天下悦隨鬼神無以見其靈吉凶無以施其變雖神鬼之靈怪豈能干於有道乎天神曰神地神曰祇人神曰鬼皆晦而不顯幽而不明苟逢道德之君必無侵傷之害矣非其鬼不神其神不傷民注上言其鬼不神非謂鬼歇滅而不神但有其神而不見怪以傷人疏此覆釋鬼無效靈之義非其鬼不神者非謂鬼歇滅而不爲神但祅之將興由人有舋人恒其德則神不見怪而傷人春秋曰其氣焰以取之義曰道德之主正直無私天神不能傷人人鬼不能害物幽靈潜匿祅怪不興故國之興也明神降之以觀其德四海之神素車乘雲來謁武王是也國之亡也神亦降之觀其惡也石言乎晋神降于萃乃鬼神之見怪也且壺子冥心而大巫波遁鄴令罄折而河神以亡此鬼神不能害於有道也其氣焰以取之者春秋莊公十四年夏鄭厲公自櫟侵鄭及大陵獲大夫傅瑕傅瑕曰苟舍我我請納君與之盟而赦之六月甲子傅瑕殺鄭子儀及其二子而納厲公初鄭有祅焉内虵與外虵鬥南門之中内虵死六年而厲公入公聞之問於申繻曰猶有祅乎對曰人之所忌其氣焰以取之言若火焰焰未成而進退之時以喻人心不堅正也妖由人興人無舋焉妖不自作人棄常則妖興故有妖厲公入遂殺傅瑕使謂原繁曰傅瑕貳周有常刑既伏其罪納我而無二心者吾皆許之上大夫之事吾願與伯父圖之且寡人出伯父無惠言入又不念寡人社稷有主而外其心寡人憾焉對曰先君桓公命我宗人典司宗祏社稷有主而外其心其何貳如之苟主社稷國内之民其誰不爲臣臣無二心天之制也子儀在位十四年矣而謀召君昔庸非二乎莊公之子猶有八人若皆有官爵行賂勸貳而可以濟事君其若之何臣聞命矣乃縊而死非其神不傷民聖人亦不傷民注鬼見神怪則傷人聖人有爲則傷人今神所以不見神怪而傷人者蓋以聖人無爲清靜故爾䟽所言神不傷人者豈但神靈無效而不能傷害於人而聖人以道臨人無爲不擾百姓自正故云聖人亦不傷人則鬼神不能見怪以傷人者由聖人以道莅天下爾將欲發明聖德故重云亦不傷人義曰聖人行大道以君臨鬼神禀聖德而自靜既絶有爲之擾自無見怪之傷此乃鬼神化聖人之道德不敢傷人聖人以清靜垂衣不勞役於群庶也夫兩不相傷者故德交歸焉注鬼神傷人則害國虧本聖人傷人則匱神乏祀今兩不傷物故德交歸䟽兩者謂聖人與神也夫人國之本亦神之主者鬼神傷人則害國之本聖人傷人則匱神之主兩不傷害人故德交歸豈惟神聖獨豐抑亦兆人咸賴義曰人爲邦本本固則邦寧人爲神主主安則神享聖人以道爲理既不傷於人鬼神感聖之功亦不害於物兩者相悦二德交歸春秋隨季良諫隨侯曰夫神依於人人者神之主也尙書甫刑曰一人有慶兆民賴之十億曰兆舉其多也天子以道不傷於人神感其化兩無傷害四海並安故云兆民咸賴賴倚賴也匱乏也虧損也此蓋顯明以道爲國其利弘多不唯寰海宅心信亦鬼神賔服理身若此何妖惑之能干耶人爲神主者春秋僖公十九年宋桓公使邾文公用鄫子於次睢之社司馬子魚曰古者六畜不相爲用小事不用大牲而況敢用人乎祭祀所以爲人也夫人神之主也用人其誰享之齊桓存三亡國以屬諸侯義士猶曰薄德今君一會而虐三國之君言執滕子用鄫子也又用諸淫昏之鬼將以求霸不亦難乎得死爲幸恐其亡國也子魚宋公子目夷也睢水自汴入泗而有妖神東夷殺人以祭之焉六畜不相爲用者如祭馬祖不可用馬況用人乎今聖人以道育之鬼神交楅兩不相咨可謂玄德乎道徳眞經廣聖義卷之四十一
