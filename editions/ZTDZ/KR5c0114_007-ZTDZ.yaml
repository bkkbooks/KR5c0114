front:
  text: 道德眞經廣聖義卷之六羔六
  hash: sha256:9dae13ea2739af1de5f106a6527e9f1545c8efc35161e202b6677389bbe50021
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0114_SJB_007-140341c, image: sjb/14/140341c.png}
body:
  text: 唐廣成先生杜光庭述道可道章第一䟽此章明妙本之由起萬化之宗源義曰此者斯也章明也分判科段使義理彰明說文曰樂歌竟爲一章章字從音從十謂一至十數之終謂書言章蓋因風雅凡有件段皆謂之章焉明者皎净之義顯出之謂也妙本者道也居經之首明道之由由從也起興也萬者數之大也化者應變之謂也言萬有變化從道而興也宗主也源本也萬化既從道而興則知道爲萬化之宗本也起自此章出生諸法如水之源流注無竭也䟽首標虚極之强名將名衆妙之歸趣義云首者元也始也爾雅云初哉首基始也標者舉也虚極妙本也强名道也此章先標可道爲體可名爲用末篇歸衆妙之門攝迹歸本趣向也復歸向於大道之本也就此門中分爲七别一曰可道可名者明體用也義云體用者相資之義也體無常體用無常用無用則體不彰無體則用不立或無或有或實或根或色或空或名或象互爲體用轉以相明是知體用是相明之義也體者形也膚也用者資也以也二曰無名有名者明本迹也義云本迹者相生之義也有本則迹生因迹以見本無本則迹不可顯無迹則本不可求迹隨事而立以爲本迹本者根也迹者末也老君謂仲尼曰六經者先王之陳迹也迹者履之所出而迹豈履哉迹出於履以迹爲履而復使人履之愈失道矣明迹爲末也三曰明有欲無欲者明兩觀也義云觀者所行之行也以目所見爲觀音官以神所鑒爲觀音貫悉見於外凝神於内内照一心外忘萬象所謂觀也爲習道之階修眞之漸先資觀行方入妙門夫道不可以名得不可以形求故以觀行爲修習之徑謂有欲歸於死無欲契於生也是觀其生死歸趣不同矣四曰同出異名者明樸散而爲器也義云大樸者道也道散爲神明流爲日月分爲五行生爲萬物器者有形用也易曰形而上者日道也形而下者曰器也五曰同謂之玄者明成器而復樸也義云神明日月五行萬物有形有器皆合於道故云復樸也六曰玄之又玄者辯兼忘也義云爲器之時必存其樸復樸之後此樸亦忘乃契於道爾故謂玄之又玄也兼忘者器樸俱忘也七曰衆妙之門者示人行了出也義云器樸兩忘了然契道復歸生化之始衆妙之門也人與萬物同禀於道有爲有欲則失道傷生除欲守和則歸根復本是謂知道要之門户也了出者出世也道可道非常道䟽道者虚極妙本之强名也訓通訓徑義曰道者至虚至極非形非聲後劫運而不爲終先天地而不爲始圓通澄寂不始不終聖人以通生之用可彰尋迹而本可悟故以通生之德强名爲道也䟽道一字標宗也義曰經首道之一字標舉爲宗也䟽可道者言此妙本通生萬物是萬物由徑可稱爲道故云可道義曰標宗一字是無爲無形道之體也可道二字是有生有化道之用也三字之中自立體用體則妙不可極用則廣不可量故爲虚極之妙本也䟽非常道者妙本生化用無定方强爲之名不可遍舉故或大或逝或遠或返是不常於一道也故云非常道義曰散爲萬物不拘一方故用無定方也但宗一道故明萬物皆資道化故不在遍舉高而無上無不包容大也高而無上不滯於上大而無外不滯於外逝也逝往也窮於無窮無所不通遠也虚心守一道復歸之返也返還也此引道經第二十五有物混成章以證此義以此推之不常厥所是謂非常道也名可名非常名注道者虚極之妙用名者物得之所稱用可於物故云可道名生於用故云可名應用者無方則非常於一道物殊而名異故非常於一名是則强名曰道而道常無名也䟽名者稱也謂即物得道用之名也首一字亦標宗也義曰名者正言也標宗一字爲名之本可名二字爲名之迹迹散在物稱謂萬殊由迹歸本乃合於道是知道爲名之本名爲道之末本末相生以成化也䟽可名者言名生於用可與立名也非常名者在天則曰清在地則曰寧在神則曰靈在谷則曰盈得一雖不殊約用則名異是不常於一名故云非常名也義曰無用則道凝有用則名立天得道垂象清明地得道確然安靜神得道變化不歇谷得道盈滿無虧此引下經第二章以明其義名散無極是爲非常名也無名天地之始疏無名者虚極妙本未立强名也妙本之始無有無名從本降氣開闢天地天地相資以爲始故曰無名天地之始義曰大道吐氣布於虚無爲天地之本始無有無名者莊子天地篇曰泰初有無無有無名言泰初者無之始也無既無名不可詰之以名混漠寂寥邈爲化主元氣資之以爲始玄化禀之而得生故曰無名天地始無名無氏然後降迹漸令兆形由此而天地生氣象立矣䟽易之太極生兩儀兩儀生三才三才生萬物按爾雅云權輿始也義曰太極者形質已具也形質既具遂分兩儀人生其中乃爲三才也爾雅者周公所造以教成王多識鳥獸草木之名通詁訓之指歸辯同實而殊號者也成九流之津梁涉六藝之鈐鍵學覽者之潭奥擒翰者之華苑也蓋興於中古隆於漢氏言中古者亦五帝之後三王之間故易繫曰作易者其在中古乎有名萬物之母注無名者妙本也妙本見氣權輿天地天地資始故無名也有名者應用匠成茂養萬物物得其養故有名也䟽有名者應用應用匠成有强名也萬化既作品物生成妙本旁通以資人用由其茂養故謂之母也母以茂養爲義然則無名有名者聖人約用以明本迹之同異而道不繫於有名無名也義曰萬化者舉其多也品物者衆物也衆物之中道無不在秋毫之細道亦居之故能生三才母萬物萬物道存則生道去則死含養之至不曰母乎大道無異無同無本無迹强立言教而本迹彰矣常無欲以觀其妙常有欲以觀其徼注人生而靜天之性感物而動性之欲若常守清靜解心釋神反照正性則觀乎妙本矣若不性其情遂欲而動性失於欲迷乎道源欲觀妙本則見邊徼矣疏欲者性之動謂逐境而生心也言人常無欲正性清靜反照道源則觀見妙本矣若常有欲逐境生心則性爲欲亂以欲觀本既失冲和但見邊徼矣徼邊也義曰夫機械之心藏於胸中即純白不粹神德不全存身者不和此有欲也若欲害之心忘於中即虎尾可履而況於人乎此無欲也有欲者任耳目以視聽勞心慮以爲理視聽逾迷爲理愈亂可謂見邊徼矣無欲者神合於虚氣合於無無所不達無所不通與天地同功乃合乎大通可謂觀其妙矣觀者外以目周覽内以神照微目覽則辯乎有無神照則契乎冥寂矣人生而靜天之性者樂記篇之詞也言性本清靜無欲無營爲物所感因境生欲感於外而動於内得不慎其所感哉故聖人制法以檢其邪制禮以檢其亂制刑以檢其過制樂以檢其淫以道制欲所以教民之崇德務善也此兩者同出而異名注如上兩者皆本於道故云同也動岀應用隨用立名則名異矣疏此指上事也兩者謂可道可名無名有名無欲有欲各自其兩故云兩者俱禀妙本故云同出自本而降隨用立名則名異也義曰夫一氣分而萬化生形兆立而萬有作三者之變各而兩之有出於無斯之謂矣道顯而名立名立而欲生此乃有道可言有名可謂有欲之機興於此矣是迹從本而生也若攝迹者棄欲忘名復歸妙本於道忘道於名忘名是謂還本矣徇情者逐欲忘本以至淪滑能返乎物初可與言乎至道矣同謂之玄注出則名異同則謂玄玄深妙也疏玄深妙也自岀而論則名異是從本而降迹也自同而論則深妙是攝迹以歸本也歸本則深妙故謂之玄義曰有欲無欲之人同受氣於天地禀中和滋液則賢聖而無爲禀濁亂之氣則昏愚而多欲苟能洗心易慮澄欲含虚則攝迹歸本之人也人能修鍊俗變淳和則返樸之風可臻太古矣玄之又玄衆妙之門注意因不生則同乎玄妙猶恐執玄爲滯不至兼忘故寄又玄以遣玄示明無欲於無欲能如此者萬法由之而了出故云衆妙之門䟽攝迹歸本謂之深妙若住斯妙其迹復存與彼異名等無差别故寄又玄以遣玄欲令不滯於玄本迹兩忘是名無住無住則了出矣注云意因者西昇經云同出異名色各自生意因令不生意因是同於玄妙無欲於無欲者爲生欲心故求無欲欲求無欲未離欲心既無有欲亦無無欲遣之又遣可謂都忘義曰夫攝迹忘名已得其妙於妙恐滯故復忘之是本迹俱忘又忘此忘脗合乎道有欲既遣無欲亦忘不滯有無不執中道是契都忘之者爾疏正觀若斯是爲衆妙其妙雖衆皆出此門故云衆妙之門也義曰衆妙門者天門也天門者萬法所生之總名也無有也言萬物出乎無有入乎無有聚散隱顯故有出入之名爾徒有其名實無其門故謂之無爲之門則無門也無門無房四達之皇皇是歸於妙道矣正觀者因修之漸證道之階也前所謂目見者爲觀音官覽之觀也神照者觀音貫行之觀也道以三乘之法階級化人從初發心至于極道捨凡證聖故有一十四等觀行之門小乘初門有三觀法一曰假法觀謂對持也二曰實法觀謂心照也三曰遍空觀入無爲也中乘法門觀行有四一曰無常觀二曰入常觀三曰入非無常觀四曰入非常觀大乘門中觀行亦四一曰妙有觀二曰妙無觀三曰重玄觀四曰非重玄觀聖何門中復有三觀一曰眞空觀二曰眞洞觀三曰眞無觀以此觀行修鍊其心從有入無階麤極妙得妙而忘其妙乃契於無爲之門爾無爲有爲可道常道體用雙舉其理甚明今於體用門中分爲五别一曰以無爲體以有爲用可道爲體道本無也可名爲用名涉有也二曰以有爲體以無爲用室車器以有爲體以無爲用用其無也三曰以無爲體以無爲用自然爲體因縁爲用此皆無也四曰以有爲體以有爲用天地爲體萬物爲用此皆有也五曰以非有非無爲體非有非無爲用道爲體德爲用也又於本迹門中分爲二别以無爲本以有爲迹無名有名也以有爲本以無爲迹互相明也萬物自有而終歸於無也夫以玄源澄寂妙本杳冥非言象可求非無有可質固亦討論理絶擬議道窮而設教引凡示兹階級然在於冥心感契漸頓隨機不可滯教執文拘於學相澡心浴德之士勤乎勉哉道德眞經廣聖義卷之六
