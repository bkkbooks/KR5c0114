  text: 道德眞經廣聖義卷之一
  hash: sha256:5f44157fe1b298d11e8fd66a09d374438595f6d8739a05fb16cac8566c3fdc4a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0114_SJB_001-140310c, image: sjb/14/140310c.png}
body:
  text: 唐廣成先生杜光庭述敍經大意解疏序引將釋此經大分二段先明制䟽後解正文今初述製䟽之由者我大唐玄宗皇帝垂衣之暇鍾想妙門以大道爲天地原根老君乃玄元聖祖二經敷演綿歷歲年說自舜朝傳於周代詮註疏解六十餘家言理國則嚴氏河公楊鑣自得述修身則松靈想爾逸軌難追其間梁武簡文僧肇羅什臧陶顧孟霞舉於南朝任黎二張星羅於西蜀其餘祖述互有否臧未盡發揮孰窺堂奥以開元十一年躬爲註解下詔曰在昔元聖强著玄言義云詔者勅命之書也在天子爲詔爲誥爲勅爲制在皇后太子諸王爲教爲令皆君命於臣上命於下之詞也曰者字林云曰者從口出言爲曰亦云張口吐舌爲曰說文云曰詞也從口乙聲象口出氣有聲而成言詞也故云曰昔者往也在者存也元者始也聖者靈通之德也書曰睿作聖是也强者力取也著者述作也玄者深妙也言者詞也謂老君爲道化之宗元弘睿聖之至德闡微妙無名之道爲强名演暢之詞將以恢振玄風化導於代理深義奥故謂玄言居萬聖之先故謂元聖矣詔曰權輿眞宗義云權輿始也眞者純正不雜也宗尊也詔曰啓迪來裔義云啓開也迪進也通達也來謂將來也裔嗣續也邊也謂此道德二篇垂於萬代傳範後王廣化人天永敷祕妙也詔曰遺文誠在精義頗乖義云遺留也謂老君玄化既畢上登九清所著眞經遺留於代百王所仰萬古常存誠信也信爲不刊之典也精者純粹深奥也義者經之文理也頗甚也乖爽也謂此經玄奥精純之理世所未窮雖百家詮註尚甚乖爽謂下句也詔曰撮其指歸雖蜀嚴而猶病義云撮者採結之謂也指者趣向也歸者義理會聚也蜀嚴者仙人嚴君平居於蜀肆作道德指歸一十四卷恢廓浩瀚爲時所稱蜀都楊子雲昌言於漢朝曰蜀嚴道德沈冥言其識量深厚玄德隱微非常俗之所知而猶病耳當畤以爲道德之說文止五千指歸之多將及數萬演之於世謂爲富贍廣博議之於理傷於蔓衍繁豐故云雖蜀嚴而猶病也詔曰摘其章句自河公而或略議云摘者採擷分判也章者裁斷音句也句者言之所絶也自從也河公者河上公也太極葛玄仙公道德經序訣云河上公者莫知其姓名也漢孝文皇帝時結草爲菴于河之濱常讀老子道德經即今陜州黄河之側有河上公廟路左有漢文帝望仙臺存焉時人不知公之姓名常見織履爲業居於河上故號河上公爾或略者聖㫖以爲道德尊經並包萬法圍制三才理國理家之宗修身修道之要無所不攝無所不周而河上公分爲八十一章局於九九之數有失大聖無爲廣大之趣故云自河公而或略也詔曰其餘浸微固不足數義云其餘者言自蜀嚴河公之外五十餘家註義也浸遠也微細也數計也嚴雖猶病可以議於重玄河雖或略亦足明其至妙自外諸家浸遠微細不足比方固非聖㫖之所計數也詔曰則我玄元妙㫖豈其將墜義云我者皇帝自謂也玄元妙㫖謂二經玄妙之㫖也聖㫖歎道德隱奥之文上下玄妙之趣未有了達解釋之人自蜀嚴河公之後注疏者去聖逾遠述道益疏豈可墜廢湮絶而不弘暢於代矣詔曰朕誠寡薄常感斯文猥承有後之慶恐失無爲之理義云朕我也古人相謂皆呼人曰卿稱己爲朕莊子云雲將鴻蒙皆自稱朕是也自秦始皇制法以天子一人自稱曰朕其餘臣庶不得復僣而稱焉寡者道未廣也薄者德未豐也聖㫖自謙之詞也每仰感此經恐玄理抑絶不得人皆開悟而我紹聖祖之玄陰居萬寓之至尊安可使無爲之文壅而不流道德之訓晦而不顯也有後者謂老君垂裕光啓聖唐是也且夫弓冶之子尚不失於箕裘折薪之家或慮曠于負荷况睿德光於堯禹聖文邁於古先固當潤色玄玄之功使炳煥于千古也詔曰每因清宴輒扣玄關隨意所得遂爲箋註豈成一家之說但備遺闕之文義云聖㫖以萬機之暇深入玄關扣寂求音探眞遠妙以契合希微之理聖文釋冲寂之文得自神襟諧於祖訓矣箋表也解也註釋也尚以謙德不欲同吕氏丘明自爲一家之述作但備衆人所註解未了之義爾詔曰今兹絶筆是詢于衆公卿臣庶道釋二門義云絶筆者經理既暢製述已周釋筆罷書是謂絶筆如昔仲尼自衛反魯因魯史而修春秋自隱公訖哀公一十二公二百四十二年褒貶行事至哀公十四年戊午春西狩於大野叔孫氏之車子鉏商獲麟以爲不祥以賜虞人焉仲尼觀之曰麟也然後取之夫麟鳳五靈王之嘉瑞也今麟出非其時虚其應而失其歸此聖人所以爲感也絶筆於獲麟之一句者所感而起固所以爲終也今註經既終乃下明詔將以宣行聖作博問羣賢絶筆之義雖同非因感歎之事是表聖德謙讓問于王公卿佐逮於道釋二宗旁求辨博之才更俟發明之理也詔曰有能起予類於卜商鍼疾同於左氏渴於納善朕所虚懷苟副斯言必加厚賞義云卜商字子夏孔子弟子也論語八佾篇云子夏問於夫子曰巧笑倩兮美目盼兮素以爲絢兮何謂也子曰繪事後素子夏曰禮後乎諸家所註云此詩上二句在衛風碩人之二章閔莊姜之詩也其下一句逸也比喻莊姜有盼倩之色而能以禮自持喻如繪畫絺綉先以五彩分布廕映成文然後以白色分别其間乃能一一彰顯分明也夫絺刺之成文爲綉畫之成文爲繪此夫子喜子夏聞繪事後素之言即知以盼倩美色須以禮自持故云禮後乎夫子乃曰起子者商也始可與言詩已矣蓋喜卜商明了夫子言詩之意故云能起發我言詩之㫖也左氏者左丘明也夫子著春秋丘明傳之經有所誤則丘明正之或先經以始事或後經以終義春秋之得丘明若良醫之鍼疾矣聖㫖延佇羣才共暢玄理若仲尼之於子夏春秋之俟丘明不拒直言唯在進善以虚懷徯望以厚賞訪求明聖情採納之至也賞以勸善亦以報功也詔曰且如諛臣自聖幸非此流義云諛臣自聖者尚書冏命篇云僕臣諛厥后自聖是也賢良在用固無諛佞之臣英叡垂乾豈有自聖之失誠非此流也詔曰懸市相矜亦云小道既其不諱咸可直言義云懸市相矜者昔吕不韋爲秦丞相封萬户侯威望之盛冠於海内聚賔客著書書成懸於市曰有增减一字者賞千金號曰吕氏春秋大誇於時今聖㫖註述既成下訪才彦開直言之路垂不諱之恩則懸市矜誇誠爲小道矣不韋後得罪始皇竄之於蜀也詔曰勿爲來者所嗤以重朕之不德義云不德者謂失無爲之德也玄經奥㫖演暢既周再垂博採之言乃下奬延之詔則九圍之外八極之中孰不仰感聖明朝宗至道矣暨明年乃御書四石幢註經立於左街興唐觀右街金仙觀又諸州節度使刺史各於龍興觀開元觀形勝之所各立石臺以傳不朽又尋御製此疏宣布寰瀛勅曰道德五千實惟家教理國則致乎平泰修身則契乎長生包萬法以無倫冠六經而首出宜昇道德經居九經之首在周易之上以道德周易莊子爲三玄之學仍以莊子爲南華眞經文子爲通玄眞經列子爲冲虚眞經庚桑子爲洞靈眞經准明經例赴舉其老君傳内析出韓非不令同傳上來述製疏之由已竟向下入解正文於中大分爲二一者先解疏題二者入文科判今初也先解疏題曰老子道德經疏者疏題即經題也向下當辯所言疏者疏决開通之義也謂經含衆義玄妙幽深雖詮註已終而文義未盡故述此疏開通幽賾疏决玄微分釋意義令可會入故謂之疏亦云疏者條也條理經義令人易曉或云鈔鈔以抄集爲名或云記記以紀録爲目此蓋隨時立名皆是包括義理之義也疏釋題訓者釋以銷解爲義言將疏决經文先當銷解經目題者訓視之首凡經籍記傳史策篇章先標首目視之可會總以此義名之曰題即標舉綱領之意也訓者教言也隨文訓解之義謂六書不同也大凡文字之興雲篆初凝傳於天上倉頡象跡興於人間大體有六一謂象形日月字是也二謂指事上下字是也三謂假借行雖字是也四謂形聲江河字是也五謂會意止戈爲武人言爲信反正爲乏是也六謂轉注考老左右字是也製文字六意不同形聲假借轉注等意以成文字須以訓之乃明其義理爾雅有釋訓毛詩有詁訓即其類也疏御製者向來已明所作疏文明御制述作之聖即謂玄宗皇帝也乃太上老君三十六代孫睿宗第三子大唐之第六帝也龍文表聖曰角標奇叶太平之符應壬辰之運母曰昭成順聖太后竇氏以則天垂拱元年乙酉八月五日戊戌生於東都生而聰明睿哲及長寬仁孝友好學善屬文英武果斷尤工楷隸兼善騎射三年閏月丁卯封楚王天授二年十月戊戌出閣開府置官屬長壽二年封臨淄王居於興慶里景龍二年出爲潞州别駕是時州境曰抱戴月重輪逐鹿渡河赤龍據按嘉禾合穗黄龍乘城仙洞自開童謡累應黄龍再見赤鯉騰波李樹連理神蓍翹立寢堂瑞氣壺口紫氣伏龍疑山巨人留迹夏禹表氣聖人金橋及神人傳慶凡一十九瑞編於史策唐隆元年入誅韋后平内難迎睿宗即位至開元元年自相國平王登極在位四十四年天寳十四年傳位皇太子寳應元年壬寅崩年七十八歲御者臨制之稱如御㝢御天義也製者作造之謂如制禮作樂之言也上來釋疏題已竟次入正文將釋下文約疏大料二段一曰總標宗意二曰開章釋文總標中又分爲二一者所詮之法即指道德二字也二者能詮之教即經之一字也解釋具在向下經題中當辨夫此道德二字者宣道德生畜之源經國理身之妙莫不盡此也昔葛玄仙公謂吴王孫權曰道德經者乃天地之至妙有天道焉有人道焉有神道焉大無不包細無不入宜遵之焉就此門中大略宗意有三十八别第一教以無爲理國經云絶聖棄智人利百倍絶仁棄義人復孝慈絶巧棄利盜賊無有又云愛人理國能無爲乎又云我無爲而人自化第二教以修道於天下經云修之於天下其德乃普又云執古之道以御今之有又云執大象天下往第三教以道理國經云以道莅天下其鬼不神非其鬼不神其神不傷人又云天下無道戎馬生於郊第四教以無事法天經云人法地地法天又云道常無爲而無不爲侯王若能守萬物將自化第五教不以尊高輕天下經云貴以身爲天下若可寄天下愛以身爲天下若可託天下又云柰何萬乘之主而以身輕天下輕則失臣躁則失君又云聖人不爲大故能成其大第六教不尚賢不貴寳經云不尚賢使人不爭不貴雖得之貨使人不爲盜又云欲不欲不貴難得之貨第七教化人以無事無欲經云常使人無知無欲使夫知者不敢爲也爲無爲則無不理矣又云我無事而人自富我無欲而人自樸又云不欲以靜天下將自正第八教以等觀庶物不滯功名經云天地不仁以萬物爲芻狗聖人不仁以百姓爲芻狗又云行不言之教又云爲而不恃功成不處第九教以無執無滯經云爲者敗之執者失之又云去甚去奢去泰又云聖人無常心以百姓心爲心第十教以謙下爲基經云貴以賤爲本高以下爲基又云江海所以能爲百谷王者以其善下之又云受國之垢是謂杜稷主受國不祥是爲天下王又云大國宜爲下又云善用人爲下又云大國以下小國則取小國以上皆本天子而言第十一教諸侯以正理國經云以正理國又云以智理國國之賊不以智理國國之福又云民之難理以其智多是以難理第十二教諸侯政無苛暴經云理大國若烹小鮮又云朝甚除田甚蕪倉甚虚又云其政察察其民缺缺第十三教諸侯以道佐天子不尚武功經云以道佐人主不以兵强天下又云兵强則不勝又云善勝敵不爭又云雖有甲兵無所陳之使人復結繩而用之又云兵者不祥之器不得已而用之又云勝而不美第十四教諸侯守道化人經云古之善爲士者微妙玄通又云其政悶悶其民淳淳第十五教諸侯不翫兵黷武經云用兵有言吾不敢爲主而爲客不敢進寸而退尺又云抗兵相加哀者勝又云禍莫大於輕敵又云善爲士不武又云攘無臂執無兵又云不爭之德第十六教諸侯不尚淫奢輕徭薄賦以養於人經云民之饑以其上食税之多是以饑又云人多伎巧奇物滋起第十七教諸侯權器不可以示人經云魚不可脱於泉國有利器不可以示人又云古之善爲道者非以明民將以愚之第十八教以理國修身尊行三寳經云我有三寳保而持之一曰慈二曰儉三曰不敢爲天下先第十九教人修身曲己則全守柔則勝經云曲則全又云柔勝剛弱勝强又云柔弱勝剛强又云柔弱者生之徒剛强者死之徒又云强梁者不得其死第二十教人理身無爲無欲經云常無欲觀其妙又云不見可欲使心不亂第二十一教人理身保道養氣以全其生經云致虚極守靜篤又云專氣致柔又云爲腹不爲目去彼取此又云知其白守其黑又云知其子守其母又云我獨異於人而貴求於食母又云綿綿常存用之不勤第二十二教人理身崇善去惡經云天下皆知美之爲美斯惡已皆知善之爲善斯不善已又云常善救人故無棄人常善救物故無棄物又云善人不善人之師又云挫其鋭解其紛又云上善若水第二十三教人理身積德爲本經云含德之厚又云上德若谷又云大丈夫處其厚不處其薄居其實不居其華又云君子終日行不離輜重第二十四教人理身勤志於道經云上士聞道勤而行之又云勇於不敢則活第二十五教人理身忘棄功名不耽俗學經云絶學無憂又云功成名遂身退又云成功不居又云爲道日損又云名與身孰親第二十六教人理身不貪世利經云身與貨孰多得與亡孰病又云甚愛必大費多藏必厚亡又云難得之貨令人行妨第二十七教人理身外絶浮競不衒己能經云不自見故明不自伐故有功不自矜故長又云大辯若訥大巧若拙又云廣德若不足又云大音希聲又云自知者明自勝者强第二十八教人理身不務榮寵經云寵辱若驚又云富貴而驕自遺其咎又云持而盈之不如其已揣而鋭之不可長保第二十九教人理身寡知慎言經云知不知上不知知病又云多言數窮不如守中又云輕諾必寡信多易必多難又云塞其兊閉其門終身不勤第三十教出家之人道與俗反經云俗人昭昭我獨若昏俗人察察我獨悶悶又云明道若昩進道若退第三十一教人出家養神則不死經云谷神不死是謂玄牝又云深根固蔕長生乆視之道又云善建不拔善抱不脱第三十二教人體命善壽不亡經云死而不亡者壽第三十三教人修身外身而無爲經云後其身而身先外其身而身存第三十四教人理心虚心而會道經云虚其心弱其志第三十五教人處世和光於物經云和其光同其塵又云大道汎兮其可左右又云被褐懷玉第三十六教人理身絶除嗜欲畏慎謙光經云五色令人目盲五音令人耳聾五味令人口爽馳騁畋獵令人心發狂又云民不畏威則大威至第三十七教人裒多益寡經云以有餘奉不足又云既以與人己愈有既以與人己愈多第三十八教人體道修身必獲其報經云陸行不遇兕虎入軍不被甲兵又云以其無死地舉此三十八别以明經之大意所詮之法然則此經大則包羅無外細則入於毫間豈止三十八門便盡其要爲存教義汎舉大綱比之秋毫萬分未得其一也禮記云道也者不可須臾離可離非道也若爲君之無道德如瞻視之無兩目若爲臣之無道德如胸腹之無五藏理家之無道德如尸殭而無氣由是論之道之於人不可闕矣其若離言教絶指陳玄之又玄妙之又妙斯可以神照不可以言傳道之極矣上來總標已竟向下開章釋文道德眞經廣聖義卷之一
