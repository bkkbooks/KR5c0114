  text: 道德眞經廣聖義卷之四十五行八
  hash: sha256:2271a4116d84f42347c3e1efd0c820bdaf9faccd9d808d076e1cec4cb92c4f44
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0114_SJB_046-140540a, image: sjb/14/140540a.png}
body:
  text: 唐廣成先生杜光庭述天下皆謂我道大章第六十七䟽前章明善下爲王標聖人不爭之德此章明喻大不肖示三寳以慈之行初六句標道大所以不肖次五句示三寳勸其用慈又八句覆釋以慈之利捨慈之害又四句結歎以慈之德義曰太上以慈訓人聖人以謙守位既善下成不爭之德即道大生不肖之疑以三寳彰儉退之功用慈宣救衛之利然後不武不怒用人得人此章通前後之㫖天下皆謂我道大似不肖注肖似也老君云天下之人皆謂我道大無所象似我則答云䟽肖似也老君曰天下後世之人皆謂我道虚無廣大似無所象故下文答之義曰天地大也有清濁之形日月大也有照灼之明道之爲大無臭無聲無形無象故不可得而擬議之所以天下之人皆言道無所似爾夫惟大故似不肖若肖乆矣其細也夫注夫唯我道至大故無所象似若如代間諸法有所象似則不得稱大乆已微細也夫䟽此答不肖之所由也夫唯我道廣大迥超物表固非凡情探賾所知故得稱大若其有所象似如代間法者則失其所以爲大乆矣是微細麤淺之法與俗不殊何足稱大乎夫者語助也義曰以大道包容廣無所似故稱爲大若如天地之有形位日月之有光華可稱可謂可筭可度則不得名爲大道其爲循常之狀亦已乆矣我有三寳保而持之注我道雖大無所象似然有此三行甚可珍貴能常保倚執持可以理身理國也䟽此明所以不肖者正以有此三行與俗不同故老君言我道雖大無所象似然有此三寳甚可珍貴於汝代人當須保持執守以修身理國爾義曰道雖籠羅衆法兼包萬行化周天地功洽無垠其於太上所寳以教於世者有三寳焉若保而持之爲國則昇平理身則貞靜故爲修身理國之要也一曰慈二曰儉三曰不敢爲天下先注慈則廣救儉則足用不敢爲天下先故樂推不猒䟽此列三寳之數也體仁博施愛育群生慈也節用後人不耗於物儉也不爲事始和而不唱不敢爲天下先也弘益之義具如下文義曰道存愛育以慈爲先養人惜費以儉爲次先人後己以讓爲終慈以法天澤無不被也儉以法地大信不欺也讓以法人恭謙不爭也此三者理國之本立身之基寳而貴之故曰三寳夫三寳者道之用也夫唯大故似不肖者道之體也抱道之體運道之用理身理國以兹爲先矣夫慈故能勇注慈仁憫惠則德有餘故勇於救濟䟽此覆述三寳之功也凡人貪競不慈勇於果敢致有窮屈今聖人以慈爲行故能勇於濟度論語曰仁者必有勇義曰布仁施惠博愛含生者慈也以慈濟物物無不周以慈立功功無不被以慈理國恩浹華夷以慈潤身善均動植故慈之爲利也强暴不能侵威武不能害讒邪不能間諛佞不能誣行之於中而功宣於外斯可謂勇矣言人貪競則不慈豈能果敢於濟物善功不立遂有窮屈之時今聖人貺果於行慈必勇於濟度故曰勇也仁者必有勇論語憲問篇孔子曰有德者必有言有言者不必有德仁者必有勇勇者不必有仁是也儉故能廣注節儉愛費故財用有餘而功施益廣也䟽以其節儉愛費不傷財不害人故功施益廣矣義曰儉嗇則財豐財豐則惠普普施其惠可謂廣矣人君儉以臨御則朝無雕麗之奢野無箕歛之弊恩惠日以廣德教日以彰固無民饑力匱之患矣不敢爲天下先故能成器長注慈儉之德謙撝益先推先與人人必不猒故能爲神器之長䟽損己益人退身進物是不敢爲天下先也以物樂推而成神器之長義曰聖人大寳者神明之器也言非人力所能成乃天地之大寳爾主此神器爲民之長必退身讓物謙己先人者人所樂推必居此位乃爲四海兆庶之長也此三寳者修道理國能行之者即於身爲行所言行者慈儉不敢爲天下先是也所言果者行而獲報則爲果勇廣成器長三者所得之果也今捨其慈且勇捨其儉且廣捨其後且先死矣注今捨慈且勇勇則害物捨儉且廣廣則傷財捨後且先先則人怨傷財害物聚怨於人是必死之道故云死矣䟽且苟且也世情多欲動與道違捨其利物之慈苟且害人之勇捨其節用之儉苟且奢泰之廣捨其謙退之後苟且矜伐之先如此之行有違慈儉以之理國則國亡以之修身則身喪故云死矣義曰言常俗之夫違聖人之行捨此三寳肆其愚心强勇而不顧其慈奢侈而不崇其儉力爭求勝無讓於人故皆喪身敗國之資取怨傷生之本謂之死矣不亦然乎夫行慈不已則得勇於濟物之功行儉不已則得廣於利物之惠行讓不已則成厚德長民之美苟或捨之失道遠矣所以成三果者謂慈則濟物成其功也儉則利物成其惠也讓則先物成其德也詎可輕而捨之哉夫慈以戰則勝以守則固注用慈以戰利在全衆用慈以守利在安人各保安全故能勝固爾䟽慈爲三寳之首故偏歎美也夫用慈以拒戰則能全衆用慈以捍守可以安人皆不失慈故能勝固也義曰戰者主客交兵之謂也陳兵於野白刃爭鋒此爲戰也若勇於殺獲不務哀傷勝負之勢固未可保若以慈爲先戰則勝矣勝在慈勝豈在於殺人乎閉門堅拒曰守夫守者以慈爲先衆心固矣若以溝隍爲險城雉爲固守之堅勝未可知也故慈之所利不亦廣乎天將救之以慈衛之注以慈戰守豈但人和天道孔明亦將救衛戰勝天救也守固天衛也是皆以慈故云天將救之以慈衛之也䟽救助也衛護也天道福善善人則吉無不利故以慈戰者天將助之以慈守者天將護之戰勝守固始賴用慈之功救之衛之終獲孔明之助爾義曰天道無親常與善人善人謂行慈之人也善以慈惠爲本慈以拯救爲功故行慈之人物不能敵以戰則慈者勝以守則慈者固上合天道旁感物心物不能傷是爲天所救衛矣此以三寳垂訓慈儉著救衛之功前彰大道無方後繼爲士不武不以强武之理亦猶慈以捍敵而能配天成功矣古之善爲士者章第六十八䟽前章明惟大不肖示三寳以慈之行此章眀爲士不武標四善配天之極首標四善之行次歎是謂不爭結善可以配天將明古之要道義曰大聖之德與道玄同非言理可窮非贊美所及而演法救代發昏擊蒙廣示因修旁眀證報所以叙三寳爲可保之行敷四善爲積善之階功可配天何爭之有次明進寸退尺不離謙戒之規也古之善爲士者不武注士事也善以道爲理國之事者尚德故云不武䟽士事也武威也明德之君用道爲理行慈儉而育物不威武以御人所尚以慈故云不武義曰有道之君其理國也先以道化之次以德教之復以文撫之示以淳和兼以仁育和故不尚於威武也所謂以武爲備蓋備豫不虞非專用之事故曰不武言不用武也易曰重門擊柝以待暴客善戰者不怒注事不得已必須應敵以慈爲善故不憑怒䟽師出應敵事在慈哀蚊蚋致螫驅除而已是知善戰在乎止敵不在乎憑怒故云善戰不怒義曰哲后臨人固無兵革設有戈甲必不得已而用之所以高智善謀有征無戰苟在勝敵非樂殺人或以悲哀泣之喪禮處之豈憑怒而求殺獲也善勝敵者不爭注師克在和和則善勝全勝之善故不交爭䟽善勝在夫以慈不爭由乎尚德若用力爭勝非善勝也今柔遠能邇盡暢慈和不與敵爭敵人自伏故云善勝不爭義曰貺不廣求殺獲又不憑怒陵人服之以慈柔之以德或射㦸以和其敵或倒戈自攻其徒或解圍於吟嘯之間或悛逆於干羽之際斯謂善勝矣善用人者爲之下注悦以使人人盡其力必先下之是謂善用䟽夫善用其人以言謙下人必盡力可以成功故易曰以貴下賤大得人也義曰握髪禮賢賢必致用吮癕撫士士必相驅既感衆心必能盡力善用之道其在兹乎以貴下賤者易屯卦初九盤桓利居貞利建侯象曰雖盤桓志行正也以貴下賤大得民也此謂處屯之初動則難生不可以進故盤桓也利建侯者息亂以靜守靜以侯安民在正弘正在謙民思其主之時初處其首而又下之陽貴而陰賤以貴下賤宜得其人此喻人君以謙爲本以下爲基而得民心也是謂不爭之德䟽此結上文善士者常柔而不武善戰者常慈而不怒善勝者常讓而不爭善用人者常謙而爲下如是者物竭其能人盡其用皆由謙下之所致豈非不爭之德乎義曰禮而下士士得竭其能悦以使人人得宣其力不憑怒以傷物不矜武以伐功以慈爲先以謙爲本不力爭求勝不尊已侮人以此用材人效其命以守以戰則固而且勝理身理國則壽而求寧所向無前是不爭之德也是謂用人之力䟽夫玄默恭己謙虚下人人皆歡心思竭其力故易曰悦以使民民忘其勞是用人之力也義曰聖人所教理國修身柔遜則德彰謙和則人服使人則人盡其力弘化則化洽無疆故曰用人之力也悦以使人者兊卦辭曰兊悦也順乎天而應乎人悦以使人人忘其勞悦以犯難人忘其死此歎美悦之所致亦申眀應人之德也先以悦撫民然後使之從事民皆竭力忘其從事之勞施悦於人所致如此豈非悦義及人能使人勸勉矣是則怒而戰者危事也武爲己任者凶德也爭而勝者强梁也虐以使人者召禍也於身於國何所利哉是謂配天古之極注善勝是不爭之德爲下是用人之力能如此者可以配天稱帝是古之至極要道也䟽此總結上來四善之行不爭之德能行之者可以配天稱帝是古之至極要道義曰惟后配天代天理物必資睿德以致人和且三寳以慈儉爲先四善以謙讓爲要不伐功於武勇自叶止戈不求勝於戰爭果能合道然繼以爲客退尺之義是懼輕敵罹殃兵刃將交則哀者獲勝矣用兵有言章第六十九䟽前章明善士爲行不爭故可以配天此章明用兵有言輕敵則幾亡吾寳初一句標宗以設問次六句示行以辨明後四句申戒用兵知慈哀者必胜義曰致理之君弘慈爲本執謙守己以禮下人三寳四善之功戒之至矣讓王爲客之義慎亦審焉既躁進而不能在勇退而爲可無攘無執何禍何憂所寳克全用哀爲勝斯言顯矣而孰知孰行知者甚希則者爲貴此兼通前後章之㫖也用兵有言注老君傷時王殘人於兵故託古以陳戒有言者謂下句也䟽老君疾時輕敵致禍樂戰殺人故託古以申誡所稱有言謂下句也義曰大道以好生惡殺代人以樂戰傷民爲君則貪利土疆鏖兵絶域爲臣則圖懋功賞轉戰窮荒骨糞丘原血塗草莽老君憫其赤子念彼無辜演法垂文以陳至戒是知兵者非盛德之器戰者是凶危之機好生之君不得已而方用用而不戒斯暴也哉吾不敢爲主而爲客疏吾者用兵之人也先唱爲主後應爲客主先唱示生事而食客後應示以慈自守欲明古者用兵常有戒令當須以慈自守不可生事而食故云不敢爲主而爲客義曰夫安居之世先動者爲主後應者爲客陳兵於野先動者爲客後應者爲主斯用兵主客之定分也兵法言之反有先後然客主之道胜負之宜决於善謀不尚武力若殺人而取勝輕敵而立功禍福不預萌存亡安可保故曰將者人之司命也生死猶轉機得失如反掌可不慎乎老君戒令守柔使之揣敵不敢先唱以始禍固在應敵而不爭苟在愛人豈欲求勝以慈以讓庶必保全者體此而用之必天救而慈衛矣不敢進寸而退尺注主有動作則生事而食客無營爲則以慈自守自守則全勝生事則敗亡進雖少不能無事退雖多不失謙讓故不敢進於寸而退於尺也疏夫以道退守則善勝進兵取强則敗亡故進雖少猶傷於貪退雖多愈得謙讓今鄙其競爭則云不敢進寸尚其慈讓故云退尺義曰夫以道爲國不恃軍功用德牧人寧勞武力且兵者凶器也戰者危事也驅彼蒸人執持凶器深入敵境自掇危亡豈爲理國之務也且貪進必樂殺樂殺則殘人勇退必懷慈懷慈則體道能體道而退尺者可謂萬勝萬全矣是謂行無行注爲客退尺不與物爭雖行應敵與無行同也䟽夫行師在乎止敵止敵貴乎不爭今爲客退尺善胜不爭雖行應敵與無行同矣義曰應敵出師蓋不得已豈果敢於行師乎以慈守衆以德撫人既不銳於爭鋒復無心於克敵自然德勝也靈寳經云守道之士以戒撿心彼來加我志在不報此其謂歟攘無臂注攘臂所以表怒今善戰不怒故若無臂可攘䟽注云攘臂所以表怒善戰不怒故若無臂可攘故曰攘無臂義曰夫士之怒也裂眦衝冠奮衣攘臂將銳於爭戰矣道之爲理惡殺尚慈貺已不爭固當無敵設有應敵不得已而出師非務力爭故若不攘臂矣仍無敵注仍引也引敵者欲爭不爭故若無敵可引䟽仍謂引也夫引敵欲有所爭今以不爭爲德是若無敵可引故曰仍無敵也義曰貺無仍引非在戰爭有敵不爭固若無敵矣執無兵注執兵所以表殺今以慈爲主故雖執與無兵同䟽執猶持也兵者五兵戈矛之屬也夫執兵者將欲殺敵以慈爲主自戢干戈則雖有兵本無殺意是則與無兵同也義曰法道爲君不務兵戰貺非獲已應敵帥師兵克在和師出以律無拓土開邊之志無爭鋒歛怨之心行若無行敵若無敵攘若無臂執若無兵推此四無叶夫三寳則射軛夾脰之矢烏號繁弱之弓魚腸昆吾之刀太阿巨闕之劍吴鈎楚矛蜀弩孟勞豈假執持無所用矣五兵者戈矛殳戟干言有五等也周禮廬人爲廬器凡祕過三其身不能用也祕柄也戈祕長六尺六寸殳長尋有四尺八尺曰尋言一丈二尺也矛常有四尺夷矛三尋夷長也長二丈四尺平野之兵欲長山林之兵欲短執欲其銳被欲其堅矛戈㦸爲鈎兵欲無掉刺兵欲無撓戈殳爲擊兵欲上下强弱均用之欲其疾速也兵有鼔角金革牙旗斧鉞甲胄旌節旗旟旒旐弓弩弧矢各有制度其大約分爲五等三制九章之法短兵有刀劍匕首之異皆所以禦敵制勝也貺以慈制敵以德行師雖執其兵執而不用故若無兵也說文曰拱手執斤曰兵禍莫大於輕敵輕敵幾喪吾寳注爲禍之大莫大輕侮敵人輕侮敵人則殆喪吾以慈之寳矣䟽幾近也喪失也寳謂慈也夫爲禍之大莫大於輕侮前敵好事交爭如此則近喪失吾以慈之寳矣且失慈以戰則敗亡以守則離散代間之禍雖非一途離散敗亡禍之大者也義曰用兵之道敵國在前先代其謀次料其敵勇怯既等衆寡復均然猶得天之時假地之利揣理之曲直因人之協和或高壘深溝挫孔明之銳氣焚舟示死雪秦繆之前羞殞長星而吿終封殽尸而歸國若不然者則五千深入永悲於鴈塞龍堆百萬横行竟怯於風驚鶴唳晋山草木盡變人形昆陽犀象寧爲我用則謙慈之寳於兹喪矣故抗兵相加哀者勝矣注抗舉也兩國舉兵以相加則慈哀於人者勝也䟽抗舉也夫兩國抗兵以相加則由其君用道其將以慈矜哀於人不求多殺者獲勝矣義曰夫雖戎狄侵邊豺狼害國奸凶肆孽妖逆亂常推轂命師鑿門授律與民除害不得已而征之猶慮强抗則乖仁故哀慈則合道合道者必勝乖仁者必亡此天理之常然詎可誣而蔽也以慈之感無或忽諸道徳眞經廣聖義卷之四十五
