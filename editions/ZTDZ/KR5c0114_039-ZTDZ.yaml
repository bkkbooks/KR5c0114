front:
  text: 道德眞經廣聖義卷之三十八行一
  hash: sha256:d5459d4a367a9228f277be50e76cebb15d92eb6537f5f203d4f549f4a3ec28ac
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0114_SJB_039-140505b, image: sjb/14/140505b.png}
body:
  text: 唐廣成先生杜光庭述使我介然章第五十三䟽前章眀守母存子故歸明無遺身殃此章明介然用知則行道有唯施之畏初三句明有知則乖道次兩句示道正而人邪又七句明有知之生弊後兩句歎盜夸之非道而以爲戒爾義曰前以歸明襲常爲所修之至要此舉有知行道所施畏有所傷而大道坦夷人趨邪徑雖庭華服侈且田廢廪虛處位者食厭財豐在下者家空力竭以此爲理識謂盜夸欲使斥彼淫奢節其劍服勤三農之稼穡使萬井之豐穰國其永寧人不爲盜修身者約己窒欲務道䟽財介然獨修可俟飛翥矣使我介然有知行於大道注老君言若使我耿介然於其有知欲行大道既與道不合故惟所施爲是皆所可畏也䟽使我者老君假設之詞也介然謂耿介然有知之貌夫道非知法而代人欲以有知行道故老君患其蔽蒙昌言曰使我耿介然矜其有知欲行無爲大道於天下者有知則與道相乖而失無爲清靜之化唯所施爲將害於物故可畏懼也義曰至道之君勤行之士不以多智而爲道不以博識而探眞道不可知知之益遠矣莊子智北遊篇曰智遊於玄水之上問無爲謂曰何思何慮則知道何處何服則安道何從何道則得道三問不答非不答不知答也智返於白水之南以問狂屈狂屈曰唉余知之矣欲言而忘其所言智又返於黃帝之宫以問黄帝黃帝曰無思無慮始知道無處無服始安道無從無道始得道智謂黃帝曰我與汝知之無爲謂狂屈不知也其孰是耶黃帝曰無爲謂眞是也狂屈似之我與汝終不近也知者不言言者不知故聖人行不言之教此謂道離有說而非說能明故知之者與道遠矣此欲使帝王行不言之教不欲介然而知也又泰清問於無窮曰知道乎曰不知又問無爲曰知之道也可以貴可以賤可以約可以散泰清以此言問於無始曰無窮與無爲兩者孰是無始曰不知深矣知之淺矣不知内矣知之外矣道不可聞聞而非也道不可見見而非也道不可言言而非也此則介然有知欲行於道既乖道矣能無畏乎大道甚夷民甚好徑注大道平易是畏有知而人多故欲心求捷如彼行人好從邪徑邪徑之弊其如下文䟽夷平也徑邪捷之道言大道坦然平易而人好從邪徑且大道之化貴夫無爲無爲則平易而代之從事不能息智於無欲將役心以應務始雖好徑而求捷終則失道而焚和故云人甚好徑義曰道本坦夷無爲即可致人好邪徑涉迹則乖眞邪捷則行之者多平夷則好之者寡其故何哉邪教順俗率下士之易從大道澹然非上智而難守故造邪徑者多也孔子弟子有澹臺滅明字子羽居武城行不由徑樂道安貧爲儒教之所重况修眞叅道而溺於邪徑者過莫大焉理國者在於去奸邪崇正直進忠讜黜佞人然後至理可期太平可致爾焚和者莊子外物篇云陰陽錯行天地大駭水中有火乃焚大槐利害相摩生火甚多衆人焚和言害生於欲欲火焚其眞性而傷天和也朝甚除注尚賢矜智生巧僞除理也䟽除理也言好徑之君不尚無爲之化但以有爲爲理雖云甚除有爲則傷巧詐故注云尚賢矜智生巧僞又解云朝廷修理峻宇雕墻故云甚除義曰上即進智巧之人矜朝廷之理次則竭生靈之力壯華侈之居用巧智則朝雖崇嚴下民困弊華侈則君迷隆盛百姓崩離豈若茅屋采椽垂衣致理修身者被褐懷玉無徇繁奢以傷其行也峻宇雕墻者尚書五子之歌詞也夏啓之子太康嗣位樂于盤遊兄弟五人作歌曰外作禽荒内作色荒酣酒嗜音峻宇雕墻有一於此未或不亡峻宇者宫殿崇高也雕墻者垣墻雕麗也田甚蕪注浮食墮業廢農事也䟽草長曰蕪淫巧浮食則農事茺蕪貺闕嘉生之報何望如𡊨之積義曰智巧在朝邪佞居位尚浮華則墯業重雕峻則傷農田畝蒿萊人力疲瘵何以致人安國霸乎詩曰不稼不穡胡取禾三百廛兮夫士農工啇各守其業則無墯遊冗食之人矣貺廢農尚詐則浮食者多國力困矣如𡊨者積土曰𡊨言豐年稼穡所積如京如𡊨多也京大也倉甚虛注南畝不收無儲積也䟽年登則廪實農廢則倉虚自然之理也義曰肆邪任智害政傷農浮冗既多倉廪不實理固然矣欲使君慕清虚臣懷端慤奸邪徑塞正直門開無華宇崇臺絶浮遊冗食勸農則廪實靜理則人安至於澡雪修眞洗心守道於身於國何莫由斯也服文彩注刻雕綺繡害工利䟽青赤爲文色絲爲彩言賤質而貴文也義曰朝既除理君尚浮華文彩飾裝理無爽也帶利劍注文德不修尚武備䟽利劍者武備也夫文德者理國之器用武功者文德之輔助而文爲本武爲末今專事武功是棄本而崇末也義曰利劍之用制敵所先非理國之大器今重而帶之是輕於文而棄於本矣武備者春秋定公十年夏與齊景公會于夾谷孔子攝行相事曰臣聞有文事者必有武備有武事者必有文備諸侯出疆必具官從請具左右司馬定公從之會所爲壇位土階三等以遇禮相見揖讓而登獻酬已畢齊使萊人以兵鼔譟劫定公孔子歷階而進不盡一等以公退曰士兵之吾兩君爲好而裔夷之俘敢以兵亂之非齊君所以命諸侯也裔不謀夏夷不亂華俘不干盟兵不逼好於神爲不祥於德爲愆義於人爲失禮君必不然齊侯心怍麾而避之有頃齊侯奏宫中之樂倡優侏儒戲於公前孔子趨進歷階而上不盡一等曰疋夫而熒侮諸侯者罪應誅請有司速加法焉於是斬侏儒手足異處齊侯懼有慚色既盟齊侯歸責其羣臣曰魯以君子之道輔其君而子獨以夷狄之道教寡人得罪於魯君乃歸所侵魯鄆讙龜陰之田此文事有武備也猒飲食注烹肥擊鮮重滋味猒飫也䟽猒飲食也庖厨豐厚猒飫芳鮮上多玉食之資下有凍餒之患矣義曰國用智詐君尚有爲道化不行農畝弛廢而嘉羞美饌猒於庖燔疲人有凍餒之悲朝市有珍鮮之飫豈不痛哉財貨有餘注聚歛積實饒珍異䟽財貨謂錢帛珠玉之流也多藏厚歛有餘也未學不貪爲寳但欲多財累愚爾義曰古之所謂寧積於人無藏府庫誠哉言乎孔子曰百姓不足君孰與足斯則民豐國安矣若積聚無已谿壑難盈帑藏有餘民力困竭非王霸之道也是謂盜夸非道也哉注矜其有知動以成弊行同盜竊仍自矜夸夸盜非道適令興歎也哉者歎之辭也䟽非理而取爲盜矜其所有爲夸且頭會而歛取於不足縱欲而費奉其有餘傲然自得以爲夸尚謂之爲盜不亦宜乎所爲如此則非吾所行之道矣也哉者傷歎之辭也義曰不以道德臨人而任智詐爲國内尚奢巧下竭黎元私室不足於糟糠公府有猒於梁肉貨財豐衍壠畝榛蕪而伐善矜能大爲夸尚理身者聲色蕩心珠翠亂目嗜欲傷性機智驚愚眞氣耗於三田赤子淪於六藏尸居餘氣而徇禄矜夸斯爲盜也去道遠矣老君以此垂文用申烱戒修身理國可以爲殷鑒焉盜者說文云私利物者曰盜從次從皿次口液也口液在於皿器之上欲得物也故謂之盜字林云取非己之物曰盜言飲食珍異財貨殷豐猒飫有餘而不修己德財富德薄叨竊無殊不自省循乃復矜伐非盜而何特宜謙戒哉善建不拔章第五十四䟽前章明好徑之君若盜夸而非道此章明善建之主享不拔而長存首標以道立國修身之益次故以身下明觀身觀家之法後吾何以下結歎惠照所知之驗義曰立國以道德國不可拔率人以道德人不可離所以享國無窮子孫不絶其何術哉身修道以正其家家修道而正其鄉鄉修道而正其國國修道而正天下以修道之益觀不修道之損其理亂可知存亡可見矣㫖在息盜夸之行悛好徑之心於國於身吉凶斯兆矣善建者不拔注善能以道建國立本者不可傾拔䟽建立也不拔不傾拔也言人君善能以道建邦立本者因百姓之所爲任兆人之自化然後陶以淳樸樹以風聲使儀刑作孚樂推不猒則功業深固萬方歸德斯所謂善建者何可傾拔乎義曰立國不以道衆叛親離立身不以道犯危蹈禍敗不旋踵傾拔可期唯道德爲基則無危殆矣儀刑作孚者詩大雅曰儀刑文王萬邦作孚孚信也文王以道垂化萬邦歸信也樂推不厭者此經第六十六章之詞也言聖人欲上人以其言下之欲先人以其身後之處上而人不重處前而人不害天下樂推而不猒以其不爭故天下莫能與之爭此善霸國立身之㫖矣風聲者德風之聲善抱者不脱注善能以道懷抱百姓者不可脱離䟽抱守也脱離也善以道懐抱百姓者動而悦隨何可脱離也且夫樂餌所在過客猶止况夫道德有進於此乎以之御物爲物所歸固其宜也義曰聖人乘時立極任物爲心四海歸仁萬方順化國之基不可以傾拔人之心不可以脱離昔周大王紹古公亶父之德始王於邠迫於犬戎狄人攻之事之以皮帛而不受事之以車馬而不受事之以珠玉而不受曰狄人所求者貪吾之土地也不可禦備以勞人征伐以役人而存吾身乎與人兄居而殺其弟與人父居而殺其子吾不忍也子皆勉居矣爲吾臣與狄人之臣亦何以異且吾聞之不以所用養害所養因策杖而去之民相連而隨之成國於岐山之下有三子其小子季歷生文王文王爲西伯律身修德而興周業八百餘年此蓋善得人心不可脱而離之也樂餌所存者上經第三十五章之詞也曰樂與餌過客止言喜樂所奏肴膳所陳過客聞而聽之見而美之爲之留止況道德昭著人固悦而隨之也子孫祭祀不輟注言善以道德建抱之君功施於後愛其甘棠況其子孫乎而王者祖有功宗有德故周之興也始於后稷成於文武周之祭也郊祀后稷宗祀文王故雖卜代三十卜年七百毁廟之主流溢於外而后稷文王郊宗之祀不輟止也䟽祭薦也繼代曰祀謂後代子孫薦祀於祖宗也輟止也義曰理國以善立善抱則祚流子孫修身以善立善抱則年踰禀受祭祀不輟弈業無窮矣愛其甘棠者詩甘棠篇曰蔽芾甘棠勿剪勿敗召伯所憩昔周武王之有天下使周公旦分理陜東召公奭分理陜西召公有德民樂其化常不欲勞人之力乃坐於甘棠樹下以聽訟焉後人懷其德而存其樹不翦不伐詩以美之也祖有功者帝王立國必藉積代之福而有天下及功成制禮必本其先祖有功者而祀之有德者而尊之宗尊也后稷姬姓之後名棄爲堯之臣歷事於舜黎民阻飢后稷播植百穀以濟於民功格於物也爲農正其後子孫亶父至于文王武王乃有社稷故其宗廟郊祀后稷以配天宗祀文王以配地雖親盡廟祧其后稷文王始祖之廟世世祀之至秦漢革命祭祀方止漢承堯後唐堯有聖德功及於民其後子孫乃興漢業代世宗祀及魏受漢禪祭祀方止德明皇帝皋繇佐堯事舜種德及民故我唐承其遐福受命享國追尊爲德明皇帝焉修之身其德乃眞注修道於身德乃眞淳也䟽此下明少修少證多學多得故修之身謂一身修修之家謂一家修始於一身修於天下例可知也言善立之人照了眞性眞性清净無諸僞雜偽雜既盡德乃眞純也義曰夫千里之行跬歩爲始修身理國先己後人故近修諸身遠形于物立根固本不傾不危身德眞純物感自化矣修之家其德乃餘注一家盡修德乃餘羡䟽修道於家上和下睦故其德有餘慶也故易曰積善之家必有餘慶義曰身既有道家必雍和所謂父愛母慈子孝兄友弟恭夫信婦貞上下和睦如此則子孫流福善及後昆矣積善者易坤卦文言曰坤道其順乎承天而時行積善之家必有餘慶積不善之家必有餘殃此明吉凶有漸先明所行善惡故後彰其吉凶一家修道善必有餘矣修之鄉其德乃長注一鄉盡修德乃長乆䟽按周禮萬二千五百家爲鄉言一鄉修道禮義興行尊卑有序閭閈相比不黨於親一家修道德猶未廣一鄉盡修德乃長乆義曰君子之立行也正其身以及其家正其家以及其鄉尊其長老敬其幼少教誨愚鄙開導昏蒙少長得宜尊卑有序風教肅肅禮樂詵詵由一身之所修乃萬家之所禀道之化物善莫大焉所以優長乆永也修之國其德乃豐注一國盡修德乃豐盈疏修道於國風易俗移還淳反朴不偏於所近一鄉修道德猶未徧一國盡修德乃豐厚義曰一國者諸侯之國也公侯伯子男各主一國所以藩屏王室輔衛帝居若一國之中自能修道則禮行化美君信臣忠境内無虞其德豐大矣修之天下其德乃普注若天下盡修其德施乃周普也䟽普徧也夫百姓歸厚在君之化修之廟堂德流海外者蓋正其身不言而化不教而理下之應上如響應聲德無不周乃施普也義曰道之行也先諸身而後諸物故曰未聞身理而國亂身亂而國理也所以身修於内物應於外德發乎近及乎遠一夫感應尚猶若此况於帝王乎天子味道躭玄敬天順地凝心玄默端己無爲書軌大同梯航入貢四夷款附萬國來王道無不被故其德周普矣廟堂者天子政事之所也德施普者易乾卦象云見龍在田德施普也言龍潜於初九見於九二當潜之時功未濟時德未及物待時而動靜以全身及九二出見布德行化周及萬方所以徧普也夫龍者喻陽氣也陽氣當子月初生潜於幽泉之底丑月出見乃能生化萬物感其發主之功故周施陽氣普及於物也故以身觀身注以修身之法觀身能清淨者乃眞䟽觀者照察也注云以修身之法觀身能清淨者乃眞謂觀身實相本來清淨不染塵雜除諸有見有見貺遣知空亦空頓捨二偏迥契中道可謂清淨契眞矣義曰不修道之身動違正理名辱身危修道之身外絶衆縁内染一氣除垢止念守一凝神以慧照自觀證了實相不滯空有深入妙門可以得道理國之君允執厥中則永享天禄也以家觀家注以修家之法觀家能和睦者有餘䟽以修家法觀家家人和睦則福善有餘義曰不修道之家不睦六親不遵五教動掇灾否上下崩離修道之家九族允和衆善咸萃易家人卦九五象曰王假有家交相愛也此言居於尊位而明於家道六親和睦移之於政即天下化之交相愛樂也以鄉觀鄉注以修鄉之法觀鄉能順序者乃長䟽以修鄉之法觀鄉鄉人盡修道尊卑順序道化漸廣德乃延長義曰不修道之鄉禮敬不行長幼失序貴賤陵虐上下交爭修道之鄉德既優長人叶其序肅靜喜順境泰人和也以國觀國注以修國之法觀國能勤儉者乃豐䟽以修國之法觀國國人盡修勤而且儉德乃豐盈義曰不修道之國干戈構役虐害其民瘥毒流行人罹其酷修道之國神明助祐風雨以時善化所覃嘉祥自應人豐德富理使之然矣以天下觀天下注以修天下之法觀天下能無爲者乃普䟽夫以天下觀天下者復何所觀哉亦但觀身爾人君清靜無爲以道善建善抱自然百姓胥附國祚又安義曰以不修道之天下者桀紂是也生人塗炭寰海判離骨肉仇讎社稷塗地雖有謀臣武士不能用也雖有金城湯池不能守也以萬乘之貴希疋夫之生不可得也修道之天下者堯舜是也四海之内比屋可封慈惠浹於殊庭正朔頒於萬㝢雖有水旱之灾年不害也雖有征伐之師人不怨也其何故哉以正身九重天下自順然後登眞證道常存不亡昭昭乎萬代師範矣吾何以知天下之然哉以此注以此觀身等觀觀之則可知矣䟽此假設之詞也老君言我何以知天下善建則不拔善抱則不脱福德弘益之然乎蓋以此觀身等觀而觀之自家刑國由内及外則知爾易曰觀我生又曰觀其生將欲自觀而觀人也義曰老君聖慈愍物垂教殷勤重明於家於國理亂之由修之與不修之證再自舉問廣示羣迷何以知天下興亡蓋以此五觀之法觀其善惡損益之驗爾觀我生者易觀卦六三云觀我生謂進退之象也我生身所動也六三居下體之極是有可進之時又在上體之下復在可退之位遠而非物不爲童觀之卑上非九四未能觀光於國貺居進退之地可以自觀我生可進即進可退即退觀風相機其道未失此以卦象之理進退則然若夫觀國觀身義在力修道德道德修則國不傾拔享福登眞失道德則國削祚危禍至身辱以爲君臣至誠得不自勗哉所云觀其生者最處上極高尚其事生亦道也爲天下觀其己之道故云觀其生也以爲特處異地爲衆所觀貺居天下可觀之地可不慎乎君子謹慎乃得無咎正義云我生其生皆動出生長之義也道徳眞經廣聖義卷之三十八
