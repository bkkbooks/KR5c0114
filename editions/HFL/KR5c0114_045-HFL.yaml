front:
  text: 道德眞經廣聖義卷之四十四行七
  hash: sha256:14e4b23cdfeca2b3cfaa1e9ae388568cf7e894d2462e0830769b262300b72aad
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0114_HFL_045-001a, image: hfl/0448/0448-004.png}
body:
  text: 唐廣成先生杜光庭述古之善爲道章第六十五䟽前章明思患預防標絶情去欲之行此章明好智生患示玄德大順之規初明爲道之化次辯以智之賊知此下示料簡以爲法常知下歎功用而勸修義曰古之爲道非欲明示於民使威强知之患令其韜晦智用潜超無有之津故以智理國則亂生晦智爲君則福至智詐興則難理智詐息則叅玄玄德於是彌深反俗而歸大順亦與夫祛俗學多欲之累而證百谷朝宗之順焉古之善爲道者非以明民將以愚之注人君善爲道者非以其道明示於人將導之以和使歸復於樸令如愚爾䟽言古之人君善能用道爲化者貴夫無爲恬澹非衒耀其道明示於人將導以淳和杜絶智詐令質樸如愚爾義曰古者玄古之時也善爲道者玄古有道之君也其志玄默其心杳冥其爲理也無刑無德其爲事也無將無迎茫乎視之不可見閒乎聽之不可聞其人若姑射之人其俗若華胥之俗民不知曆數不違盈虚不以親爲親不以己爲己蒙兮昩兮將無所有也固不以常道之教而教之但以無爲之化而化之所以天下質樸淳白若令其愚也民之難治以其智多注君將眀道以臨下人必役智以應上智多則詐興是以難理化者正以其智太多智之太多由人君眀道以臨下是使下人役用其智而生姦詐故難理爾義曰夫上明道以臨下下飾智以奉君本用明以理人所務易理及變智而爲詐始自有爲是由上明察而下詐僞欲求靜理不亦難乎舉此義者欲使法玄古之君示民以淳樸則易理以智治國國之賊注以用也人君任用多智之臣使令理國智多必作法法作則姦生故是國之賊也䟽以用也賊害也言人君任用智詐之臣使之理國智多則權謀將作謀用則情僞斯起僞起則道廢有害於國故云國之賊義曰用智爲政務欲理人智變姦生禍亂滋起所以詐妄賊害之事勃然而興矣曹叅守法而漢以之安啇君變法而秦以之弊故上經云智惠出有大僞是也不以智治國之楅注若不用巧智之臣但取淳德之士使偃息蕃魏弄丸解難自然智詐日薄淳樸日興人和則年豐故是國之福也䟽人君不任智詐之臣但求淳德之士坐進無爲之道行宣大樸之風交泰致和是國之福也義曰君猶表也表正則影端表邪則影曲正則人隨而正邪則人從而邪邪正淳漓匪由他矣用智謀之臣則權令起用忠厚之士則風教淳人化淳和國乃豐泰此爲福也偃息蕃魏者段干木爲魏文侯之師以安靜爲先道德爲化故偃息無事而藩屏魏國矣偃者偃仰也息冥息也藩蘺屏也弄丸解難者楚白公勝與大夫子西兩家舉兵相伐兩家大夫曰市南宜僚陸沉之士也一人當五百人並遣使往召之宜僚高枕安卧以見二大夫之使卧而不起以兩手弄丸不止承之以劍不動二大夫之使各還具論宜僚之狀二大夫曰高枕安卧者示我無爲也承之以劍不動者兵不足恃也兩手者喻兩家也丸者形圓無爲之物兩手弄之不止者俱止於困也明兩家稱兵不止必至滅亡二大夫解兵而歸是兩家難解也事見莊子也夫無爲既興有爲遂息貞素既顯智詐自亡勢使然也爲國之福其在兹乎知此兩者亦楷式注役智詐則害於人任純德則福於國人君常知所委任是謂深玄之德䟽兩者謂用智與不用智也楷模也式法也人君知用智則爲賊不用智則爲福當去賊取福如此者可爲理國之楷模法式也義曰用智則國亂息智則人安去亂就安理之要也夫智謀之士辯說之徒飾智以惑於諸侯縱辯以亂於時主離堅合異反白爲黑所務者在乎干名譽要寵榮逞是非肆胸臆不以安全爲志不以惡殺爲心苟得恣彼笙簧鼔其頰舌以爲榮矣理國之主當鑒而斥之則淳素化行人復於樸矣常知楷式是謂玄德注福德之臣是亦爲君楷式以祐於國人君能知此者可委任之䟽玄深也妙也人君常能知此則兩者爲楷式是謂深遠玄妙之德也義曰人君知用智用德以定安危常法之而行則其德深遠矣玄德深矣遠矣與物反矣然後乃至大順注玄德深遠能與物反歸復其本令物乃至大順於自然之性爾䟽此結歎也玄德之君無爲而化不測其量深也所被無外遠也故能與萬物反歸妙本然後乃至大順於自然眞性爾義曰大順者本乎人情禮記禮運篇曰人情者聖王之田也故聖王修義之柄禮之序以理人情以情爲田修禮以耕之和剛柔也陳義以種之樹善道也誦學以耨之存是去非也本人以聚之合其所成也播樂以安之感動使堅固也理國不以禮猶無耜以耕也爲禮不本於義猶耕而不種也爲義而不講之以學猶種之而不耨也講之以學而不合之以仁猶耨之而弗穫也合之以仁而不安之以樂猶穫之而不食也安之以樂而不達之於順猶食之而不肥也夫四體貺安膚革充盈人之肥也父子篤兄弟睦夫婦和家之肥也大臣法小臣廉官職相序君臣相正國之肥也天子以德爲車以樂爲御諸侯以禮相與大夫以法相序士以信相考百姓以睦相守天下之肥也是謂大順故天子用民爲順則天不愛其道地不愛其寳人不愛其情衆瑞出焉順之寳也君以玄德居上臣以忠信處下其化廣遠深厚歸萬物於淳風斯謂大順於道矣古之帝王皆順考古道以行其教令任於樸素牧以謙和所以書稱稽古帝堯之例是也天下大順萬方歸之江海謙順百川歸之故江海之章可繼大順之德爾江海爲百谷王章第六十六䟽前章明好智生患示玄德大順之規此章眀善下爲王標聖人不爭之德初舉江海之喻善下則爲王次明聖人用謙樂推而不厭後結不爭之德以示修學之門爾義曰江海處下百川所歸人君用謙萬國朝會由是處上而人不重後己而人樂推江海以之爲王聖人以之有國前符玄德之主克諧大順之規後應不肖之詞常叶以慈之訓也江海所以能爲百谷王者以其善下之故能爲百谷王注江海所以能令百谷委輸歸往者以其善能卑下之故百川朝宗矣䟽言江海所以能令百川朝宗而爲王者以其善居下流之所致也故易云地道變盈而流謙此舉喻也故地道用謙則百川委輸而歸往聖人用謙則庶人子來而不猒爾義曰下爲高之本謙爲德之基百川東注以如歸歸謚善下萬姓北趍而拱聖聖在用謙庶人子來理在斯矣嚴君平曰天地不舍群類群類舍之衆物不求爲王物自往之故天地億萬而大道爲之王陽氣赫赫而天爲之王陰氣肅肅而地爲之王生靈億兆而聖人爲王羽者翔虚而神鳳爲王毛者蹠實而麒麟爲王鱗者水處而神龍爲王介者澤處而靈龜爲王百川並流而江海爲王凡此九王不爲物主而物自歸之不施法式而物自理之不爲信義而物自附之不爲仁愛而物自親之不任智力而物自畏之其何故哉體道合德委任自然而物自宗之江海所以爲王者無智巧以悦之無慈惠以懷之無威令以束之無刑法以勸之無機權以制之百川所以朝宗者以其處下物自順之由是而言人之處謙遜志恭恕不爭者有國聚人斯爲要矣地道變盈而流謙者易謙卦彖詞言丘陵川谷高者漸下下者益高改變其盈而流布其謙也子來者春秋昭公十年叔孫昭子曰詩大雅云經始勿亟庶人子來言文王經始靈臺作有急疾之意衆人自以子義來歡樂爲之也是以聖人欲上人以其言下之䟽此合喻也此聖人欲上於人則以其言謙下之夫聖人豈欲居人上而以其言下之聖人知滿必招損故言則謙柔名則孤寡以下於物而盛德鴻業自然爲物所推尚爾義曰聖人謙己固無飾詞所以孤寡不穀之名彰其以下爲本罪己納隍之志明其刻責之心故盛德日崇大業彌固鴻大也欲先人以其身後之䟽聖人亦不欲先人直爲撝謙後已先物物自先之爾義曰聖人豈欲先於人而曲爲之後以其謹身順道不以物先故能爲萬物推之於先耳是以處上而人不重處前而人不害注謙爲德柄尊用彌光以言謙下之百姓欣戴故處其上而人不以爲重以身退後之百姓子來故處其前而人不以爲害䟽此結前也聖人臨大寳之位居至極之尊勞身而逸人薄己而厚物在上人得以生故不以爲重處前人得以理故不以爲害也義曰君德謙虚人所翼戴故居上不重君德欽明人共瞻奉故處前而人不害夫勛華在上人皆戴之仰之如天辛癸在前人皆棄之視之若冤謂有道則昌無道則亡是也是以天下樂推而不猒注以是不重不害之故故天下之人樂推崇爲之主而不猒倦也䟽聖人之德弘濟無私與物爲春望之如曰既不爲重爲害是以天下之人樂推崇而無猒倦也義曰堯之理天下也六合群生就之如雲望之如日推崇爲主而無猒倦及其棄世也天下之人如喪考妣三載遏密八音其何故耶德以撝謙化以無爲也以其不爭故天下莫能與之爭注聖人謙退不與物爭天下樂推誰與爭者䟽今天下樂推聖人而不猒者豈不以聖人言則下之身則後之以其不與物爭先故天下之人莫能與聖人爭先者矣義曰聖人御天下德化周普明並六合惠覃九圍以謙抑不爲物先以柔遜不居物上人自推戴誰與之爭如此則祚曆遐長弈葉繁茂若巨海之納百谷不溢不盈若太上之持三寳以慈以儉故下章以三寳次之道德眞經廣聖義卷之四十四
