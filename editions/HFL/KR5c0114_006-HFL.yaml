front:
  text: 道德眞經廣聖義卷之五羔五
  hash: sha256:1df3501595d690b0e691fb8c6f879b6f8513c212da7672de4c721501cdda3685
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0114_HFL_006-001a, image: hfl/0441/0441-004.png}
body:
  text: 唐廣成先生杜光庭述釋䟽題明道德義義曰老子者太上老君之内號也釋解已具前篇道經者此經兩卷上經以道爲目夫化導羣生貫穿萬法居衆法之首故三皇尊其道焉爲萬教之先故大演虚其一焉故一者道之數道者一之本下經云道生一是也夫其道也極虚通之妙致窮化濟之神功理貫生成義該因果縱之於己則物我兼忘蕩之於懷則有無雙絶道與德有相資相稟之義故云道德經也今於道德義中分三門解釋一者釋名無名方了玄教故經云虚無常自然强名字大道所以道義主無理物有病德義主有理世無惑故臧玄靜云道者通物以無爲義令就明之道有三義一理也二導也三通也理者理實虚無以明善惡導者導執令忘引凡入聖通者通生萬法變通無壅上經法陽象天數奇故三十七章也老君說經本亦不執上經爲道下經爲德昔賢相承分判故有道先德後其間經文互相明證具如序中矣次道衰而後有德德衰而後有五常是明道德爲衆行之先五常之本故道經居先而德經次之也今依名釋道即前序所謂導也通也理也夫道德雙釋分三門者一釋名二明體三明用釋名第一道德玄絶自應無名開教引凡强立稱謂故寄彼無名之名者宣彼正理令識名之無名方可了達玄教强名道德其義者何臧玄靜曰道以通物以無爲義德者不失以有爲功道無則能遣物有累德有則能祛世空惑今明道三義者理也通也導也德三義者得也成也不喪也所謂理者理實虚無言一切皆無故云道在一切有解云理者兼通善惡善道亦名道惡道亦名道善惡性空不乖此義但惡道稱道其意不然正以徒類稱道非關就理爲釋若言隨事近理此說不妨所謂通者謂能通生萬物變通無壅河上公云道四通也所謂導者導執令忘引凡入聖自然經云導末歸本本即眞性末即妄情也德有三義所謂德者得於道果太平經云德者正相得也所謂成者成濟衆生令成極道此就果爲名亦資成空行就因者經云熟成之所謂不喪者謂德不失也故云不喪太平經云常德不喪是也此六義者互可相通西昇經云道德混沌玄妙同也道中有德義者昇玄經云德等無等等無等是道也故云道有得義道有成義者河上公云非但生之乃復長之成之道有不喪義者既言常道常即不喪也德中又有理義者生神經云感應理常通應既是德故得有理義也德有通義者河上公云德一也一至布氣而畜養之德有導義者謂有開導之德論語云道之以德是也此就通門則如前解矣但道之言通通無所通而無所不通德之言得得無所得而無所不得故能忘己忘功生物成物今就此科更分五别一依名釋者前義也二因待釋者明非德無以言道非道無以言德道德相待强立假名故離道無德離德無道道是德義德是道義經云長短相形是也三所表釋者道德爲教正表不道不德之理所以說道則言可道非常道明德則言上德不德故不道不德爲道德之義四無方釋者正一德名有無量義如因迹有成並其義也道無不在名何言屬故謂無方以釋其義五無釋爲釋者既以不爲名亦以無義爲義故自然之義名無所有原其所由即是無義義曰道者因生以立稱德者從教以言名道者德之通德者道之功有德故稱道有道故稱德德義取有體無爲言道義取無通有爲說陸先生經云虚寂爲道體謂虚無不通寂無不應也臧玄靜云智慧爲道體神通爲道用也又云道德一體而具二義一而不一二而不二二而不二由一故二一而不一由二故一不可說言有體無體有用無用蓋是無體爲體體而無體無用爲用用而無用然則無一德非其體無一用非其功尋其體也離空離有非陰非陽視聽不得搏觸莫辯尋其用也能權能實可左可右以小容大以大容小體既無已故不可思而議之用又無功故隨方不示見今不異此但知道德不同不異而同而異不異而異用辯成差不同而同體論惟一不異異者經云道生之德畜之也不同同者西升經云道德混沌玄妙同也知不異而異無所可異不同而同無所可同無所可同無所不同無所可異無所不異也今更舉七義以通釋一本迹者本則爲道迹則爲德本爲道者以大智慧源常寂眞身爲體迹爲德者以上德之君太上應身爲體二理教者理則爲道教則爲德理爲道者悟說正性爲體教爲德者悟說正經爲體三境智者境則爲道智則爲德智理爲道體理智爲德體四人法者人則爲道法則爲德人爲道者以本迹二身爲體法爲德者以理教二法爲體五生成者生則爲道成則爲德道以應氣化生萬物以應氣爲體成爲德者德以成就衆生法教爲體六有無者無則爲道有則爲德無則爲道以因地空觀果地空智爲體有爲德者以因地有觀果地有智爲體七因果者果則爲道因則爲德果爲道者以果地萬德爲體因爲德者以因地萬行爲體以上七義互相交絡二而不二一而不一是知道德爲正體非果非因非本非迹不本不迹而開本迹欲明顯本由迹不果不因而開因果欲令修因趣果其餘五雙不言自顯明義用第三德是不有之有既能理無亦能理有道是不無之無既能理有亦能理無惑者謂玉貌金容道爲實有今明道是虚無此即理於有惑河上公云道者空也王輔嗣云道者無之謂也惑者或謂常道乃至上德實是虚無今明是以有德此則除其無病故經云杳冥中有精此是一往相翻聞名遣病及其進悟義則更深明道之爲無亦無此無德之爲有亦無此有斯則無有無無執病都盡乃契重玄方爲雙絶故經云仙道無不無有不有也此則道必資於德德必禀於道老君說經亦不執言上卷爲道下卷爲德二經文義互相包含後賢相傳强分其義是則道經含德德經含道聖㫖序内已具舉明至於五千餘言亦不確定其數文質相半義理兼通不可局字數而妨文剪文勢而就數皆失其大㫖也司馬遷云五千餘言則不定指五千字矣其有删文約數俯就四千九百九十九言而云析三十輻字爲三十以滿五千字此又膠柱刻舟執迷不通也經字諸家所解凡有四義一由二徑三法四常一由者三世天尊十方大聖因由經教證聖成眞也二徑者開通道理導達衆生爲學者津梁登眞徑路也三法者眞趣玄妙至理精微可以軌法羣生楷模衆聖也四常者妙理深遠冥寂玄通萬代百王不刊之典也具兹四義總稱爲經或結氣成文凝雲作篆字方一丈八角垂芒或紫字瓊章龍書鳳札劫初降世劫末歸天或刻玉鎸金竹木縑紙流傳演化篆隸隨時雖復麤妙不同皆玄聖之眞訣爲理病之良藥乃出世之妙門假使代變時移金銷石化而此經垂教常布於人天萬劫長存故云經也故題曰老子道德經疏卷上之上夫此二篇玄微五千幽奥統包萬法冠冕衆經而所說年代及過關時日降生先後宗趣指歸諸家所說未爲準的今别演四門以祛所惑第一重眀降生者老君至道之祖元化之宗長於上古而不爲先生於末代而不爲後況億劫之前即弘道化豈復待胞胎誕孕而謂之生邪今言降生者蓋表跡人間示有始也託形聖母示有生也母事元君示有尊也今此按經誥前後降生有三一以上和七年庚寅之歲九月三日甲子生於北玄女國天岡靈鏡山李谷之間聖母曰玄虚之母當生之時三日出於東方九龍吐水以浴其形因李谷而爲姓名玄元字子光乃高上之冑玉皇之胤位爲長生大主太平正眞太一君金闕後聖九玄帝君今詳考其時亦是劫運之前宋靈上和前劫之年號也二以殷武丁庚辰歲二月十五曰卯時生於陳國苦縣瀨鄉聖母曰玄妙玉女乃上帝之師後位爲元君詳此即是毫州降生年月也據皇甫士安長曆所證甲子仙公云太歲丁卯下爲周師此即紂元年丁未二十一年丁卯老君居岐山爲周西伯之師自武丁九年庚辰至紂丁卯凡一百八年又至昭王二十五年癸丑出關一百七年通計二百一十五年司馬遷云二百餘年是也惑者妄云平王定王幽王厲王時老君降生此皆曲說信爲謬矣何者若幽厲平定時生即不得與文王武王相見矣三以老君自樓觀與尹喜辭訣當昭王二十六年甲寅約會於蜀青羊之肆遂即降生於蜀乃昭王二十九年丁已尹喜千日之後到蜀重見老君之時也三度降生此義爲定第二過關年代者老君以周昭王二十五年癸丑度關西化與關令尹喜相遇因授以道德二經授經既畢即以二十六年甲寅四月於樓觀與喜相别昇入太微二十九年丁巳尹喜入蜀訪尋老君乃於青羊肆相見戊午年入流沙即此過關年月也何者尹喜爲康王大夫到昭王時爲關令與老君相見若據臧玄靜云幽王時西出隴關即與出天寳靈符故關處所不同矣況幽王元年庚申十一年庚午已滅年内又無癸丑此爲誤也又文如海云成王二十二年癸丑度關此又與尹喜不得相見亦爲誤矣又云平王四十三年癸丑度關此又在尹喜之後年代懸遠不同皆誤說耳今詳按今古以昭王二十五年癸丑度關爲定年代相合可無疑焉第三說經時節者葛仙公内傳云黄帝時老君爲廣成子爲帝說道德經及五茄之法又應號五聖圖及紀聖老君内傳云老君舜時號尹壽子居河陽說道德經教以孝悌之道舜行之退身讓物尊道貴德天下之人從而化之所以舉十六族竄四兇達四聰明四目外撫百姓内親九族得道於蒼梧之野九疑之山又諸家所引皆言周昭王時癸丑之歲於函谷關爲尹喜作道德二篇上下經焉史記亦云老君爲關令尹喜著書五千餘言又王子年拾遺云老君周時居景室之山常與五老人譚天地造化之事著書十萬言後删其繁蕪作五千言矣今按河上公授漢文帝上下二經章句謂帝曰余注是經以來千七百餘年凡傳三人連子四矣勿示非其人成玄英法師解曰傳三人者務光羡門子高丘子是也以此詳之莊子云湯伐桀後讓位務光務光不受抱石自沈於清泠之泉湯時務光既死即授經在桀之前也足明此經非是周昭王癸丑年及景室山中所著又按黄帝書云谷神不死是謂玄牝全載此一章則是黄帝時說經所以黄帝著書引此一章爾又按年代推之若是昭王時函關著經至漢文帝時未及一千年則與注經以來數不同益明此經是黄帝時及帝舜時說爲定矣且帝舜在位六十餘年一百一十二歲傳位於禹禹子孫相承十七帝四百七十一年爲湯所伐湯子孫相承二十一代三十王六百四十四年爲周所滅周自武王至赧王子孫相承四十一代三十七王八百六十九年爲秦所並秦昭襄王四十九年丁未滅周歷始皇終子嬰共四十五年爲漢所伐漢自高祖惠帝吕后至文帝元年相繼二十八年自舜至此凡計一千七百六十九年則眀說經在黄帝時注經在舜時非是函關特爲尹喜著此五千文明矣穎鑒之士宜詳之焉第四宗趣指歸者道德尊經包含衆義指歸意趣隨有君宗河上公嚴君平皆明理國之道松靈仙人魏代孫登梁朝陶隱居南齊顧歡皆明理身之道符堅時羅什後趙圖澄梁武帝梁道士竇略皆明事理因果之道梁朝道士盂智周臧玄靜陳朝道士諸糅隋朝道士劉進喜唐朝道士成玄英蔡子晃黄玄賾李榮車玄弼張惠超黎元興皆明重玄之道何晏鍾會杜元凱王輔嗣張嗣羊祐盧氏劉仁會皆明虚極無爲理家理國之道此明注解之人意不同也又諸家禀學立宗不同嚴君平以虚玄爲宗顧歡以無爲爲宗孟智周臧玄靜以道德爲宗梁武帝以非有非無爲宗孫登以重玄爲宗宗㫖之中孫氏爲妙矣又此經以自然爲體道德爲用修之者於國則無爲無事自致太平於身則抱一守中自登道果得之者排空駕景乆視長生於國失道德則必敗亡於身喪道德則致淪滅故在乎上士勤人抱之爲式也又道德玄序開元二十一年頒下其所分别上卷四九三十六章法春夏秋冬下卷五九四十五章法金木水火土則上卷從第一訖第九章以無形無名爲宗明春道從第十訖第十八章無知惚恍爲宗明夏道從十九訖第二十七章以有精有信爲宗明秋道從二十八訖三十六章以凝重清靜爲宗明冬道其下卷自第一盡第九章明仁德次第十盡十八章明禮德從第十九盡二十七章明義德從第二十八至三十六章明智德從三十七盡四十五章明信德仁以履虚抱一禮以不恃不宰義以柔弱和同智以無識不肖信以執契不爭其大㫖亦以玄虚恢廓冲寂希微爲宗體强名則有五有四契理則無執無爲而譚講之家執文則多舛謬古今所釋獨學則或不周今廣引衆文窮其指當明者詳採則可明年代先後宗趣是非矣道德眞經廣聖義卷之五
