front:
  text: 道德眞經廣聖義卷之三十七景十三
  hash: sha256:d42afaa494843e9624f2fa40dea0c9e725ea338a8d4a3a0e7e2a7480e4fee890
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0114_HFL_038-001a, image: hfl/0446/0446-110.png}
body:
  text: 唐廣成先生杜光庭述道生之章第五十一䟽前章明出生入死善攝超患累之門此章明道生德畜不宰有自然之貴首標妙本應感生成之美次眀萬物尊貴道德之由故道生之下覆贊生畜之功生而不有下結歎忘功之德義曰道爲妙本能生羣物德爲道用能畜衆形動物屬于天植物配于地天地之所長育造化之所生成非道氣物莫能生非道用物莫能遂因道而立賴道之功有情有識之徒無情無識之類尊道貴德不忘本乎道爲萬物所尊者非有爵位之重非有權勢之威蓋以失道必亡固須尊貴况南面之術失道無以寧萬邦修眞之功離道無以成萬行而道於萬類未嘗自伐其功功德益自玄深爾道生之注妙本動用降和氣德畜之注物得以生養萬類䟽道生之者言道降沖和之氣陶冶萬物萬物得之以生故云道生之注云妙本動用降和氣者妙本道也至道降氣爲物根本故稱妙本德畜之者德得也畜養也謂萬物得道用而能畜養斯形則約道畜養之處而受德名故云德畜之義曰生而不畜德無以表其功畜而不生道無以明其妙生以從無爲始畜以養有爲終終始循環惟道爲本故云妙本道無動用物無以生既有禀生賴乎畜養是相循之理也物形之注乾知坤作兆形位勢成之注寒暑之勢各成遂䟽道生德畜品物流形注云乾知坤作兆形位者易繫云乾知太始坤作成物天地爲形上下爲位斯皆道功寄乾坤以爲用也勢成之者言爲萬物化天時地利陰陽之勢而物資之以成故去勢成之也義曰萬物之生也道德禀之以氣乾坤禀之以形氣禀道德之功形資天地之化因寒暑之運假陰陽之資以生以成以終以始生成終始斯謂勢乎乾知太始者始初也乾是天爲陽氣萬物初得天陽之氣而生坤作成物者坤是地爲陰氣萬物得地陰氣而形既分動植形位然賴寒暑之氣以成其功然生化之本皆本於道豈天地寒暑能生化哉是以萬物莫不尊道而貴德注萬物由道德以生畜故尊貴之䟽以道德有生畜之功故凡厥懐生莫不尊尚於道敬重於德此勸示衆生令敦本而崇道也義曰尊者高上之稱喻於父也貴者重敬之義喻於母也道生德畜物受其形以道德爲父母得不尊而貴之乎苟忘其本非人也哉道之尊德之貴夫莫之爵而常自然注言道德之尊貴非假爵命但生成之功被物而常自然尊貴爾䟽夫代之尊榮者必由君爵命然後爲尊今道之所以尊德之所以貴蓋以生成之功被物故物尊貴之非假爵命而常自然尊貴爾義曰人之處世上以事君其有材器也君舉而用之然後爵之而尊寵之而貴而此尊貴有窮極之時今道以生物爲物所尊德以畜物爲物所貴生生不絶故生物之功常尊成成不窮故成物之功不極則常尊常貴豈有窮極之期乎其次於此者則孔子以文教五常之道垂於萬世百王之尊太公以武教七德之訓傳於萬世百王貴之顔閔以德行夷齊以仁義十哲以四科貽則於後世歷代仰而行之此固非當代之君爵命所及而其德常尊常貴但玄功廣大不階於太上玄元之道德耳夫爵命者人君尊賢任士所重也古者帝王以萬彙之殷四方之大不可一人以理之故設官命爵長之於民爵者禄位也命者名品也正則官不濫官不濫則各當其材如此則人理矣官者管轄之謂也亦猶網之有綱衣之有領舉綱領則物自理矣故大昊以龍紀官神農以火紀官黃帝以雲紀官少昊以鳥紀官各以其瑞爲其官矣從少昊以降德不及遠不能以他物命官以民爲紀皆佐天子以理四海也唐虞稽古建官惟百夏商官倍亦克用乂居方以理俗策名以叙功所以爵禄以尊之威權以重之使萬物瞻仰而遵行其教令聖人在上賢以爲佐如魚水相須不可闕也爵之大者有皇有帝有后有王有君其次者公侯伯子男列五等之國是以帝王之域四面各五百里爲甸服方千里也千里之内所納有五等百里納禾藳二百里納穗三百里納秸藳四百里納粟五百里納米甸服之外五百里爲侯服分爲三等百里爲采供王事而已二百里男邦男任也任王事也三百里諸侯侯爲斥候也以衛於王此合三爲一名也侯服之外五百里爲綏服綏安也服王之政教而己亦有二等三百里揆文教揆度王之文教而行之一百里奮武衛天下所以安之綏服之外五百里爲要服要約也要約束以安文教也亦有二等三百里夷夷平也守平常之教事王者而已又外二百里蔡蔡法也差簡而已要服之外五百里爲荒服言其簡略而遠也亦有二等三百里蠻以文德蠻來之不制以法也二百里流言流移也政教所及隨其俗而已五服相距五千里分一十四等遠近不同也又王制公侯之國地方百里方伯之國地方七十里子男之國地方五十里此古之設官命爵差以等級佐於帝王共理天下古之制也禀帝王之爵命而長於民矣故道生之畜之䟽此覆結初章道生之義始之爲生養之爲畜義曰初言道生德畜今只云道生之畜之然德爲道之用生畜於物皆道之動用功爾故不復言德長之育之䟽增進曰長撫字曰育義曰萬物貺生則陰陽之候寒暑之勢增進撫字之非人之功亦道之力也成之熟之義曰道貺生萬物秋成冬熟亦道運四時之氣而成熟之也輔相者輔助也相佐也周易泰卦云輔相天地之宜以佐佑民是也養之覆之注是以人莫不尊道貴德也䟽資給曰養陰庇曰覆八者皆道德功用之謂所以萬物尊之而貴之義曰生畜長育成熟養覆八者以利於物皆道德之玄功也故天人萬物含識有情至於蛸翹動植未有不資道化功用而有其生也得不尊之貴之宗於妙本乎生而不有䟽道生萬物不見其有生之可生忘生之功結上道生之義也義曰道能生物不恃爲有而物禀道之功道亦不矜其力爲而不恃䟽德之爲養不見有物之可爲不恃其功結上德畜之之功也義曰德以養物不矜其功而物禀道之力道亦不恃其有長而不宰䟽以道德忘生育之功故雖居萬物之長長育成熟不爲主宰貴望於物言此者欲令人君法道生育而忘其功爾義曰道生物而不爲有德畜物而不爲功道德長於物而不爲主故能常爲物所尊貴人君化育萬物不伐其能施及四海不求其報澤普天下不矜其恩讓德於天推功於物超然其心不以九重爲貴故保其社稷享楅無窮矣是謂玄德注貝如載營魄章所釋彼章明人修如道此章明道用同人爾䟽此歎忘功之德也玄者深遠不測之名大道雖能生能畜而終不恃不宰德施周普而名跡不彰豈非深遠不測之德乎義曰道德之功不恃不宰可謂深玄矣聖人之德不恃不矜可謂廣大矣道德玄深故常爲萬物尊貴聖功廣大固能克永宗祧修道之士積德而不居陰功而不恃享壽彌遠而證道登眞可也天下有始章第五十二䟽前章明道生德畜不宰有自然之貴此章明守母存子歸明無遺身之殃首七句標能生之本勸令守母存子次六句示絶欲之戒開塞對明後六句歎美修證之功結成襲常之行義曰道化既彰天下有始道爲物母含孕羣生理國之君修道之士睹萬有之畢備知妙本之所生守道而居用道而理則國無危殆身保寧長也夫守道之要收聰閉視緘口靜身察微抱柔韜光返照常所服守至道可階若衒明矜功道去遠矣此其㫖也天下有始以爲天下母注始者冲氣也言此沖氣生成萬物有茂養之德可以爲天下母䟽資氣曰始資生曰母言道能以沖和妙氣生成萬物物得以生如母之生子故云以爲天下母始母雖殊於道氣布化常一故上經云無名天地始有名萬物母言此者欲令人知源識本守母而存子也義曰資禀也物禀道生道爲物本仰含育之德同母養之慈當須睹流識源鑒柔知本用道守道理國理人可以泰寧矣沖中也無名天地始者上經第一章之詞既得其母以知其子注萬物既得沖氣茂養以知其身即是冲氣之子䟽言人既得冲和之氣茂養爲母當知其身是冲氣之子義曰道爲身母有生成茂養之恩身爲道子識茂養生成之本能知此道當體用於中和以全其身也既知其子復守其母殁身不殆注既知身是冲氣之子當守此冲和妙氣不令離散則終殁其身長無危殆䟽言人既知身是道氣之子從道氣而生常守道清淨不染妄塵愛氣養神使不離散人從道生望道爲本今却歸道守母故云復守爾殁身不殆者言人常能無欲以歸道則可以終竟天年而無危殆也義曰貺知身之所禀道生我身即洗心返神復守其道無是非之惑絶聲利之塵終身行之道可得矣塞其兊閉其門終身不勤注兊愛悦也目悦色耳悦聲六根各有所悦縱則生患是故塞之不縱六根愛悦則禍患之門閉矣故終身不勤勞矣䟽此明絶欲守母之行也兊悦也謂耳目愛悦聲色鼻口愛悦香味六根各有所悦門以出入爲義言諸根色塵之所由也若塞其愛悦之視聽則禍患之門閉矣禍患之門閉則終身無有勤勞也義曰惟道集虚惟神集無灰心滅智道自歸之不視之見與天同明不聽之聞與天同聰不爲之事與天同功六根不染行與玄通六欲不起與道相同身安物順而終身不勤矣易曰兊之言乎悦也又以兊爲目門爲口亦以戒其閉絶禍患爾西昇經云鼻口所嬉香味是怨是也此言六情嗜欲相因爲用眼見耳聞心則運動心既所悦口則興言口爲禍患之門心爲愛悦之主故可塞而閉之夫此禍患用之於國則政亂行之於身則道虧閉塞得宜則身國俱理矣開其兊濟其事終身不救注開張六根縱其視聽以成濟其愛悦之事則常有禍患故終身不救䟽此明失道之行也開其視聽之門濟其愛悦之事則禍益患增故終身不能救理也義曰道不欲煩力視損其明道不欲諠力聽損其聰心智競撓道不可留躭聲冒色貪利悦名萬慮滋起衆患並興動貽悔吝坐陷灾蒙神明不能祐造化不能生者以其縱欲害身故終身不能救見小曰明注人能於事微小見而改行可謂明矣䟽此示防患之源也惡兆將興細微必察故憂悔吝之時則存乎纖介令守母之人防萌杜漸理之於未亂能如此者可謂之明義曰守道之人理國之主防微於未兆慮患於未萌杜邪佞之門賢良進用閉嗜欲之鍵樸素日臻矣憂悔吝者易繫辭云辯吉凶者存乎辭憂悔吝者存乎纖介言吉凶悔吝之來雖纖介之微不可慢也防備豫也杜閉塞也萌微兆也漸小至大也理於未亂者此經第六十三章之詞也尚書云致治于未亂保邦于未危皆防其萌漸也夫萌者如草木甲坼先有萌芽漸者善惡之來非一朝一夕必由其漸故要杜而塞之勿使滋蔓蔓難圖也守柔曰强注守柔弱則人不能加可謂强矣䟽守柔弱之行者處不競之地人不能加同道之用能如此者可謂之强義曰力强者人折之智强者人害之勢强者人謀之氣强者人制之德强者人伏之守弱體柔不犯於物其德如此可謂之强如道之用孰敢害之也用其光復歸其眀注見小則明守柔則强若矜明用强將失守柔見小之義故當用光外照復歸守内明則長無患累矣疏光者外照而常動明者内照而常靜由見小守柔爲明爲强不矜明而用强故雖用先外照還歸内明此轉釋見小守柔之義使息外歸内故曰復歸其明義曰外明者其照有極謂五里之外牛馬不辯也内明者其照無窮謂一心密照則遠近皆察也所以外則萬境所牽勞神傷性内則重玄默悟造靜歸根復其内明幾乎道矣無遺身殃是謂襲常注遺與也言還守内明則無與身爲殃咎者如此是爲密用眞常之道䟽遺與也殃咎也言用光照物於物無著還守内明不自矜耀守母存子反照本源自無殃咎是謂襲常者密用曰襲能察微遠害守柔含明如是等行者是謂知子守母密用眞常之道義曰既了復明内照之理故無殃累及身殃累不侵眞常密契矣理國若矜其外照察察繩非其政益煩而人益亂復能見微防患謙已守柔晦智含輝任賢垂拱三五之理夫何遠哉道德眞經廣聖義卷之三十七
