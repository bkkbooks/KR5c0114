body:
  text: 唐廣成先生杜光庭述載營魄章第十䟽前章明縱欲溺情憍盈故有咎此章明養神愛氣不雜則無疵營魄以下至滌除戒修身所以全德愛人以下至明白示德全可以爲君結以生之畜之表玄功之被物也義曰此章明抱一之利以表前揣鋭之非抱一則神全魄安揣鋭則盈而必覆至於致柔玄覽之妙愛人理國之規同大道生畜之功顯匡翼玄深之德載營魄抱一能無離乎注人生始化曰魄既生魄陽曰魂魄則陰虚魂則陽滿言人載虚魄常須營護復陽陽氣盈滿則爲魂魂能運動則生全矣一者不雜也復陽全生不可染雜故令抱守淳一能無離身也䟽載初也營護也言人受生始化但有虚象魄然既生則陽氣盈滿虚魄魄能運動則謂之魂如月之魄照日則光生故春秋子産曰人生始化曰魄既生魄陽曰魂言人初載虚魄當營護陽氣常使盈滿人則生全若動用不恒敗散陽氣復成虚魄而死滅也莊子曰近死之心莫使復陽故令營護虚魄使復陽生全也抱守淳一不令染雜無離乎身則生全矣此教養神也義曰載運載也言人之身神氣所居魂魄所舍以身運載如車載物西昇經云身者神之車也既以喻車固當運載矣虚魄者陰氣有象人之形也陽氣無形人之神也形之具矣而陽氣未附則塊然無知如頑石枯木陽氣既降即能運動故以形爲魄魄屬陰也以神爲魂魂屬陽也凡人有纖毫之陽氣未盡不至於死有纖毫之陰氣未盡不至於仙所以鍊陰氣盡即超九天而爲仙仙與陽爲徒也鍊陽氣盡則淪九泉而爲鬼鬼與陰爲徒也故當保守陽魂營護陰魄以全其生抱一者守道也拘魂制魄守道爲基令人守道拘制能無離乎虚象者形質始具謂之虚象象似也如月之魄照日則光生天元經云月本陰氣有象而無光日者太陽之精常循黄道而東行一日一夜行一度有奇一度二千九百三十二里月者太陰之精其狀也圓其質也清禀日之光而見其體日所不照則謂之魄常循黄道東行或出黄道表或入黄道裏行有遲疾其極遲日行十二度十九分之二平行一十三度三十七分極疾日行十四度九分度之十三遲則涉疾疾則復遲二十七日五十二分日則四百一十七分則遲疾之終也終而復始每月朔與日同度謂之合朔月疾而日遲故三日哉生魄三日之外其光漸生二弦之日日照其側人觀其傍故半明半魄晦朔之日日照其表人在其裏故不見月日望之日日月相望人居其間以觀其明故形圓而光滿月望而晨見東方謂之側行遲也月晦而夕見西方謂之眺行疾也天對曰衝其光如日日光不極謂之暗虚暗虚值月則月蝕值星則星亡日月朔望行於中道則值暗虚而蝕日月各周圓三千里徑一千里也人始化曰魄者春秋昭公七年初鄭伯有爲政駟帶殺之鄭人相驚曰伯有至矣或夢伯有介曰壬子余將殺帶明年殺段於是壬子駟帶卒明年公孫段卒鄭人益懼或問子産曰伯有猶能爲鬼乎子産曰人生陰曰魄陽曰魂用物精多則魂魄强匹夫匹婦强死而魂魄猶能憑依於人以爲淫厲况伯有三世執其政柄而强爲鬼神不亦宜乎伯有乃穆公之胄子良之孫子耳之子故曰三世子産立其子良止以撫之乃止近死之心莫使復陽者莊子齊物篇之辭也以其利患生禍陰結遂志有如此者也蓋南郭子綦答子游天籟之㫖爾淳一者淳和也不雜者除垢止亂無令雜也老君明此營魄守一之㫖以教人養神也上清隱書有鬰儀奔日結璘奔月之道存日月中各有五帝呼日月内諱想五帝形服來降於己乃吞日月之華得其道者與日月同壽又有拘魂制魄之道常以月三日十三日二十三日存心中赤氣變化而呼三魂之名胎光爽靈幽精乃密呪拘魂又以月朔月望月晦之日存鼻端白氣變化而呼七魄之名尸狗伏矢雀陰吞賊除穢臭肺非毒乃密呪制魄各有存念呪術具上清品中乆乆行之可以輕舉此大上營護虚魄度世長生之道也專氣致柔能如嬰兒乎注專一冲氣使致和柔能如嬰兒無所分别矣疏專專一也冲氣冲和妙氣也人之受生冲和爲本若染雜塵境則冲氣離散神不固身故戒令專一冲和使致柔弱能如嬰兒無所耽著乎此教養氣也義曰嬰兒未知孩偶答對專任冲和之氣外無染雜内無思慮隨氣柔弱故冲氣不散守道之士當如嬰兒無染雜思慮使神不離身西昇經曰哀人不如哀身哀身不如愛神愛神不如含神含神不如守眞守眞長乆長存也又曰神愛人人不愛神是以老君教人養神養氣也滌除玄覽能無疵乎注玄覽心照也疵瑕病也滌除心照使令清靜能無疵病乎䟽滌者洗也除理也玄覽心照也疵病也人之耽染爲起欲心當須洗滌除理使心照清靜愛欲不起能令無疵病乎此教人修心也義曰心之照也通貫有無周遍天地因機即運隨境即馳不以澄靜制之則動淪染欲既滯染欲則萬惡生焉萬惡生則疵病作焉老君戒令洗滌除理翦去欲心心照清靜則無疵病西昇經曰生我者神殺我者心故使制志意遠思慮者是謂教人修其心也愛民理國能無爲乎注愛養萬民臨理國政能無爲乎當自化矣自上營魄皆教修身身修則德全故可爲君也䟽愛民者使之不暴卒役之不傷性理國者務農而重穀事簡而不煩則人安其生不言而化矣此無爲也能爲之乎義曰生民者國之本也無爲者道之化也以無爲之化愛育於人國本固矣政虐而苛則爲暴也賦重役煩則傷性也使之不以時則妨農也不務儉約則賤穀也此教以理國也爲君之體以道爲基以德爲本失道喪德何以君臨此老君教以理國之要也天門開闔能爲雌乎注天門曆數所從出開闔謂理亂言人君應期受命能雌柔守靜則可以永終天禄矣又解云易曰一闢一闔謂之變言聖人撫運應變無常不可以雄成而守雌牝亦如天門開闔虧盈而益謙矣䟽修德可以爲君爲君須承曆數即天門者帝王曆數所從出也開謂天受闔謂廢黜天降寳命以祚有道能守雌柔可享元吉故云能爲雌乎義曰修愛民理國之事爲垂衣南面之君猶須恭己奉天以順曆數曆數者謂受命之曆五運之數也舜命禹曰天之曆數在爾躬天禄永終謂曆數在躬以承天命故可大寳愛之謂之寳命自天而授故謂受命於天易繫曰聖人之大寳曰位是也天門開則降非常之瑞或黄星動彩赤伏表符紫氣充庭五星聚井流虹貫月火電繞樞然後禀嶽降賢誕星命輔以佐佑之故應天順人拯物除害而承曆數以有天下也及乎臨御失所刑政乖宜衆叛親離兵交禍起逆亂生於下氣象見於上日寳天開山崩川竭灾凶蜂起而國亡矣是天門闔也一闢一闔之謂變者易繫辭云謂開閉相循陰陽遞至倚伏之義也虧盈而益謙者易謙卦辭虧謂滅損盈滿而增益謙退若日中則昃月盈則虧其盈也盈既虧滅謙則受益倚伏之勢矣老君戒人君既受命臨人當以雌靜柔和無爲清簡之政順膺天數以牧萬方矣又易繫云闔户謂之坤坤陰也闔閉藏也凡物先藏而後出若室之開闔其户故云闔户也闢户謂之乾乾陽也闢吐生也在陽則舒陽能吐生萬物若室之開其户也亦解闔爲暗昩闢爲昭明也不可以雄成者莊子大宗師曰不逆寡不雄成謂不恃其成而處物先當守雌靜以化也明白四達能無知乎注人君能爲雌靜則萬姓樂推其德明白如日四照猶須忘功不宰故云能無知乎䟽帝王既受曆數臨御萬方若能守雌靜則其德明白如日之照四達天下功被於物不以爲功所謂忘功若無知者故云能無知乎義曰明白惠照也惠照之心照無遠近煥然四達無所隔礙其照如此當息念忘心不滯於見猶若無知或矜其有知則有所執而失道也人君負獨見之明以御四海其政察察民凋弊矣老君戒之今忘功息照亦猶黈纊塞耳以閉其聰冕旒垂目以杜其明也生之畜之䟽下經云道生之德畜之此云生之畜之者謂人君法道清靜令物得遂其生成效德弘濟令物各盡其畜養故云生之畜之義曰道以通生萬物故云生之德以畜養萬物故云畜之帝王法道體德任物生畜各隨其分各達其情咸得所宜物無失所矣法則也效學也生而不有爲而不恃長而不宰是謂玄德注令物各遂其生而畜養之遂生而不以爲有修爲而不恃其功居長而不爲主宰人君能如此是謂深玄之德矣䟽物得遂生聖忘功用遂生則生理自足忘功則功用常全斯乃無私而成私不宰而爲宰也故生而不有者令物各遂其生君不以爲己有也爲而不恃者令物各得動爲而不自負恃爲己功也長而不宰者居萬民之上故云長不恃其功故云不宰也如是是謂深玄之德矣義曰人君抱守淳一洗心内照愛人理國動法天時雌靜平和收視返聽體道生物順德養人生物而不有其功爲政而不恃其力視聽四達功成不居此理身理國兼愛之道順天之德也玄天也三十輻章第十一䟽前章眀養神愛氣不雜故無疵此章明利有用無相資而功立故乾坤爲大易之韞轅厢成用無之質標器室以爲喻存利用之結成爾義曰愛氣養神則尚乎清靜用無利有則在彼相資資取也車器室三者皆假其有而取其無以爲用也車以運載器以成受室以居止必資外有而用中無故能成有用之功爾乾坤爲大易之韞者易繫辭也明易之所立本乎乾坤乾坤不存則易道無由起故云乾坤是易道韞積之根源與易爲州府奥藏也故下文云乾坤成列而易立乎其中矣乾坤毁則無以見易也亦猶輪轂轅厢爲車之質轅厢毁則無以見車將明利用之因故舉三物之喻理國者民存則有國民散則國危理身者神存則有生神逝則身滅利用之道實相資也三十輻共一轂當其無有車之用注此明有無功用相資而立三十輻者明造車共一轂因言少總衆夫轅厢之有共則成車車中空無乃可運用若無轅厢之有亦無所用之車車中若不空無則轅厢之有皆爲棄物矣䟽輻三十貫於一轂明少者多之所宗也當其空無方有車之運用明無者有之所利也義曰轂總衆輻以成輪車總衆材以成用其所用者用車之中空無之所爾向無輪轂不得成車今得成車又虚中而運載以喻人君内資輔相之謀外委諸侯之助乃能有國如三十輻之輳一轂也既有國矣能虚心體道則天下化成如車中之空也人之身也外資百體之設内仗五氣之和如輻之輳而成於人既爲身矣能虚心體道則元和潜運而致長生矣此明有無利用互得相資也疏夫道者何至無至一者也故能鼓動衆類磅礴群材適使萬殊區分成之者乃一象也義曰道之眞一無色無聲衆類群材資之以立動者五靈毛羽鱗甲昆蟲之屬也植者草木之屬也類者狀也材者質也動植材類億萬不同是萬殊也物雖萬殊而長養生成者道也道唯一象爾經曰惚恍中有象即此眞精淳一生化萬殊之物可謂少者多之所宗也䟽衆竅互作鼓之者一響原天下之動用本天下之生成未始離於至無至一者也義曰衆竅者莊子齊物篇南郭子綦謂子游曰夫大塊噫氣其名爲風是唯無作作則萬竅怒呺大木百圍之竅穴似鼻似口似耳似枅激者謞者叱者吸者叫者譹者冷風則小和飄風則大和然則衆竅之聲大小萬殊所鼓之者一風而已矣觀天下之動用者易繫曰聖人有以見天下之動者言聖人有其微妙以見天下萬物動用明天下萬物生成皆禀於淳一微妙之道故云未始離於至無至一者也䟽且就車而論則轅厢有質車中空無也車中空無乃可運用若無轅厢之有則空無之運用息矣車中若不空無則轅厢之數皆爲棄物矣故乾坤成而易功著義曰此覆釋乾坤成而易立乎其中喻轅厢之有以成車中之空無也䟽萬化流通而道用彰是以借麤喻之用無明至無之利有爾義曰萬化流通皆禀道用若無萬化道用不彰亦猶轅厢爲車之用乾坤爲易之韞也車者常器人所見焉假此爲喻以喻妙道故云麤喻也埏埴以爲器當其無有器之用注埏和也埴土也陶匠和土爲瓦缶之器者也䟽埏和也埴粘土也注云陶匠者尚書云範土曰陶此云陶匠範和粘土燒成瓦器亦取其中空虚以用盛受物也義曰和土爲器亦彰因有而用無凡曰器用其形萬殊大小不同方圓各異或巧或拙或賤或珍而其所用皆用器中空無之處爾範土曰陶者尚書之辭也舜側微之時耕於歷山陶於河濱是也列仙傳云陶公與弟子師門皆古之陶者善化五色之火而昇天矣鑿户牖以爲室當其無有室之用注古者陶穴以爲室宇亦開户牖是故云鑿爾䟽鑿穿也門傍窗謂之牖古者穴居故詩云陶復陶穴謂穿鑿穴中之土以復覆其上故云鑿爾後代聖人易之以宫室取其室中空虚所以人得居處莊子曰室無空虚則婦姑勃蹊謂爭路也爾雅宫謂之室義曰毛詩文王之什綿綿篇云古公亶父陶復陶穴未有家室古公者邠公也古言乆也亶公字也文王之祖處於邠以德化人歸之者衆狄人侵之公事之以皮幣不得免焉事之以犬馬不得免焉事之以珠玉不得免焉乃屬其耆老曰狄人之所好者欲吾之土地也吾聞君子不以其所以養人者害人二三子何患乎無君遂策杖而去之踰梁山而邑乎岐山之下邠人曰仁人不可失也從之如歸市焉未有居室陶其土而復之陶其壤而穴之父子夫婦居謂之家未有寢廟亦未有家室也箋云諸侯之臣稱公曰君也復者復於地上鑿地曰穴皆如陶焉陶者今之瓦窯也此言其在邠創業之時爾邠者所封地名也易繫曰上古穴居而野處後代聖人易之以宫室蓋取諸大壯以制造宫室大壯於穴居野處之時故云大壯易言上古者言未造宫字之前止是夏巢冬穴故制室宇以代之非是後物以朁前物故云上古乃在伏羲黄帝之間也莊子盜跖謂夫上古之人夏棲木上冬拾杼栗是也巢穴之中取其空而可居今宫室所制亦取其中空而居之故云當其無有室之用婦姑勃蹊者蹊路徑也勃戾怒也莊子外物篇所云言室中不空蹊路湫隘則婦姑爭路而行婦合順於姑以爲孝敬今乃爭路忿怒是室中隘狹無所往來以容其私則反戾而鬥爭也此謂室隘狹不空則婦姑爭路心壅蔽不虚則嗜欲交侵爾雅曰宫謂之室室謂之宫大小異制也今則禮有降殺聖人所居爲宫通衆所居爲家宅屋宇堂室等也論語皇偘疏云堂之内隔爲内外分爲房室故孔子弟子有升堂者入室者則堂爲通稱室在堂内復爲分别矣故有之以爲利無之以爲用注有體利無以無爲利無體用有以有爲用且形而上者曰道形而下者曰器將明至道之用約形質以彰故借麤有之利無以明妙無之用有爾䟽有之所利利於用用必資無故有以無爲利也無之所用用於體體必資有故無以有爲用也義曰夫道之無也資有以彰其功無此有則道功不彰矣物之有也資道以禀其質無此道則物不生矣物非道則不能生成道非物則不顯功用亦猶車器室三者皆取其因無以利有因有以用無也䟽注云形而上者曰道形而下者曰器者易繫辭文也義曰形而上者道之本清虚無爲故處乎上也形而下者道之用禀質流形故處乎下也顯道之用以形於物物禀有質故謂之器器者有形之類也聖人法道之用制以爲器畫卦觀象以制文字刳木爲舟刻木爲檝斷木爲杵掘地爲臼弦木爲弧剡木爲矢制以宫室結爲網罟服牛乘馬負重致遠鑄金爲兵揭竿爲旗斲木爲耜揉木爲耒一事以上以利天下此皆分道之用以爲器物爾皆易繫所稱此乃道是無體之名形是有質之用凡萬物從無而生衆形由道而立先道而後形道在形之上形在道之下故自形而上謂之道自形而下謂之器形雖處道器兩畔之際形在器上不在道也既有形質可爲器用故云形而下者謂之器夫道者無也形者有也有故有極無故長存世人修道當外固其形以寳其有内存其神以宗其無漸契妙無合於道可以長生爾䟽自無則稱道涉有則稱器欲明道用必約形器以彰雖借喻於三翻終用無於一致爾義曰至一至無道也有象有形器也約器明道復借喻於車器室等謂三翻也其用於無皆一揆耳聖人之理天下也懸賞罰制法度垂教令明上下此皆有也若無端默爲政沖靜率人不言兹化萬物自理雖有賞罰之科制度之設教令之行上下之别而不用之亦可謂假其有而用其無也斯至理也修身之道因經而悟理因悟而忘言了達妙門不執言教亦此義歟道德眞經廣聖義卷之十一
