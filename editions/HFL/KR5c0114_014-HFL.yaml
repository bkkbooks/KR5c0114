front:
  text: 道德眞經廣聖義卷之十三
  hash: sha256:ac1f46024f8681641290c31bad5405fc4b8501a1e110c2f95afb007f92f0ad60
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0114_HFL_014-001a, image: hfl/0442/0442-058.png}
body:
  text: 唐廣成先生杜光庭述寵辱若驚章第十三䟽前章明染逐塵境馳騁則發狂此章明寵辱皆驚貴身故爲患本首兩句標宗以起問次十句因問以明理故貴下假寄託以結成義曰馳騁貪貨既戒於前寵辱大患故明於此凡情得寵則喜遇辱方驚殊不知寵有辱隨辱爲寵末禍福倚伏寵辱循環聖人了知故寵辱皆驚棄而不取若外身抱道方免寵辱之來徇世貪榮難逃福禍之至非獨爵位爲戒亦以天下爲憂故桎梏紱冕而糠粃億兆或不獲己而處其位則撝謙爲本雌靜爲心故申寄託之喻用明安危之㫖爾寵辱若驚注操之則慄捨之則悲未忘寵辱故須驚也䟽若如也言寵辱之驚相如也夫操之則寵捨之則辱言人不能心齊榮辱矜徇功名執權既以爲光寵失位自驚於卑辱光寵則矜徇卑辱則驚嗟故陳戒使其若驚欲令齊其寵辱義曰聖人睿鑒得喪混同尚以死生爲一條豈復寵榮而辱懼故戒之曰得寵亦驚此則寵辱齊一得失混同也所以言驚者寵爲辱本安得無驚且人君富有天下尊繼百王告類上玄君臨萬有亦當馭朽自戒納隍軫憂乃能享此大年保其遐祚矣人臣之遭遇也九遷三接之澤既已厚矣兵符相印之任亦已重矣高冠大旆長轂朱輪氣壓伊臯權傾衛霍亦當夙興夜寐履薄臨深乃能克保福祥免貽覆餗矣故令尹三已而無愠考父三命而益恭達其理也夫富與貴是人之所欲不以其道得之不處也貪與賤是人之所惡不以其道得之不去也苟能達道則富貴貧賤寵辱得失無所驚也易繫曰吉凶與民同患正義謂非獨凶者人之所憂患吉者亦人之所憂患也何哉既得其吉又患失之此亦寵辱若驚之㫖爾貴大患若身注身爲患本故矜貴其身即如貴大患矣此答云貴身如貴大患而乃云貴大患如身者欲明起心貴身即是大患有貴即身是大患故云貴大患如身若如也此上兩句正標䟽貴矜也若亦如也身者禍患之源夫耽翫聲色矜競榮華皆爲有身遂成患本即貴其身者復何貴乎貴大患矣即身是患等無有異未能無患只爲有身即此貴身同貴大患若能無患亦復忘身是知患猶貴生身爲患有故云貴大患若身義曰夫至人順道忘患忘身内忘肝膽外遺耳目彷徨乎塵垢之外逍遥乎無事之業此即有身亦猶無也豈復憂其患乎所以世人之身内則飢渴苦惱晝夜相攻外則風寒暑濕循環相害疼酸痛痒聲色繁華嗜欲是非利名得喪六情中撓萬境旁牽皆爲患本矣西昇經曰身爲惱本痛痒寒温意爲形思愁惱憂煩吾拘於身知爲大患觀古視今誰存形完是也患隨身立身存則患生寵與辱偕寵極則辱至老君恐世人不曉故兩舉以明之將細指陳復下句發問矣列子天瑞篇云人自生至終大化有四嬰兒也少壯也老耄也死亡也其在嬰兒神專志一德充氣和善莫偕也其在少壯血充氣溢欲盛心侈德殆衰矣其在老耄也欲慮柔焉體將休焉物莫先焉方於少壯氣已間矣其在死亡也則之於息焉反其極也此四者相須而行相待而成惟得道者反之矣理身之士其自勖焉爾何謂寵辱寵爲下注前標寵辱如驚恐人不了故問何謂寵辱夫得寵則憍盈無不生禍是知寵爲辱本故答云寵爲下䟽前標寵辱若驚恐人不曉故設問云何謂寵辱自答云寵爲下所以明寵爲下者夫恃寵則憍盈憍盈即生禍因寵獲禍則寵爲辱本故知寵爲下也義曰老君恐人未曉前義舉問欲以重明既立問者之詞乃爲對答之理云寵爲下者辱因寵至寵是禍階世人視寵以爲榮聖人觀之以爲下也恃寵憍盈者春秋隱公四年衛公子州吁恃寵而好兵其臣石碏諫衛莊公曰臣聞愛子教之義方不納於邪憍奢淫佚所自邪也四者之來寵禄過也夫寵者不憍憍而能降降而不憾憾而能眕者鮮矣公不聽明年桓公立州吁弑桓公衛人殺州吁焉是則因寵獲禍可謂寵爲下矣得之若驚失之若驚是謂寵辱若驚注寵辱循環寵爲辱本凡情惑滯驚辱而不驚寵故聖人戒云汝之得寵當如汝之失寵得辱亦如吾戒汝得寵而驚懼也故結云是謂寵辱若驚䟽得則爲寵失則爲辱若驚者夫寵辱循環寵爲辱本代間衆生得寵則忻喜得辱則驚懼聖人戒云禍福循環譬之糺纏寵辱無定豈可獨驚辱來既驚其禍患寵至亦驚其憍逸其驚相若故結云寵辱若驚義曰得寵不驚得辱則懼者常情也寵至而懼其憍逸辱來而知其禍患者君子也得寵而驚日慎一日即無禍患之辱矣得寵不戒以憍以矜必有危亡之辱焉人君恃天之寵不恤於人則景命遷革矣人臣恃君之寵持權傲下則刑悔將及矣纏索也糺結也糺纏相循之貌也何謂貴大患若身注恐人不曉即身是患本故問也䟽恐人不曉故設問以明義曰亦如何謂寵辱之義世人得寵而不思其辱故辱至則驚老君欲戒於恃寵之人故重自發問爾吾所以有大患者爲吾有身注身相虚幻本無眞實爲患本者爲吾執有其身痛痒寒温故爲身患䟽吾所以有此大患者爲吾執有身相好榮惡辱辯是與非不得則大憂以懼心神内竭於貪欲形體外勞於奔競苶然疲役非患而何義曰苶疲役也吾我也指名身也身相既有患累隨之勢利相高故好榮防慮亡危故惡辱若夫强干人事妄辯是非得則憍侈以恣情失則憂驚以損性損性則心神内竭恣情則奔競外勞或憔悴江濱或恓惶澤畔形疲心役爲患深焉及吾無身吾有何患注能知天地委和皆非我有離形去智了身非身同於大通夫有何患䟽無身者謂能體了身相虚幻本非眞實即當坐忘遺照隳體黜聰同大通之無主均委和之非我自然榮辱之途泯愛惡之心息所謂帝之懸解復何繫於大患乎哉故云及吾無身吾有何患注云委和者莊子承答舜問云身非汝有是天地之委和者也義曰無身者非頓無此身也但修道之士能忘其身爾業報經云衆生苦惱常爲有身生死輪迴不能自出以何方便妄想得除太上曰妄想顛倒皆從心起强生分别繫念我身觸境生迷舉心皆妄以此流浪淪乎生死但當定志觀身盡皆虚假既知虚假妄想漸除妄想既除内外清淨自悟眞道謂之忘身既忘其身患累息矣莊子曰適來者夫子時也時自生耳適去者夫子順也理當死耳安時處順憂樂不入此達人之忘身也幻者假妄變化之謂也眞實者契道之謂也坐忘遣照者安坐忘身之謂也外忘萬境内息一心心若死灰形如槁木不知肢體之有不知視聽之用隳肢體黜聰明遺形去智以至於大通通無不通汎然無主此達人之忘心也顔回得之以告於夫子焉如此則天地之大吾不知也日月之明吾不有也何榮辱愛惡之可滯哉帝之懸解者性命之情得矣寧復繫於大患乎則無身無患養生之要也委和者莊子知北遊篇承答爲曰身非汝有天地之委形也生非汝有天地之委和也性命非汝有天地之委順也言天地結氣而生氣上氣下曰順爾若身是汝有美惡生死當制之由汝今氣聚而生汝不能禁也氣散而死汝不能止也明其委結而自成非汝有也故行不知所往處不知所持食不知所味皆在自然中也達此則近於道矣何大患之可憂乎故貴以身爲天下者若可寄天下愛以身爲天下者若可託天下注此章首標寵辱之戒後以寄託結成者夫寵辱若驚未忘寵辱貴愛以爲未忘貴愛故以辱校寵則辱不如寵以貴方愛則貴不如愛驚寵辱者尚有寵辱介懷存貴愛者未爲兼忘天下故初則使寵如辱後欲令寵辱俱忘假寄託之近名辯兼忘之極致忘寵辱則無復驚忘身則無患本忘天下則無寄託之近名也䟽言人君自矜貴其身以爲天下之主者貴身則淩人人故不附可暫寄爾義曰夫人君自貴其身而爲天下者必自尊自大作福作威以臨於人以肆其欲窮華侈之飾極奢麗之求外則殘物虐人窮兵縱武内則瑶臺瓊室酒池肉林歛天下之怨嗟資一身之逸豫尊其名號深其溝隍賞有臺榭陂池宿以妃嬙嬪御不知人之離心離德而欲爲萬世之基淪滅不暇若暫寄於天下爾疏若自愛其身以爲天下之主者愛身則慈人慈人則推樂故可託身於萬人之上長爲之主矣義曰夫人君自愛其身而爲天下者必以恭以謙以儉以約謙恭則怨敵不起儉約則嗜好不行無怨敵則人安無嗜好則人富如此内睦九族下親萬民遠懷近悦上下交愛却千里之馬惜十家之財菲飲食卑宫室外無征伐境無勞人享祚乆長可以永託於天下䟽然此一章首驚寵辱結以寄託者欲明驚寵辱不若忘寵辱存貴愛不若忘貴愛寄托天下不若忘天下故爲大患爲吾有身驚寵辱則未能無我都忘則百慮一致矜有則萬殊爭長故忘寵辱則無所復驚忘身則無爲患本忘天下則無寄託之近名然後上有太上之君下有下知之臣無爲無不爲不德爲有德矣義曰身爲患本寵辱由身而生能忘其身則忘寵辱矣忘寵辱者寵至不喜時之來也辱至不驚時之去也不充詘於富貴不隕獲於貧賤非至達之士孰能與於此乎忘身者身與道合昇爲雲天與道無爲當有何患乎非至道之士孰能造於此哉忘天下者遊心澹漠冥神虚無任物自然而然不以汨其慮無私而天下理然後目無所見耳無所聞心無所知氣無所滯神將守形形乃長生功蓋萬國而不自已化貸品物而不爲有無名無稱使物自遂立乎不測而遊乎無有與萬物爲體而歸乎虚無故黄帝得之以登天太皡得之以昇玄此聖人忘天下而至乎道也太上之君下知之臣解在十七章矣道德眞經廣聖義卷之十三
