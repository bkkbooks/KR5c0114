front:
  text: 道德眞經廣聖義卷之十羔十
  hash: sha256:d57516865d8142c39a9b1efdfb291d30c332959e8e94dde8e8451f9d04a55fc1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0114_HFL_011-001a, image: hfl/0441/0441-150.png}
body:
  text: 唐廣成先生杜光庭述上善若水章第八䟽前章明天地無私生成則能長乆此章明至人善行柔弱故無尤首標若水示三能之近道次云居地盡七善之利物結以不爭勸守柔以全勝也義曰夫水之爲德也柔弱平和居順處下隨時壅决任器方圓流作泉源散爲霧露凡物失之則死得之則生擊之無傷執之無有所以不及於道者水有形而道無形也雖有形爲礙其於利物之德謙沖之用近於道矣老君舉水爲喻以勸修道之人欲令體七善三能修身理國兼以不爭之德故無尤過之事矣上善若水注將明至人上善之功故舉水性幾道之喻也䟽上善標人也若水者喻也至虚懷於法無住忘善而善是善之上上善若水行如水之能具在下文皆含法喻也義曰上善之士體道修心應變隨時縱横利物老君欲顯上善之德以勸後學之人以水與道相鄰故舉水爲喻上善有善而忘其善如水之不矜其功水不矜功其功益大善不伐善其善益彰既大且彰爲善之上矣上惟南面之主下洎栖巖之人能如水焉必得道矣法喻者以水爲喻以道爲法以上士爲能行之人也水善利萬物而不爭處衆人之所惡䟽水性甘凉散灑一切被其潤澤蒙利則長故云善利此一能也義曰甘者水之味也凉者水之體也水爲氣母王於北方以潤下爲德其色黑其性智其味鹹其數六北方者陽德之始陰氣之終也生數一與道同也道亦爲一即無一之一水亦爲一即有一之一也無一之一爲道之體有一之一爲道之用則眀水者道之用也一切物類皆資潤澤而得生成以能潤故耐生萬物故處三能之首也䟽天下柔弱莫過於水平可取法清能鑒人乘流值坎與之委順在人所引嘗不競爭此二能也義曰柔弱者水之德也德經第四十一章云天下柔弱莫過於水重舉水德以勸守柔矣夫其水也居平則不流法以平恕爲本故可取法也水之不流靜能鑒物故曰人莫鑒於流水而鑒於止水以其清且靜也水性平也故值不平則逝值坎澤則止東西南北隨引所行不與人爭無所不可校量衆德又云不及生物之功故次之二能也䟽惡居下流衆人恒趣水則就卑受濁處惡不辭此三能也義曰人之性也徇常者衆謙順者寡好居上位惡處下流唯夫水也處下不爭居污不辱比前之德前德爲勝故爲三能也故幾於道注幾近也䟽利物明其弘益不爭表其柔弱處惡示其含垢此水性之三能唯至人之一貫其行如此去道不遐故云近爾義曰以前三能故近於道人君能宣弘益之德秉謙沖之心體含垢之行則天下太平矣理身者功務及物柔以制性處濁順俗委迹謙光則神仙可冀矣居善地注上善之人處身柔弱亦如水之居下潤益一切地以卑用水好下流䟽至人所居善能弘益如水在地利物則多又地道用卑水好流下同至人謙順幾道性之柔弱故云居善地義曰此明處下樂卑爲安國存身之道也天以清浮故用其高地以濁厚故安其下易曰天尊地卑卑高以陳又云地道卑而上行則水順下而處卑同至人之謙德矣心善淵注用心深靜亦如水之泉渟也䟽至人之心善於安靜如水之性湛爾泉渟水靜則清明心閑則了悟泉深靜也故云心善淵義曰此明澄靜清虚爲潔己洗心之術也臣心如水臣門如市斯之謂歟與善仁注施與合乎至仁亦如水之滋潤品物也疏至人弘濟常以與人善施之功合乎仁行如水潤澤無心愛憎故云與善仁義曰此明潤澤品物爲博施濟衆之行也既以與人己愈有既以與人己愈多亦斯義矣言善信注發言信實亦如水之行險不失其信矣䟽上善之人言必眞實引化凡庶善信不欺如彼泉流豈殊坎險故云言善信注云行險而不失其信者周易坎卦之詞也義曰此明信實無欺爲眞常審諦之教也行險不失其信者周易坎卦曰習坎重險也水流而不盈行險而不失其信也夫理國長民率身從道言必信實可以動天地感神明所以善惡之詞興於一室之中應乎千里之外此信之至也孔子云去食去兵而存乎信至哉言乎政善治注從政善理亦如水之洗滌羣物令其清淨也疏政正也至人於事動合無心正容悟物物因從正正則自理非善而何如彼水性洗滌羣物令其清淨故云善理義曰此明眞正化物爲革凡成聖人法也正容悟物者莊子田子方篇子方名無擇侍坐於魏文侯文侯師子夏而友子方子方數稱谿工之道文侯以爲谿工子方之師也子方曰非也無擇之里人耳稱道數當故無擇稱之無擇之師東郭順子也其爲人也人貌而天虚縁葆眞清而容物物無道正容以悟之使人心意也銷無擇何足以稱之此所謂物之失道東郭順子正其容儀心冥于道物睹自悟邪志盡銷亦可謂不言而化不化而行眞道也哉事善能注於事善能因任亦如水之性方圓隨器不滯於物䟽至人圓明於物無礙凡有運動在事皆通通則善能是名照了如彼水性决之爲川壅之爲池浮舟涵虚無所不爲是善也義曰此明因機任物爲變應圓通之用也水以方圓任器壅决隨時故能習海浮天且廣且大人君垂裳理物委任賢良用之不疑各得其職可以無爲而理臻乎泰寧之治矣動善時注物感而應不失其時亦如水之春泮冬凝矣疏至人之心喻彼虚谷方之鏡象物感斯應如彼水性春泮冬凝與時消息故云動善時義曰此明出處從時爲守道保生之戒泮散也春布陽和層冰釋散冬有寒沍流水堅凝水之順時也理國之道理身之方舒卷任時因物之性則至理矣則保生矣夫唯不爭故無尤注上善之人虚心順物如彼水性壅止决流既不違迕於物故無尤過之地䟽尤過也至人善行與物無傷虚心曲全未曾爭競波流頽靡委順若斯曾不違迕於物故無尤過之地矣義曰不爭之德德之先也凡人之性不能無爭爲爭之者其事衆也亂逆必爭暴慢必爭忿恚必爭奢泰必爭矜伐必爭勝尚必爭違愎必爭進取必爭勇怯必爭愛惡必爭專恣必爭寵嬖必爭王者有一於此則興師海内諸侯有一於此則兵交其國卿大夫有一於此賊亂其家士庶人有一於此則害成於身皆起於無思慮愆禮法不畏懼不容忍爭乃興焉故爭城者殺人盈城爭地者殺人滿野必當察起爭之本塞爲爭之源無不理矣語曰君子無所爭又曰在醜不爭下經曰聖人之道爲而不爭不爭之德何過之有哉虚心者虚心無欲也曲全者曲己全人也波流者任性自適也頽靡者放曠無滯也波流者莊子應帝王篇云變化頽靡世事波流無往不同矣委順者委心順道也體兹七善遵彼三能國泰長生之要也持而盈之章第九䟽前章明至人善行柔弱故無尤此章明凡俗溺情憍盈故有咎首標持盈揣鋭示具難保次云金玉富貴戒在貪求結以名遂身退令忘功而不處也義曰前章舉水爲喻顯明修學之行此以持盈爲首更彰貪滯之非欲使忘功退身以將至人之美爾持而盈之不如其已注執持盈滿使不傾失積財爲累悔吝必生故不如其已已止也䟽持執也盈滿也已止也言人心貪愛求取無厭執守保持更令盈滿積財爲累悔吝必生故聖戒云不如休止義曰持盈之喻凡有四義一者堅持欲心至於盈滿二者保持世財至於盈滿三者執持惡行至於盈滿四者持權恃禄至於盈滿大凡知進忘退不念善道執滯不迴以至盈滿者皆當有報欲心盈滿者得羸疾傷生報世財盈滿者得攻劫侵奪報惡行盈滿者得刑危殘害報權禄盈滿者得傾覆淪滅報所以老君戒之不如休止不休不止斯報必驗揣而鋭之不可長保注揣度也鋭銛利也揣摩鋭利進取榮名富貴必憍坐招殃咎故不可長保也䟽揣量度也鋭銛利也凡情滯溺貪求榮利故揣量前事銛鋭欲心鬼瞰人怨坐招殃咎故不可長保也義曰夫王者鋭於開疆拓土則人怨國亡人臣鋭於貪利圖名即身危禍及縱或苟得安能長乆況進無所補退有憂患故云不可長保金玉滿堂莫之能守注此明盈難乆持也䟽假使貪求不已適令金玉滿堂象既有齒而焚身雞亦畏犧而斷尾且失不貪之寳坐貽致寇之憂以其賈害豈云能守此覆釋持盈也義曰假令明能揣度鋭解貪求金玉珍奇滿堂潤屋必致攻奪之害豈能保而守之乎況人生有限情欲無厭既不救其死亡豈能保乎金玉象有齒而焚身者春秋襄公二十四年晋范宣子爲政諸侯之弊重鄭人病之二月鄭伯如晋子産寓書於子西以告宣子曰子爲晋國四鄰諸侯不聞令德而聞重弊僑也惑之僑聞君子長國家者非無賄之患而無令名之難夫諸侯之賄聚於公室則諸侯貳若吾子頼之則晋國貳注貳離也諸侯貳則晋國壞晋國貳則子之家壞何没没也將焉用賄夫令名德之輿也德國家之基也無壞亦無是務乎有德則樂樂則能乆詩云樂只君子邦家之基有令德也夫恕思以明德令名載而行之是以遠至邇安無寧使人謂子子實生我而謂子浚我以生乎注浚取也言取我財以自生象有齒以焚其身賄也宣子悦乃輕弊是行也鄭伯朝晋爲重弊故也雞斷尾者春秋周景王子子朝之傅賔孟適郊見雄雞自斷其尾歎曰犧牲之用存乎全而肥碩今自斷其尾使己不全冀免爲犠之用雞之保其身也如此況於人乎貪利而忘其身智不及雞矣不貪之寳者鄭人有得玉獻於子罕曰此寳也將以獻之子罕曰汝以玉爲寳我以不貪爲寳我若取玉俱喪寳矣不如兩全之遂不受玉致寇者易解卦九三辭曰負且乘致寇至負者小人之事也負擔於物合是小人乘者君子之器也今小人捨負擔而乘車是小人而乘君子之器矣故竊盜之人恩奪之矣以下原闕鳥盡而良弓藏狡兔死而獵犬烹勢使然也范蠡扁舟而脱禍文種固位而喪身此之謂矣日中則昃月滿則虧暑往即寒來春榮即秋落天道然也人能體盈虚於天道忘成遂之功名子房絶粒以優游疏廣解印而高尚固無上蔡華亭之追痛矣況乃居九五之位臨億兆之人光宅萬方廓廡四海而不守持盈滿堂之戒乎道德眞經廣聖義卷之十
