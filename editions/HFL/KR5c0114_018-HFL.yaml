front:
  text: 道德眞經廣聖義卷之十七羊六
  hash: sha256:e12d501e7742a855f4bc5654f5e3bae813a6314d9b6ce5cd83d43c65a03db803
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0114_HFL_018-001a, image: hfl/0442/0442-164.png}
body:
  text: 唐廣成先生杜光庭述大道廢章第十八䟽前章明步驟殊時道存故淳樸不散此章明風俗頽靡道失則仁義遂行秃施髢而病求醫雖云由愈數米炊而簡髮櫛何其傷性故直舉八句將以明其積弊冀速返於淳古也義曰前以淳樸漸散澆薄繼生原其澆薄之由乃彰道德之廢步者安徐於皇化驟者趨急於帝功俗靡風頽仁興義作執仁義而飾性立刑賞以訓人亦由既秃而加髢求妍已病而求醫望愈矣淮南子曰數米簡髮煩而不察有爲之甚也何異乎以膝搔背以踵解結矣能明四者之非可致還淳之望也髢髮也頽壞也靡傾也櫛梳也大道廢有仁義注澆淳散樸大道不行曰仁與義小成遂作濡沫生於不足凋弊起於有爲然則聖人救代之心未嘗異而夷險之跡則不得一爾䟽大道廢者代俗澆漓人民浮競玄風斯泯穆清之化不存失夫至道無爲之事故云廢也義曰廢者陵替不行也皇道帝風陵頽已遠興王圖霸譎詐交馳時既遷訛情惟浮競玄深宴安之風日以泯滅穆和清靜之化日以銷平大道不行斯爲廢矣禮運云大道既隱天下爲家是也澆沃也漓者水入地也淳古之質如水沃地散不可收故云澆漓也疏廢則有兼愛之仁裁非之義䠥躃於其間矣義曰蹩躠爲仁强行兼愛之貌也踶跂爲義詐立裁非之貌也皆局促其狀勉强其容非廣大也去道日遠聖跡已彰仁義不眞禮樂離性徒得其强飾之形表皆非自然眞一之誠心也䟽故莊子曰道隱於小成小成謂仁義等各自其成不能大通故謂之小成義曰大道既隱上德亦隳仁者自仁義者自義不能混然同化各成一名方之於德固以小矣況於大道乎道隱小成者莊子齊物篇南郭子綦謂子游曰道於乎隱而有眞偽言於乎隱而有是非道於乎往而不存言於乎存而不可道隱於小成言隱於榮華此謂小成仁義之道也榮華竄句之辭也執言滯教故爲隱故有儒墨以是其所非以非其所是以此紛紜莫能質定亂由是而作焉智慧出有大僞注用智慧者則將立法也法出而姦生則有大偽矣並竊符璽可不信然䟽智慧出者謂後代之人役用智慧立法以檢俗制典以詰姦恐其不信作符璽以信之恐其不平爲斗斛以量之而不仁之人兼盜符璽並竊斗斛則夫智慧之作法適足侈大其詐偽故云有大偽矣義曰智心慧也慧識解也檢束約也詰責也符信也璽印也道德隱而仁義行仁義興而智慧用法繁於秋荼網密於凝脂而人愈亂也夫弓弩罼弋機變之智多則鳥亂於其上矣鈎鉺網罟罾𦊒之智多則魚亂於水矣削格羅落罘罝之智多則獸亂於澤矣智詐漸毒頡滑堅白解㖃同異之變多則俗惑於辯矣故天下每每大亂罪在好智矣法則也謂立法則以束於人也典常也姦詐也謂作常法以詰責姦詐也符者刻文相合以驗若金虎竹使兵信之符也璽者天子曰璽諸侯曰印上下等差以爲信也斛之所起起於圭六十四黍爲圭十圭爲抄十抄爲撮十撮爲勺十勺爲合十合爲升十升爲斗五斗四升曰斛所以量物也智慧之人設此符印斗斛之法將以限量拘制以驗其盜安知不爲大盜之積者乎田常矯仁義於齊國一旦弑其君而竊其國傳十二世齊之符璽斗斛聖智之法皆田常有之是則智慧作法而生此大偽其後竊國者往往因田氏之法焉王莽竊之於漢司馬宣王竊之於魏梁武帝竊之於齊隋文帝竊之於周豈若焚符破璽而使民樸鄙掊斗折衡而使民不爭殫殘天下之聖法而民可以議於道乎六親不和有孝慈注父子夫婦兄弟六親也疏戚無倫不和也各親各子有孝慈也皆由失道故有偏名也䟽六親者父子兄弟夫婦也夫大同之俗無自私之親及乎上下不和冤恩斯起則有扇枕温席人謂之孝義曰大道之世天下爲公無非親也澆末之代六紀有辯孝慈彰也有不慈則慈者著焉有不孝則孝者顯焉天下爲公則大同之俗也冤屈折也恩惠愛也扇枕温席者宋有劉苞字孝嘗三歲而孤其伯父悛等皆顯貴苞見之常泣母陳氏疑其畏憚而怒之苞曰自悲早不識父今見諸父相似心中悲爾因歔欷母亦悲慟苞奉其母夏則扇枕冬則温席焉孝者事親之名禮祭統曰孝畜也釋名曰孝好也謚法曰至順曰孝總而言之則事親之道恒畜在心盡其色養中情悦好承順無違之義也爾雅曰善事父母爲孝也䟽出顧入復謂之慈被孝慈之名有自矜之色殊不知大道之代天下爲家上承下綏自然之分視人如己不獨親其親則天下之人皆可孝也人亦視之猶己不獨子其子則天下之幼皆可慈也孝慈之名復何所施乎義曰禮運篇云仲尼仕魯與於蜡賔事畢遊象魏之觀見祭禮之不備睹象魏之舊所喟然而歎弟子言偃問焉仲尼曰大道之行三代之英丘未之逮也而有志焉大道之行天下爲公選賢與能講信脩睦人不獨親其親不獨子其子使夫老有所終世有所用幼有所長鰥寡孤獨廢疾者皆有所養男有分女有歸貨惡其棄於地不必藏諸己力惡其不出於身不必爲己是故謀閉而不興盜竊亂賊而不作故外户不閉是謂大同此則扇枕温席出顧入復無所施矣人盡親也何偏名之有乎矜恃也哉國家昏亂有忠臣注太平之時上下交定何異名乎昏亂之日見危致命有忠臣矣䟽忠者人臣之職分而云有忠臣者何乎由人主失御臣之道今佞主之人獲進規君於昏使生禍亂則有見危致命蒙死難以匡杜稷而獲忠臣之名義曰讜正曰忠春秋曰忠社稷之固也爲臣事君以忠爲本事親孝者則事君忠矣阿諂曰佞不明於理曰昏上下不理曰亂夫佞臣在側君鑒不明不能退佞進賢陷己於昏亂昏亂既作紛爭生焉外有寇敵之侵内有蕭墻之釁所以良臣效命排難扶危或生著功名或死節王事忠臣之目由斯立焉向使唐堯爲君虞舜爲臣上得臨御之宜下盡弼諧之道則忠臣偏美何所顯哉䟽若夫道化大行無爲清靜思皇多士盡是䕫龍彝倫攸叙無非作乂義曰大道之化玄風廣行上既無爲下自清靜詩曰濟濟多士文王以寧多士衆臣也䕫龍舜佐也尚書曰䕫作典樂八音克諧擊石拊石百獸率舞簫韶九成鳳凰來儀龍爲納言出納王命彝法也倫等也攸所也叙次也乂理也書曰彝倫攸叙言舜得良臣而典法不失其正也䟽然後忠孝之名息淳樸之道興則於忠臣乎何有此四者頽弊之極也焉得不返之於淳樸乎義曰頽墮也弊替也四者謂仁義智慧孝慈忠臣也道廢智生家爭國亂而四者是顯因頽弊之極而立其名大樸壞隳淳風訛替德衰道喪可勝言哉所以大道既隱下德有爲仁義用而巧智興小惠成而大偽作忠臣名著於昏亂孝慈事彰於不和弊極風頽所宜反樸反樸之謂詳具在於下章絶聖棄智章第十九䟽前章明風俗頽靡失道而仁義遂行此章明絶棄多門還淳則盜賊無有首六句且絶矜徇之迹次三句將明立教之方後四句示行門之由趣義日道廢俗訛偏名遂立將復樸素須絶偏名既前章四者不行則此章三者宜絶孝慈自復盜賊不生乃尊樸素之風除私欲之患天下之利其何博哉絶聖棄智民利百倍注絶聖人言教之迹則化無爲棄凡夫智詐之用則人淳樸淳樸則巧偽不作無爲則矜徇不行人抱天和物無夭性是有百倍之利也䟽聖者有爲制作之聖智者凡俗矜徇之智制作之聖則有迹矜徇之智則非眞失眞是生巧偽逐迹坐令喪本故皆絶棄之而全其淳樸天和既暢矜徇不行是人有百倍之利也義曰無爲之聖内明之智應物周遍隨時感通比之聖智杳冥無迹制作之聖矜徇之智既有其迹人往迹存以所存之迹非應變之具執而用之去道愈遠何者聖智設法所以守國也大盜至矣則聖智之法并其國而竊之其故何哉若不盜其聖智之法則無以取其國是知聖智設法本以守國智詐極矣乃翻爲盜國之盜資也老君戒之忘聖則爲理涉迹則爲亂能忘其有迹之迹棄其矯智之智則淳樸復而巧偽息矣人復怡和無傷無夭俗臻樸素無怨無爭各保其生是有百倍之利也絶仁棄義民復孝慈注絶兼愛之仁棄裁非之義則人復於大孝慈矣䟽前章云大道廢有仁義此章云絶仁棄義民復孝慈者明大道之代所謂玄同民無私親悉皆慈孝故理至則迹滅事當而名去矣義曰六親不和則孝慈之名偏立天下有道則淳樸之化復行淳素既行人皆慈孝可謂無私親矣斯則絶名迹之仁義復玄同之孝慈無私親者是不獨親其親也䟽今六紀廢絶則孝慈名彰若絶兼愛之仁棄裁非之義江湖無濡沬之迹慈孝有自然之素故民復於大孝慈矣義曰六紀者亦曰六親是君臣父子夫婦也六者和則皆孝皆慈六者不和則有孝有不孝有慈有不慈不孝者衆則孝者顯其名不慈者衆則慈者彰其美所以然者仁義制於其間而昭其名迹若化之以大道鼓之以淳風棄名迹之仁義則民復於皆孝皆慈矣魚處於陸相呴以濕相濡以沬不如相忘於江湖何者相呴相濡言其相愛矣相忘於江湖各得其適豈俟濡沬之小愛乎偏孝偏慈濡沬之謂爾莊子天運篇老子謂孔子曰子以仁義之道行之於世亂莫大焉夫仁義憯然乃憤吾心豈若使天下無失其樸放風而動總德而立又奚桀桀然若負建鼓而求亡子矣黑白之樸不足以爲辯名譽之觀不足以爲廣魚相濡沬不如相忘於江湖人相仁愛不如相忘於道術矣絶巧棄利盜賊無有注人矜偏能之巧必有爭利之心故絶巧則人不爭棄利則人自足斯不爲盜賊矣䟽絶巧者絶雕琢非法淫過之巧棄利者棄徇財兼並乾没之利夫盜賊者生於羡欲不足今絶巧則人不爭棄利則人自足人各自足復誰爲盜賊乎故云無有義曰雕琢淫過之巧工既不當雖巧奚爲則衛人之刻棘猴宋人之琢楮葉徒云悦目終曰蕩心所宜絶也徇財則妨行兼并則奪人乾没則欺詐有一於此非盜而何斥而棄之循分而足矣何盜賊之有乎又脩道之人宜絶心内嗜欲之巧身外浮華之利六情鋭進之巧六根耽著之利則三元清淨六賊自無矣此三者以爲文不足故令有所屬注此三者但令絶棄未示修行故以爲此文不足垂教更令有所屬著謂下文也䟽三者謂絶聖棄智一也絶仁棄義二也絶巧棄利三也此三者且令絶棄未有修行故以爲此三者於文不足以垂教更令有所屬著謂下文見素等是也義曰聖智絶棄則人享其利仁義絶棄則皆復孝慈巧利絶棄則民無盜賊三者既絶既棄將示修眞復古之方故云此爲未足屬於下文屬著也見素抱樸少私寡欲注見眞素抱淳樸少私邪寡貪欲矣䟽欲求絶聖棄智則常見眞素義曰同乎無欲則謂素樸素樸則民性得矣無知無欲則合眞素眞素合則聖智之迹絶矣䟽欲求絶仁棄義則懷抱質樸義曰淳質敦樸以守其心則兼愛之仁裁非之義絶矣䟽欲求絶巧棄利則當少私邪寡貪欲義曰私邪不汨於性貪欲不起於心則淫奢之巧專冒之利絶矣䟽三絶雖於文不足四行則修身有餘將欲禁邪於中心故必取資於内行義曰聖智仁義巧利此六者行之初以拯物執之末以妨道故姦詐盜竊因而生焉絶而棄之可復眞素眞素已復乃資内修顯四行於結成爲眞道之要妙矣夫有迹之聖作則矜詐之智生仁起於不仁義出於不義孝彰於不孝慈顯於不慈能絶有迹有爲自復至慈至孝斥淫巧則私利息私利既息盜賊不生然後凝旒於樸素之鄉杜念於私欲之境人登富壽國致遐長此人君行道之效也若夫心除嗜欲身蕩浮華翦鋭進之情鋤耽著之本六賊不作三元坦夷四行克修乆視何遠此行人修之之效也道德眞經廣聖義卷之十七
