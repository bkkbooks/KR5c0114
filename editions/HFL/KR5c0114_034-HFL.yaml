front:
  text: 道德眞經廣聖義卷之三十三景九
  hash: sha256:5294a5950daa18de809bb40c522a090ac631bd885491678bb9dd7e4ba29120fe
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0114_HFL_034-001a, image: hfl/0445/0445-134.png}
body:
  text: 唐廣成先生杜光庭述道生一章第四十二䟽前章明三士所聞之道能生萬物此章明萬物生化之由必資三氣初明冲氣柔弱令萬物抱以爲和次云孤寡不穀戒王公以謙自處結以强梁不得其死示其修學之元義曰天地不能自生者天地者大道大道運用惟一爲先故云生一則明前章三士所聞之道也道惟一爾而愚智聞之不同由是有信有疑或勤或笑乃顯明昧進退之㫖示世人修習之由又述谷辱偷渝之方表上士謙虛之行既云善貸萬物彰萬物抱道而生是知謙虛卑下之基損之而益夫格悍强梁之性益之而損焉必資三氣者即靈寳生神章經云玄氣元氣始氣也始氣白凝爲清微天號玉清境天寳君所掌元始天尊統九聖居之元氣黄凝爲禹餘天號上清境靈寳君所掌大道君統九眞居之玄氣青凝爲大清境號大赤天太上老君統九仙居之以此三氣每氣復各生三氣下爲九天通三境爲十二天又以十二天各分二天凡三十六天也又以其精凝爲三才即始氣爲天玄氣爲地元氣爲人始氣積陽玄氣積陰元氣積陰陽之華而總爲人倫散爲萬物冲氣者是元和冲寂之氣也萬物得之以生失之以死人能寳之則返老還嬰革凡成道孤寡不穀之義前章己明重成强梁益明柔弱爲契道之行也論語云禮之用和爲貴是知和者陟道之徑不可忽也道生一一生二二生三注一者冲氣也言道動出冲和妙氣於生物之理未足又生陽氣陽氣不能獨生又生陰氣積冲氣之一故云一生二積陽氣之二故云二生三三生萬物注陰陽合孕沖氣調和然後萬物阜成故云三生萬物䟽道者虚極之神宗一者沖和之精氣生動出也言道動出和氣以生於物然於應化之理猶自未足更生陽氣積陽氣以就一故謂之二純陽又不能生更生陰氣積陰氣以就三故謂之三三生萬物者陰陽交泰沖氣化醇則徧生庶彙也此明應道善貸生成之義爾義曰道以無形無名不無不有自然妙化而生乎一一者道之子也天得以清地得以寧人得以長存萬物得以生故此妙一修道者守之抱之存之得之以爲證道之根矣所言一者即前始氣爲天也一生二者即玄氣爲地也二生三者即元氣爲人也所以沖和妙氣生化二儀凝陰陽之華成清濁之體然後人倫畢備品物無遺四序調平五行運象若交感而順則物保其常或否塞而逆則物罹其患故周易乾下坤上爲泰天地交而萬物通也上下交而其志同也内陽而外陰内健而外順内君子而外小人君子道長小人道消也故陽氣在上而下感於陰坤爲陰也陰氣在下而上感於陽二氣交感而生萬物是則孤陰孤陽不能生化其或反此則坤自居下乾自居上二氣不交天地隔塞在易爲否天地不交而萬物不通上下不交而天下無邦亦不能生化故疏云陰陽交泰冲氣化醇易曰天地絪緼萬物化醇也萬物負陰而抱陽冲氣以爲和注萬物得陰陽冲氣生成之故故負抱陰陽合養沖氣以爲柔和䟽言物之生也既因陰陽和氣而得成全當須負荷陰氣懷抱陽氣愛養沖氣以爲柔和故廣成子告黃帝曰我守其一以抱其和故我修身千二百歲而形未嘗衰是知元氣沖和群生所賴老君舉此者明人既禀和氣以生則氣爲生本人當固柔和守雌弱以存本也義曰萬物之生也道氣生之陰陽氣長養之一晝一夜一陰一陽更相遞代養育萬物其大也陰爲寒陽爲暑其細也陽爲明陰爲晦以寒暑明晦晝夜長育萬物各成其形非妙道沖和之氣無以生也雖有寒暑而無道氣者亦殂落矣二氣更爲内外故萬物負之抱之不可離矣人之生也道以元一之氣降之爲精爲神天以太陽之氣付之爲動爲息地以純陰之氣禀之爲形爲質生神經曰人之既生天神一萬八千地神一萬八千故三萬六千神氣一時生形夫向之者陽也背之者陰也故曰負陰而抱陽至矣哉人生天地之間驚天駭地三元育養九氣結形萬神恭諾司馬敬順天眞鑒映擢形太陽亦不輕也但人得生而自不能尊其氣貴其形保其命愛其神自取死壞離其本眞豈不痛哉莊子在宥篇黃帝於崆峒山問廣成子理身之道柰何可以長乆廣成子蹶然而起曰善哉問乎吾語汝至道之精杳杳冥冥至道之極昏昏默默無現無聽抱神以靜形將自正必靜必清無勞汝形無摇汝精乃可長生目無所見耳無所聞心無所知神將守形乃可長生慎汝内閉汝外多知爲敗我爲汝遂於大明之上矣至彼至陽之原也爲汝入於杳冥之門矣至彼至陰之原也天地有官陰陽有藏慎守汝身物將自壯我守其一以處其和故我修身千二百歳矣而形未嘗衰此謂天有日月星辰地有岳瀆百川皆有尊卑遞相運用帝王無事物自昌壯矣豈在多事乎廣成子乃太上所化之身應號於世以道授於帝王豈有生死終始之數寓言千二百歲耳又曰得吾道者上爲皇而下爲王失吾道者上見光而下爲土又曰人其盡死而我獨存此得沖和之妙也人之所惡惟孤寡不穀而王公以爲稱注萬物皆以沖和之氣爲本而沖氣柔弱守本者當須謙卑柔弱故王公至尊而稱孤寡不穀者以謙柔爲本䟽沖氣柔弱爲生之本故舉王公謙卑以敦其本孤寡不穀不善之名非尊崇之稱人所惡之而王公以爲名者謙之至也言王公爲風化之主存亡所繫天下具瞻若不崇尚謙柔以安社稷則物所不歸故取謙柔爲本以致巍巍之功義曰守柔弱者生而不匱懷謙抑者高而不危所以柔弱爲保生之元謙抑爲全高之本故大國者宜爲下崇臺者固其基此守道之常立身之要但人不能行之耳具者衆也居尊高之位衆所瞻仰毛詩小雅節南山篇赫赫師尹民具爾瞻既居高位爲師長尹正故能宣行風化以育黎元詩序云上以風化下言王侯以德風化於下民論語曰君子之德風小人之德草草上之風必偃言民從順其上之化也王侯行道德四方之人歸從其化故曰歸往解云民所歸往之謂王王公有道其功崇高如山之固故曰巍巍乎其有成功巍巍者高峻之貌也故物或損之而益益之而損注自損者人益之自益者人損之故朝宗者善於下謙弱者德之柄孤寡而稱不亦宜乎䟽故者仍上之詞也損貶毁也言王公稱孤寡以自毁損則爲百姓樂推尊敬而事之而致益也或益之而損者若王公貴寵其身居上而驕則下人離散而致損也書曰滿招損謙受益斯之謂也義曰理國以謙光爲本立身以柔弱爲先易曰謙謙君子卑以自牧或反於此必貽其損易說卦曰緩之必有所失故受之以損損而不已必益故受之以益益而不已必决故受之以夬則損益倚伏終始相循若謙己不已物常益之故無顛覆修道之士割榮華去繁盛捨悦樂甘寂寥損之甚矣其得道也延景福享遐年逍遥無爲天地齊永豈非益之乎滿招損者尚書大禹謨舜曰咨爾禹惟時有苗不率汝往徂征禹乃會群后誓師征之三旬苗人逆命益贊禹曰惟德動天無遠不届滿招損謙受益是乃天道禹拜昌言曰俞帝乃誕敷文德舞干羽于兩階七旬而有苗格故理國理身謙爲本也人之所教亦我義教之注老君曰人君所欲立教教人者當以吾此柔弱謙虚之義以教之䟽人謂人君也人君爲政教之首一國之風繫乎一人而化故老君昌言之曰人君欲行言教以化人者當須用我沖虚柔弱之義以教之也義曰理化之本其惟元首乎元首者人君也尚書曰元首明哉股肱良哉庶事康哉此言人君教之善也又曰元首叢脞哉股肱惰哉庶事隳哉人君叢脞細碎而無大略則臣下懈惰萬事隳廢此言人君教之不善也政教由於元首可不慎耶詩序曰一國之事繫一人之本謂之風天下之事形于四方之風謂之雅風雅正也言王政之所由廢興也人君以謙損柔弱以教於人人醇朴而宗道矣以仁義苛察以化於人人智詐而歸於亂矣理身者謙靜而事簡事簡而心泰則生可保躁動而心競心競而事繁則去道遠矣昌大也强梁者不得其死注强梁之人動與物亢求益而損物或繫之故不得其死䟽强梁謂剛暴屈强之人也剛暴之人失養生之要必自夭其天素不得壽終而死嚴仙人曰强秦以專制而滅大漢以和順而昌義曰老君所戒柔必勝剛弱必勝强故舌柔則存齒堅則亡是則强梁非全身之道爲失生之基耳剛暴非進道之階殊保壽之㫖矣深宜戒之嚴仙人者蜀郡嚴遵字君平常於成都巿以卜筮之道潜化於人人有不正之問必以陰陽之理制而止之日閲百錢而閉肆下簾以受老子乃作指歸數萬言明理國理身之要其解此義云强秦以專制而滅者言秦皇吞滅七國一統天下威制四方殺伐無已違謙抑守柔之道故子嬰降而祚滅不得其死理實然乎秦嬴氏顓頊伯翳之後至非子與周孝王養馬封於汧渭之間平王東遷秦襄公衛助有功因命列爲諸侯至繆公乃下士用賢得由余子桑百里奚乃强盛昭王五十一年伐周取九鼎寳器三十六邑遷周於憚狐昭王俾卒孝文王戍立一年戍死莊襄王子楚立三年而卒始皇正立元年乙卯至二十六年庚辰平諸侯滅六國自號始皇三十八年卒二世胡亥立三年卒子嬰立四十六日降漢於軹道項羽至斬之國滅漢祖劉邦字季彭城豐沛人帝堯劉累之後父太上皇端起布衣推賢用能與項羽力戰而取天下德制强楚仁及生靈智士爲之謀賢士爲之輔相三傑而成帝業約二章而安疲人有長者大度之美傳祚兩漢二十四帝四百餘年裔孫王蜀亦及兩世此柔德制强之驗也理身理國足爲鑒乎䟽强梁者失道剛武者失神生主以退安得長存注云動與物亢亢敵也物或擊之者易益卦上九爻辭云莫益之或擊之義曰理代者以强梁失國理身者以强梁喪生與物抗敵豈能無患或擊之者易益卦上九曰莫益之或擊之言處益之極過盈者也求益無已是心無恒無厭而求人莫之與獨唱莫和適是偏辭人道惡盈怨者非一故或擊之也益與也擊傷也神爲生主人爲神主相須而立闕一則亡用剛失神故非善也吾將以爲教父注吾見强梁者亡柔弱者全故以此柔弱之教爲衆教之父也䟽父本也此句結修學之元老君舉强梁者亡以之爲戒柔弱者全以之爲勸以爲教父者父爲子本言吾將此柔弱之教爲衆教之本如子之於父故云以爲教父義曰父者尊也柔弱必全尊於衆教衆教之末謙柔爲先故易曰謙尊而光卑而不可踰言尊者能謙光而益明卑者能謙不可踰越禮曰傲不可長慎以避禍恭以遠耻敬讓以行皆謙慎之㫖也尚書曰願而恭慤愿而恭恪也柔而立和柔而立事也詩云靖恭爾位守柔敬也春秋曰使之以和臨之以敬行之以禮守之以信奉之以仁教之以務閑之以義經曰兵强不勝木强則共强大處下柔弱處上高者抑之下者舉之此衆教之中皆以柔弱謙敬爲本也爲教之父豈虚也哉理天下修其身守柔行謙無思不服矣道德眞經廣聖義卷之三十三
