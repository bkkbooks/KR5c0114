front:
  text: 道德眞經廣聖義卷之四十六行九
  hash: sha256:7defbb876d96061cb24eceb3ab4f70a679baf80bce4b3e6adfdc3b65207187d3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0114_HFL_047-001a, image: hfl/0448/0448-064.png}
body:
  text: 唐廣成先生杜光庭述吾言甚易知章第七十䟽前章明用兵之言戒其輕敵此章明暢理之教示其易知易知則必有宗君輕敵則喪其慈善初標聖教易知次眀迷途不曉言有宗下解釋易知之意夫唯下辯說不曉之由後歎聖之懷玉以勗勤行之上士爾義曰既明行慈者勝輕敵者亡此言易知易行而迷者不知不曉以其不知於至道不能深了於戒言瞢彼君宗尚拘昏滯是知我者少也苟能法則於道信爲貴乎若披褐而懐玉非常徒之可識夫道易知也而不知者信爲愚矣不知而强知者聖人不取放下章次而明之也吾言甚易知甚易行注老君云吾所說言契理故易知簡事故易行䟽老君言我所言者以暢於理理暢則言忘故易知也吾所事者事於無事事簡則無爲故易行也義曰吾者老君也明此二經老君言教三寳四善儉讓謙慈皆實易知易行可以理身理國以無爲爲本以清靜爲基清靜無爲事簡理暢知之甚易行之豈難天下莫能知莫能行注天下之人滯言而不悟煩事而不約故莫能知莫能行䟽此歎衆生不能了言無言執言而滯教惑於言教故莫能知也不能悟事無事煩事而不約迷於塵事故莫能行也義曰代人惑於圖功輕敵不能儉讓謙慈貺莫知之豈能行也且夫五千垂教雖深契重玄而導世引凡且事唯簡要無爲則易悟無事則易行而棄無爲無事之門趨執教滯言之路以斯致惑故莫能知勉語君宗早期了悟此老君所以戒勸也言有宗事有君注言者在理得理而言忘故言以無言爲宗事者在功功成而不宰故事以無事爲君䟽此覆釋易知易行所由宗本也君主也夫言者所以在理得理而忘言故言以不言而爲宗本事者所以在功功成而遣事故事以無事爲君主此豈不易知易行耶義曰了言無言有宗則易知也於事無事有君則易行也滯言執教則不知其宗局守迷事則不知其君在乎捨執棄迷漸悟於道爾夫唯無知是以不我知注夫唯代人無了悟之知是以不知我無言無事之教也䟽不我知者謂不知我也夫唯代人迷惑無了悟之知封著名相不能暢理於事執事於言滯言是以不知吾教以無言無事之意又解云老君言夫唯我所知惟在無知而天下之人用知求知是以不知我也義曰無言爲了言之宗歸於至理無事爲遣事之主契彼無爲以世人不能知故難知不能行故難行爾知我者希則我者貴注了知我忘知之意者希少法則我不言之教者至貴也䟽希少也則法也老君言知我忘言契理之意者至希少也若能法則我言而行之者則可尊貴矣義曰知無言之宗固已少矣能體我無言爲法斯可貴焉然教本無言固言方能辯理教本無事固事方可探玄辯理則言自忘探玄則事自簡言忘事簡可與言道矣是以聖人披褐懷玉注披褐者晦其外懷玉者明其内故知我者希爾䟽褐裘也賤者之服襲裘褐者所以蔽下之麤衣也玉者潔潤而可比德君子言此者欲明聖人内心慧了外狀如愚以如愚之狀故云披褐以慧了之心故云懷玉義曰聖人之於道也隱顯同途出處同跡語默皆契斯須不遺但代人不能窺聖人之閫奥爾智周萬行德冠九清御無爲之宗了兼忘之㫖外晦其用委跡和光内瑩其明鑒窮識遠故河上公注曰内雖昭昭外如愚頑明珠在蚌中美玉處石間是披褐懷玉之㫖也夫道至明矣而凡愚昩之又莊子曰無門無傍四達皇皇非明也哉道心惟微何往不達而下士惑之披褐者聖人混其外褐者賤衣與衆同也懷玉者聖人明其内也玉者石中之美有五德焉潤澤而温人之方也䚡理自外可以知中義之方也其聲舒揚專以遠聞智之方也不撓而折勇之方也銳廉而不伎潔之方也玉比德者禮記玉藻篇云古之君子必佩玉焉右徵角聲中民與物也左宫羽聲主君與事也趍以采薺門外之行也行以肆夏登堂之樂也周旋中規反行也折旋中矩曲行也進則揖之謂小俛也退則揚之謂小仰也然後玉鏘嗚也故君子在車則聞鑾和之聲行則鳴佩玉是以非僻之心無自入也世子君在不佩玉左結佩不使嗚也右設佩去之也居則設佩朝則結佩朝於君不敢使鳴也齊則靖結佩屈之也凡帶必有佩玉唯喪則否言王喪事也佩玉有衝牙君子無故玉不去身比德於玉焉喪與灾眚謂之故也天子佩白玉而玄組綬公侯佩山玄玉而朱組綬大夫佩水蒼玉而純組綬世子佩瑜玉而綦組綬士佩瓀玫玉而緼組綬孔子佩象環五寸而綦細綬謙不比德示不仕也環取其循而無窮也知不知上章第七十一䟽前章明暢理之教示其易知此章明了心之知虚忘爲上首標迷悟有異執迷成病夫唯下結歎聖人了知是病故不强知義曰前以知道既貴要隱跡藏光此乃强知爲非要忘知契道聖人强知之病不爲之故無病焉行人能了此聖心復何病之有知不知上不知知病注了法性空本非知法於知忘知是德之上不知知法本性是空於知强知是行之病䟽夫法性本空而非知法聖人悟此有不取相之知於知不著故云不知是德之上此釋悟也不知知病者言常俗之人不知知法本非眞實於此無知之理强謂有知有取著之縛所以爲行之病此辯迷也義曰了知非知是謂眞知知而不知是以爲上不知眞知而强知之是以爲病聖人了知皆妄成彼修眞於知忘知自息强知之病夫唯病病是以不病注夫唯能病强知之病是以不爲强知所病䟽衆生强知妄生見著而爲病惱夫唯能病强知之病於知忘知則不爲强知所病故云是以不病義曰知强知之病而能病之是以不病者無强知之病聖人不病以其病病是以不病注唯聖人所以不病者以其病衆生强知之病是以不病䟽聖人正智圓明了悟實相於知忘知故不爲知之所病所以者以其病凡夫有强知之病故說眞知以破之妄知之病既除眞知之藥亦遺故云不病義曰凡代之人識因淺劣未了知眞之理乃執强知之非以此循環迷失正智聖智圓備不執强知之知又了眞知之理能病强知之病不惑强知之知以其病病是以不病如惑者說大道是有執有爲是一人言道爲無執無爲是執無者則病於有執有者復病於無聖人知道非有非無兩無所執能病所執是以不病義亦然矣所以大辯若訥至知忘知顔子如愚孔光温樹三緘戒慎其斯謂乎西昇經曰能知無知道之樞機也人不畏威章第七十二䟽前章明了心之知以虛忘爲上此章明迷妄之病有可畏之威初標人不畏威則禍累所及次無狹下勸人虚心靜欲神不猒人後舉聖行證成示其去取義曰聖人於知忘知既顯强知爲病又舉威之可畏不畏則大威及之俾其滌慮虛心栖神於絳關恬和養氣味道於玄虛人神相須貴見皆遺去猒狹之爲累取知愛以爲資然後勇於謙柔挫其剛果以爲修眞之徑爾民不畏威則大威至注有威而可畏謂之威言人於小不畏拙於慎微則至大可畏也䟽有威可畏謂之威夫欲惡之來起於微末積成病累爲彼大威人不能慎其細微則至於大可畏也義曰君子有三畏畏天命畏大人畏聖人之言又人之立身以憂畏爲本理國而有憂畏四時順焉六氣序焉神明交焉邦國泰焉其無憂畏者神明不交灾害爲生理身而憂畏官以之理家以之寧疾𤵜不作而志氣和平其無憂畏者反是則大威至其可逭也無狹其所居注神所居者心也無狹者除情去欲使虚而生白䟽神所居者心也人當忘情去欲寬柔其懷使靈府閑豫神栖於心身乃存也義曰神者身之主心者靈之府嗜欲不入物我都忘是非不汨於胸中則神栖於靈府也西昇經曰謀思危之首危者將不乆此使人思謀絶慮少私寡欲又曰身者神之車也神之舍也神之主人也主人安靜神則居之躁動神則去之以心能動靜變化故謂之神神能飛行並能移山此則神爲靈妙之稱也神力之大不可思而議之故修三奔行大洞則雲車龍駕出有入無飛昇三清嘯吒水火移山陷地何所不爲若用之非道則敗國喪身淪滯六欲飄零苦趣往反生死善惡吉凶皆由於心矣故心爲靈府也無猒其所生注身所生者神也無猒者少私寡欲使不勞倦䟽身所生者神也猒惡也人由神而生故謂神爲所生也神明託虚好靜人當洗心息慮神自歸之若嗜欲瀆神營爲滑性則精氣散越散越則生欲故勸云無猒所生之神以存長乆之道義曰身之生也因道禀神而生其形夫神者陰陽之妙也形者陰之體也氣者陽之靈也人身貺生假神以運因氣以屈伸神氣全則生神氣亡則死故形爲神之宅神爲形之主豈可猒而去之耶且所生我身大約有三一曰精二曰神三曰氣受生之始道付之以氣天付之以神地付之以精三者相合而生其形人當受精養氣存神則能長生若一者散越則錯亂而成疾耗竭而致亡不愛此三者是散而棄之也氣散神往身其死矣得不戒而保之哉此三者能生其身故曰所生也夫唯不猒是以不猒注夫唯人不猒神是以神亦不猒人也䟽善貸曰道資形曰神人能愛道存神故云夫唯不猒除垢止念惟精惟一神不猒人故云是以不猒義曰貸假也資禀也垢惡也夫惟修道之人養神愛氣冥懷虚寂神則常存神不猒人人可長乆除垢止念者西昇經老君將昇太微戒尹喜之詞也曰除垢止念靜心守一衆垢除萬事畢吾道之要也惟精惟一者尚書大禹謨篇舜命禹踐位之詞也曰人心惟危道心惟微危則難安微則難明惟精惟一可以允執厥中也是以聖人自知不自見䟽自知者反照内省防害於微令無可畏之事不自見者不自彰見其材能炫耀於物違理失常以招患也義曰夫人不炫己能不彰己行故尚書曰惟不伐天下莫與汝爭功惟不矜天下莫與汝爭能但内照含光周鑒四海固無可畏之事矣理身及此則功名顯而道德充也自愛不自貴注自知其身防所畏之事自愛其身無猒神之咎不自見其能以犯患不自貴其身以聚怨也䟽聖人自保愛其身絶去嗜欲令神不猒身不自貴者不自矜貴其身凌虐於物以聚怨爾義曰葆和谷神希言養氣絶嗜禁欲抑非損惡此自愛也輕裘肥馬甘食美衣華宇文階崇軒大厦自貴也自愛則神安心泰自貴則奉己害民傷財歛怨故曰有道之君以樂樂人無道之君以樂樂身樂人則人從樂身則人叛也故去彼取此注去彼見貴取此知愛䟽去彼自見自貴取此自知自愛聖人得年等智了法性空理無去取開教引凡寓言之爾義曰自見者不明自貴者不長故貴以身爲天下若可寄天下故聖人去之而不取自知者明自愛者寧故曰愛以身爲天下若可托天下言聖人内愛其神外愛其民也寓言者寄寓立言以教神俗言聖人非有去彼取此之行立理以勸人爾道德眞經廣聖義卷之四十六
