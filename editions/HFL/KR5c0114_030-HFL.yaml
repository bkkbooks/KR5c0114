front:
  text: 道德眞經廣聖義卷之二十九景五
  hash: sha256:153953219220d73c9733ed950057d62b0d96835014f3cf8b516e0d5ca04bcba6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0114_HFL_030-001a, image: hfl/0444/0444-124.png}
body:
  text: 唐廣成先生杜光庭述將欲歙之章第三十六䟽前章明能行道化人所歸往此章明道或用權國之利器歸往則安於平泰利器則不可示人初標歙張之權次示柔弱之行終結淵魚之喻以明權道之徵義曰道之爲化應變隨機其於上古也則君任於道臣富於德民全於和故視不可見聽不可聞用不可既及乎代云澆薄俗已遷訛玄妙難明希夷靡測將欲頓歸淳樸遽汰澆漓至音寂寥尋求遐邈聖人教理代之主持權變之機示歙歛開張之門以遏奸詐反與奪廢興之用以檢回邪攝奸詐可復於忠良束回邪可歸於正直明此權變雖非至理之本亦乃助理之方故謂爲國家之利器也用利器之主亦猶用兵馬不得已而用爾猶須柔弱其行微明其機不以其權示於非人如魚之不可失水魚失水則死人失機則敗素書曰陰謀外泄者敗易曰機不密則害身此之謂矣將欲歙之必固張之將欲弱之必固强之將欲廢之必固興之將欲奪之必固與之䟽歙歛也此明聖人用權道以攝化衆生也夫人既有鈍根利根故教有權有實聖人欲量衆生根性故以權實覆却相明利根衆生見善則遷有過則改略示方便深達根原義曰聖人設教分權實二門上士利根了通實教中下之士須示權門權門變通其法甚廣依經所判略具四門夫根者謂智性之根也人之所禀眞元道性能生衆智如草木之根生花結實展轉相生故名根也性之生智亦如此焉禀受之性由其氣也有清濁不同性有利鈍差别氣清和者生乃穎利才智過人明古達今問一知十此人根性既利了悟圓通見可而進知難而退見善如不及聞惡如探湯故能見善則遷有過則改明方便之法知進趣之途不俟權道誘之自達眞實之教矣四門者歙弱廢奪也䟽鈍根衆生惑滯滋乆自非以權攝化不可令其歸往故將歙歛其情欲者則先開張極其侈心令自困於愛欲即當自歙歛矣强弱等義亦復如是推而行之無不信矣乍聞斯語以爲非道德之意深達玄極然後明權實之由故注云君子行權貴於合義小人用之以爲詐譎下文又云不可以示人者正爲權道之難故爾義曰鈍根之人禀氣濁雜者則生頑鈍智識不通莫辯是非豈知善惡或復貪性狠戾徇欲恣情動陷罪纏永乖人域聖人常善救物俯念含靈示以權門令其自悟故開四門權道以攝化之第一將欲歙之必固張之者攝其心也第二將欲弱之必固强之者攝其性也第三將欲廢之必固興之者攝其欲也第四將欲奪之必固與之者攝其貪也夫心廉則道𢍆心侈則過生因侈獲過自思獲其廉矣此歙歛其心之權矣性弱則德全性强則禍起因强起禍自思復其弱也此伏性挫强之權也寡欲則行清多欲則神濁欲深濁極自思復其清矣此廢欲清神之權也不貪則儉約極貪則殃身因貪獲殃自思復其儉矣此修儉奪貪之權也皆先極其侈心使自困於貪欲然後反性修道也乍聞者以爲非無爲自化之㫖然性有利鈍之别悟有漸頓之殊頓悟者不假於從權漸化者須資於善誘乃有權實之别爾權道教人合歸乎大義故云貴於合義也小人輕弄權道因其詐欺故不可以輕示於非道之人矣論語云可與立未可與權言用權之難也陰符曰君子得之固窮小人得之輕命此之謂歟是謂微明注經云正言若反易云巽以行權權反經而合義者也故君子行權貴於合義小人用之則爲詐譎孔子曰可與立未可與權矣故老君前章示執大象斯謂之實此章繼以歙張是謂之權欲量衆生根性故以權實覆却相明令必致於性命之域而惑者乃云非道德之意何其迷而不悟哉故將欲歙歛衆生情欲則先開張極其侈心令自困於愛欲則歙歛矣强弱等義略與此同此道甚微而效則明著故云是謂微明爾䟽權道攝化其理甚微校其所中效則明著故云是謂微明義曰權道至微用之則明校量其效可謂彰顯矣著明也夫聖人屬念上士遊心玄𢍆無爲冥符至道而權實之教安所用哉所以權教之設爲中下之智耳亦猶用兵之道也上智伐謀制敵不在於興師坐籌决勝折衝千里而下智昩於機變必俟交兵上决頸領下剖肝肺然後方知勝負之勢徐議進退之方如此昩於變通必須示其權法因權變正可謂無棄於人矣巽以行權可與立之義已具别解柔弱勝剛强注巽順可以行權權行即能制物故知柔弱者必胜於剛强矣䟽易云巽以行權欲明巽順謙卑則可以行於權道故欲翕先與之張欲弱先與之强而卒令其歙弱者是柔弱之道能制勝於剛强也故云柔勝剛弱勝强義曰易下繫云巽以行權巽順也既能順時合宜故可以行權也若不能順時制變則權不可行矣夫巽者齊也順也東南之卦春夏之交斗柄東南萬物潔齊矣巽主申明號令以示法制故云巽德之制也又巽主於風帝王號令猶風之行教能稱揚號令而不彰伐以自幽隱故曰巽稱而隱以是言之巽有柔順潔齊幽隱不伐具此四德復能發號施令應變制宜方可行於權道由此而論權道不可輕而議之也若合義能行則可以化惡爲善興國利民不能者則害性傷身卒爲詭詐矣人君教獷惡之人以權制變然更守以柔弱示之謙和則剛强之人咸遵其柔德矣魚不可脱於淵國有利器不可以示人注脱失也利器權道也此言權道不可以示非其人故舉喻云魚若失水則爲人所擒權道示非其人則當竊以爲詐譎矣䟽脱失也利器權道也夫魚之在水猶人主秉權魚失水則爲人所擒權道假示非其人則爲小人所竊弄而爲詐譎矣義曰魚之處淵也失水則死得水則生人君用權道也得其人則爲善失其人則爲敗魚能潜深潭匿巨浸不貪餌不吞鈎則無失水之憂也人君能任賢良委忠正斥奸佞塞回邪則無失權之歎矣魚失水則爲人所擒君失權則小人得志竊人君權道而弄之者必反白以爲黑反善以爲惡肆其奸邪縱其殘酷所以竪牛之廢嫡立庶傾陷於穆子之家趙高之疾正害忠隳亡於秦祖之業民罹其禍人怨其君民散國危不可以救矣說文曰詐欺也譎者謬欺於天下也譎者春秋晋文公使楚怒而戰乃執曹侯卑於宋楚果伐宋文公因而戰楚楚師敗績文公復召周襄王於河陽以諸侯見且使王狩故大合諸侯而欲以尊事天子以爲名義自嫌强大不敢朝周喻天王出狩因得盡君臣之禮皆譎而不正之事也仲尼曰以臣召君不可以訓故書曰天王狩于河陽非其地也若此尚謂之譎謬况奸臣小人弄權欺主得不戒而自悔乎修道之士内正其心外正其行内外惟一貞正無邪然後屬心動念可以昭感眞靈如其言行相違邪而不正雖屈伸俯仰外飾其容信無益矣道常無爲章第三十七䟽前章明道或用權示以歙張之術此章明權必合義將鎮無名之樸故道無爲侯王守之而自化樸不欲天下以靜而自清老君因言以明無言說教而欲遣教故演暢此章於上經之未將寄兼忘於玄悟之人爾義曰人君之理天下也以實教齊君子以權教伏小人以無爲之道統權實二教以爲化本夫實教者君君臣臣父父子子禮樂仁信以正萬方人君與君子服而行之垂法四海小人者進不親於仁義退將陷於刑章若不以權道誘之改惡爲善因而淪喪斯爲棄焉老君曰人無棄人故設權道教之亦使歸善兼濟天下皆可復朴矣朴者妙本之道也侯王守而用之萬物自化設欲變易常以無爲鎮之則天下靜而正矣修道之士聖人以玄功難懋世欲易迷設科戒儀範之文用齊其外著注念神凝之法以正其心復以鍊氣胎元之方制其食味祈眞朝謝之品滌其過尤然後趣於學無學之途臻乎冥寂栖於損之又損之府契乎無爲則邪謫之關之不開鎮靜之淳和可致道常無爲而無不爲䟽道性清靜妙本湛然故常無爲也萬物恃賴而生成有感而必應故無不爲也夫有爲者則有所不爲也故無爲者則無不爲矣義曰道性無雜眞一寂寥故清靜也玄深不測如彼澄泉故湛然也寂然不動無爲也感而遂通無不爲也無爲者妙本之體也無不爲者妙本之用也體用相資而萬化生矣若扣之不通感之不應寂然無象不能生成此雖無爲何益於玄化乎若復循迴不息動用不休役役爲勞區區無已此之有爲也何所寧息乎當在爲而無爲以制其動在無爲而爲以檢其靜不離於正道無滯於回邪可與言清靜之源矣侯王若能守萬物將自化注妙本清靜故常無爲物恃以生而無不爲也侯王若能守道無爲則萬物自化君之無爲而人淳朴矣䟽侯王若能守道清靜無爲無事則萬物將自感化君之善教而淳朴矣義曰君王理萬方諸侯率一國俱能用無爲之道清靜之化萬物化於下侯王靜於上可謂至理矣教而後化是從而化也不教而化是自化也教而化者無不爲而能化物也不教而化者無爲而自臻於化也化而欲作吾將鎮之以無名之朴注人既從君上之化已無爲清靜而復欲動作有爲者吾將以無名之朴而鎮靜之無名之朴道也䟽無名之朴道也欲作者動作有爲也吾者侯王自稱也言人禀承善教以化君德無爲清靜矣而復欲動作有爲者吾則將以無名之朴以鎮靜之令其清靜不動作也義曰夫應用則爲道道有强名也攝迹復歸朴朴無名也侯王以道化人人禀其化皆清靜矣若復他境所牽人欲動作者侯王復以道之妙本無形無名之至朴鎮靜其心不令有爲動作常合於道化清靜也人之修道融心寂神已有通感而世塵妄起外念忽生將超躁競之途或溺是非之境即可急詣靜室思玄念眞以無爲之道鎮其心靈制於妄想如水之濁徐以澄清則三尸不能干百邪不能擾魔試都息造於虚無之階矣無名之朴亦將不欲䟽上言凡人欲動作有爲者人君則將無名之朴而鎮靜之今言於彼無名之朴亦將不欲者夫所以鎮無名之朴爲衆生興動欲心若復執滯無名還將有迹令此衆生尋迹喪本復入有爲則與彼欲心等無差别義曰凡人既化清靜而復動作有爲以積習生常沉迷日乆亦猶水難清而易濁性難澄而易昏心難靜而易動志難乆而易退人君當以妙本之朴鎮而靜之亦既靜矣又當兼忘所執都令泯然則冥寂玄通洞達眞妙是令衆生不滯於迹聖人不滯於空空有兩忘盡登正觀矣䟽故初用無名之朴以鎮靜蒼生欲心蒼生欲心既除聖人無名亦捨喻如藥以理病病愈而忘藥舟以濟水水濟而遺舟若水已濟而仍守舟病已除而復嘗藥豈唯不達彼岸亦復更生患累矣義曰既已靜於人性復能遣其無名如既濟而忘舟病愈而忘藥可謂達眞修之要矣夫舟藥者喻言教也衆生輪回世網迷惑有無漸染六塵牽縁衆惱而爲病也老君演無爲之訓叙弘救之功以此眞經爲理病之良藥因經開悟迷惑自祛洗内染之塵絶外牽之惱積病既愈世網盡除然須遣教忘言混融歸道矣又以世間衆惱生死輪迴流浪眞元漂沉正性有如巨海陷溺衆生逐境隨波無由超度老君以此經玄妙理國濟人於憂欲海中拯拔群品因經得濟如乘巨舟橫截迅流超登彼岸欲波不能蕩其性愛浪不能溺其心出積苦之庭踐長生之域既已濟矣然當忘所乘之舟捨所執之行栖神無何之境遊心自得之鄉是可謂虚而保眞清而容物人貌而天泛然皆順獨任自然矣若執所乘之舟保所餌之藥不達而生患豈虛言哉不欲以靜天下將自正注言人君既以無名之朴鎮靜蒼生不可執此無名而令有迹將恐尋迹喪本復入有爲故於此無名之朴亦將兼忘不欲於無欲無欲亦忘泊然清靜而天下自正矣䟽夫無名之樸既將不欲不欲之欲於此亦忘則泊然清靜是名了出君無爲而上理人遂性而下化不煩教令而天下正平故云天下將自正義曰衆生動作之心既已靜矣而又忘舟藥之喻仍遣無名之朴不欲之欲亦復都忘是則了出有無曠然不滯君於上也不言而自信人於下也不化而自行不言而信是無爲而上理也不化而行是遂性而下化也化及於此何教令之有哉天下正平可復於太古之道矣理身者因教而眀道悟道而忘言不爲譽故無怨不爲利故無害理心術理好憎適情性不惑禍福不妄喜怒混然與大道冥通而忘其所習遣其所執心寂於中神化於外修於無修學於無學得於無得可謂明眞經之玄賾窺大聖之堂奥矣上經法天故奇有三十七章此章居其末更復顯明至道妙用重訓人君侯王明此微言可臻於了悟矣道徳眞經廣聖義卷之二十九
