front:
  text: 道德眞經廣聖義卷之四十三行六
  hash: sha256:d45995aa17465cbfd597dde5b83074d49ce22f39bac100ed8b89b2dff24bfa4e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0114_HFL_044-001a, image: hfl/0447/0447-162.png}
body:
  text: 唐廣成先生杜光庭述爲無爲章第六十三䟽前章眀妙本沖奥坐進是輔相之門此章明玄默無爲息怨成修證之行首標坐忘絶欲次示杜患防萌後是以下舉聖人之德以申結勸爾義曰前以不貴璧馬之翫進道爲理化之源頓悟即通玄通玄即無咎此乃無爲無事味道守常自無怨嫌寧勞德報不爲難大輕寡之過故合道以無尤此欲使人君貴道而體無爲率身而弘清靜也爲無爲事無事味無味疏爲造作也修道行人坐忘去欲心無造作凡所施設功與化冥於爲非爲故曰無爲此明心也即事不滯故於事而無事此明身也即味不耽故於味而無味此明口也三業既净則六根塵自息矣義曰夫人之禀生即有三業心業所起有用而無形凡所作爲起於心也無爲則心業淨矣身業所起有用而有質所執之事關於身也無事則身業净矣口業所起有言有味故所知之味非道之言由於口也無味忘言則口業净矣既無三業自息諸塵塵累清靜脗契眞道此行人所修爾夫理國之無爲者不滯於有作則三時不奪萬姓不勞垂拱握圖超然宴處矣無事者不勤力役不務軍功無瑶臺瓊室之華無阿房虎祁之麗則卑宫茅宇人力存矣無味者不酣於酒不味於珍飛走遂其生水陸全其命菲食自安矣忘言者正身化下言令不煩澹爾無營兆人自化如此則符於無爲之道也大小多少報怨以德注於爲無爲於事無事於味無味假令大之與小多之與少貺不越分則無與爲怨若逐境生心違分傷性則無大無小皆爲怨對今既守分全和故是報怨以德䟽夫大小之爲多少之事苟涉有爲之境無非怨對之讎若能體彼無爲捨兹有欲悟眞實相無起滅心自然怨對不生可謂報怨以德義曰人君於爲不爲於事無事恬然自得獨與道游下無怨咨邊無戈甲設有肆逆必自馴柔舞干羽而格有苗斯乃報怨以德矣修身者三業既净衆惡不生物莫能干豈有怨怒既無怨怒專任清虛亦乃報怨以德也圖難於其易爲大於其細注肆情縱欲者於爲無不難於事無不大今欲圖度其難營爲其大當須於性未散於其分未越則是於其易細矣䟽圖謀度也爲營也夫情欲傷性皆生於漸無不始於易而終成難初於細而後成大若謀難於難爲大於大禍亂已作縱欲圖而爲之將無益於患難也義曰無事無爲固不爲難大之事矣皆萌心之際已息機縁貺不爲之於大於難不俟制之於細於易此理心則虚寂理化則安貞也天下難事必作於易天下大事必作於細注明上文所以預圖爲也䟽作起也此疊上文原禍難之所起難事必起於易欲令於易而圖之大事必起於細欲令於細而去之其類寔繁不可具舉故以天下而總言之爾義曰防禍於未兆絶患於未萌慎之至也夫病生於稍稍禍起於微微早爲之防寧有難大之患矣普言天下者欲使動靜防微也是以聖人終不爲大故能成其大注因云大事必作於細將眀聖人所以能成大者以不爲難事大事故能成其尊大爾䟽前明凡人常爲難大之事故改作多敗多難是以舉聖人終不爲難大之事故能成其尊大義曰凡人觸途徇境屬念成非難事成而過不可除大事搆而罪不可解聖人了知虚妄洞達眞常終不爲大爲難故能證於尊大夫輕諾必寡信多易必多難注輕諾許人必寡於信動作多易後必多難䟽此結喻也夫不三思而後言輕易於然諾者必少忠信不謀始而慎終多易行其事者後必生難而爲患累義曰立身之先忠信爲首慎終如始禍患莫侵若輕以許人易爲行事患累所及理亦信然所以解揚無貳命仲由無宿諾古今美之是以聖人猶難之故終無難注難爲輕諾多易故終無難大之事也䟽聖人即有道之君也猶難之者難爲輕諾多易故終無難大之事爾義曰有道之君修身之士不爲輕諾之約重靜以循常不興多易之心恬和而應物所以於國則咸服誠信於身則外息過尤自絶難大之瑕以契無爲之道矣其安易持章第六十四䟽前章明無爲玄默示息怨修道之門此章明思患預防標絶情去欲之行初六句迭明防患之漸次六句舉喻生患之由復兩句論爲執之迷又六句申異凡之行後七句推聖人不欲不學之意觀凡俗易持易謀之心義曰前章戒二爲之難自無患累此乃明四易之行周勸精修戒慎其纖微忘遣其爲執將表聖人之行以塞衆民之非至於欲學皆除貴愛不染以叶後章善爲道之㫖爾其安易持䟽安靜也持執也言人之受生正性清靜感物而動則逐欲無窮今明欲心未動安靜之時將欲守之令不散亂則易持執故云其安易持義曰夫正性安靜嗜欲未萌就而守之執持爲易絶堅冰於履霜之際理固非難復推輪於大輅之前樸猶可睹任乎修鍊用含眞常爾感物而動者禮記樂記篇之詞其未兆易謀注言人正性安靜之時將欲執持令不散亂次雖欲起心向未形兆謀度絶之使令不起甚爲易爾䟽兆萌漸也謀度也情欲將起未有萌兆謀度絶之亦爲甚易故云其未兆易謀義曰欲之將萌未有形兆謀度除絶其易可知然而明在於察微能在於杜欲察而能杜善莫大焉其脆易破䟽言欲心已動柔脆未堅將欲除之易消破也義曰欲兆貺彰未成堅執破柔攻脆於理非難在於斷自誠明復其純粹爾其微易散注欲心初染尚自危脆能絶之者脆則易破禍患初起形兆尚微將欲防之微則易散爾䟽微細也禍患細微未至於大防之於初欲令散釋亦甚易爾義曰欲既堅成事猶微細抑情以解散挫欲以安排滌慮洗心去道非遠此上四句通明防微之行言理國理身之道防患慮禍爲先禍成而救之患成而攻之用力益多而禍患未可除也爲之於未有注覆上易持易謀也所以易者爲營爲之於未有形兆爾䟽爲修除也此一句釋前易持易謀兩句也所以易者明欲心未起之時修除杜絶則欲惡不生故云爲之於未有義曰爲者爲之防也防患於未然雖覆釋易持之意亦旁演防未然之㫖文選詩曰君子防未然此所謂防患避嫌也治之於未亂注覆上易破易散也所以易者除之於未成禍亂也䟽此一句釋上易破易散兩句也所以易者明欲惡雖有尚自脆微未成禍亂故易理爾義曰理者救理也嗜欲之生亂於正性正性將復理之爲先於理貺明禍亂息矣此雖覆釋易破易散之義亦存救理之㫖此六句約之於身以欲心興起之漸修行制伏之門割欲違情却禍除患是矣語之於國則安不忘危其安易持也理不忘亂理之於未亂也慮患於冥冥爲之於未有也慎禍於細微其微易散也防萌杜漸其未兆易謀也興小善去小惡其脆易破也勿以小善爲無益而不修勿以小惡爲無傷而不去以斯六者蓋理國之要焉合抱之木生於毫末九層之臺起於累土千里之行始於足下注此三者喻其不早良圖使成後患也䟽此言患生於微而成於著喻如合抱之木始生如毫毛之末此明自性而生也九層之高臺起乎一簣之土此明積習而成也千里之遠行始於舉足之下此明遠行不止也則天下之事誠以細微爲始而人多忽之遂成患本故舉三喻以證上文義曰人之所以不防患國之所以不慎微禍形而務除亂成而務理此皆失之遠矣毫末至於合抱自小而成大也累土成於層臺自下而爲高也千里始於舉足自近而及遠也世人但見合抱之大層臺之高千里之遠方欲執柯以伐之聚以壞之馳騖以追之勞亦云甚禍不可救亦猶倚都門而長嘯終亂晋朝崩沙鹿以貽祅幾傾漢室默識遠鑒所宜留神矣爲者敗之執者失之注凡情不能因任營爲分外爲事求遂理必敗之於事不能忘遣動成執著執者求得理必失之䟽爲謂營爲也執謂執著也言人不能爲之於未有理之於未亂而更有所營爲於性分之外執著於塵境之中故必禍敗而失亡也義曰世人不能知道妄動營爲非道營爲必至隳敗或妄於教體執著有無不能任以自然守常知分有執必失有爲必敗此乃常理也欲使化理之君無爲則無敗修道之士無執則無失也是以聖人無爲故無敗無執故無失䟽聖人無爲安靜故素分成全而無敗虚忘無執故眞性常存而無失義曰聖人知有爲乖道無爲故無敗知有執違眞無執故無失是知冥寂其心混通於道道尚虚寂修道之士當宜體聖人之心恬神安漠不思不慮無營無爲然後虚室生白矣民之從事常於幾成而敗之注人之始從事於善者常於近成而自敗也䟽幾近也言常俗之人從於善事常以功業近成不能慎終乃復忘敗也義曰世態紛綸眞心難固嗜欲牽役妙道易忘始從事而立功忽進退而生惑亦縁有爲有執所以敗於垂成爾慎終如始則無敗事注慎其終末常如始從善之心則必無禍敗之事䟽此老君重申勸戒也人若能慎末如初始終常一則其事無敗也詩云靡不有初鮮克有終義曰修道之人不能委心順道分外營爲執著即喪眞有爲則隳敗故云修道如初得道有餘弘道無已自致不死蓋愍其初勤中怠誠不終也末常如始從善不移者難矣故重戒之靡不有初者詩大雅蕩之什也此言民初教之以誠信忠厚今則更化於惡俗言其爲善者不能終靡無也鮮少也克能也是以聖人欲不欲不貴難得之貨注難得之貨謂性分所無者今聖人於欲不欲不營爲於分外故常全其自然是不貴難得之貨䟽此明聖行以斥凡也難得之貨内謂性分所無外謂珠犀寳貝聖人於欲無欲内不務於性分之無外不營於累德之寳故云不貴難得之貨爾義曰大聖之行迫出塵煩愛欲不能干榮枯不能迫外無潤屋之望内無越分之求將勸理國之君惟賢是寳欲使修眞之士惟道是從矣珠者大或徑寸光照十二乘乃古人之所貴也犀者南徼之外有牛重千餘斤一角在鼻端可以爲寳中斷其角有文通達成形象者有辟塵者有辟水者磨而服之可解蠱毒之疾雞見之夜驚故曰駭雞犀亦今古所貴也寳者金玉珍異草木毛羽衆所奇重者皆曰寳焉貝者出東海中如螺有文有長尺者可以爲寳在海爲介蟲居陸名猋在水名蜬甘音古者貨貝而寳龜周有泉貝到秦廢貝而行錢貝字者象形也今凡貨賄贈賚賞賜賝賮凡財之屬皆從貝矣古詩曰積財爲累愚明財多累德也古有三幣珠玉爲上黄金爲中刀布爲下帝王以之御四海也學不學復衆人之所過䟽凡夫貴難得之貨故矯徇務尚以學性分之所無聖人不求過分之學常全自然之性是於學不學如此者將欲歸復衆人所過分之學爾義曰聖人心冥太虚道貫天地固不營過分之學所以戒學於不學是戒凡夫矜徇之求耳行人能晤聖㫖絶此矜求即無越分瀆財之過矣以輔萬物之自然而不敢爲注聖人不求過分之學是於學不學將以歸復衆人過分之學以輔其自然之性故不敢爲俗學與多欲也䟽輔佐也自然物之性本也衆生起妄失於性本聖人慈誘勸學無爲將以輔佐物之自然眞性故不敢爲於俗學與多欲也義曰俗學蔓衍難復於無爲多欲紛綸必迷於正性聖人令學不學以敦素欲不欲以恬愉漸窺正道之光用輔自然之性不貪難得之貨不務過分之能自敗而反成慎終其若始察微防害復於易持之安國所以晏寧身所以貞固然後可擬於古之善爲道爾道德眞經廣聖義卷之四十三
