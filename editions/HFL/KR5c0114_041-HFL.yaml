front:
  text: 道德眞經廣聖義卷之四十行三
  hash: sha256:e58a349bc28e7cb68f58b42af52931ef4a3b76453624ea9daff26295763166a5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0114_HFL_041-001a, image: hfl/0447/0447-070.png}
body:
  text: 唐廣成先生杜光庭述以政治國章第五十七䟽前章明悟道之士能了言而無執此章明以政之君失無爲之自化首三句標門以示義次十句設問以明理後五句反無事可以取天下爾義曰理國以政其迹必彰用兵以奇其詐非道不若無事以聚萬方其或多忌諱廣機權縱淫工明法令去道殊遠而國益危惟可以無事臨人去欲歸靜兵革不用奇詐不施政令不煩刑法幾措此章之大義也以政治國疏此下三句並標宗也以用也政教也言有爲之君矜用政教而欲爲理不能無爲任物自化欲求致理未之前聞也義曰以道理天下者不言而民信不令而民從不刑而民威不賞而民勸夫何故哉民化其上皆歸於善不在賞而勸也民禀於和自革其惡不待刑而威也民復樸素不待令而從也民齊貞正不待言而信也此無言教而理矣以言教理民渉有爲也非道也哉以奇用兵疏奇變詐也不祥之器君子惡之況加變詐之名而無節制之用是兵猶火也不戢將自焚故知奇變之兵非制勝之道也義曰以奇詐而用兵乖於大道何者國以政刑爲本政在於簡易因循兵以變詐爲先變在於應權合理政失於道則刑賞濫詐失於道則殺害多濫刑賞以爲功恣殺害而求勝而欲興邦致理不亦難乎與夫任物自化有征無戰遠矣兵猶火者春秋隱公四年春衛公子州吁弑其君完初衛莊公娶干齊東宫得臣之妹曰莊姜美而無子衛人爲賦碩人之詩娶于陳曰厲嬀生孝伯早死其娣戴嬀生桓公莊姜以爲己子公子州吁嬖人之子也有寵而好兵公弗禁莊姜惡之石碏諫曰臣聞愛子教之以義方不納於邪驕奢淫佚所自邪也四者之來寵禄過也將立州吁乃早定之若猶未也階之爲禍夫寵而不驕驕而能降降而不憾憾而能修者鮮矣且夫賤妨貴少凌長遠間親新間舊小加大淫破義所謂六逆也君義臣行父慈子孝兄愛弟敬所謂六順也去順效逆所以速禍也君人者將禍是務去而速之無乃不可乎弗聽石碏之子厚與州吁遊禁之不可桓公立碏乃老二月戊申州吁弑桓公而自立將修先君之怨於鄭而求寵於諸侯以和其民使來告於宋曰君若伐鄭以除君害君爲主弊邑以賦與陳蔡從則衛國之願也宋人許之於是陳蔡方睦於衛故宋與陳蔡衛伐鄭圍其東門五日而還宋公乞師於魯魯辭之隱公問於衆仲曰州吁其成乎對曰臣聞以德和民不聞以亂理亂理亂猶理絲而棼之也夫州吁阻兵而安忍阻兵無衆安忍無親衆叛親離難以濟矣夫兵猶火也不戢將自焚夫州吁殺其君而虐用其民不務令德而欲以亂成必不免矣州吁未能和其民厚問定君於石子石子曰王覲爲可曰何以得覲曰陳桓公方有寵於王陳衛方睦若朝陳使請必可得也厚從州吁如陳石碏使告于陳曰衛國褊小老夫耄矣無能爲也此二人者實弑寡君敢即圖之陳人執之而請莅於衛九月衛人使石宰醜殺州吁于濮石碏使其宰獳羊肩殺石厚于陳君子曰石碏純臣也惡州吁而厚預焉大義滅親其是之謂乎所謂子從殺君之賊國之大逆不可不除故云大義滅親明小義則兼愛其子也以無事取天下注在宥天下貴乎無爲若以政教理國奇詐用兵斯皆不合唯無事無爲可以取天下此三句標也䟽此示標也有道之君無爲而理夫無爲則無事無事則不煩不煩則百姓自化而天下太平矣義曰政教理國奇詐用兵豈若無事無爲而化天下民聚國泰以致和平也吾何以知天下其然哉以此注以此下文知之䟽吾何以知發問也其然猶如是也以此答也老君詳問我何以知取天下必須無事以下文云多忌諱則人彌貧我無爲而人自化驗可知矣義曰以政教求理以奇詐用兵固不可以致理矣上多忌諱下多利器奇物滋起法令滋彰皆非太平之本唯無事無爲乃可化物以此觀之理亂之道昭然矣天下多忌諱而民彌貧注以政理國動多忌諱人失作業故令彌貧䟽此覆釋以政理國也爲天下之主不能敦清靜以化人崇簡易而臨物政煩網密下人無所措其手足避諱無暇動失生業日就困窮所以彌貧也義曰上多忌諱謂法令多門也動有拘於忌犯則獲罪民不聊生怨叛憂虞農桑隳廢故其民彌貧釋曰無財曰貧君上無爲法令寬簡人無拘忌適性自安鑿井耕田以飲以食故民富而國昌矣人多利器國家滋昏注利器謂權謀也人主以權謀爲多不能反實下則應之以詐譎故令國家滋益昏亂也疏此釋上以奇用兵也利器者權謀也夫權道在乎適時不得已而方用人君若多用權謀不能反實不必應之以詐譎故云滋益昏亂義曰昏亂不明也君好奇變民尚欺詒上下交詐正道不明故爲昏亂也人多伎巧奇物滋起注人主以伎巧爲多不能見素下則應之以奢泰故令淫奇之物滋起䟽伎能也巧工巧也奇物謂刻鏤雕琢寳貨珍玩之屬言人君不尚淳朴而好浮華百姓效上而爲奢泰馳競淫飾日以繁多也義曰淫巧悦目珍奇蕩心上躭玩而不除下增飾而彌甚華侈貺作朴素遂忘固可戒矣春秋丹桓宫之楹刻桓宫之桷書而譏之臧文仲山節藻棁亦以爲過蓋欲人君尚於儉素也法令滋彰盜賊多有注無爲既失法令益明竊法爲奸盡成盜賊豈非多有乎䟽法刑法也令教令也君嗜欲以御人而欲彰法令以齊物人既苟免而無耻竊法而爲奸上下相蒙故令盜賊多有矣義曰法令所以齊於民也令煩則民姦生矣奸詐既作盜賊日多謂之亂政禮運曰大道既隱天下爲家城郭溝池以爲固禮義以爲理故謀用是作而兵由此起法令滋彰盜賊多有春秋曰夏有亂政而作禹刑殷有亂政而作湯刑周有亂政而作九刑三辟之興皆叔世也民是以亂免而無耻者論語爲政篇孔子曰導之以政齊之以刑民免而無耻言爲政者導民以法制齊民以刑罰民畏威苟且百方巧避求免脱罪辟而不暇避於耻辱故注云苟免罪也民既免而無耻必假竊法制以爲奸詐則弄法舞文害於人矣莊子云大盜之生則並竊聖智之法而盜其國況於盜賊乎蒙蔽也竊法作奸下欺其上上害其下上下相蔽恩化不行大亂之本也故聖人云我無爲而民自化䟽此釋無事以取天下也我謂聖人也夫聖人之德不尚伎巧體道之主所貴無爲無爲之爲無所禁忌下化上之無爲故云而人自化義曰人化無爲自歸於理也夫有爲則多事多事則政煩煩政事多而民愈亂無爲則事簡事簡則政清政清事簡而人不待教令而化於善也我無事而民自富䟽上無賦歛下不煩擾耕田鑿井家給人足故云而人自富也義曰多財曰富君無勞民之事民得勤而耕農農功不妨穀稼豐瞻故人富也鑿井耕田者古詩云鑿井而飲耕田而食此言唐堯在上人遂無爲不知上之有君不知君之養己自飲自食無患無憂所以家自給而人自足也我好靜而民自正䟽人生而靜天之性也上好安靜無以動摇則下被君德率性而自正也義曰禮云人生而靜天之性也言人之禀生本乎道氣六塵未染六欲未侵任以元和體乎澄靜及貺孩之後愛惡生焉喜怒形焉若人君靜以理之天下之人復歸簡易則自清而正也我無欲而民自樸注無爲則清靜故人自化無事則不擾故人自富好靜則得性故人自正無欲則可全故人自樸此無事取天下也䟽人君誠能内守沖和外無營欲則下之感化自淳朴矣義曰人君無欲於物物遂其宜無欲安民民自朴素此自然之理也理身之道莫大於無欲知足理國之道莫大於無事無爲誠能實而行之身泰而國理矣又一本有兩句云我無情而民自清此亦義理相符而御註闕之故輒詳載於此其政悶悶章第五十八䟽前章明以政之君失無爲之自化此章明以政必敗示禍楅之所由初標二政寬急不同次明禍福二門倚伏無準人之迷下致衆生之迷執是以聖人下舉聖德以勸修爾義曰前明以政以奇用兵理國法令伎巧率下化人既非無爲是皆資亂此又明悶悶之政爲是察察之政爲非執於善則善反爲妖執於政則政反爲譎所尚者在於無滯無執不有不爲不割不穢不肆不耀而能祛乆迷之俗也其政悶悶其民淳淳注政教悶悶無爲而寬大人則應之淳淳而質朴矣䟽悶悶無心寬裕也淳淳質朴敦厚也言無爲之君政教寬大任物自成貺無苛暴故其俗淳淳而質朴矣義曰政簡則人淳人淳則務省務省則刑罰不用賞勸不勞君拱默而任賢臣因循而順物國泰無爲之理漸於兹乎苛者法細而急也暴者不令而刑也夫先令而後刑民知教矣法簡而事緩民知禁矣苟犯其禁而後加刑則刑一人而千萬人懼矣朝令夕刑民未知法得非暴乎況不令而刑害人甚矣其政察察其民缺缺注政教察察有爲苛急人則應之缺缺然而凋弊矣䟽察察有爲嚴急也缺缺凋弊離散也有爲之君其政峻急以法繩人法令滋彰盜賊多有故人則凋弊而離散矣義曰政刑則民亂民亂則國殘凋散之事漸於兹矣素書曰國將衰者人先弊根枯則枝朽人困則國殘固當寬政養人而康其國也察察者伺人之過强明而急也缺缺凋敗不全傷和害物也禍兮楅所倚福兮禍所伏孰知其極注倚因也伏藏也上言其政悶悶俗則爲無政理之體人乃淳淳然而質朴此禍爲福之所因也其政察察俗則以爲有政理之術人乃缺缺然而凋弊此則福爲禍之所藏矣䟽禍兮福所倚者前言悶悶之政俗以爲惡而人反淳淳質朴敦厚豈非福因倚禍中而生也福兮禍所伏者伏藏也察察之政俗以爲善物却缺缺而凋弊豈非禍伏藏福中而發也孰知其極者夫失道喪德習僞尚華故禍福循環倚伏無準誰有知其窮極者義曰天地有休否日月有虧盈此倚伏之數也禍藏福中福極則禍至福隱禍内禍盡則福來拘彼俗纏此爲常矣惟有道之士上德之君抱道體和陰陽不能制全眞反俗善惡不能移故禍不能加福不能利超然出得喪榮衰之外矣夫以國言之亦賢哲不能料倚伏不可窮齊有仲孫之難而桓公興遂霸其國晋有里克之難而文公起乃統諸侯是二國因禍而昌也衛方寧靜狄人滅之邢方晏安衛人滅之是二國無禍而喪也故伏藏因倚莫知其極故春秋云有禍而啓其疆土無禍而喪其守守不可知也其無正耶䟽此言禍福之極豈無正定耶但由於人不能體道無爲妄生迷執失其正爾義曰常俗之人惑於禍福寵至則喜辱至則驚愈失其正致爲妖祥矣豈知側身修德雊雉不足以貽灾垣慮忘懷失馬未必以爲禍悔吝無準召之由人爾正復爲奇善復爲妖注禍福之極豈無正耶但衆生迷執正者復以爲奇詐善者復以爲妖祥故禍楅倚伏若無正爾疏此釋迷正所由也言衆生迷於禍福正處於正不明以正者爲奇詐於善不了以善者爲妖祥故若無正爾義曰修道之要在乎應變無心方圓任器不滯於禍福不惑於正邪滯於福則善復爲妖矣惑於正則正復爲奇矣帝王乘時任人隨才適用求正過切矯正者必來求善過切矯善者必至若虚心無滯推公任賢奇詐妖祥幾乎息矣民之迷其日固乆注以正爲奇以善爲妖如此迷倒其爲日也固已乆矣䟽此歎衆生迷於正善反以爲奇爲妖其所由來尚矣故曰其日固乆矣義曰俗之迷妄積習生常爲日且乆終不開悟老君歎彼群迷丁寧垂訓將以祛其迷也迷謂失方也夫不爲禍福所惑不爲邪正所拘曠蕩乎襟靈均齊乎得喪則何正善之能迷其方哉是以聖人方而不割䟽方由正也此舉聖德以勸修聖人弘道濟代萬物向方身行正方物則應之以自正非立言教裁割於物使從己也義曰聖人正方以約己人自正方以從化夫人貺失其正所以迷方由邪正不分禍福所撓爾聖人於禍無辱於福無榮不矯正以飾其心不徇邪而溺其志卓立物表允執大中則人皆向方從其正也廉而不穢䟽廉清廉也穢濁也聖人率性清廉自然化下非穢彼之濁以揚其清有本爲劌劌傷也聖人廉以成行不傷於物義曰聖人清廉以澡身人自廉潔以順教豈復滓穢乎世人行教令也制之以法威之以刑勸之以利誘之以賞而人順其教者十無二三矣今聖人不以賞刑不以法制但清其己廉其行人自化之豈俟宰割正方而後知勸也直而不肆䟽肆申也聖人之行不邪彼自從而正直非爲彼之不正而申直以正曲義曰聖人自然正直故非申而正之以正直率人人自清正所以上下俱正而天下正矣若上行回邪下爲諛誷何因正哉尚書冏命曰僕臣正其后克正僕臣諛其后自聖此由臣之不正以佞於上也春秋曰其身正不令而行其身不正雖令不從此申上化下以成其邪正也光而不耀注聖人善化不割彼以爲方不穢彼以爲廉不申彼而爲直不耀彼而爲光修之身而天下自化矣䟽光者謂明智也聖人雖有明智而韜晦之不以炫耀故云光而不耀聖德如此自然百姓淳淳而從化也義曰聖智光明非强炫耀也此四者皆聖人之行借以開喻於人以此而王天下乃可稱其聖德然大㫖在乎知吉凶倚伏祅奇不常韞廉方而内明含光直而内照棄嚴暴之事澄寬裕之懷既除迷固之由自叶希夷之妙也道德眞經廣聖義卷之四十
