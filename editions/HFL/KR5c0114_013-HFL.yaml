front:
  text: 道德眞經廣聖義卷之十二十三同卷羊二
  hash: sha256:24b621e291599c298969b5388aa61d69d38332863506a97c6f9a74417964165d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0114_HFL_013-001a, image: hfl/0442/0442-042.png}
body:
  text: 唐廣成先生杜光庭述五色令人目盲章第十二䟽前章明利有用無相資故功立此章明染塵逐境馳騁即發狂首標色聲滋味戒傷當所以爲病次云畋獵貪貨明逐欲所以焚和結以聖人去取示全眞保性之要爾羲曰前章明利有用無此章戒用之太過色聲之所以養耳目也過之則盲聾食味所以養身也過之則爲病况復馳騁貪貨甚於三者之傷耶且耳目口之所急待之以養命不可去也尚欲損而去之馳騁貪貨非性命之急而欲害甚於聲色味而不能去是迷之甚矣老君明此使内去外損以爲理國理身之要㫖爾五色令人目盲五音令人耳聾五味令人口爽注目悦青黄之觀耳耽宫徵之音口嗛芻豢之味傷當過分則坐令形骸聾盲爾䟽五色謂青黄白赤黑音謂宫商角徵羽味謂甘苦酸鹹辛爽差也目視色耳聽聲口察味傷當過分則不能無損故坐令形骸聾盲爽差失味也義曰五音者按漢劉向曰宫者中也君之德也商者章也物成章也角者甲也物之發生也徵者祉也物之盛大繁祉也羽者聚也物聚而藏也五色者按王叔師曰皎皎練絲得藍則青得丹則赤得蘖則黄得皂則黑而爲五色也目不見五色謂之盲五色之設本以彰五行之象别尊卑之飾翫而滯之匪曰盲乎耳不聞五聲謂之聾五音之設本以通天地之氣彰五行之聲悦而滯之不曰聾乎口不辯五味謂之爽五味之設本以彰五行之和以養於人美而耽之不曰爽乎姚信士緯曰五音成而鄭衛作五色成而綺縠生傷當過分内以致疾滯而不已外以害德雖不傷於視聽無廢於飲食其於滯著不移亦同乎病也易頤卦辭曰慎言語節飲食斯亦戒之㫖也春秋富辰諫周襄王曰耳不能聽五聲之和爲聾目不别五色之章爲昩昩盲也理國者滯於一隅民必壅閼而成釁理身者滯於一隅氣必憤薄而構病所宜戒哉䟽又況耽滯代間聲色諸法不悟聲色性空豈唯形骸之有聾盲此亦智之聾盲爾義曰夫目悦妖麗之色耳耽鄭衛之聲口嗜珍鮮之味則心有滯著不通而流遁忘返大則忘天地四時之序次則違尊卑禮樂之倫小則生侵淩怨爭之禍惟國惟家皆失理矣則自古及今以色以聲亡其家國者衆矣豈獨末嬉妲己褒姒麗姬而已哉味之起爭亦有羊羹解黿之禍矣羊羹者春秋宣公二年鄭公子歸生受楚子之命伐宋宋華元樂莒帥師以禦之二月壬子戰于大棘將戰華元殺羊以食士其御羊斟不預及戰曰疇昔之羊子爲政今日之事我爲政與入鄭師故宋師大敗鄭人囚華元獲樂莒及甲車四百六十乘俘二百五十人馘百人宋以兵車百乘文馬百駟以贖華元于鄭半入華元逃歸立于羽外告而後入見羊斟曰子之馬然也對曰非馬也其人也既答而叔牂奔魯叔牂斟字也君子謂羊斟非人也以其私憾敗國殄民於是刑孰大焉小雅所謂人無良者其羊斟之謂乎殘民以逞矣解黿者宣公四年楚人獻黿於鄭靈公穆公太子夷也公子子公名宗子家名歸生將入見子公之食指動第二指以示子家曰他日我如此必嘗異味及入宰夫將解黿相視而笑公問之子家以告及食大夫黿召子公而弗與也子公怒染指於鼎嘗之而出公怒欲殺子公子公與子家謀先爲難子家曰畜老猶憚殺之而況君乎反譖子家子家懼而從之夏弑靈公書曰鄭公子歸生弑其君夷權不足也子家權不足以禦子公懼譖而從弑故書首爲惡也君子曰仁而不武無能達也初稱畜老仁也不討子公是不武也不能自通於仁道而陷弑君之名其實子公染指而成斯禍爾復有滯金石之音者不能聽無聲之聲耽玄黄之狀者不能見無色之色嗜甘辛之味者不能知無味之味自喪眞道以掇死亡矣馳騁畋獵令人心發狂注馳騁代務耽著有爲如彼畋獵唯求殺獲日以心鬥逐境奔馳靜而思之是發狂病耳䟽此言耽滯聲色之人馳騁欲心亦如畋獵但求殺獲欲心奔盛逐境如馳靜而觀之是心發狂病義曰畋獵者國之正禮也時而行之則爲禮不時而溺之則爲亂亦猶人之四肢百體屈伸動靜得其宜則合於禮違之則爲狂矣禮天子諸侯每歲三畋一爲乾豆祭祀宗廟也二爲賔客交二國之好也三充君之庖食以時也時而不畋則曰不敬畋不以時則謂之暴所以春蒐夏苗秋獼冬狩皆俟農隙以講武事也獺未祭魚網罟不施於川豺未祭獸罝罘不通於野鷹隼未擊罻羅不張於林修祭禽之禮展三驅之仁順天時也天子仲春教振旅遂以畋獼仲夏教茂田遂以蒐仲秋教理兵遂以獵仲冬教大閲遂以狩大司馬以掌其事山虞澤虞以供其職蓋以教武事示民時也則有不遵典故外作禽荒暴物犯時十旬不返馳騁莫已遂爲發狂人怨國危失禮致禍也況人之心馳騁逐境爭奔外溺色聲内傷神氣發狂於身乎難得之貨令人行妨注性分所無求不可得妄求難得故令道行有所妨傷䟽難得之貨者言人身材器爲貨難得之貨即性分所無求不可得夫不安其分矯性妄求既其乖失天倪所以妨傷道行義曰材器者性分之貨也珠珍者世間之貨也性分所無之貨矯竊即行傷珠珍難得之貨貪求則身辱所宜任其性分守彼天常矣人君貪求珍異則下怨民殘理身貪求珍異則行傷身辱是乖失天倪也天倪者天然之分也莊子曰始卒者若環莫得其端是謂天均天均者天倪也夫物均齊豈有妄哉皆天然之分也是以聖人爲腹不爲目䟽腹者含受而無分别目者妄視滯於色塵無分别則全和故謂之滯色塵則傷性故不爲也義曰不爲目者以其妄見妄視滯於色塵傷性乖和聖人不取爲腹者懷質朴抱忠信餐元和薄滋味可以致道可以化民聖人爲之何者目之視也聖人爲之方故制禮經以檢之日無淫視將入户視必下視瞻無回其乘車也立視五嶲式視馬尾顧不過轂不妄指不妄視斯謹戒而敬慎也不敬不慎者理國則傷政理身則傷性聖人所以不爲之矣色塵者有形可見爲色有染而不可見爲塵塵細色麤皆妨於行修道之士先除其色反神照内次除其塵滅心忘外塵者染之於心關之於念即名爲塵故六根所起則爲六塵染六麤塵净猶有六細塵染六細塵净復有六輕塵染六輕塵净方契於道見於無色聞於無聲味於無味入於無形了於無爲乃謂之證道果也故去彼取此注取此含受之腹去彼妄視之目䟽彼目妄視故去之此腹含受故取之義曰腹者容受而無情故取之目者觸見而有欲故去之夫人君之心睿聖爲本理國之道清淨爲基其逐獸荒原奔車絶巘六龍逸足萬騎莫追與雕鶚以爭先共熊羆而賈勇日月虧蔽旌旗糺紛畋獵忘歸殺獲無已風雨恒若宫室或空此謂之發狂也若復貴遠方之物産貪無用之土疆嗜蒟醬而討西夷伐大宛而取名馬關塞有不歸之魄邊城有怨曠之魂天下流亡户口滅耗赫赫宗社幾陷寇讎青史具書百代爲戒曷若去彼取此遵老君之明詰乎道德眞經廣聖義卷之十二
