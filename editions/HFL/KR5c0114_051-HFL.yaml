front:
  text: 道德眞經廣聖義卷之五十行十三
  hash: sha256:3179dcd803f5961cfc26dfe2c7ef5774abe884f5fc78c4b5d8fe1af330a55c53
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0114_HFL_051-001a, image: hfl/0448/0448-162.png}
body:
  text: 唐廣成先生杜光庭述小國寡民章第八十䟽前章明法令則生弊必育餘怨之跡此章明淳樸則至理自無矜徇之求初標無爲之風以勸次示人從君化則理後明家給人足無所企求義曰前以司契立法勝負有殊此乃重死化醇樸素爲本將復結繩之理自無兵乘之興甘食美衣各全其分安居樂俗無喪其和雖云鷄犬相聞豈尚往來爲禮美信雙遣知博亦忘無事無勞洞達聖人之道爾小國寡民使有什伯之器而不用注什伍也伯長也此明君含淳和什伍伯長無所求及適有人材器堪爲什伍伯長者亦無所用之矣䟽寡少也什伍也伯長也器材器也此論淳古之代也言國小者明不求大言人少者明不求多不求大則心無食競不求多則事必易簡易簡之道立則淳樸之風著適使有出人材器堪爲什伍之伯長以統於人者亦無所用之矣義曰國小則易理民寡則易寧雖設官司亦無宰執君臣循分外無貪益之求人庶懷淳俱臻易簡之道若大國能徇斯法自然天下無爲矣使民重死而不遠徙注少私寡欲不輕用其生敦本無求故不遠遷徙䟽徙遷移也化歸淳樸政不煩苛人懷其生所以重死敦本樂業無所外求各安其居故不遠遷移也義曰易理之境易寧之民懷淳素之風各全其性命無貪求之志肯慕於播遷乎所謂安其居樂其俗人至老死不相往來斯大道云至矣雖有舟輿無所乘之䟽舟輿之設本以水通陸濟有無貺無往來則舟輿棄捨無所乘用矣莊子云至德之代山無蹊隧澤無舟梁義曰刳木爲舟以濟於水斲輪爲輿以通於陸蓋適遠之所用也國小地狹既無乘泛之勞遂性端居豈有盤遊之事固無所乘之矣山無蹊隧者蹊徑也隧穴道也莊子馬蹄篇曰至德之世其行填填其視顛顛山無蹊隧澤無舟梁萬物羣生連屬其鄉禽獸成羣草木遂長是故禽獸可繫羈而遊鳥鵲之巢可攀而窺惡乎知君子小人哉是謂素樸之代矣雖有甲兵無所陳之䟽甲兵所陳本以討不服禦寇敵上行道德下無離異既却攻戰之事甲兵韜戢而無所陳也義曰君既無爲臣惟樸素内無離叛外絶寇讎雖有甲兵復何陳用行人心通玄默道合正眞嗜好不惑於心繁華不亂於目雖有科戒詎假研尋斯固洞達生知不在修而後得亦猶民化淳和無煩武備爾使民復結繩而用之注舟輿所以利遷徙甲兵所以徇攻戰兩者無欲故無所乘所陳反樸遷淳歸復三皇結繩之用矣䟽古者書契未興結繩紀事故繫辭云上古結繩而理後代聖人易之以書契欲明結繩之代人人淳樸文字既興是生詐僞今將使民忘情去欲歸於淳古故云使人復結繩而用之義曰以道德之主牧淳素之人無水陸遷徙之勞無甲兵攻取之事則結繩之理猶謂其煩繫辭之文具如疏解夫上古未有書契先於結繩書契既興結繩遂息今使有爲之代多事之民懷道餐和却歸淳素故云復結繩爾甘其食注不貪滋味故所食嘗甘美其服注不事文繡故所服皆美䟽食之甘者在於適適則所食皆甘服之美者在於當當則所服皆美苟不適當雖玉食錦衣不足稱甘美也義曰充身適口不尚珍華也尚書天子王公皆有玉食夫錦者五彩相鮮女工精巧服之則過當製之則勞人况衣在蔽形所以禦寒燠也食則充口所以濟飢乏也温飽既適凍餒不侵足以安其身而樂其性何在綺麗珍羞乎安其居注不餘棟宇故所居則安樂其俗注不澆淳樸故其俗可樂䟽無欲所居則安化淳故其俗可樂若逐欲無節將自不安其居苛政且煩焉得復樂其俗爾義曰普洽淳和故安其居而樂其俗也鄰國相望雞犬之音相聞注言其近也使民至老死不相往來注無求之至也䟽列國相望雞犬相聞蓋言其近也人至老死不相往來由彼此俱足無所求及故爾義曰君無境上之會民無身外之求雖接風煙何煩來往在身則各安其分外絶食求於國則各暢其生民無勞役樂道順性道之至乎信言不美章第人十一䟽上下三篇通明道德始標宗㫖以開衆妙之門終結會歸將通得意之路故寄信美以彰言教論辯善以戒修行書知博以示迷悟陳不積以教忘遺假有多以暢法性結不爭以明聖人將令學者造精微於言象之中道筌蹄於性命之外悟教而能忘教何必杜口於毗耶因言以明無言自可了心於柱下爾義曰此章首目結二經之終始也自可道可名之始訖不害不爭之終八十一章配天法地其此篇美信辯善之理較華實之可忘知博有多之詞定文質之可捨忘言忘象得玄遣玄深入兼忘之樞混融至道之域矣衆妙之門者上經第一章之詞也言象者易繫云得意而忘象得象而忘言也筌蹄者易繫云得兔而忘蹄得魚而忘筌也並具經中己解若彼毗耶杜口自昧於眞宗靈山拂席竟迷於正見豈若兹文演暢體用兼明語之修身理家則百關和而六親睦奠邦御㝢率土靜而九有清奕代宗師百王規稟者矣柱下者老君當周武王之時居於岐佐武王爲柱下史即今之御史也信言不美注信言者聖教也信實之言不韻於俗故不美也䟽信言者聖教信實之言也老君欲以自明所演言教化導衆生實爲精信故與俗相違代人以爲不美義曰大聖垂訓以暢道爲先無華詞可悦於人無曲說可誣於衆眞理直致質而不文故代俗所窺以爲不美然而循理屬念依經宅心不唯霸國和民抑乃長生輕舉可謂精信矣美言不信注美言者代教也甘美之言動合於俗故不信也䟽美言謂代教甘美之言也言多浮華動合於俗既非信實不可化人所以不美正以代教美言不信故爾義曰代間教㫖以華藻爲先無至理可依無玄譚可採但以綺美爲富贍煩博爲奇能俗耳所樂聞常情所甘愛不可行化於世但可娱適於情故美而不信也善者不辯注善者在行無辯說也䟽悟教之善在於修行行而忘之曾不執滯故不辯說也義曰知道能行不勞言辯故經曰知者不言是也夫辯者理闊而詞煩虚多而實寡但可誇誕於俗不能徑了於玄故善言於道者臻乎無言非假辯說西昇經曰道在勤行不在能言是也辯者不善注空滯辯說故不善也䟽但能辯說言教曾不悟了修行惑滯貺多故爲不善義曰夫懸河縱辯炙輠與詞其於言也亦以富矣但夫滯言則迷於了悟執理則瞢於眞修詞多惑人故非善矣經曰言者不知是也能辯而不能行者西昇經云言出飛龍前行在跛鱉後是也知者不博䟽知了悟也博多聞也言體道了悟之人在乎精一不在多聞故莊子云博溺心者義曰道在乎知不在乎博知而行之者至道不煩一言了悟悟而勤乆乆而彌堅則得道矣知而求博博而不修言之於前行之不逮則失道矣博溺心者莊子繕性篇云古者淳樸既散德又下衰唐虞之世智不足以定天下然後附之以文益之以博文滅質博溺心然後民始惑亂無能以反其性而復其初由是觀之世喪道矣道喪世矣世與道交相喪也道之人何由興乎世世亦何由興乎道哉此疾其捨無爲循有作也所以鍾鼓作荒淫之具玉帛爲傾奪之資亂生於此矣人君理國若能去琱琢息奢淫削繁文薄禮樂化以眞素無事無爲豈患其溺心之博也博者不知注知了悟也博多聞也䟽夫多聞則滯於言教滯教則終日言而盡物貺非了悟故曰不知義曰道之要者在乎得言而忘言知道而行道行之既得教亦俱忘守一則不煩無爲則不亂故博於言教者去道遠矣豈能得玄妙之道哉聖人不積注積者執言滯教有所積聚也聖人了言忘言悟教遣教一無執滯故云不積䟽積滯聚也聖人達妙理源深明法性悟文字虚假了言教空無所說之理貺明能說之言亦遣則於彼言教一無積滯故云聖人不積爾義曰聖人無爲無爲之爲亦遣聖人忘教滯言之教俱忘了達希微宗尚虚漠故不積滯於俗教矣修眞之士亦當悟此忘言了兹妙道也既己與人己愈有既以與人己愈多注此明法性無盡也言聖人雖不積滯言教然以法味誘導凡愚盡以與人於聖人清淨法性曾無减耗唯益明了故云愈有愈多有明自性多明外益䟽貺盡也言聖人雖不積滯言教然衆生發明慧心必資聖人誘導故聖人以清淨理性盡與凡愚而教導之於聖人慧解之性曾不减耗故云愈有愈多注云有明自性多明外益者悟理之性既非他有故云自性因教之益不自中來故云外益明聖人教導凡愚心彌慧解故云愈有惟斆學半理益精暢故云愈多爾義曰聖人清靜理性光明慧心外無所因内無所滯和之愈響如鍾在懸矣夫天地之生化不窮而天地之用未嘗倦矣曰月之照灼而不息而曰月之明未嘗竭矣江海之注不極而江海之流未嘗耗矣薪火之傳不絶而薪火之力未嘗盡矣亦猶聖人之慧解浩蕩而無涯隨悟立言隨方設教因機誘導稱彼物情物情高下俱得法味而言教塞於天下而理性慧解愈有愈多矣惟斆學半者尚書說命下篇云斆教也教然後知所困是學之半也終始常念學則其德之修無能自覺其惟學乎天之道利而不害䟽天道施生長養萬物利也無所宰割不害也此舉喻欲明聖人之道弘益也義曰舉天道以喻聖人之道利於萬物物遂其生而無所害也聖人之道爲而不爭注舉天道利物不害者將明聖人之道施爲弘益常以與人故不爭也䟽聖人之道凡所作爲而與物不爭者爲聖人無所積滯與人愈有是以不爭爾義曰天授聖人之道以利於萬物聖人體道應天以濟於群生澤愈廣而志愈謙化愈彰而功愈晦故利物而不害應物而不爭且夫上下二經論道叙德首明可道常道爲設教之宗源次標有德無德述因時之澆樸此陳愈多愈有表聖澤之無窮信可以垂表萬天程式千古革漓敗而復樸滌邪弊而歸眞貫天地而燭幽明斯二經之大㫖也道徳眞經廣聖義卷之五十
