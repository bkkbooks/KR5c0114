front:
  text: 道德眞經廣聖義卷之三十九行二
  hash: sha256:47a47390687223966096c24d0d21de43c8b23a6648f5b36783ac80b3468c849d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0114_HFL_040-001a, image: hfl/0447/0447-044.png}
body:
  text: 唐廣成先生杜光庭述含德之厚章第五十五䟽前章明善建之主享不拔而長存此章明含德之人獨知和而不害首五句標含德所以不搏次骨弱下五句明全和所以不嗄知和則明了使氣則强梁物壯下申勸强梁之人欲令不爲是行義曰於國既能善建善抱於身所要含德全和善建則國不傾危含德則物無傷害和至則益生爲善物壯則非道早亡不唯戒在修身抑乃勸於理化此章之大㫖也含德之厚比於赤子注至人含懐道德之厚者其行比於赤子矣䟽含懐也言至人含懷道德之深厚者内爲道德之所保外爲神明之所護比若慈母之於赤子也此理難曉故借喻以明之故寄赤子之全和以況至人之全德赤子嬰兒之小者取其内無分别不生害物之心義曰至道之士韜德含和内外混凝不忤於物如赤子之純粹若嬰兒之未孩其德既然所以物不能害物不害者以至人無害物之心故也赤子者子生三月而眼轉晴微眴能分别人其未分别之前即號爲赤子和氣全也既有所别和氣分矣不可謂爲赤子也毒蟲不螫猛獸不據攫鳥不搏注至人神矣物不能傷貺無害物之心故無搏螯之地此至人之含德也䟽此釋至人之全德也毒蟲蜂蠆之屬猛獸虎兕之屬攫鳥鷹鸇之屬螫謂尾端行毒據按也謂以足據物搏持也謂以爪搏持物也言至人德全於内和氣充盈心冥乎道故有毒之蟲不能螯猛毅之獸不能據鷙攫之鳥不能搏蓋以其至順德厚之所致也義曰含德之行與道混冥動順物宜物故不害靜與道合害所不加雖蜂蠆毒螫之徒猛毅鷙攫之類自然遠矣何能害人人君含德臨人全和御物禍亂不作戈甲不侵外服四夷内清六合靡然物化其含德之謂乎骨弱筋柔而握固䟽此下眀赤子之全和也赤子筋骨柔弱持握不當牢固今拳手執物能自固者豈非和氣不散之所致乎義曰和之所用其大矣哉禮之用和爲貴師之用和爲先地利不如人和師克在和不在衆書曰紂有億兆之人離心離德周有十臣同心同德故春秋鄖人伐楚屈瑕患之鬬廉對屈瑕曰師克在和不在衆啇周之不敵君所聞也屈瑕欲卜之曰卜以决疑不疑何卜敗鄖師於蒲騷今赤子以和握持既能牢固立身以和處衆必無交爭王者以和君臨固能化洽和之全也與含德理同所解赤子全和謂如下文爾未知牝牡之合而峻作精之至䟽雌曰牝雄曰牡峻者氣命之源也言赤子心無情欲未辯陰陽之配合而含氣之源動作者豈不由精氣純粹之所致乎義曰上清洞眞品云人之生也禀天地之氣爲神爲形禀元一之氣爲液爲精天氣减耗神將散矣地氣减耗形將病矣元氣减耗命將竭矣故帝一迴元之道泝流百脉上補泥丸腦實則神全神全則形全形全者百關調於内邪氣亡於外髓凝爲骨腸化爲筋純粹不雜而長生可致矣終日號而嗌不嗄和之至注赤子骨弱筋柔而能握拳牢固未知陰陽配合而含氣之源動作者精粹之至終日號啼而聲不嘶嗄者由純和之至此知赤子之全和也䟽嗄聲破也赤子終日號啼其聲不嘶破豈非精氣純粹之能致乎義曰含德之人全和之士德行周厚和氣精純如赤子也赤子純和既積元氣内充執握能牢啼號不嗄純之至也夫啼極無聲謂之嗄赤子和氣未散眞精固存喻彼理國純和羣生貞粹玄化彌遠德聲益彰而不竭也又骨弱筋柔而能握固非因其力由赤子心專以喻含德之人屈身順物柔心從道衆欲所不能開由心業净故也未知牝牡之合而峻作由含德之人無心應物動任自然非情欲所侵由身業净故也赤子號而不嗄如含德之人法音演教以法利物聲化無窮而不衰歇由口業净故也赤子純净外欲不侵内心不亂自然而然也含德之人三業清淨有如赤子乃修之使然理國之道君抱淳素臣任忠良法綱不施德化周布若赤子自然端樸如含德修勵日新和氣潜充人歸於道矣知和曰常注能如嬰兒固守和柔是謂知常之行䟽赤子以和氣至純而聲不敗因之以示教言人能如嬰兒知和柔之理修而不失者是謂知眞常之行義曰五常備貝曰和於身和則德充而合眞於國和則化周而祚永處衆和則合禮行師和則有功和之爲義大矣哉知常曰明注守和知常是曰明了䟽人能知眞常之行而保精愛氣者是曰明達了悟之人知和知常歎同德之美益生使氣舉失道之過義曰既備五常是謂和矣復知其和不可斯須離而常行之斯謂於道益明於理益達理國以和爲常加以明達所謂合天地之德齊日月之華矣以和御物物無不順以和從道道無不成太上五厨經曰和乃無不和玄理同玄際抱和守常道可異也益生曰祥注祥者吉凶之兆言人不知守常而求益生過分動之死地是曰凶祥䟽祥者吉凶之兆不能全和於知常而營生於分外殊不知分外求益所亡滋多則求益生過分是凶祥也莊子云常因自然而不益生義曰人能知和知常也爲明達於道更求益生過分是必兆其凶祥斯則求生之厚爲妖祥矣而不益生者莊子德充符篇莊子謂惠子曰是非吾所謂情也吾所謂無情者不以好惡内傷其身常因自然而不益生此莊子以是非爲情不以喜怒滑性哀樂傷神受之天然不營分外人理自具何用情以益生乎道與其貌天與其形無以好惡内傷其身也心使氣曰强注心有是非氣無分別若役心使氣是曰强梁之人䟽夫心有是非而氣無分别故任氣則柔弱使心則强梁今失道益生之人役心使氣氣爲心使是曰强梁故莊子云無聽之以心而聽之以氣義曰含德必任氣而柔弱益生則使心而强梁柔弱合於眞常强梁乖乎修鍊理國亦以柔和爲上不以强大爲能棄柔任强喪身敗國矣無聽之以心者莊子人間世篇孔子謂顔回曰若一志無聽之以耳而聽之以心無聽之以心而聽之以氣聽止於耳心止於符氣也者虚而待物者也唯道集虚虚者心齋也此言心虚則嗜欲無入神清則玄覽無疵遺其色聲忘其境智境智忘而玄道自至色聲一而物相盡空心止於符氣合於漠此謂之心齋也惟孔子顔回得之矣物壯則老是謂不道不道早已注凡物壯極則衰老故戒云矜壯恃强是謂不合於道當須早已䟽此明强梁失道之過壯者剛毅也老者衰憊也夫物盛則衰壯極則老夫用心使氣矜其强壯者自致衰老謂之不道者道貴柔弱今恃强梁既與道不合故勸令早止義曰夫物自壯而得老自盛而得衰自榮而得枯自老而得死世之常也守和含德之士反於此焉老君以衆生未解知常不能含德不及赤子之無害果爲强梁以喪眞勸其早止俾令知道而勤修也若理國之主捨和棄明不能謙抑於九重而肆其鋒於外境人疲國耗必致自焚未若體道全柔以安其社稷所謂早已也知者不言章第五十六䟽前章明含德之人獨知和而不害此章明悟道之士能了言而無執首兩句示理暢而言忘次七句明靜塵而不染是謂下明不染者與玄同德故不可下明同德則不可毁譽爾義曰至道無言有言則乖道至人窒欲塞兊則歸眞能混光塵與道同矣如此則親疏不此利害難欺不爲貴賤所排是明天下之貴此亦欲使人君自悟任道忘功不爲利欲所嬰遠懐近悦不爲貴賤所惑合道同玄常爲天下之尊克享無期之祚與夫含德全和之理亦何異乎知者不言言者不知注知了悟也言辯說也疏知者了悟也言者辯說也夫至理精微玄宗隱奥雖假言而詮理終理契而言忘故了悟者得理而忘言辯說者滯言而不悟故曰知者不言言者不知爾義曰無爲之要訣之於心以言而傳斯非道矣西昇經云道可以心得不可以言傳易曰得理而忘言得意而忘象滯於辯說非道也哉塞其兊注了悟者於法無愛染於言無執滯故云塞其兊閉其門注貺無愛染則嗜欲之門閉矣䟽具如天下有始章所釋彼則約道清淨以塞六根愛悦此則因教辯忘將息滯言之累於言無執故云塞其兊不爲榮辱之主可謂閉其門義曰欲忘言者塞其兊兊口也言語理絶自契忘言矣欲忘象者閉其門門目也形象混冥自契忘形矣塞兊則辯說不施固無滯於言教閉門則榮觀自息無溺於是非然後紛銳盡銷光塵共混方叶玄同之德矣人君尚不言之化敦不宰之功其功益崇其化彌廣矣挫其銳解其紛和其光同其塵䟽此四句已出上經道冲章彼則就道以論功此則據人以眀行上下兩經互舉其文者以其於濟物修身之義有功故重言之義曰銳以躁進挫之以歸和紛以交爭解之以歸寂光以獨顯不若和之爲貴塵以衆晦不若同之爲能此四行體道表道之功於人勉人之行於國則刑賞合度於身則貞吉攸長老君重舉此言益明朂勵之㫖是謂玄同注五句解如道冲章彼則約道此則約人言人能體道是謂與玄同德䟽歎夫體道之人既已不滯言教又能和光混跡行符於道是謂玄同義曰以上明四行體道於人既彰其利理身理國克叶其功是謂與道同德玄謂道也故不可得而親注玄同無私故不可得而親不可得而疏注汎然和衆不可得而疏䟽言玄同之人心無偏私不可得親而狎之和光順物不可得疏而遠之義曰心既玄同親疏混一夫世俗之常者偏愛則親之偏惡則疏之有道之士愛惡不關於心則親疏不彰於物矣理國之道刑賞不濫功過無欺推之以公則無偏親偏䟽之事矣不可得而利注無欲故不可得而利不可得而害注無爭故不可得而害䟽恬惔無欲故不可得從而利之處不競之地故不可得犯而害之義曰迹既玄同利害不加矣夫有道之士不可以利誘不可以害加以其無欲無爲惟清惟靜故利害無由而入矣世人反於此故利可誘之勢可移之所以害可加矣不可得而貴注體道自然故不可得而貴不可得而賤注洸然無滓故不可得而賤䟽體道自然非爵禄所得貴也超然絶累非凡俗所得賤也義曰情既玄同貴賤一矣體道之士榮禄不能勸威刑不能沮如玉投泥不能污也豈貴賤干其慮哉故爲天下貴注體了無滯言忘理暢紛銳盡解光塵亦同既難親疏不可貴賤故爲天下貴䟽玄同之士悟理忘言塞兊閉門根塵無染紛銳既解光塵亦同其行如此故爲天下之所尊貴義曰既彰四行玄與道同心不涉於親疏跡不交於利害貴之不爲喜賤之不爲憂混合大道爲天下貴人君弘此四德以化萬邦與道混同不言而理矣道徳眞經廣聖義卷之三十九
