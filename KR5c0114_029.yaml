front:
  text: 道德真經廣聖義卷之二十八景四
  hash: sha256:3a802e466bf6b5e77b91f3b746caa949756c1cd78f7eea110d134a7cb048ecdf
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0114_HFL_029-001a, image: hfl/0444/0444-098.png}
body:
  text: 唐廣成先生杜光庭述大道泛兮章第三十四疏前章明賔服有道之君由能自知自勝此章明能成光大之業皆為法道忘功首標大道泛兮示左右略無封畛次云功成不有明小大難與為名是以聖人下舉聖人不貴其身以成光大之業義曰既明有道之君得自知自勝之用能致壽而不亡今舉君之德行如大道之無滯不有其功不恃其物不為其大故能成其大業泛兮之道言可左可右不拘一方也封疆也畛田中道也物生物成不辭不有非大非小聖行圓通不貴大其身故成其尊大也大道泛兮其可左右注大道泛兮無繫而能應物左右無所偏名疏泛兮者無繫之貌也言道之為物非陰非陽非柔非剛泛然無繫能應衆象可左可右無所偏名故莊子曰夫道未始有封義曰大道之體也凝而為真一融而為萬化泛然不繫諭彼虛舟無塊然之質不昧然而昏者非陰也無赫然之象不皎然而明者非陽也懸天載地乾健而龍行非柔也委和順物細入毫芒非剛也能顯能晦能微能章泛泛然無所繫著也刻雕類狀無所不為能應衆象也旁通萬境不局一方可左可右也一以貫之為天下式無所偏名也未始有封無涯無略涣而散也無所不無寂而歸也無所復有生化萬殊也莊子齊物篇曰古之真人其知有所至矣惡乎至有以為未始有物者至矣盡矣不可以加矣未始有物其次以為有物矣而未始有封此言天地初分人生其內品物咸遂性識真淳心迹無為故無封執其次以為未始有是非是非既彰道所以虧也道即虧也則有偏名矣修身之士當體道虛心無所執著以臻其妙理國當坦然無為以合於道通乎大方歸於至理也萬物恃之以生而不辭疏言天地萬物皆恃賴大道通生之功以全其生理而大道生化妙本無心雖則物恃以生而道不辭以為勞倦又解云物不辭謝於道爾義曰天之高也道氣蓋之地之厚也道氣載之萬物之繁也道氣遍之非大道運氣孰能致其高廣厚大繁多之功哉由道之所化各得其生生生成成全備之理矣道之生物也無為而物自生道之化物也無為而物自化雖因道而生化而大道不以生化辭勞物亦不以生化之恩歸功於大道亦如雨露之施也物自潤澤於下物既不辭謝雨露之德雨露亦不以灑潤稱功所以聖主臨人達賢利物如大道生成雨露膏潤爾聖人忘功於上民忘帝力於下則合乎至化矣功成而不名有注言萬物恃賴沖用而生化而道不辭以為勞功用備成不名己有疏功者生成之功也言大道生物之功備成而不以其物為己之有又解道之生物雖則功成其功雖成曾不名有言忘功也義曰言於有也則萬物之形各稟道氣物得成就皆道之功非夫道氣稟之則生成之功廢矣而道之妙本無有無名道之妙用無窮無已物成而道不恃其力物生而道不有其功既不恃物為我功亦不執物為我有有無皆泯功用都忘不獨忘生物之功亦乃忘萬物之有也愛養萬物而不為主常無欲可名於小注愛養群材而不為主宰於物無欲可則名於小言不可名小也疏此聲解義也云可名於小者不可名小爾夫道生萬物愛養熟成而不為主宰於彼萬物常無欲心豈是道之狹小耶故云可名於小者言不可名於小耳義曰聲解義者如修詞之人云其可得乎是不可得也以是詳之則經所云可名於小是不可名於小也道之生化萬億之類和氣周遍巨細無遺畜之養之成之長之愛護之功至矣茂養之恩普矣不為主宰各遂生成無心於物含育之恩大矣此聖旨所解也今釋云有情有形飛沉動植纖芥之小丘山之大道氣覆育力無不周仁愛畜養而不為主物賴於道不以為功雖鵬鯤大軀固乘道而變化焦螟細品亦資道以裁成故秋毫之小也道氣存則溫柔潤澤道氣去則枯瘁凋零秋毫不棄可謂之小充塞天下可謂之大不為主宰可謂忘功斯則道之用也能小能大而非小非大無所不小無所不大也萬物歸之而不為主可名於大注愛養之故萬物歸之有萬不同而不為主可則名為大言不可名大非小非大故以難名矣疏萬物歸之者歸道生成之功也言萬物歸道道不為主而有此萬物棄而不收豈是道不廣大故云可名於大爾既云可左可右所以非小非大非小非大固難與為名注云有萬不同者莊子文也義曰道生成於萬物物稟生成之功各歸功於道而道不為主任物自遂非道之大故聲解云可名於大乎所以可名於小是非小也可名於大亦非大也非大非小難可定名是難與為名也有萬不同者莊子天地篇孔子曰夫道覆載萬物洋洋乎大哉君子不可不刳心焉無為之謂也無為為之之謂天無為言之之謂德愛人利物之謂仁不同同之之謂大行不崖異之謂寬有萬不同之謂富此言有萬物之不同我獨同之可謂富有天下也道無有二物則萬形於物則有萬不同於道則統之惟一此聖旨所解也今釋云大道匿德藏名怕然無象是可名於小也萬物生者自生化者自化使各遂性不為之主是可名於大也亦猶帝王以道育物以德御民考六氣之和順四時之令恩以篤之義以正之仁以愛之禮以齊之信以教之賞以勸之殺一草伐一木必以其時孜孜焉煦煦焉恐其失所也可名於小矣及夫物遂其性民得其宜上下交歡天地和泰謙恭端穆讓德於天不為己有不為其主可名於大矣是以聖人終不為大故能成其大注是以聖人法道忘功不自為光大故能成其光大之業疏言理天下之聖人布德施惠淳風偃化物遂生成法道忘功不自為尊大故能成其光大之業爾義曰聖人之理天下也愛民恤物巨細申恩若可名於小矣任物遂性歸功於天又可名於大矣法道施化布德及人鼓以淳和之風被以清靜之政忘功不有不自尊高故其盛業可大聖德可大以其不為大故能此尊大理身之士泛然無著若雲之無心水之任器可左可右隨方隨圓不滯於常物來斯鑒物雖廣不拘應用之心利物雖多不矜利濟之德仁逮蠢動未始為私衆善歸宗不為之主是能彰非小非大之德無自尊自伐之稱可以契全真之大道矣執大象章第三十五疏前章明道可左右則物被愛養之功此章明王能用道則人歸平泰之化首標執象以明歸往之義次明樂餌舉喻歸往之由道出口下申明無為不言之教以勸人君用道爾義曰言理天下之聖人不自尊大而成其大業者由其執大象而天下歸王所以成光大之業也象者道也亦猶恍惚中有象爾天下所歸各蒙其澤聖人無察察之政以傷害之故能致天地交泰執大象而人歸者喻以樂餌所以八音乍奏聞者悅其心百味交陳嘗者適其口則行客為其駐止矣天下之人歸於有道亦猶此也至言不文出口無味大象無狀視聽莫求歷代用之其用日新而未嘗窮竭矣執大象天下往注大象道也帝王執持大道以理天下萬物往之矣疏執持也大象道也此言人君執大道以理天下無為無事物遂其生候日觀風皆歸有道故云天下往義曰執用也大道非形不可執有聖人用道可以理人為於無為事於無事動植飛走各遂其生則航海駿奔梯山麏至皆歸用道之君矣候日觀風者昔聚窟洲在巨海之中使者朝貢於漢言於武帝曰臣之國去此三十萬里國中常占候於天若東風入律百旬不休青雲干吕連月不散者中國將有有道之君矣臣國之主所以仰中土而慕道風薄金玉而厚靈物故乃步天林而靖猛獸搜奇韞而出神香濟弱水度飛砂而朝於闕下艱苦道途十三年矣斯則有道之主其德動天風雲效祥遐遠慕德矣往而不害安平泰注物往而不傷害則安於太平矣疏言天下四方之人慕化而往帝王以道綏撫而不傷害之則安於太平矣平者言政教之和平也太者功業之光大也義曰綏宴安也撫安養也泰康泰也平和平也害傷害也四方之人慕我道德觀風候日歸於聖人聖人因而綏安養之不以教令督責之不以刑法傷害之故遠近之人安其太平之政矣政教和平人俗康泰然後功業光大故曰安平泰也論語曰遠人不服修文德以來之既來之則安之斯則帝道皇風無遠不屆矣樂與餌過客止注樂音樂也餌飲食也言人家有音樂飲食則行過之客皆為之留止如帝王執道以致太平亦為萬物歸往矣又解云樂以聲聚餌以味聚過客少留非長久也是以蘧廬不可以久處仁義覯之而多責故人君體道清靜淡然無味始除察察之政終化淳淳之人故下文結云用不可既也疏樂音樂也餌飲食也此舉喻也言人君執大象而天下之人歸往亦如人家有音樂飲食則行過之客皆為留止爾義曰人君有道天下慕之如行過之客遇飲食聞音樂而為留止莊子至樂篇云咸池九韶之樂張之洞庭之野人卒聞之相與還而觀之是也夫樂者歷代之所用也樂以象天奏之圓丘則天神降奏之方澤則地祇升鼓之以和八風摟之以政四時黃帝有咸池堯有大章舜有大韶禹有大夏湯有大濩文王有辟雍武王周公有大武樂以和之人則安其性故為人之所重王者功成而作樂理定而制禮所以通天地神明也然此舉喻者以道則長存樂餌非久所以樂悅於耳樂罷而人散餌以美口食畢而衆離雖留止於一時故難期於久永唯無為理國則衆歸而不可離有道理身神全而不可散故下文云道出口淡無味又言用不可既則非同樂餌有竭盡之期也蘧廬者結草之舍非久處之所仁義者以兼愛而親不可以久交非若體道化人人歸於道淡然長久詎可散乎察察者苛急之政也淳淳者和樂之風也道之出口淡乎其無味注人君以道德清淨為之教初出於口淡乎其無味不如俗中言教有親譽畏侮等爾疏道之出口者言人君約道德清靜之法以為不言無為之教者初出於口淡然無味豈若俗中有親譽畏侮等以為滋味乎義曰甘言美詞所謂有味也無為之理清淨之訓至道之言其出淡然安有滋味乎俗中親譽之説即此經第十七章之詞也謂甘言以親之美詞以譽之或威令之言以畏之狎慢之言以侮之雖其有味皆非至道矣視之不足見聽之不足聞用之不可既注道以鎮靜初無言教故視不足見聽不足聞而淳風大行萬物殷阜歲計有餘故用不可既既盡也疏既盡也道化無為淡然平正既不為察察之苛急又不為滋彰之法令故視不足見聽不足聞而歲計有餘淳風和暢動植咸遂品物光亨故用不可盡也義曰道之無言其於言也無味於口道之無形其於形也無見於目道之無聲也無聞於耳故咀嚼不得其滋味視聽不得其見聞不同苛急滋彰之令驚民耳目矣物得其所曰平直無私曰正法細曰苛徴賦迫促曰急禁令太明察察也法外立辟滋彰也滋多也彰顯也阜積也所以民之耳目日有見聞畏淫苛狂暴之刑逾於履薄懼督察滋彰之令甚若臨深投足措手不知其所矣豈若以道臨御不可見聞淳風潛行萬物和暢用之不可以窮盡矣歲計有餘者莊子曰老聃之役有庚桑楚者得老聃之道居崴壘之山三年其俗大穰其民相與言曰庚桑子之始來吾灑然異之今吾日計之而不足歲計之而有餘庶幾其聖人乎言其德惠潛及於物而致豐穰況帝王奄有四海為天下君以道垂衣天下蒙其化信矣人之修道於身者心無思慮則神氣全情無嗜好則愛惡息不感於視聽不泊於恬和玄德潛充道可冀矣道德真經廣聖義卷之二十八
