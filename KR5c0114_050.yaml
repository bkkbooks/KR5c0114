front:
  text: 道德真經廣聖義卷之四十九行十二
  hash: sha256:c2abacbc249ef0e26190370744664b9d2d5be408254bfab0a95c93c23f177e0b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0114_HFL_050-001a, image: hfl/0448/0448-140.png}
body:
  text: 唐廣成先生杜光庭述天下柔弱章第七十八疏前章明强梁必招損以示天道之喻此章明柔弱則受益故贊水德之能初五句標水之勝功次四句歎莫能行者又五句證釋前義後一句轉結上文義曰前明聖人不恃不處之行此舉水德勝剛勝强之能守柔弱則謙光為强梁則屈抑所以國君以含垢為大立名以不祥為先配聖德乃允叶厥中聞俗耳則雖正若反嗣以執契之理更彰與善之方爾天下柔弱莫過於水而攻堅强者莫之能勝疏水之為性善下不爭動靜因時方圓隨器故舉天下之柔弱者莫過於水矣而攻堅强莫之能勝者夫水雖柔而能穴石石雖堅而不能損水若以堅攻堅則彼此而俱損以水攻石則石損而水全故知攻堅伐强無先水者故云莫之能勝義曰水之為用其體至柔其性善下萬川委輸百谷朝宗霏湛露以淩虛貫昭回而上漢言其大也古今注海而不盈言其細也毫末禀生而有潤故老君配之於道焉三能不讓七德備周包裹造化貫穿形兆處濁受汙隨方任圓此其至柔也故物莫能傷焉及其泛十洲浮八極淪藏日月涵貯乾坤陵谷由之而革遷鯤鵬託之而變化摧山穴石無所不能此其至强也故物莫能制焉然而强柔相制强者必損亦由六欲纏性三業縈身結搆日增堅固難解以至柔之道至靜之真銷而解之漸除堅執久久行之則廓然清淨虛室生白矣此所謂至柔攻堅莫之能勝也其無以易之注以堅攻堅故兩堅俱損以柔制强者則强損柔全故用攻堅者無以易於水矣疏夫水雖至柔用攻堅强之物無能易之者豈不以其有不爭之德而無守勝之心乎理國修身亦當如此義曰不爭處下攻於堅强萬物之中無易於水沖和之氣淡寂之心攻除嗜欲莫先於道所以道之於身則却塵除垢於國則納汙蕩瑕萬有所以歸仁六欲所以銷滌者矣故柔勝剛弱勝强天下莫不知莫能行注柔弱之道勝於剛强天下之人無不知有此道而不能行疏柔弱之道勝於剛强天下之人皆知此義但惑於自賢以己為尚無能行其所知者故云莫能行義曰柔弱之勝剛强人皆知矣雖知其事誰能體柔修性用道修心挫其剛强習其虛寂耶有能體而修者道何遠哉是以聖人言受國之垢是謂社稷主受國不祥是謂天下王注引萬方之罪是受國之垢濁稱孤寡不穀是受國之不祥其德如此則社稷有奉故天下之人歸往矣疏舉聖人之言證成上義此即能行以柔勝剛之行者垢穢辱也言人君能含受垢穢引萬方之罪在己則人仰德美而不離散社稷有奉故云是謂社稷之主也受國不祥是謂天下王者祥善也人君能謙虛用柔受國之不善稱孤寡不穀則四海歸仁是謂天下王矣義曰惟水之德上配於道次配於王道以化育無私王以君臨有德夫有德之主用道居尊罪己撝謙責躬引咎罪己即是受國之垢也受國不祥也四方向化六合宅心可以常奉社稷而為王矣社稷者帝王立國左宗廟而右社稷宗廟者尊祖配天之位也社稷者尊稼穡備粢盛為生民粒食之本也言人以食為天故有國必先社稷故王者社稷主也引萬方之罪者尚書湯誥云萬方有罪在余一人余一人有罪無以汝萬方是也孤寡不穀已具此經第三十九章解矣正言若反注受國之垢為社稷主受國不祥為天下王是必正言初若反俗故云正言若反疏此一句結上文也夫受國垢濁却為社稷主受國不祥却為天下王其言乖背不同於俗故老君詳質云是必真正之言行之而信但常俗聞之初若乖反爾義曰聞之若反於俗行之則合於道故俗耳所聞是正言若反也靈寶經云修道之士捨富樂棄榮華栖遁山林備受勞頓及其功成證道羽駕雲車享年長久自苦而得其樂也帝王孤寡不穀以為其名引罪責躬以化於俗此受其不祥凶惡之事而人樂推故能長主社稷此正言若反斯之謂乎和大怨章第七十九疏前章明柔弱則受益故贊水德之能此章明法令即生弊必為餘怨之跡初明立教和怨未足為善次是以下明有德執契其怨不生後天道下明天道無親惟善是與義曰前以聖人體彼虛玄法兹上善以奉社稷臨御配天此則執契乘時和怨為美乃明惟善是與以表天道無親至於棄舟輿而不乘除甲兵而不用玄契大道此其㫖乎和大怨必有餘怨注與身為怨對之大者情欲也和謂調和也此言人君欲以言教調和百姓使無情欲故云和大怨疏厥初生人身心清淨而今耽染塵境失道淪胥者情欲之所為也則知與身為怨之大者其惟情欲乎和調和也此言百姓已困於情欲而生矯僞人君不能以我無為令其自化方欲設教立法制其奸詐而和之故曰和大怨必有餘怨者設教立法不能無迹斯迹之弊還與為怨故云必有餘怨義曰語之於身則情欲為怨禮記樂記篇曰人生而靜天之性感物而動性之欲物至知然後好惡形焉好惡無節於內智誘於外不能反窮天理滅矣物之感人無窮故不可節矣且夫受生之始情欲已興積習既深難於除絶若凝玄守素尚虞試難之侵或混世隨流未達恬愈之趣未能盡遣是有餘怨也語之於國則興滅繼絶是曰至公推亡固存亦為巨惠而武庚起禍幾覆周宗是有餘怨也安可以為善注貺有餘怨則不可以為善疏設教立法其迹生弊既有餘怨則安可以為善是知善性於俗學以求復其初者爾若能上化清靜無事無為人有淳朴之風迹無餘怨之弊方可為善矣義曰立教繩人欲除積習之弊胡可得哉惟陶以無為率以虛寂飲以淳和之氣混其冲漠之心與道相冥反覆為一者可無餘怨之弊洞合重玄之趣爾俗學以求復其初者莊子繕性篇云俗學是仁義之門初者是不生之本今人貺學仁義已亂其心而求不生其欲將復內明之照不可得也是以聖人執左契不責於人注左契者心也心為陽藏與前境契合故謂之左契爾聖人立教則必有迹有迹則是餘怨故執持此心使令清靜下以化人則無情欲不煩誅責自契無為也義曰聖人以立教誘人未能澄其情欲執心虛室可以契彼清玄心契則無為無為則人化不煩設法混合真修固無餘怨之迹矣修心之法執之則滯著忘之則失歸宗在於不執不忘惟精惟一爾心法之中唯定觀經得其㫖矣經曰夫欲修道先能捨事外事都絶無起於心然後安坐內觀心起若覺一念心起即須除滅隨動隨滅務令安靜惟滅動心不滅照心於此修之務其長久久而習者則心有五時身有七候心五時者第一時心動多靜少第二時心動靜相半第三時心靜多動少第四時心無事時靜事觸還動第五時心與道冥觸亦不動心至於此始得安樂罪垢滅盡無復煩惱此五者於所修之中即為行相其七候者即為修行所得之果身七候者心得定已覺無諸塵漏舉動順時容色和悅一也宿病普消身心輕爽二也填補天損回年復命三也延數千歲名曰仙人四也鍊形為氣名曰真人五也鍊氣成神名曰神人六也鍊神合道名曰聖人七也聖人設教本為衆生為其生死輪回展轉繫縛流浪惡趣永失真常故出我心以滅他心上士若能法聖人之心去住任運不貪物色不著有無能滅動心了契於道既契道已復忘照心動照俱忘然可謂長生久視升玄之道爾夫仙果雖證而有氣象所拘年運所主自初天證位壽九百萬歲每進一天即壽加一倍凡二十七倍至無色界極上秀樂天合壽一千二百七萬九千七百七十五萬五千二百萬歲此其所以有年歲之數者在陰陽二氣之內三界遷變之中其人有形有氣有神三者周備雖變化不測坐在立亡隱顯自由神通無礙須待鍊形為氣方出三界之外然無年壽之數爾其鍊神成氣已為真人鍊氣成神即為聖人其真人聖人永超數運無復變遷以億劫為斯須以萬天為指掌道果所極皆起於鍊心故西升經云生我者神殺我者心以其心有人我故形有生死無心者可階道矣靈寶經云道為無心宗是也故有德司契無德司徹注司主也徹通也言有德之君主司心契則人自化無德之主將立法以通於人為法之弊故未為善也疏司主也徹通也言有德之君主司心契人將自化無德之主不能虛心而忘己唯欲作法以通人作法則弊生故為無德爾義曰執心契則易化立法教則難通執契為有德之君可至於道立法乃無德之主未始通玄矣此聖主所解也今竊謂有德者下古之君也無德者玄古之君也有德之君德既有名以心契理物物雖化善不能得道玄古之君德大無名化民於道朝徹而後能見獨無思無為玄契大道故能臻於定觀忘心之要證超真入聖之階也天道無親常與善人注司契則清淨立法則凋殘皇天無親惟德是輔故人君者常思淳化放無為不可立法而生事疏雖天道平施與善不欺司契清靜者天福其善則吉無不利立法殘傷者天降以殃則孽不可逃豈非皇天無親惟德是輔者乎義曰司契之道由中以明故清靜而易化立法之本自外而制故凋弊而難通立法方為弊源去善彌遠司契潜諧道要乃善之宗降福降殃可以明矣降殃者尚書伊訓曰聖謨洋洋嘉言孔彰惟上帝不常作善降之百祥作不善降之百殃是矣皇天無親惟德是輔尚書蔡仲篇云天之於民無有親疏惟有德者則輔祐之民心於上無有常主惟愛己者則歸之所謂撫我則后虐我則讎是也道德真經廣聖義卷之四十九
