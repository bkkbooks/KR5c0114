  text: 道德真經廣聖義卷之三十六景十二
  hash: sha256:9e816289b9e6da538d558feac99ec72f46e759fa399a1fae647f60d8953e6757
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0114_HFL_037-001a, image: hfl/0446/0446-068.png}
body:
  text: 唐廣成先生杜光庭述為學日益章第四十八疏前章眀不出不窺不以知政理之道此章明為學為道則至乎無為之事首兩句示進修息遣之漸次三句明損有歸無之益後四句結成其意戒有事不足以化人義曰理世之教以勤學而成功修身之階以損知而契道勤學則日益而進業契道則日損而無為倚伏本殊語默互致此眀日益之為劣局世居常日損之為優超凡證道固以符合於不出不窺之冥寂戒彌遠彌少之煩勞示無為可以握圖有事不足理國此其㫖也為學日益為道日損注為學者日益見聞為道者日損功行益見聞為修學之漸損功行為悟道之門是故因益而積功忘功而體道矣疏為修為也損忘損也言初修學者曰求聞見以為益因益為道則忘遺功行以為損所以者何夫為學者莫不初則日學以知道修功而補過終則悟理而忘言遣功而去執故注云益見聞為修學之漸蓋言其初也損功行為悟道之門蓋言其終也義曰學道之人先立功行後忘其心所以契無為之道理國之道先弘德化後忘其迹所以成太平之基也此亦一致也夫立身之道不可不學春秋曰學者殖也不學將落於是乎下陵上替能無亂乎白虎通云學者覺也悟也言以先王之道開道情性使覺悟也幼則迷昏而不悟未可以學長則悍格而難入不可以教學有三時一就人身中為時者十三歲之後可以習業也故學記云發然而後禁則悍格而不勝時過而後覺則勤苦而難成二就年中為時者內則云人之養子六年教之數一至十十至百千萬也與方名東西南北也七年男女不同席不共食八年出入門户及即席飲食必後於長者教之讓也九年教之數日朔望與甲乙至壬癸六甲也十年出就外傅居宿於外學書計十有三年學舞勺誦詩背文而讀曰誦也十五年成童舞象學射御先舞籥籥似笛執而文舞也後舞象武舞也二十而冠始學禮三十有室理男事學無方四十而仕出謀發慮五十服官政是也三就日中為時者言隨時節氣受業易入王制云春夏習詩樂言春夏是陽陽體清詩樂是聲聲以輕清故也秋冬習書禮秋冬是陰陰體重書禮是事事以重濁故也以輕清之時習輕清之業以重濁之時習重濁之事故其氣相感皆易入也然三時之學雖有定規所習善道日不可廢豈可拘於三時哉故學記曰斯焉修焉息焉遊焉是也若修道之士先務博聞後乃日損反乎冥寂以期通玄矣藏亦自有而歸於無也損之又損之以至於無為疏損之者謂損為道者之功行也又損之者謂除忘功行之心也斯乃前損忘跡後損忘心心跡俱忘可謂造極則以至於無為矣義曰修道之階漸臻其妙初則由學而開悟因悟而遵修修則以立功補過積微成著功不在大遇物斯拯過不在小知非則悛過在改而不復為功在立而不中倦洞玄經曰功滿三千白日升天修善有餘坐降雲車斯皆從凡慕道誘勸立功之㫖也夫立功之義蓋亦多途或拯溺扶危濟生度死苟利於物可以勤行或內視養神吐納鍊藏服餌導引猿經鳥伸遺利忘名退身讓物皆修道之初門也既得其門務在勤久勤而能久可以積其善功矣善功既積不得自恃其功矜伐於衆為而不有旋立旋忘功既旋忘心不滯後然謂之雙遣兼忘之至爾經曰上德不德是以有德忘德不恃其德益彰忘功不居其功益廣理國契無為之化修身成不死之基矣無為而無不為注為學者積功行為道者忘損之雖損功行尚有欲損之心兼忘此心則至於泊然無為方彼鏡象而無不應故無不為也疏夫有為則有礙有礙則有所不為今既無為無為則無礙故能無所不為也此謂契道則應用而周普也故上卷云道常無為而無不為也義曰功行既忘忘心亦遣無為之智了能自明既達兼忘吻合於道與道冥契則無所不了無所不知無所不為細合乎稊稗秋毫大合乎陰陽天地非無非有非有非無無所局滯始可與言道矣道常無為而無不為者上經第三十七章之詞也取天下常以無事注無為無事天下歸懷故可取天下也疏此勸人君行無為也取猶攝化也攝化天下必須為無為事無事無事則天下不擾無為則百姓自安以斯臨蒞于何不可言常者無事御物不可斯須離也義曰取謂聚也為國失道衆叛親離為國以道人必悅服離叛則散悅服則聚聚則國泰而昌散則國虛而亡欲聚人之法常以無事為先蒞猶臨也御猶制也攝追也易萃卦正義云萃聚也情同而後聚氣合而後群故方以類聚物以群分聚而無主不散則亂惟有大德之人能弘正道得常通而利正大人為主聚道乃全此謂理國聖人以道德聚民而安天下也故曰取若言取天下非人力所能乎及其有事不足以取天下注有事則有勞煩勞煩則弊故不足以取天下矣疏夫有事謂政令煩苛禁網凝密令苛則人擾網密則刑煩百姓不安四方離散欲求攝化不亦難乎故有此事則不足以取天下矣義曰以道以德為有國之基無事無為乃聚人之本及其有事不足安民但有叛離故難懷聚矣秦皇法嚴而人叛以一統致亡漢武令峻而刑煩故三邊起怨所以秦季年也法如秋察網如脂凝嗷嗷生民無所措其手足矣故土崩瓦解一旦隳亡苛細也煩急亂也理身者常以無事則心逸而神安及其有事則神疲而心擾擾則喪道逸則契真不可不戒也聖人無常心章第四十九疏前章明為道日損示修學忘遺之門此章明聖人無心表虛懷應物之用初六句標聖人無心而應物次兩句示聖人混迹而用心後兩句結百姓歸善之由明聖人均養之德爾義曰理國者在於無事應化亦在於虛心虛心則應物不常無事則臨人可久所以善不善等以善應善化攸同信不信皆以信之信誠無間所謂融心混化萬國所歸安而撫之俱為赤子此聖人之大㫖也聖人無常心以百姓心為心注聖人之心物感則應應在於感故無常心心雖無常惟在化善是常以化百姓心為心矣疏聖人虛心物感斯應應必玄感感貺不一故應無常心心雖無常義存慈救以百姓有不信不善之心故混同用心而以化導故云無常心義曰廣無不覆微無不通大道也化無不周感無不應聖人也聖人化既周普心亦無常從善者固以感通不善者亦令開悟惟德是輔人無棄人周布慈心不遺毫末而聖人無心未始有滯也善者吾善之疏此應感之義也吾者聖人也善者回向正道之心聖人奬之進修以果其行使至夫忘善之大善也義曰夫善者因心所起對惡得名善因惡而彰善勝則惡滅人既善矣聖人因而善之所以誘其進也不善者吾亦善之德善疏不善者謂習染增迷信邪背道聖人亦以善道而引汲之德善者令化聖德而為善也義曰人不知善之可修惡之可改積習為惡迷而不回聖人愍其執愚亦以善道開化化惡為善賴于聖功人無棄人於是乎在信邪者謂世人不知正道迷溺於邪亦猶聵者不預金石之音瞽者不悅玄黃之色邪既增迷故背於正道矣聖人亦以善教教之使分别邪正而歸於善也信者吾信之疏信謂聞道勤行心無疑執聖人應之以至誠贊成其善以至於深信也義曰信者亦起於心因疑以彰信信因疑而立信勝則疑忘人貺信焉聖人因而信之所以勸其志也不信者吾亦信之德信注欲善信者吾因而善信之不善信者吾亦以善信教之令百姓感吾德而善信矣疏不信謂强梁背教之人聖人亦以平等正信而導化之令化聖人之德捨僞而歸信也故云德信義曰人之滯俗積習生疑不知信之可行疑之可捨執疑守惑不信正真此弱喪之忘歸同下士之大笑聖人亦以正信之理漸開悟之知信捨疑賴于聖德德信德善其在兹乎强梁背教者謂執疑之人以疑為是以信為非亦猶夏蟲疑冰井蛙陋海以兹執見封彼邪心聖人亦誘而教之使分别信疑而歸於信所以誘之歸善歸信者聖人恐其因疑獲罪滯惡罹殃勸而勉之蓋惜人憫物之至也聖人在天下惵惵為天下渾其心注聖人在理天下化引百姓常惵惵用心令得善信而聖人凝寂德照圓明渾同用心皆為天下故云為天下渾其心疏此明聖人渾跡用心也惵惵憂勤也聖人在宥天下統御寰中懼衆生不歸善信故惵惵憂勤也然聖人無心復何憂喜今所言惵惵者皆為天下百姓未能信善故聖人混同於物而用其心故云為天下渾其心義曰聖人應天御時順人臨極黃屋左纛黈纊垂旒雖身處九重而心周萬國察臣子邪正知稼穡艱難宥罪寬刑輕徭薄賦既悶悶而不撓亦惵惵而垂憂導惡化疑令歸善信而聖人淡寂常若無心以其無事無心物亦自寧自化矣宥者寬而簡正也寬宥故道行焉混者內外混融無分别之貌也百姓皆注其耳目注百姓化聖德為善故傾注耳目皆觀聽聖人也疏百姓被聖德而歸善仰淳化而觀風故皆傾注耳目以觀聽則於聖人義曰聖德所覃人皆率化上行下效君唱臣隨四海生靈傾耳以聽其言目以觀其事是則是效以歸於道焉聽者側聞也觀者遍覽也聖人皆孩之注聖人念彼蒼生猶如慈母凡視百姓皆如嬰孩疏百姓貺傾注耳目觀聽聖人聖人視之如慈母之於赤子故云皆孩之又解云百姓有分别之心聖人化使從善令如嬰孩無所分别義曰有道聖人慈育萬有萬有奉之如慈母聖人視之如嬰孩如此者則道德周行上下交感人和俗泰不亦宜乎理身者寶氣嗇神氣全神王形神交固則命紀遐延斯神仙可致也聖人化使為善誘以修真先祛不善之心書歸崇善之行善行既著乃忘為善之心無知無為不矜不伐淳淳默默內外混融如彼嬰孩無分别相可謂合於道矣出生人死章第五十疏前章明聖人無心混融應善信之行此章明出生入死善攝超患纍之門前五句標安時處順之人次五句明探變求化之類後八句結善攝之行示長生久視之門義曰天地之德惟生為大得其生已當守道以安之谷神以養之適來不為榮適去不為懼不貪生而喪道不越分而傷生可謂安時而處順矣迷之者求生太厚反失其生善攝者以道自至固無其害以其無死地誠哉言乎安時處順者莊子大宗師篇子祀謂子輿曰且夫得者時也失者順也安時而處順哀樂不能入此古之所謂懸解而不能自解者物有結之矣此言得生者時有生也失死者順化死也處生而安生得生理矣處死而順死得死理矣既無生無死豈有哀樂哉此古之真人無所繫也若在生而惡死樂極之哀來知此之流為生死哀樂之所結矣長生久視之道者此經第五十九章之詞也出生入死注了悟則出生迷執則入死此標也疏了悟生死不厚其生名為出生迷執人我動往死地名為入死此標章門也義曰元精播氣大冶匠形禀陽和則出生歸陰寂則入死將明輟死延生之路喪生趣死之由標此章門似若設問具如下句以答之也生之徒十有三疏徒者類也此泛論衆生能安生理不自矜貴適來為時一無封執如此之者大泛而論十中有三爾此謂順理者少而逆理者多也義曰將生不以為樂而安其生此生之徒也夫當其生也不以利欲亂其心不以厚養傷其性安於淡默順其冲和則神守於形氣保於神志和於氣心寂於志靜定其心如此則不求於延生生自延矣不求於進道道自至矣死之徒十有三注此泛論衆生當生安生得生理處死順死得死理如此者十中有三人爾疏此亦泛論安死之道不拒變化適去為順一無驚怛如此者亦十中有三人爾義曰將死不以為憂而順其死此死之徒也達人處世了悟有無知道之運化委和所禀有厚薄厚於陽和之氣者則壽薄於淳粹者則夭知壽天皆由於分則生死可齊矣生死貺齊則憂樂不入泰然而身心無撓也况髑髏見夢於莊子曰死無君於上無臣於下無四時之事泛然以天地為春秋雖南面而王樂不能過矣莊子不之信曰吾欲使司命復子之生可乎髑髏深臏蹙頞曰吾安能棄南面王樂復為生人之勞乎此雖寓言立理而莊子以世人樂生者為生所拘樂死者為死所繫滯於生死所以有死有生唯至人在生無生不為生之所繫在死無死不為死之所拘貺而不繫不拘故能無生無死然而變而生也不可以止變而死也不可以留但冥契大道則為達生死爾其出死之表長生為期者在乎修真鍊形可以與語議其玄要爾人之生動之死地十有三注徇生太厚以養傷生既心矜此生故動往死地此則生理既失死理亦虧如此之輩亦十中有三人爾疏此釋迷執之人養生失理之徒也言人雖欲修生不能悟了動往喪生之地安生之理既失順死之道又乖如此之輩亦十中有三人爾義曰愚迷之人不知生生者不生化化者不化以生為樂以死為哀畏死貪生故養生過分希生乖其道則反喪其生十中有三人約其大數爾又解云人之禀生有三業十惡三業者一身二心三口業也十惡者身業有三惡一殺生二偷盜三邪淫心業亦有三惡一貪欲二嗔怒三愚癡口業有四惡一兩舌二惡口三妄言四綺語此三業十惡合為十有三矣人能制伏三業十惡則可得道長生可謂生之徒由此十有三也人若縱此三業十惡則必從生趣死可謂死之徒由此十有三也且衆生善必難搆惡乃易成三業十惡日有所犯犯即趣死之徑故云動之死地亦由此十有三也夫三業十惡衆罪之源捨之則可以出生行之則可以入死修身之戒戒之元急此十惡事又各有四緣皆為罪惱之本何者殺生罪中有四種緣一實是衆生二起衆生想三有欲殺心四令斷他命偷盜罪中亦有四緣一實是他物二起他物想三有欲盜心四使移本處邪淫罪中亦有四緣一實是邪境二起邪境想三發邪淫心四身受染樂事兩舌罪中亦有四緣一是所聞人二起前人想三起離間情四發分搆語惡口罪中亦有四緣一是所罵人二起前人想三起惡罵心四發惡罵語妄言罪中亦有四緣一是所欺人二起前人想三有欺妄心四成虛違說綺語罪中亦有四緣一是所對人二起前人想三發綺語心四吐非義語凡此十惡三業計五十三條動罹此罪即之死地慎哉戒哉夫何故疏此設問衆生動之死地之由義曰將攝化之要趣死之因重自設問謂下句也以其生生之厚注所以動之死地夫緣何故但以其求生此生太厚故也疏此正答言衆生動之死地者以其耽滯有為溺情縱欲厚自奉養以全其生養之太厚故動之死地爾義曰天生蒸民愛之甚矣五味以食之五色以章之五聲以悅之五香以娛之五利以用之五氣以和之五官以司之五緯以主之五教以勸之五常以禀之五福以將之居五靈之首為萬彙之長得不自貴而保愛之乎而縱欲適情樂生畏死養之過分自掇死亡非天怒神責由貪生太厚所殺爾故前之十惡三業五十條罪動有所犯寧無過乎且夫躁進者亡勇退者傷得其中者可以議於修身爾蓋聞善攝生者疏攝衛也謂善能以道衛生之人妙觀生本本來清靜於生忘生不以情欲而滑其和唯以冲虛而養其性物莫能害故稱善攝義曰其生也有涯而事也無涯以有涯之生役無涯之事能無傷乎善攝生者於事無事以全其和不以欲嬰心不以利傷己任沖和之自運託虛寂以置懷忘生而生能全體道而道自致虛室生白冥心契玄攝生之善也陸行不遇兕虎入軍不被甲兵疏不期而會曰遇按山海經兕出湘水南蒼黑色爾雅曰形如野牛一角重千斤善攝生之人不起心害物所以陸行不求遇於兕虎入軍不被帶於甲兵故虎兕甲兵無傷之意義曰瀟水湘水出九疑零陵其地有犀兕焉兕虎皆害人之者也兕虎害人甲兵傷敵遇之必有所害敵之必有所傷而善攝生者不干預於兵甲故不為其所傷不求遇於兕虎故不為其所害昔晋人郭文字文舉栖於餘杭大滌山與猛虎同處每出城市虎必隨之人或問之曰先生有道乎何摯獸之馴擾若是也文舉曰人無害獸之心獸無害人之意亦何術乎兕無所投其角虎無所措其爪兵無所容其刃注善攝衛生理之人心照清靜無貪取之意則凡是外物不可加害陸行不求遇兕虎入軍不被帶甲兵此不求害物則物無害心故無投角措爪容刃之地疏前明善攝生之人內無害心所以外不求遇兕虎此明設使逢遇此無傷害之心自然彼無容措之處是知忘情於物者則海上之鷗可馴而狎陸行之獸可繫而遊况傷害乎故無是也義曰攝生之人性與道合慈心廣運己無傷物之心和氣內充物無傷己之執雖遇兕虎必無爪角之傷或值甲兵亦無鋒刃之害以其道德充備物物皆柔服焉狎鷗者有人居於海上其子每於海濱與鷗鳥群相狎而戲其父異之將往觀焉其子先詣嘗遊之所群鷗見之飛翔而不下以其無機心而鷗鳥狎之今有機心則翔而不下則知苟有害物之意虎兕寧容不傷所不傷者機心息於內也神仙傳劉剛字伯鸞與妻樊夫人俱得神仙之道剛為上虞令遊四明山遇虎虎見剛俯伏不敢起以語夫人夫人徑往以繩繫虎而歸如家犬焉蓋道德所攝也如此措置也容受也狎近也習也無置爪受刃之所也夫何故疏此問虎兕兵刃是害人之物今不投措其爪角無容其兵刃者其故何也假問其故以曉於人義曰欲明善攝生之人無趣死之地復重發問將以勉勵於修行耳以其無死地注夫何故兕虎甲兵無容措之所乎以其順化無私不以死為死則物不得害其生故云無死地疏此正答也夫見有其身者纍生生之厚者死今善攝生之人照法性空悟身相假故能於生忘生不為厚養之過無私順化故無死地可處爾貺心無死地夫何虎兕兵刃能害其生乎義曰大聖演經廣弘道要欲使人皆趣善衆盡寶生趣善則無過無疵寶生則懷道懷德無過疵則不履死地懷道德則可致遐齡自無兵刃爪角之傷可合清淨希夷之道理國之君不懷五兵之力四境協寧能開三面之羅百獸率舞何所加害乎道德真經廣聖義卷之三十六
