front:
  text: 道德真經廣聖義卷之十八羊七
  hash: sha256:b62beb334833956bc565bfcaf2736e177dffb54bb6a490c6381830cd571831e6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0114_HFL_019-001a, image: hfl/0443/0443-004.png}
body:
  text: 唐廣成先生杜光庭述絶學無憂章第二十疏前章明絶棄多門還淳則盜賊無有此章明畏除俗學若昏故獨異於人首一句標門以示絶次七句舉喻以明理又一十七句格凡聖以對辨後兩句論獨行以結成義曰絶日益之學以務恬和除浮華之事則無憂患舉唯阿恭慢之譬將喻絶與不絶之理爾絶與不絶皆出於心唯之與阿皆譍於口絶則契沖靜而歸道不絶則溺智見而喪真唯則恭謹而無尤阿則傲慢而招罪同出於心口而吉凶異焉人之所畏者畏招罪與喪真而不能絶知見而恭謹既知之矣不可不畏此勸勉於絶學也衆人行反於道聖人故獨異之棄太牢之滋味間春臺之心目除明察之弊去有以之為繩繩悶悶內襲氣母如嬰兒之行以含乎至真也絶學無憂注絶有為俗學則淳朴不散少私寡欲故無憂也疏絶學者絶有為之俗學也夫人之稟生必有真素越分求學傷性則多若令都絶不為是使物無修習今即乃絶有為過分之學義曰絶者除斷之義老君將令後代之人漸慕淳和斷絶妄習故有絶學之文有為俗學者謂俗間有為之學也自三代以下胸胸焉終以賞罰為事則天下之人何暇安性命之情哉故悅於明者是淫於色也悅於聰者是淫於聲也悅於仁者是亂於德也悅於義者是悖於理也悅於禮者是助於詐也悅於樂者是助於淫也悅於聖者是助於藝也悅於知者是助於疵也此八者學之大也安其所稟之分則無過求之悅矣若所稟之外越分過求悅而習之則致淫悖之患而傷其自然之和亂其天稟之性矣若令都絶又失所修但任真常於理為得疏莊子所謂俗學而求復其初者爾若分內之學因性之為上士勤行未為不絶故曰絶學無憂義曰莊子繕性篇云俗學求復其初者謂世間之人已治性命於俗矣而欲以俗學復性命之本則愈非其道也斯為蒙蔽之民去道遠矣曷若無以知為而任其自知雖智周萬物而恬然自得矣分內者謂因其性分而任其真素也夫任真智則智矣矯於分外則為詐也任其真禮則禮矣矯於分外則為亂也任其真忠則忠矣矯於分外則佞矣任其真仁則仁矣矯於分外則諂也任其真義則義矣矯於分外則盜也任其真信則信矣矯於分外則誣也矯於分外則失而多憂任於分內則真而無懼故曰絶學無憂也上士勤行者守真朴不妄為也唯之與阿相去幾何善之與惡相去何若注唯則恭譍阿則慢譍同出於口故云相去幾何恭譍則善慢譍則惡以喻俗學絶之則無憂不絶則生患只在心識回照豈在相去遠哉疏唯恭譍也禮曰先生召無諾唯而起義曰唯者聲謹而貌恭譍譍答也先生父兄師長也召呼召也父兄之召若譍之以諾尚慮遲回聞命即往故唯而起也論語曰有酒食先生饌注云先生謂父兄也從先生不得越道與人語言恭謹而從之其義皆同於恭謹也疏阿慢譍也漢書曰不誰何綰謂何問也此舉喻也唯之與阿同出於口唯恭則善阿慢則惡學之絶否只在於心而絶之則無憂不絶則生患同出於口故云相去幾何只在於心故云相去何若若能了學無學學相皆空於知忘知不生分别則唯阿齊致善惡兩忘義曰此明恭譍慢譍同出於口而善惡異焉絶學不絶同出於心而憂樂異焉不絶則憂心役慮絶學則志泰神和學無學者日損之謂也化胡經曰文始學無學能伏于闐雄言以無為之道能伏強獷之俗也西升經云吾學無所學乃能明自然德經云學不學服衆人之所過此皆絶除之旨也能知此旨則學相皆空矣夫世間萬法無非有為有為之事皆當滅壞故皆空也唯無為無事清靜恬愈內合真常外無分别以此則唯阿齊其一致善惡以之謂兩忘也人之所畏不可不畏注凡人之所畏者慢與惡也善人之所畏者俗學與有為也皆當絶之故不可不畏疏人之所畏者畏慢與惡也夫慢則為過惡則被嫌被嫌則人所棄薄為過則物多尤怨以況有為俗學增長是非若不畏而絶之是皆違分傷性故不可不畏而絶之義曰慢與惡招過人知畏之而不知俗學增長是非動生尤悔而不畏也故有道之士畏於俗學越分傷性棄而絶之愈於俗中之人畏慢之與惡也荒兮其未央哉注若不畏絶俗學則衆生正性荒廢其未有央止之時疏荒廢也慢惡為過俗學失真是皆可畏故當棄絶若不絶而棄之則正性荒廢其未有央止之時義曰央中也亦旦也止也俗學者明則生苛察智則生是非邪則生荒淫妄則生誇誕少則生企慕多則生疲勞勇則生紛競藝則生優劣惡勝己而求勝慕多聞而求多苦忘勞神役心損性是乖於真素也故曰失真既乖真素則荒廢正性如彼美土本無穢雜而蒿蘭荆棘滋蔓於其間荒而穢之傷土真性俗學荒人真性亦如草之滋蔓故云荒也春秋曰無使滋蔓難圖也蔓草不可除是其義矣疏詩曰夜未央言更漏尚多也此云其未央言俗學傷性無息止期故前途尚多云未央義曰俗學之長觸類而生若不絶除方將日益故荒亂渺然殊未央止也周詩小雅庭燎篇云夜未央央旦也未央言夜未巨央也俗學不絶未可盡也衆人熙熙如享太牢如登春臺注衆人俗學有為熙熙逐境如臨享太牢春臺登望動生貪欲也疏熙熙者情欲淫動之貌也此明不畏絶學之人也夫俗學有為動生情欲熙熙逐境役役終身若餒夫之臨享太牢恣貪滋味冶容之春臺登望動生愛著義曰冶容者易繫云冶容誨淫言女之容色夭冶而不精慤其行動生淫泆况春臺登望乎熙熙和悅之貌也俗學之人動溺其性熙熙自悅不覺為勞然而逐境牽情是非相擾吉凶得喪由此而生則有六印垂腰五府交辟一怒而諸侯懼安居而天下息繁華忽其滿志富貴樂其當年五鼎列食猒太牢之盈味衆芳悅性喜春臺之縱目至有燕姝洛豔楚舞吳歌八音聵其聰五色熏其鑒樂則樂矣終復如何其或泰往否來福終禍起變熙熙之樂為惴惴之憂也仲尼謂顔回曰昔吾以樂天知命之不憂今乃知樂天知命憂之大也聖人猶若此況於常乎豈若縱神於自得之場適性於忘知之境乎疏太牢者牛羊豕也義曰禮器云太牢而祭不必有餘言稱牲之大小也又云諸侯七牢大夫五牢故春秋吳徴魯之百牢是矣夫牛羊豕三牲通謂之牢牛者祭之牢也天子以犧牛謂全色也諸侯以肥牛大夫以牽生求得即用無所擇也牛謂一元大武將祭必繫於牢芻之三月所養必有其式以備不常如左傳鼷鼠食郊牛角乃改卜牲也羊者天子舋廟開冰告朔皆用之謂之柔毛孟春食麥與羊是也豕者天子之祭皆用之以備三牲則牛曰太牢羊曰中牢豕曰少牢曰剛鬣是也禮天子無故不殺牛大夫無故不殺犬彘謂其皆祭禮所用非祭而殺是曰無故也牢者取其四固以養犧牲故通謂之牢矣疏春臺所以為愛著者謂其卉木滋榮禽鳥鳴匹陽和陶然易淫蕩也故邠詩云春日遲遲采蘩祁祁女心傷悲逮及公子同歸義曰築土曰臺又曰因高為臺言升高肆望也夫春之氣也天地絪緼萬物交感和風舒暖陽景遲遲登臺肆目煦然蕩矣倉庚既鳴春之候也采蘩生蠶之時蘩皤蒿也祁祁衆多也傷悲感事之苦也春女感陽而悲生秋男感陰而思起此固陰陽常理物化使然也逮始也及與也思歸嫁於公子故言同歸禮二月為匹偶之月女心傷春思匹配也邠詩國風七月篇之辭也倉庚箋云鸝黃也我獨怕兮其未兆如嬰兒之未孩注我獨怕然安靜至於貪欲略無形兆如彼嬰兒未能孩孺也疏我老君自稱言也我畏絶俗學抱道含和獨能怕然安靜於彼代間有為之事情欲等法略無形兆如彼嬰兒未能孩笑無分别也孩者别人之意莊子曰不至于孩而始誰義曰怕兮者安靜無為之貌也兆形狀之初也老君見代之人物變化云為馳騁利名耽營俗學留連情欲凋喪天和皆歸於空非為了出乃教其冥視聽之域絶思慮之源令若嬰兒無所分别不知不識深含玄虛嬰兒者未分别於人孩者有分别也萬事無形兆忘懷之至也莊子天運篇老君謂子貢曰三皇五帝之理天下不同舜為天下也使人心競故孕婦十月生子子生五月而能言不至乎孩而始誰此言心競者有分别也既有分别和氣將離五月能言時漸急也自此物多大落也家語本命篇曰人生三月而微眴然後目能見八月生齒然後能食期而生臏然後能行三年間合然後能言今五月而言和散而澆急也乘乘兮若無所歸注至人無心運動隨物無所取與若行者之無所歸乘乘運動貌也疏乘乘運動之貌衆人動生耽著常有所求故若有所歸往我本無心怕然安靜乘流則逝值坎則止若彼行道之人無所歸趣不汲汲也義曰衆人耽著所求者趣於俗學有求勝之心耽其世欲有營為之念運動心慮奔逐所求故若有歸也者若無心不著諸見悠悠自得何所滯焉喻如水也決之則流壅之則止不與物競亦無所求故若無所歸也衆人皆有餘注耽著塵務矜誇巧智自為有餘以示光大也而我獨若遺注常若不足有所遺忘也疏衆人俗學耽著矜誇巧智是法皆執自為有餘我獨損之未嘗凝滯心無愛染故若遺忘義曰衆人矜誇俗學以立功名巧智相高財利相勝於彼世法各言有餘矣老君忘心息智無滯無矜恍惚任心若遺忘也我愚人之心也哉純純兮注我豈愚人之心遺忘若此也哉但我心純純故若遺爾疏言我於諸法中體了無著故若遺忘豈則若愚人之心也哉但我心純純質朴無愛欲故若遺忘爾義曰老君為化物之本源乾坤之宗主萬智周備聖德玄通而示以無心而泯合乎道者所務世人淳朴其志以反澆漓收視滅聽以歸道德爾非謂本來所稟愚冥而若遺失也俗人昭昭注矜巧智也我獨若昏注自韜晦也俗人察察注立法制也我獨悶悶注唯寬大也疏昭昭者自矜衒巧智也若昏者如昏昧無所分别也察察者於教立法以繩下也悶悶者無心寬大之意也所以昭昭矜衒察察施教者皆由不絶俗學與有為故聖人畏絶若昏默也義曰上惟君后下及兆人徇俗學之心忘大朴之本理國則昭昭矜其聖智察察申其典章聖智愈作而政愈煩典章益明而人益弊老君昏昏默默不化而自行也莊子曰至道之極昏昏默默昏昏者韜光默默者不言也忽若晦寂兮似無所止注容貌忽然若昏晦而心寂兮絶於俗學似無所止著也疏絶學行人忽忽無心常若昏昧而心寂然曾不愛染於法無住故似無所止著爾義曰晦昧暗也寂虛靜也既絶俗學不矜其智不著有為不住有法不止於有不滯於無空有都忘深入玄要矣衆人皆有以注衆人於代間皆有所以逐境俗學之意者也我獨頑似鄙注頑者無分别鄙者陋不足而心實了悟外若不足故云似爾疏凡俗之人不畏俗學常有所以耽滯逐境未曾休息我於代間獨無分别有所鄙陋頑者無分别也鄙者陋不足也而心實了悟故云似爾衆人熙熙下皆對明也義曰世之衆人動循俗法皆執有為故云有以以者為也老君內了萬法深洞道源外示昏愚若似頑鄙下經曰天下皆謂我道大似不肖若肖久矣其細也夫亦此旨也自衆人熙熙下六番聖行以對俗學是俗明其必須絶除而宗大道也我獨異於人注人有情欲我無愛染人與道反我與道同爾而貴求食於母注求食於母者貴如嬰兒無營欲爾故上文云如嬰兒之未孩下經云含德之厚比於赤子如此所以獨異於人也先無求於兩字今所加也且聖人説經本無避諱今代為教則有嫌疑暢理故義不可移臨文則句須穩便便今存古是所庶幾又司馬遷云老君説五千餘言則明理詣而息言不必以五千為定格也疏此兩句結成也我獨異於人者異於不絶俗學之凡人也即上對明諸與凡人異凡人愛染有為我獨遺忘情欲人於諸法分别我獨等無是非故云異於人義曰首標絶學兩字恐人未能頓明相次對持凡有十一别一者絶學無憂不絶學則多憂二者唯則恭譍而為善阿則慢譍而為惡三者善則人所尚惡則人所惡四者衆人有太牢春臺之美我則守淡泊嬰兒之行五者衆人有所趣我則無所歸六者衆人矜有餘我獨若遺忘七者俗人昭昭而明我獨昏昏若暗八者俗人察察立法我獨悶悶寬大九者衆人有所止我獨無所著十者衆人皆有為我獨若不足十一者衆人耽榮味我獨餐元和此十一者與俗對持即明俗學可絶而無為可習也故疏云衆人有愛染我獨忘情欲衆人於諸法分别我獨無是非所以異於人也疏老君戒人守朴全和少私寡欲絶視聽之耽著杜聲名之奔競令如嬰兒但求食於母爾故云而貴求食於母義曰如嬰兒之行無外所牽但知求食於母而無紛競之纍也此聖旨所解今詳其理母者氣也人之稟象因氣而生氣為茂養故謂之母十一門中皆明有為之學無益於身習道之人俱令棄絶行與俗異故云獨異於人俗學既已絶除唯餌氣餐和歸根復命是所行之法爾黃庭經曰人皆食穀與五味我食太和陰陽氣又曰百穀之實土地精五味外美邪魔腥臭亂神明胎氣零那能反老得還嬰何不食氣太和精故能不死入黃寧是也家語云食氣者神明而壽理無疑矣大約理國則在於守靜默除淫苛人君服道而鶉居臣下崇德而弘道前則修身之旨此乃理國之規也道德真經廣聖義卷之十八
