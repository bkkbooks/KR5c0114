front:
  text: 道德真經廣聖義卷之十五羊四
  hash: sha256:dbc34b1556f79d934fccf7b60bf868a6bcf55b6e1f1d75d2b55fc4b5428e5ea0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0114_HFL_016-001a, image: hfl/0442/0442-120.png}
body:
  text: 唐廣成先生杜光庭述致虛極章第十六疏前章明玄通之士常保道而不盈此章明守靜之人必歸根而復命復命為知常之要守靜是致虛之由文相次以轉明理同歸於用道故知常則明了行道乃久長義曰保道運修前章得徐清徐生之用致虛內守此章明歸根復命之常雖公正以為王必法天而體道體道則久故無殆危矣致虛極守靜篤注虛極者妙本也言人受生皆稟虛極妙本及形有受納則妙本離散今欲令虛極妙本必致於身當須絶棄塵境染滯守此雌靜篤厚則虛極之道自致於身矣疏虛極者妙本也言人受生皆稟虛極妙本是為正性義曰虛極者妙本之道也人之受生稟道為本所稟之性無雜無塵故云正也既生之後其正遷訛染習世塵淪迷俗境正道乃喪邪幻日侵老君戒云修道之士當須息纍欲之機歸靜篤之趣乃可致虛極之道爾篤厚也疏及受生之後六根受染五欲奔競則正性離散失妙本矣義曰稟道之性本來清靜及生之後漸染諸塵障翳內心迷失真道六根者一曰眼根能見諸境二曰耳根能聞諸聲三曰意根能生攀緣四曰鼻根能辨香臭五曰舌根能知諸味六曰身根能生諸惱以此六種生諸罪因展轉相生障弊真性喻如草木結花吐實相生不窮尋其所起不離六種如根生物名曰六根五欲者眼欲諸色耳欲諸聲鼻欲諸香口欲諸味心生衆欲障弊五情煩惱縈纏皆由此起內心悅慕謂之愛外境著心謂之染因境生心謂之欲制止不已謂之奔意想交侵謂之競正性流散隨念生邪以生邪故乖失正本疏欲令虛極妙本必自致於身者當須守此雌靜篤厚性情而絶欲無狹而不猒則虛極妙本自致於身義曰隨念生邪既云失道欲其妙道却復於身者當須守雌柔貞靜之行篤厚恬和之性以制其情情者末也性者本也自性而生情則隨境為欲自情而養性則息念歸元歸元則五欲不生六根不動無猒其氣無狹其心則妙本之道自致於身矣無狹其所居無猒其所生德經第三十四章之詞也西升經曰心之虛也則和氣歸疏亦由水之流濕火之就燥矣致者令必自來如春秋致師之義義曰水流濕火就燥者易乾卦九五爻詞也言水火二者無情之物而以形氣相感水流其地先就於濕火焚其物先就於乾無識無情猶感應如此況虛心靜慮而不能致道乎固可不求而道自至也致師者春秋宣公十二年楚莊王圍鄭旬有七日鄭人卜行成不吉國人大臨楚莊退師鄭人修城圍之三月克之鄭伯肉袒牽羊以逆楚王既而許之平潘尪入盟子良出質夏六月晉師救鄭及敖鄗之間楚莊乃求成於晉盟有日矣楚許伯御樂伯攝叔為右欲單車挑戰示不欲和以致晉師許伯曰吾聞致師者御靡旌麾纍而還樂伯曰致師者左射之以菆代御執轡御下兩馬掉鞅而還攝叔曰致師者右入壘折馘斬俘而還皆行其所聞而復晉人逐之樂伯左射馬右射人逐不能進時魏錡趙旃有憾於晉請使於楚皆欲晉敗彘子又不設備戰于邲晉師敗績焉以此致師師必成敵亦猶以靜致道道必可求也萬物並作吾以觀其復注老君云何以知守此雌靜則能致虛極乎但觀萬物動作云為及其歸復常在於靜故知耳疏此明守靜篤必致虛極之意夫萬物萬形動作不同觀其歸復常在於本義曰物雖動作萬殊必復歸其本人能虛心念道道必集其虛故戒令虛心以念於道也疏易曰雷在地中復復者反本之謂也故靜則歸復動則失本義曰易復卦象曰雷在地中復者雷是動物復卦以動息為主故曰雷在地中先王以至日閉關商旅不行后不省方皆取動息之義以復其本也萬物並作者動也以觀其復者息也當息而動當動而息則失其本矣夫物藝藝各復歸其根注又云所以知萬物歸復常在於靜者為萬物花葉藝藝生性皆復歸於其根本或有作云云者云云動作也言夫物藝藝動作者及其歸復皆在於根本爾疏此舉喻明觀復之意也根者本所受氣而生也今觀萬物花葉藝藝乃其生性皆復歸於其根而生義曰藝藝茂盛貌也百草衆木藝藝茂盛及其枯落則各歸其根而更生茂盛動作也歸根復息也物理皆然矣人稟道而生本源澄靜既生於世利欲所牽妍醜盛衰富貴貧賤萬途千慮勞性役神或轉地回天有非常之勢或立功懋績有不世之名或扛鼎拔山或伸鈎索鐵或輕車肥馬或高蓋朱輪權傾於許史金張榮邁於五侯七貴藝藝之盛固不可偕及其數極勢移俄為丘壠此以歸其根而靜矣若能猒棄榮祿了悟浮華虛心谷神靜慮思道豈不能致道哉疏虛極妙本人之所稟而生也今觀性欲熙熙能守靜致虛則正性歸復命元而長久矣本作云云者如注釋之義曰熙熙佚樂之貌也人之情欲熙熙如華葉茂盛也茂盛則不久枯落熙熙則必致傷生故令去欲閉情以復於道云云者或為衆多之貌爾歸根曰靜靜曰復命注花葉者生性歸根則靜止矣人能歸根至靜可謂復所稟之性命也疏物歸根則安靜人守靜則致虛木之稟生者根歸根故復命之人稟生者妙本今能守靜致虛可謂歸復所稟之性命也義曰物以茂盛為動作凋落為歸根人以逐欲而動則遷情息念而靜則合道遷情則流遁合道則還元所以靜而致道者是復歸所稟妙本之性命也復命曰常疏能守雌靜篤厚以致虛極妙本致虛則復命可謂得常矣義曰去情欲守沖和復契章首致虛守靜之教則得其常矣知常曰明注守靜復命可謂有常知守常者更益明了也不知常妄作凶注不恆其德或承之羞失常妄作窮凶必然矣疏能知守常是曰明了失常妄作可謂無恆不恆其德窮凶必矣注云不恆其德或承之羞者易恆卦文也義曰常者垂久不移之義也天地曰月得常而清寧久照人君理國得常而貞正無為人能守常則終始不易故常者道德之紀也去欲守靜復命得常可謂照明了達矣反於此者乃是妄作非道故致災凶不恆其德者易恆卦九三曰不恆其德或承之羞恆常也處不得中進退不定雖在恆中而乖恆體實可恥惡故曰或承之羞彖曰不恆其德無所容也知常容注知守真常則心境虛靜如彼空谷無不含容疏知常曰明明則鑒物物來必應無不含容故曰知常容義曰恆常其德即有所容此反契前彖詞之義也得常體道玄鑒無遺應物順常含弘光大也容乃公注含容應物應物無心既無私邪故為公正矣公乃王注能公正無私者則為物所歸往疏能含容應物乃公正無私則天下歸往是為王矣義曰知常順道故能公正而為王也有道之人不言而自化不召而自來故天下歸往也王者以物歸往為義王乃天注羣物樂推如天之覆則與天合德矣天乃道注王德如天乃能行道疏惟天為大惟王則之其德同天而無不覆故曰王乃天王德如天則無為而理道化乃行故云天乃道義曰以物歸往乃可配天子育萬方告類上帝法天廣覆法地無為王以法天天以法道也道乃久注道行天下乃可以久享福祚矣殁身不殆注同天行道則終殁其身長無危殆之事疏言守靜致虛歸根復命其德如此可以為王王德合天乃能行道道行乃久享福祚天下之人就之如日戴之如天澤之如雨望之如春故終殁其身復何危殆之事故曰殁身不殆義曰此教人君積德之謂也人君雖承平御極握紀臨人若乖道德豈能長久所以先虛其心次守其靜虛靜致道乃復於常而能公正無私人所歸往應天合道行道化人道化大行天下欣戴故能運祚長久不殆不危如日之照臨如天之覆育如雨之潤澤如春之溫和雖終殁其身盛德不泯如今之歌詠堯舜鼓舞義農矣戴之如天就之如日者堯之德也道德真經廣聖義卷之十五
