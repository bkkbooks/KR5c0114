front:
  text: 道德真經廣聖義卷之二十三羊十二
  hash: sha256:367632446ad1d1613ca4a2cbe8052c488475d15011adcd86467f7268dfb82656
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0114_HFL_024-001a, image: hfl/0443/0443-148.png}
body:
  text: 唐廣成先生杜光庭述善行無轍迹章第二十七疏前章明重靜為君以誡身輕天下此章明言行無滯欲令常善救人守重靜理國在無為善行言貴乎忘遺首標五善之行次明善救之慈善人下暢兼忘之訓雖知下結妙要之首爾義曰前垂輕躁之戒乃君臣守位之規此標五善之文明修道參真之行至於救人救物表無棄之慈為師為資暢相須之旨再彰要妙戒彼久迷爾善行無轍迹注於諸法中體了真性行無行相故云善行如此則心與道冥故無轍迹可尋求也疏此明法性清淨也行謂修行也法性清淨是曰重玄雖藉勤行必須無著次來次滅行無行相心與道合故云善行如此則空有一齊心境俱淨欲求轍迹不亦難乎故云善行無轍迹義曰法性清淨本合於道道分元氣而生於人靈府智性元本清淨既生之後有諸染欲瀆亂其真故去道日遠矣善修行之人閉其六欲息其五情除諸見法滅諸有相內虛靈臺而索其真性復歸元本則清淨矣雖約教法三乘之行修復其性於法不住行相之中亦不滯著次來者修次修者滅滅空離有等一清淨故無心迹可得而見於內曰心心既寂矣於外曰境境亦忘之所以心寂境忘兩途不滯既於心而悟非假遠求無車轍之迹出於四外矣帝王以清淨之道以化於人混然大同萬國風靡固不煩車轍馬迹布於天下此謂理身與國皆得善行之妙也善言無瑕謫注能了言教不為滯執遺象求意理證言忘故於言教之中無瑕疵謫過也疏此明善行之人不滯言教也瑕病也謫責也言謂言教也夫善行無迹則能了言教不為執滯於言忘言是善言也能如此遺象存意理照言忘於彼言教一無病責故云善言無瑕謫義曰疵病也聖人知代人不可無言以訓故立言以明教因教以訓人衆人則執教而滯言故有瑕疵之病謫責之過不通於理不達於道言愈多而道愈遠矣善修行之人因言而悟教因教而達理尋理而契道契道而忘言故無瑕疵之病謫責之過也易略例云言生於象故可尋言以觀象象生於意故可尋象以觀意意以象盡象以言著故得意而忘象得象而忘言存言者非得象也存象者非得意也象生於意而存象焉所存者乃非其象也言生於象而存言焉所存者乃非其言也象者似也以所詮義理非言説所及非心智所思不異忘言絶慮之真體故云象似也喻如臨鏡照影影非骨肉之身若執影為身即失真影若不因影無以識其真身鏡喻言也影喻象也身喻意也言得意者但冥契真心矣於法有三謂言象意也言喻能詮意喻所詮象通所能是則遺象而存意得理而忘言達於此者則無瑕疵謫責之事矣善計不用籌算注能了諸法本無二門一以貫之不生他見故無勞籌算自能照了計無計相非善而何疏此明言教無滯則不計異門也夫執言執行辨是與非適令巧曆亦不能計若能了諸法皆方便門究竟清淨不生他見則無勞籌策算數自能深入一乘善計若斯何勞籌算故云善計不用籌算義曰籌計策皆算也算長尺有握握者算之本手執處也握外長尺矣投壺射皆用算以記勝負故射禮云多算飲少算是也投壼禮曰左右告矢具則司射坐而釋一算焉卒投司射執算請數二算為純一算為奇遂以奇算告曰某賢於某或多或鈞勝者飲不勝者是知凡籌量計數皆用算以定之故國有算學始自黃帝之臣隸首始以數演算數者生於道也春秋曰道生而有氣氣生而後有滋滋生而後有象象生而後有數由是而算興焉夫明天地之度察品物之數考陰陽之變窮律曆之元皆以算而後能定其少多也故數之大約有數有度有量有衡數起於一至十十至百百至千千至萬萬至億億至兆兆至京京至垓垓至棟棟至壞壤至溝溝至間間至正正至載下數言十即變中言萬即變上數言萬萬而變也度之所起起於忽十忽為絲十絲為釐十釐為毫十毫為分十分為寸十寸為尺十尺為丈三尺為跬六尺為步七尺為仞八尺為尋倍尋為常三百步為里二千九百三十二里為度矣量之所起起於圭六粟為圭十圭為抄十抄為撮十撮為勺十勺為合十合為升十升為斗十斗為石四升為豆四豆為甌四甌為釜四釜為鐘十六斗為庾六斗四升為斛十六斗亦為藪十六斛為秉聘禮又云十斗曰斛十六斗曰藪十藪曰秉鄭玄又云斗二升曰斛矣衡之所起起於黍十黍為絫十絫為銖二十四銖為兩六銖為分十六兩為斤三十斤為鈞四鈞為碩二十兩為鎰是矣此四等之數蓋人間籌算之法大則品量天地孝校陰陽造化不能藏其機鬼神不能逃其數矣若修道之士不計異門守一而已何用計術乎夫一者道也至貴無偶一而不二萬化之首靡不由之天得一以清地得一以寧恍惚之象杳冥之精皆謂一也聖人抱一以法天下至人得一以升雲天故一者能存能亡能晦能光能圓能方能柔能剛渴者思一一與之槳飢者思一一與之糧守一以成道固不用籌算而為善計也善閉無關鍵而不可開注兼忘言行不入異門心無逐境之迷境無起心之纍雖無關鍵其可開乎疏此明不計異門則欲心自閉也橫曰關竪曰鍵夫善行善言不耽不滯心照清淨境塵不起故云善閉雖無關鍵其可開乎故云善閉無關鍵而不可開義曰夫關鍵之設所以限內外也易繫云重門擊柝以待暴客謂關鍵隔限時其啓閉若善閉於國則均一玄化遐邇大同外無干戈邊無烽燧不設關塹而人無交侵天下有道守在四夷是也不善閉於國者則四郊多壘𡑅境興師雖有山川之險關防之固守之非德釁生墻廡敵起舟中雖有關防莫能制也豈可謂之善閉乎善修行之人守真抱一無欲無營知萬法之門是階修之漸不滯於法不執於言不計異門不求博贍閉三關而自靜祛衆念而自安聲色不能惑其心軒冕不能啓其志此之善閉其可開乎善結無繩約而不可解注體了真性本以虛忘若能虛忘則心與道合雖無繩索約束其可解而散乎疏此明善閉之人心與道合也結繫也繩索也約束也解散也夫坐忘遺照深契道源於諸法中盡能不滯繫心於此故云善結夫用繩約者繩散則為約解以道結者心靜則道冥適使萬緣盡興終能一無所染雖無繩索約束豈可解而散乎故云善結無繩約而不可解義曰繩約之結可解可散世之常法也結人之心或離或合世之常交也理國之善結者其德如天物無不覆其仁如地物無不載其明如日物無不照其利如水物無不潤則六合之心億兆之衆可結而不可散也不善結者臨之以威峻之以令檢之以法脅之以兵人或畏之暫結而散矣其散也雖誘之以賞啖之以利榮之以爵貴之以位已散之心不可復結矣理身之惑者務以博聞旁求術戴學曰益而心日散法愈多而神愈勞欲以淡泊結其心不可得也善修行之人萬慮都忘一念不二靜契於道與真合同萬緣不能侵諸見不能誘此之善結其可解乎是以聖人常善救人故無棄人疏是以者引下以明上也言聖人心雖冥寂教則流通故常用五善以救人令必釋然而達解大慈平等無所偏隔凡是於人盡皆善誘故云常善救人而無棄人義曰聖人者謂用道之聖人也聖人常以善道廣誘於人人聞法音皆能悟解隨其深淺必獲利焉開悟之門數以甚衆或因言得悟或因教得悟或聞經得悟或睹相得悟開悟之由不一誘勸之法亦多大慈悲心等無憎愛一一接引令入法門既入法門捨惡為善人皆為善則無棄人矣夫棄人者謂其為不善之行興害物之心物被其害與之為敵惡積於明顯者人得而誅之惡積於幽暗者鬼得而誅之為人鬼所誅者是為人鬼所棄矣今若皆修善行無惡無尤悉變善人何棄之有五善者謂善言善行善計善閉善結等行也論語云孔子善誘於人誘者導引之也常善救物故無棄物注是以聖人常用此五善之教以教之故無棄者也疏物者通有識無識也救人善教故不棄人救物善心亦無棄物令動植感遂無有夭傷者也故云常善救物故無棄物義曰用道聖人以前五善之教教人為善人皆化善故無棄人又以無事無為不勞於物物皆遂性無害無傷信及豚魚澤周草木人皆化善不害於物此明聖人救物也物無所害各遂其常此明故無棄物是謂襲明注密用曰襲五善之行在於忘遣忘遣則無迹矣故云密用密用則了悟矣故謂之明爾疏襲密用也明了悟也善行救人在於忘遣若滯教矜有轍迹必存故雖常善救人終使慧心無滯如此密用則能了悟故云是謂襲明義曰聖旨以密用善功了悟無滯不存於迹謂之襲明又解襲者承續也言人靈府之性本來明淨為塵所翳迷惑天真今以五善之行內洗其心真性復明慧照如本然當常行善救無起妄塵承襲慧明無使昏翳不矜於迹不滯於常可謂襲明也故善人不善人之師注師法也夫善人者離諸愛染則心清淨於法無滯則教圓通取喻於水物來斯鑒所鑒者照形而有象能鑒者見象而無心善人正慧若斯故可為不善人師法疏曰夫不為諸惡守法循常無侵於人無傷於物者善人也人之為善者天地愛之神明護之不習道而行合於道不明法而心契於法不傷於物物亦不傷之不害於人人亦不害之如此則動靜運為常獲貞吉惡人慕其貞吉亦當化而為善是可為不善人之師也春秋云鄭人以鄉校論其執政然明以其謗議國政欲毁之子産曰若朝夕遊之聞執政之善否其所善者吾則行之其所惡者吾則改之是吾師也若之何毀我聞忠善以損怨不聞作威以防怨若遽止之由防川也夫決傷人必多不克救矣不如小決使導然明悅之孔子曰人謂子産不仁吾不信也書曰能自得師者聖人也夫師者有法可範之謂也學記曰安其學而親其師樂其友而信其道雖離師輔而不及也若隱其學而疾其師若其難而不知其益也君子知教之所由興又知教之所由廢然後可為人師獨學而無友孤陋而寡聞是故擇師不可不慎也義曰君子知至學之難易而知其美惡然後能博喻能博喻然後能為師能為師然後能為長能為長然後能為君故師者所以學為君也當其為君不為臣也太學之禮雖詔於天子無北面所以尊師也善學者師逸而功倍不善學者師勤而功半又從而怨之言先王事師之道無北面王行而西折而南面東而立師尚父面西以道書之旨以教於王故曰在三之義君父師也師無當於五服五服不得不親是則為師之道不亦重乎况至人心無染著於法不滯應物而為鑒鑒物而無心乃真道之師也善人者邦國之所貴也春秋羊舌職曰吾聞之禹舉善人不善人遠矣詩云戰戰兢兢如臨深淵如履薄冰此善人在上也此謂宣公十六年晉滅赤狄士會獻狄俘于定王王以黻冕卿服命士會將中軍且為太傅於是晉國之盜逃奔于秦故羊舌職美之曰善人在上國無幸人人之多幸國之不幸無善人之謂也若此則善人者邦國之寶豈惟師乎不善人善人之資注師法也資取也善人可師法不善人可取以役使也疏資取也夫火有其炎寒暑附之聞道勤行必資宗匠既悅先生之善須伏弟子之勞則不善之人善人可取使役耳義曰善人既以善行能化不善之人則不善之人景慕服從為之使役論語云有事弟子服其勞先生者父兄師長也則弟子事師服膺從教也夫人之立身有三尊焉事父母以孝事君以忠事師以敬身體髮膚父母生之也道德禮樂師以教之也爵祿品位君以榮之也雖道在即請學無常師凡申請益之儀便有在三之敬矣不貴其師不愛其資注此章深旨教以兼忘若存師資未為極致今所以貴師為存學相學相既空自無所貴所以愛資為存教相於教忘教故不愛資貴愛兩忘而道自化矣雖知大迷是謂要妙注師資兩忘是謂玄德凡俗不悟以為大迷以道觀之是謂要也疏夫初地修進兩存學相未能忘言教故貴愛師資若能了悟行門則學無所學師資之名既失貴愛之目不存義曰初地修行者謂從凡覺悟回向正道捨凡從信初入法門謂之初地本際經云夫為學者初修十事以為階梯如人緣梯從初一桄至第二桄乃至於頂升階之人自下至高要須先習此十行法然後乃能深入正觀一者初地之人先因善欲有欲樂心乃能進趣二者親近善友導引其心深信正道三者簉詣明師師有妙法廣能宣告示以要術四者既聞正教能受讀誦五者能出家專行柔弱永斷有為離諸桎梏六者參受正戒防身口心七者幽隱山林棲遁獨處求離囂塵修寂靜志八者當念大道是真法王能度衆生越生死海猶如船師拯濟沈溺九者當念經教是妙醫方能示衆生理煩惱藥十者當念法師是真父母善能生我法身慧命以是十法品初地因次以小乘柔伏之法又進中乘進修之法後入大乘觀行之法以此法故貴愛師資師者父也我若無師不能得道是故應當遠近隨逐心眼觀想恆在目前不替須臾無他雜想非師不度非師不仙既了悟己學相皆空諸方便門本無文字解了大道貴愛兼忘入衆妙門達真常境疏然此章大宗教之忘遣語以漸頓不無階級論其造極是法都空故前舉為師為資示修進之路後云不貴不愛導悟證之門則所以貴師為存學相學相既空自無所貴所以愛資為存教相於教兼忘故不愛資相忘江湖自無濡沫乍聞斯旨凡俗不悟執學滯教則必以為大迷故老君格量云雖知凡俗以為大迷於道而論是謂要妙矣義曰師資之道相因之義也玉因琢而成器人因師而悟道言於教則有念師禮師之法垂以訓人歷劫典憲非同不善之人暫為資取矣故天子上丁釋奠於先師太子太學謁先師皆存其道以垂教也若以達觀之理大則忘天地內則忘其身物我都忘豈復有師資之限如齧缺問道乎被衣被衣曰正汝形一汝視天和將至攝汝知一汝度神將來舍德將為汝美道將為汝居汝瞳焉如新生之犢而無求其故言未卒齧缺睡寐被衣大悅行歌而去之曰形若稿木心若死灰真其實知不以故自持媒媒晦晦無心而不可與謀彼何人哉言其初與變化俱末而獨化者也當此時也齧缺形骸天地俱忘矣豈唯忘其師乎師資貴愛之道於斯達矣其於理國也不立德於人不衒仁於物百姓日用而不知固無師資貴愛之尚契太古忘言之道衆人不達初為大迷了而達之信為要妙矣濡沫者莊子天運篇老子答孔子之詞也道德真經廣聖義卷之二十三
