front:
  text: 道德真經廣聖義卷之二羔二
  hash: sha256:71ae8944717ccb4d567390222a36d3398acd108f787b08cd37145051c4b7bed6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0114_HFL_002-001a, image: hfl/0440/0440-050.png}
body:
  text: 唐廣成先生杜光庭述釋老君事迹氏族降生年代疏老子者太上玄元皇帝之內號也義曰前明所説之教次釋能説聖人能説聖人所謂老子老子即太上老君也太上謂證果尊位玄元皇帝謂顯册鴻名內號謂真經共所標載今就老君位號之中分為三十段以解名號之由起也第一起無始者所言老君也老君生於無始起於無因為萬道之先元氣之祖也無光無象無音無聲無色無緒幽幽冥冥其中有精其精甚真彌綸無外故稱大道大道之身即老君也萬化之父母自然之極尊也第二體自然者大道元氣造化自然強為之容即老君也虛無為體自然為性莫能使之然莫能使之不然不知其所以然不知其所以不然故曰自然而然葛玄仙公序訣云老子體自然而然生乎太無之先起乎無因經歷天地終始不可稱載是也第三見真身者老君乃無生之至精兆形之至靈也昔於空洞之中結氣凝真強為之容體大無邊相好衆備自然之尊上無所攀下無所躡處虛空之中如日月之光也第四應法號者老君挺生空洞變化自然智慧無窮聖德周備形既莫測號亦無邊在天為萬天之主在聖為萬聖之君在仙為萬仙之總在真為萬真之先在星為天皇大帝在教為太上老君或垂千二百號或顯百八十名或號無為父或號萬物母與大道而輪化為天地而立根浩浩蕩蕩不可名也約而言之凡有十號即降生之後空中十方聖人讚十號是也具降生段中所解第五啓師資者老君將顯明大教布化萬方乃曰道不可無師尊教不可無宗主乃師事太上玉晨大道君焉大道君即元始天尊弟子也道君審道之本洞道之元生於億劫之前為道氣之祖也天尊為五億天之主億萬聖之君亦生億劫之前為道氣之根本也所以道君為老君之師天尊為道君之師二聖既立乃曰老者處長之稱君者君宗之號以老君天上天下歷化無窮先億劫而化生後億劫而長存天天宗奉帝帝師承故賜以太上老君之號三聖相師乃垂教尊卑之本矣莊子曰吾師乎吾師乎齏萬物而不以為義澤及萬世而不以為仁長於上古而不以為老覆載天地雕刻衆形而不以為巧在太極之先而不以為高居六極之下而不以為深先天地生而不以為久是也第六歷劫運者老君生於萬物之首起於無始之前經歷劫運甚為久遠劫者天地成壞之名陰陽窮盡之數陽盡則生陰故為大水陰盡即生陽故為大火陽極於九故云陽九陰極於六故云百六小則三千三百年次則九千九百年大則九九大數八十一萬年為劫終老君長生行化經此劫運不知其數矣西升經云上世始以來所焉鈎繩者莊子馬蹄篇云陶者曰我善治埴圓者中規方者中矩匠人曰我善治木曲者應鉤直者應繩夫埴木之性豈欲中規矩鉤繩哉然且世世稱之此言土之性也種之得五穀掘之得甘泉木之性也曲則為輪直則為桶今陶者以規矩匠者以鈎繩圓者則矩之使方方者則規之使圓曲者繩之使直直者鈎之使曲此失其真性誠至小巧爾造化刻雕衆形者莊子大宗師篇意而子問許由曰願遊於至道之藩由答曰噫吾師也𩐎萬物而不為義澤及萬世而不為仁長於上古而不為老覆載天地刻雕衆形而不為巧此所遊已此謂吾師自然之道無心自爾莊子師之吾師之遊自然而已大辨若訥注不飾小説故若訥疏合譬飾詞結繩竄句小辨也行不言之教辨雕萬物窮理盡性大辨也至言去言無所抑揚如謇訥爾也次十八天為色界一虛無天二太極天三赤明天四恭華天五曜明天六皇笳天七虛明天八端靖天九玄明天十極瑶天十一元載天十二太安天十三極風天十四始皇天十五太黃天十六無思天十七上揲阮樂天十八無極曇誓天是也次四天為無色界一霄度天二元洞天三妙成天四禁上天是也此二十八天名為三界劫運所及陰陽所陶氣有窮極人有歲數則初第一太黃皇曾天人壽九百萬歲一天加一倍凡二十八天年壽之數極於一千二百七萬九千七百七十五萬五千二百萬歲下至日月所交四千四百四十四萬四千四百四十四億氣一氣三千里也此上又四天名為四種人天一常融天二玉隆天三梵度天四賈奕天此四天超出三界不生不滅無年壽之數無淪壞之期大劫之交災所不及向下諸天諸地隨劫淪滅劫運再開混沌復判則此天之人承太上所命下化人間教世行法一如此劫之初三皇繼理矣又上三天為三清境一曰大赤天二曰禹餘天三曰清微天最上曰大羅天包羅諸天極高無上玄都玉京鎮於其巔三尊所處萬聖朝軒為極道之域成化之根也既分諸天即以三十六天滓陰之氣下為三十六地每天立一天帝每地立一地皇七十二君同稟命於老君矣其諸天境域分布凡有五億之殊皆三十六天之氣所生也地中有三十六洞天亦與上天相應日月分精玄照其間則天文地理六甲五行陰陽變化皆老君運玄妙之機生之成之行之化之矣故曰道者萬物之宗元天得以清地得以寧物得以生神得以靈海嶽得之以安鎮王侯得之以太平道士得之以神仙枯朽得之以發榮也太上老君乃陰陽之主首萬神之帝君元氣之父母天地之本根先王之師匠品物之魂魄陶冶虛無造化應因襟帶八極載地懸天遊馳日月運走星辰呼吸六甲吒御乾坤改易四時推移寒溫驅使風雨奮鼓雷雲分别玄黃歷數虛盈君臣父子禮義備矣是知陰陽雖廣天地雖大非道氣所育大聖所運無由生化成立矣第八登位統者老君大聖之功生化天地運育萬物豈復有品位名稱哉然上有元始之尊次有道君之聖老君次道君之位演化立功既以三氣運行萬天周布衆法顯著玄功克明乃登證極道之果居三尊之位紹嗣太上之任為法王之尊上總羣聖中理衆真下制諸仙而統攝三十六天三十六地七十二君星辰日月嶽瀆萬靈陰陽變化一切神明主領天上天下地上地下五億天界有情無情有識無識有形無形皆太上老君之所制御焉由是常在太清境太極宫丹臺紫闕玉堂之中有三大仙九太帝二十七天君八十一卿大夫千二百仙官二萬四千靈司七萬仙童玉女五億天丁神王並羅衛雲街巨虬師子金翅孔雀鳳凰靈獸天馬麒麟備衛左右老君時亦上朝元始疏奏罪福中謁玉宸賞校九宫下統三界生死之簿一切神官鬼僚考察之司仙官靈洞福食之曹無幽無隱莫不仰隸之焉或下理九天在太微勾陳六星中號天皇大帝曜魄寶所以秉三使六把九樞機統攝萬一千五百二十物秉持仙籙主領神人真人仙人聖人賢人行人悉係之焉但見百億天王拜乎在前咨求風雨水旱豐儉逆順生死善惡之事焉遊行萬方以玄道化而一老君常在太清太極之宫也第九隨機赴感者老君極聖洞真總領萬化化隨方出降德屈身自億劫之初至混沌之始歷羲媧一十八氏三紀五十八統一百八十九代代為國師及神農之後或為國主或為師君或為賔友或為人臣乃有鬱華録圖等號以道德妙旨更相發明所謂應物無擇者道也赴感隨機者聖也常以經圖戒律應化一切分形應感無量無邊而老君之體端寂無為凝然常住於太清之宫也第十演上清者老君於上三皇時人尚淳朴以龍漢元年號玄中法師以上清聖教一十二部大乘之道開度人天也第十一傳靈寶者中三皇時老君以赤明元年號有古先生降靈寶真經一十二部中乘之法開化一切救度兆人也第十二出洞神者下三皇時人心朴散老君以開皇元年號金闕帝君出洞神經一十二部小乘之法開度萬品也第十三垂文象者伏羲之時人已澆漓未有法度老君以清濁元年號鬱華子下為師説元陽經教伏羲畫八卦以通神明之德以類萬物之情仰則觀象於天俯則取法於地制嫁娶敘人倫焉第十四示好生者神農之時人食禽獸茹毛飲血老君以清漢元年號大成子下為師説太上元精經教以化生之道播百榖以代烹殺和百藥以救百病嘗桑得禾柳得稻榆得黍槐得豆桃得小麥杏得大麥荆得麻五穀既登獸禽免害止殺所以長善除惡所以全生不食血肉人無疾苦五穀養性人無宿業其利人也大矣第十五教陶鑄者祝融之時人食生冷未知火食老君以天漢元年號廣壽子下為師説按摩通精經教陶鑄為器以變生冷人保其壽焉第十六制法度者自下三皇以後伏羲以前未有典禮鳥獸同羣老君以道開化漸漸生心辨形食味參以五行廣施經法勸化兆人矣第十七作形器者自伏羲之後老君示以世法制禮樂以敘尊卑造衣章以明貴賤作宫室以代巢穴為舟車以濟不通置棺椁以代衣薪造弧失以威不順立刑獄以戒凶暴造書契以代結繩服牛乘馬引重致遠日中為市交易而退耒耜杵臼之利重門擊析之規並老君教於時君以化於物也第十八崆洞演道者黃帝時老君號廣成子居崆洞山黃帝詣而師之為説道戒經教以理身之道黃帝修之白日升天第十九衡嶽授經者顓頊時老君下為師號赤精子居衡山授帝微言經教以忠順之道第二十江濱應化者帝嚳時老君下為師號録圖子居江濱授帝黃庭經教以清和之道第二十一姑射宣真者唐堯時老君下為師號務成子居姑射山授帝政事離合經教以廉謹之道第二十二傳道德者帝舜時老君下為師號尹壽子居河陽授舜道德經説孝悌之道此上下二經出於兹焉第二十三教理水者夏禹時老君下為師號真行子居商山授禹戒德經説勤儉之道又授靈寶五符檄召神鬼濬九江通河海決百川矣第二十四述長生者殷湯時老君下為師號錫則子居灊山授長生經説恭愛之道第二十五寄胎慧者老君愍時凋弊欲反神降生以殷第十八王陽甲十七年庚申之歲託孕於玄妙玉女就此門中分為五别一曰大道應化託孕人間乘日精為五色之象以明陽德也二曰乘九龍之車凝結變化五色玄黃入玄妙玉女口中又明九龍陽精之華也三曰處胎寄慧與俗不同八十一年極太陽九九之數然後乃生四曰玄妙玉女感夢之後因而有孕容顔益少神氣安間八十餘年悅豫無比以明聖人降迹之異也五曰玄妙玉女所居之室四時和暢六氣調平冬無凝寒暑無煩燠祥光照室靈風滿庭衆惡不侵萬靈潛衛八十一年不覺為久當殷二十二王武丁九年庚辰之歲降生也第二十六顯降生就此門中又分一十七段一曰老君降生逈異凡品雖依聖母之孕乃剖左腋而生也二曰老君生登行九步步生蓮華陸地開敷大彰神異三曰老君降生之時日童揚輝月妃散華七元流景祥雲蔭真四靈翊衛玉女捧接聖母因攀李樹忽爾降生矣四曰老君降生之時九龍吐水以浴聖姿龍出之地因成九井于今見在毫州真源縣太清宫中也五曰老君降生之後即行九步左手指天右手指地曰天上天下唯吾獨尊代間之苦何足樂聞六曰老君降生者為念時澆朴散大道不行委迹生神以救於世七曰老君以衆迷難曉正道難宣降生之時故顯現禎祥令物信悟八曰老君欲明妙道須在修功示有鍊丹以勸修習今亳州宫中有鍊丹井鍊丹檜並存焉九曰老君教人習道內外俱修既鍊金丹又習真氣今有虛無堂在毫州宫中乃習氣之所也十曰老君眀此妙道修之必得升天示彼功成輕舉而去今毫州宫中有鹿迹檜即老君乘白鹿升天之所其樹見在十一曰老君降生年代即殷武丁九年庚辰歲二月十五日也今詳殷周以子月為歲首二月即今之十二月丑月也十二曰老君降生郡國即古之楚國之分苦縣因城為名瀨鄉因水為名曲仁里九井之西靈溪之側其縣本名苦縣漢魏以來名谷陽縣乾封元年改為真源縣中和二年升為赤縣十三曰老君降生之後九日之中身長九尺七十二相八十一好蹈五把十美眉方口雙柱三漏日角月淵具大聖之相也十四曰聖母玄妙玉女老君降生之後聖母乘八景玉輿羣仙侍衛白日升天大唐追尊為先天太后今有宫在真源縣太清宫之北一宫在樓觀升天臺上十五曰老君升天之後歷代帝王欽慕真迹漢桓帝隋文帝皆崇修宫廟命文臣刊碑以旌道德故漢有邊韶碑隋有薛道衡碑于今並在十六曰聖唐受命之年毫州舊宅枯檜再生以彰子孫興昌享無疆之祚其樹見在號再生檜十七曰真源舊里纍降樹祥甘露乍垂卿雲時布或真容顯現以弭妖凶或雲霧凝空以護宫宇或神鳥銜箭或瑞雪驟飛或神龍躍九井之中或文字顯三檜之上代代昭驗載在簡書漢桓帝時感夢老君修祠宇之日卿雲見在其上隋文開皇五年卿雲白鹿現於祠庭帝遂修崇庭宇武德三年枯檜再生其年卿雲現於其上上元元年枯檜樹於木枝上有宋書乾元亨利貞字重重分明太極元年卿雲現於其上天寶七年鳳凰集於虛無堂上寶應元年有紫雲屬天神光夜照明日龍見九井之上大曆三年卿雲現於宫上甘露降於檜樹會昌二年甘露降於庭樹咸通十年徐州逆賊龐勛欲領徒據太清宫老君應現有黑氣遍川賊徒迷失道路其日敗滅中和廣明之際黃巢侵逼宫宇縱火焚燒陰雲升現雨降火滅賊徒奔潰又逆賊遍地白刃圍逼亳州其日黑氣大雪賊徒殞仆凍死解圍而去又黃巢餘黨攻圍毫州神鳥繞城銜箭有黑氣自宫中而來賊黨驚奔解圍而去中和二年勑吏潘稠奏自黃巢入關之後一十八度凶徒侵逼宫宇攻圍州城皆有祥異賊遂奔散遠近户口多就宫避難並獲安全請移縣就宫安置勑旨不允遂升為赤縣光啓元年七月九龍井中五雲成蓋高千丈以來如此現者三度汴州畫圖聞奏此之符瑞皆載於國史矣第二十七彰聖號者老君瓊胎寄慧八十一年誕聖之辰生而白首聖母為之立號以示世人於此門中又分五段一曰聖人降迹與俗不同聖母欲謂為老又是初生欲謂為子又乃白首兩字兼稱因立老子之號焉二曰道與俗反夫老者長年之稱子者幼稚之號世人先幼而後老老君先老而後幼欲明攝迹還本也三曰老者考校衆聖為名子者以孳生萬物為義所以老君為萬物父母衆聖祖宗故有考校孳生之名以為老子之號老子二字起於此時老君之號先於億劫非此一時四曰聖人垂名反終歸始老者終也子者始也世人先始而後終老君先終而後始欲令世人修道反老還嬰故號老子五曰委迹和光以循於世者老君以生而白首故號為老子者男子之通稱亦如孔子孟子莊子列子等以姓為號老子鶡冠子抱朴子淮南子因事為號序訣云老子之號始於無數之劫杳杳冥冥眇邈久遠矣斯乃不以降生而老為號乃以長於億劫之前故以老為號爾夫託神李母剖左腋而生生即皓然號曰老子老子之號因玄而出在天地之前無衰老之期故曰老子此序訣所證也今考詳衆説既不以因生立號即是老君歷劫垂教應代表形常現老容故有老子之號爾第二十八明胄胤老子本記及諸家史册皆云生於李樹之下指樹以為姓斯理為當矣今按大唐天潢玉牒即云顓頊之後生大業大業生媧媧娶有喬氏之女感月光貫昴而生咎繇咎繇生伯翳伯翳之後代為士師至理徴避桀之亂遁居伊侯之墟食李實乃改為李氏此言咎繇之後以理獄為功遂姓理氏其後子孫或改里氏至伊侯之墟避難遂改里為李徴生利貞當殷湯之時也利貞生昌祖昌祖仕陳為大夫因居苦縣昌祖生明明為陳相葬瀨鄉之北立廟因有相城明生慶賔慶賔生靈飛一名虔會慶賔靈飛皆白曰升天所言陳國乃古之陳國非周時所封胡公滿之國也今按湯至陽甲一十八王二百五十餘年自李徴至虔會五世相承年代相類當此之時太皥之時已為陳國及周封舜後當是此陳既滅乃封胡公而王其地也靈飛之妻玄妙玉女感日精之夢而生老君此一説也又按本記云老君生而能言指李樹曰此我姓也因遂姓李故隋內史捨人薛道衡老君祠庭碑云感日載誕莫測受氣之由指樹為姓未詳吹律之本是也又樓觀先師傳云老君既因聖母攀李樹曰此汝姓也三家之説經傳備載今並明之以彰國姓宗緒矣聖母者按玄中記云李靈飛當殷之時父子相承得修生之道父慶賔年百餘歲常有少容周遊五嶽諸山一旦於所居雲龍下迎白曰升天靈飛感父飛升之異深隱不仕內修其道以天水尹氏之女為妻居於瀨鄉其妻嘗因晝寢夢天開數丈衆仙人捧日出於其處良久見日漸小從天而墜化為五色之珠大如彈丸夢中得而吞之因即有孕八十一年容色益少常若處女靈飛亦百餘歲而升天既誕生老君之後即有五色雲輿迎之升天而去又李氏大宗譜云李氏之姓其先黃帝之後姓公孫曰軒轅元妃西陵氏生昌意昌意之妃方雷氏曰女節感台光貫日而生少昊曰青陽氏少昊次妃名修房生大業大業之妃名扶始感白雲覆己而生皋繇皋繇生伯益伯益一名翳帝舜封之於嬴因姓嬴氏翳妃姚氏生若水若水生昌貴昌貴生景僕景僕生仲行仲行為周成王諸侯諡曰非公至宣王賜姓裴氏裴氏之孫庭堅有女貞潔不嫁居楚國瀨鄉曲仁里因食李實而有孕歷八十一年安愈無苦常有神明潛衛其身以周惠王之時二月十五日因攀李樹生於左脅生而髮白左掌中有玉印字右掌中有七十卷經字左腳下有救字右腳下有治字生而能言問父何在母曰吾貞潔不嫁今則老矣吾因食李實而孕汝無父也吾以處女而孕於汝恐為鄉里所笑欲飲藥而去之神人告吾不令吞藥及今八十一年矣因食李而生李即汝姓也既生而老號曰老子老子作七十二經以記天地鬼神之名述無為長生之道娶天水尹氏之女生子名貞利當定王之時此一説也今詳尹喜是康王大夫昭王時為關令老君已度關授經此即年代縣殊先後差爽雖譜書所載恐非真的然李姓所起今亦載得姓之由也又玄妙玉女元君傳云老君在天為衆聖之尊先億劫而行教以無為常存之道化於天人長於億劫之前為萬聖之君長故天尊道君賜其真號號曰老君即在五太之前歷劫有此號矣雖代代應見為帝王師而未有降世誕生之迹乃於九清之上命玄妙玉女降於人間為天水尹氏之女嫁李靈飛為妻老君乃乘日精駕九龍化為五色流珠下入玄妙玉女口中而寄胞託孕歷八十一年因攀李樹而生老君誕於左脅當孕之時神靈衛聖母之身既生之後玉女捧接祥雲滿庭日童散暉月妃擲華衆聖來集老君乃指李樹曰此吾姓也在代凡有九名一名耳字伯陽二名雅字伯宗三名忠字伯光四名石字孟公五名重字子文六名定字元陽七名元字伯始八名顯字元生九名德字伯文或云三十六號或云七十二名或云姓字眇眇從劫至劫非可悉記老君有九變以法太陽變化生育之功有七十二相八十一好故為聖中之聖真中之真矣聖母在天即號玄妙玉女既降育大聖即為太一元君元君乃授老君化世行教之旨內修九室三一之門萬善萬惡之戒百病百藥之訣虛無清淨之規九丹餌鍊之品將以示世人有師資授受之法而太上大聖為萬化之主豈復待師受稟學乎受道既畢即有天樂駭空流雲靄野千乘萬騎五帝上真擁九光八景之輿迎聖母元君歸于玉清之上至令為太一元君國朝尊為先天太后具在前解詳諸家所載聖母本起即玄妙玉女為老君之母證太一元君事迹為勝國朝所尊云母益壽氏為先天太后是宗譜所明道經之中未睹其事所言降生年代以殷武丁時為是自餘諸説舛誤不同前後差謬今則載而不取也第二十九興帝業者老君道包萬有澤被諸天貽厥孫謀光膺大寶是以三十一代孫高祖神堯皇帝光宅天下奄啓我唐矣所以天潢流瑞源出於上清瓊海澄瀾潤涵於萬宇德明皇帝佐堯翊舜興聖皇帝握紀乘時始輝映於唐虞之間復恢拓於秦梁之野比夫后稷古公之德文昌武發之興卜代卜年帝枝帝葉固無讓於姬周矣第三十册鴻名者乃向下明乾封元年册尊號也向來所解老子兩字泛舉三十門以彰應迹垂號也釋老君聖唐册號夫所言太上者統教之尊名證聖之極果也太者大也上者高也太者大也無大於太上者高也無高於上乃修因證果極位之稱也世人修行自凡而得道自道而得仙自仙而得真自真而得聖聖之極位升為太上太上者六通萬德無不畢備紹法王位統臨萬聖即得居此尊名亦如代間皇帝代代紹位皆得稱之自元始天尊之後即有太上大道君太上老君太上丈人太上高皇帝皆極此位而太上丈人高皇帝雖兼有尊極之名而不行教其傳祚行教為萬天之主唯道君老君耳玄者深也妙也亦云道也天也至道高妙不可言詮約妙與深以玄為證言深妙玄遠以明道體故謂之玄元者初也始也祖也爾雅云肇道根源萬物宗祖處世出世之法皆為之本始故謂之元皇者大也謂大道也道大曰皇尚書序曰三皇之書謂之三墳言大道也帝者天也其德配天次於道也德大曰帝道德兼稱故云皇帝又云法道法天謂為皇帝秦始皇既一統天下垂法後代上採三皇之尊名下取五帝之美號兼而稱之曰皇帝焉尚書序曰五帝之書謂之五典言常道也內號者隱號也老君千名萬號不可備窮以當時天下所稱謂之老子亦乃道尊德貴不可斥名天上人間咸稱曰老子是則以老子之內號也我大唐高宗天皇大帝乃老子三十三代聖孫大唐之第三帝太宗文皇帝之第三子也承平嗣極握紀垂衣耀仙李之靈葩展升平之盛禮回鑾苦縣謁聖真源表大孝於奉先贊玄元於聖號以乾封元年太歲丙寅二月二十八日下詔曰東臺大道混成先一儀而立稱至人虛己妙萬物以為言粵若老君朕之本系爰自伏羲之始暨乎姬周之末靈應無象變化多方遊元氣以上升感日精而下降或從容宇宙吐納風雲或師友帝王丹青神化譬陰陽而不測與日月而俱懸屬交喪在辰晦迹柱下大弘雅訓垂範將來雖心齊於太虛而理歸於真宰若夫絶聖棄智安排寡欲寂寞杳冥之際希夷視聽之表淡爾無為宛然自得酌之不竭用之不盈執大象而還淳滌玄覽而遣纍邈乾坤以長久跨陶鈞而亭育至矣哉固無得而名也况復大聖所資克昌寶祚上德所履允屬休期朕嗣膺靈命撫臨億兆總三光之明而夙宵寅畏居四大之重而寢興祗惕盡孝敬於宗祧罄懷柔於幽顯行清淨之化承太平之業登介丘而展采坐明庭而受記飛煙結慶重輪降祥鶴應九臯山稱萬歲越振古而會休徴冠帝先而為稱首大禮云畢回輿上京迂駕瀨鄉躬奠椒糈仰瑞柏以延佇挹神泉而永歎如在之思既深敬始之情彌切宜昭元本之奧以彰玄聖之功可追上尊號曰玄元皇帝仍改谷陽縣為真源縣當縣宗姓特給復一年冀敦崇遠之情用申尊祖之義布告中外咸使聞知主者施行又永淳二年癸未十二月四日下詔曰君崇於道宅紫微以垂衣臣修於德罄丹心而作礪若使上守於義下尊於禮名教所以垂淳忠信由其漸薄在昔胥庭連陸媧燧伏羲不宰而天下化軒頊堯舜禹湯文武至公猶行深仁尚積及秦居潤位奢泰之漸聿興漢襲霸圖玄默之風已替遐觀魏晉近鑒周隋代益囂浮人踰僣侈窮百王之弊俗極千年之否運以承大亂之後方開大聖之期既逾交喪之辰必興交泰之緒我高祖神堯皇帝受鑣宫之景命蕩轡野之妖氛重懸日月一匡宇宙太宗文皇帝披圖汶水杖鉞參墟降斗極之神兵滌懷襄之巨浸張四維而安赤縣勞百戰而徇蒼生聲教遐覃隄封遠亘緬惟洪業無得而稱朕以寡昧忝膺丕緒未嘗不孜孜訪道戰戰臨人日慎一日三十四載於今矣况下安則上逸時弊則君憂雖身處九重而情周萬姓建本之懷愈切抑末之念遽深今庶績雖凝而淳源未洽朕之綿系兆自玄元常欲遠叶先規光宣道化變率土於壽域濟蒼生於福林屬想華胥載勞寤寐所冀內外寮寀各竭乃誠敦勸梨萌俱崇簡質舊染薄俗咸與惟新憑大道而開元共普天而更始宜申霈澤廣被紱埏可大赦天下改永淳二年為弘道元年仍令天下諸州置道士觀上州三所中州二所下州一所每觀度道士七人以彰清淨之風佇洽無為之化主者施行是則奉先尊祖復朴還淳之旨也道德真經廣聖義卷之二
