front:
  text: 道德真經廣聖義卷之三十四景十
  hash: sha256:4ee4fab29bd787c020655a9f81e40fa44ec95161310f7c9510e081feebd5be41
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0114_HFL_035-001a, image: hfl/0446/0446-004.png}
body:
  text: 唐廣成先生杜光庭述天下之至柔章第四十三疏前章明衆生背道強梁所以不得其死此章示人正性柔弱修之則與道合同文殊途以發明理會歸而齊致首標舉道性柔弱之本人有失之成堅強之過後吾是以下明無為之道廣有利益衆教莫之能先義曰既以前章示強梁極則之於死此乃明至柔失即為至堅用顯無為之益更彰不言之利欲使人捨強服柔宗無去有從粗入妙深契道元爾天下之至柔馳騁天下之至堅注天下之至柔者正性也若馳騁代務染雜塵境情欲充塞則為天下之至堅矣疏夫人之正性本自澄清和氣在躬為至柔也若馳騁情欲染著代塵為聲色所誘則正性離散為至堅也義曰道以至柔無乎不在貫通萬物流注群形得之則生失之則死故保養道存則生全而柔弱馳騁氣散則枯稿而堅強理國有道則襁負而歸仁無道則蕭墻搆敵矣染著代塵者謂六根起於六識六識恣於六情六情生於六欲六欲謂之六塵六塵謂之六染六染謂之六入從根而生染有輕重皆在修鍊漸而制之所以理身所務眼絶五色耳絶五聲鼻絶五香口絶五味身絶五觸心絶五緣即六塵淨矣六塵淨則世利不能動聲色不能誘自歸柔弱之道豈有堅強之患哉無有入於無間疏無有者謂人了悟諸法一無所有則返歸正性與道合同入無間矣無間道也入謂與道同也以道為無間者明道性清淨混然無際而無間隙矣義曰天地有形位清濁殊矣陰陽有分别昏明殊矣氣象有代謝四時殊矣惟道廣包天地微貫陰陽總四時運氣象無處無道故云無間隙也人能融神觀妙返一歸元息則為人消則為氣與道為一常存不亡乘無有之和入無間之道何四序之能運生死之能局哉吾是以知無為之有益注無為者不染塵境令心中一無所有無間者道性清淨妙體混成一無間隙矣不為可欲所亂令心境俱淨一無所有則心與道合入無間矣故聖人云吾見身心清淨即能合道是知有為之教不如無為之有益疏吾者老君自稱也此章亦通戒人君以無為化理天下故老君云吾見衆生正性柔弱及乎馳騁奔競則至堅強若使照了心境則一無所有即合道矣是知清淨無為理身理國有益於人也以此推之有為之教不及無為之有益也義曰老君垂教以清靜為用無為為宗清靜則國泰身安無為則道成人化夫道德無為也天地成焉萬化行焉萬物生焉天地無為也四時運焉六氣和焉八風鼓焉聖人虛心以原道德靜氣以存神明寡其聰聽於無聲杜其明視於無形覽天地之變動睹萬物之自然以是而知有為者亂無為者理所以至柔之性本無為也至堅之患由馳騁也息馳騁之有欲復柔弱之無為以教天下弘益之道廣矣照了心境者神奇莫測內察於一心妙用無窮外忘於萬象理國則忘其所理修身則忘其所修洞入虛無泯然合道是謂內照內明之旨也不言之教無為之益天下希及之注言天下衆教少能及之也疏至道無言物以之生聖人無為化以之清即不待立言然後成教天下希及之者言九流百氏希有能及無為之教者又云自非體道之君莫之能及故曰希也義曰人君以無為為理率土以自然而化復何言哉夫無為之至妙包於道德統於仁義合於禮樂制於信智囊括萬行牢籠二儀至廣無涯至細無間凝寂玄寥與道混合是無為之至也九流者漢書云道家流者使人精神專一動合無形贍足萬物其為術也因陰陽之大順與時遷徙應物變化本清虛以自守卑弱以自持此人君南面之術也儒家流者蓋出司徒之官助人君明教化祖述堯舜憲章文武宗師仲尼以垂其言於道最高此其所長也或失精微而僻又隨時抑揚違離道本茍以譁衆取容後進僻儒之患名家流者蓋出於春官名位不同禮亦異數子曰必也正名乎此其所長也及徼為之則苟鈎釽折辭而已為君者慎器與名故曰惟名與器不可以假人縱橫家流者蓋出於行人之官子曰使於四方不能專對又曰使乎使乎言當權事制宜受命不受辭此其所長也邪而為之則尚詐而棄其信矣雜家流者蓋出於議官合儒墨兼名法此其所長也蕩者為之則羡無歸心矣農家流者蓋出於農官播五穀以足衣足食洪範八政其一曰食此其所長也鄙者為之欲使君子並耕矣小説家流者蓋出於稗官稗小米也王者欲知風俗立稗官采街談巷議之説子曰雖小道必有可觀致遠恐泥此亦芻蕘狂夫之義也墨家流者出於清廟之宇茅屋采椽兼受選士敬者為推也陰陽家流者出於天官五行之説使人多拘忌也兵家流者出於司馬之官所以威不軌而昭文德兼弱攻昧以遏亂略以靖四國此其威也止戈為武武有七德佐文而理文武之道不可廢也百氏者六經正史之外自為述作自周已來立理著書凡百餘人皆稱曰子子者男子之通稱也不敢侔於六經皆目之為子為論為記為書或以姓氏立稱或以因時表號則有鬻子曾子晏子孟子管子荀卿子魯連子列子莊子庚桑子王孫子尹文子公孫尼子吕氏春秋鄧析子鬼谷子陸賈朝錯賈誼桓談崔實周生列子魏朗任蝦裴玄蘇彥傅玄唐滂秦菁阮武啇君陸雲牟子符朗孫武汜勝之是也或自立别號者子思子太公金匱淮南子鹽鐵論説苑新序論衡潛夫論風俗通文子申鑒昌言典論篤論中論萬機論忠經意林道言録歲時記耆舊記法訓五教芻蕘典語默記正書正論物理論韓子人物志成敗志通論正部士緯通語國語越絶書抱朴子世要新論析言幽求長樂子家語太玄經方言法言志林搜神記博物志義訓山海經水經大荒記十洲記拾遺録本草相牛經相馬經相鶴經周髀竹譜孫子兵法司馬兵法孫子算經黃石公記相貝經萬畢術是也或採玄經奧義或探儒術禮書或宗律曆天文或附陰陽象緯或拘以名法或約以機權各盡所長互陳其自然有為或作乍弛乍張各滯一隅罕能通貫以兹量較難以及之於無為之道焉惟體道之君上德之主志無所慮神無所思動若無形寂若無有與道相得曠然大通可以繼躅玄元追蹤大白矣名與身孰親章第四十四疏前章明正性柔弱馳騁所以至堅此章明名貨親疏愛藏所以為患初三句標問得亡孰病次兩句詳答致患之由後知足下結勸令守分則可長久爾義曰貨者身之所資名者身之所美滯於貨則有焚軀之咎溺於名則有損命之災藏貨愛名斯為大患老君哀世人迷執名貨不知致病之由故三句問之於前兩句答之於後示以止足之善息其藏愛之心軫慮羣生斯亦至矣名與身孰親注名者實之賔代人徇名以亡身設問誰親欲令去功與名而全其真矣疏此以名較量身也孰誰也詳問云夫以矜徇功名保養身命兩者既異誰者與保壽全身之道為親乎傷代人不能忘名以全真爾義曰聖人憫俗間之士貪愛功名名立於前身危於後誰能棄名而修道絶俗而全身所以伯夷死於仁聶政死於義尾生死於信比干死於智荆軻死於勇龍逄死於諫伍員死於忠介推死於怒是皆名顯身殁形骨飄零披面剖心火焚水溺齒劍抉眼自取滅亡殊不知儒者之訓全而歸之賈彼虛名去道遠矣身與貨孰多注徇利者將以求財財得而亡身設問孰多欲令擲玉毀珠以全其和矣疏多者可貴重之意也言身與貨兩者既别誰可多貴耶云此者欲令悟身為多不貴於貨可也注云擲玉毁珠者莊子外篇之詞也義曰老君以舉世所惑財貨為先貨積而身憂財多而禍至誰能散財却害樂道安貧所以慶封死於富駟遄死於侈齊簡公死於貪榮夷公死於利故莊子至樂篇云天下所尊者富貴壽善也所樂者味服聲色也所下者貧賤夭惡也所苦者飢寒憂懼也而富者苦身疾作積財而不得盡用其為形也亦以外矣貴者夜以繼日思慮常若不足其為形也亦以疏矣而至於豐屋蔀家名亡身辱殊不知達者所誚積財纍患保壽全生固亦遠矣擲玉毀珠者莊子胠篋篇云唇竭則齒寒聖人生而大盜起若掊擊聖智縱捨盜賊而天下始理矣夫川竭而谷虛丘夷而泉實聖人已死大盜不起絶聖棄智大盜乃止玉毁珠小盜不起此所謂聖智者作盜之利器珠玉者起盜之貪心棄而不用姦盜自然息矣得與亡孰病注問得名貨與亡名貨孰者病其身疏此總問上二句得名貨與亡名貨誰為病耶得名貨則亡身存身則亡名貨曆然殊智為病可知而迷倒之徒莫之先覺故後文詳答之爾義曰大聖説經義存匡救將顯以身為重名貨為輕輕重設問辭復為詳答殷勤指喻迷者尚或懵焉是故甚愛必大費多藏必厚亡注甚愛名者必勞神非大費乎多藏貨者必纍身非厚亡乎疏此二句總答前問甚愛必大費此答名與身孰親費猶損也親猶愛也甚愛名者矯企情性損費心神所愛既甚所費彌大矣多藏必厚亡者此答身與貨孰多藏貨既多其亡亦厚劍玉賈害譬諸懷璧詩書發塜只為含珠惟貨之損可為殷鑒義曰徇名則害己藏貨則亡身已如前解河上公云生多藏於府庫死多藏於丘墓生有攻劫之憂死有發掘之患劍玉賈害者春秋桓公十年虞公之弟虞叔有玉虞公求之弗與既而悔之曰周諺有之匹夫無罪懷璧其罪吾焉用此其以賈害也乃獻之又求其寶劍叔曰是無厭也無厭將及我恐將殺我也遂伐虞公故虞公出奔洪池也詩禮發冢者莊子外物篇儒以詩禮發塜大儒臚傳曰東方作矣事之若何小儒曰未解裙襦口中有珠詩固有之青青之麥生於陂生不布施死何含珠為大儒曰接其鬢壓其顪徐以金鎚控其頤無傷口中珠大儒大也小儒小也東方作矣言日將出也詩古詩也麥宜下田今種陵陂非其所也生不布德施惠死乃含珠非其藏也致有發塜理亦宜然詩以溫良禮以莊敬先王理世之法也今用發塜稱儒為盜誠有之哉知足不辱知止不殆可以長久注知足者不甚愛知止者不多藏既無辱殆故可長久也疏辱損纍也殆危亡也不邇聲名知足也不殖財貨知止也知足故名當其實而無過分之纍知止故貨不多藏而無貪求之害既不辱不殆乃可長存而久壽也義曰人之生也大道降氣三元炳靈九天所錫稟有其數修道者積功而延壽為過者負舋而夭年既貪過分之名名不稱實又積難得之貨貨必致災小則恥辱及身大則危亡其命身辱命夭自貽其殃深可憫也老君戒之使絶其叨名之過革其瀆貨之心知足知止無貪無欲則却夭年之禍造延壽之庭固可長久也大成若缺章第四十五疏前章明身貨孰親愛藏所以為患此章明成盈若缺其用所以不窮初七句標立行之楷模次兩句明靜躁之優劣後清靜下結釋清靜則可為天下正爾義曰上德之君達道之士其履行也有兮若無實兮若虛泛然與天地同體浩然與陰陽同波不矜盈成之所能故若沖缺之不足代人睹屈拙之外狀罔知巧直之內明挫辨躁之機明訥靜之要為天下正無以加焉顯前章名貨之非表後章貪欲之咎以清以靜為修道之階此其大旨也大成若缺其用不弊注學行大成常如玷缺謙則受益故其材用無困弊時疏凡曰學人功行大成衆德圓備常自虛忘有如玷缺如是則材用不窮也道德大成之君亦復如是等天地生育之功齊日月照臨之德所成理大故曰大成然不恃其成有如虧缺以斯為用用則無窮義曰人君以大道化物與道相符上士以大道修身與道冥合是以天高地廣日照月臨寒暑陰陽自相遞代道不伐其功矣人君法道為理上行下隨不伐其功與道同矣修學之士功圓德備不矜其能道益彰矣故皆若虧缺而其實圓成也於國則聖理常存於身則體和無極雖云若缺固無弊竭之時矣大盈若沖其用不窮注祿位盈滿常若沖虛儉不傷財故用不窮匱疏沖虛也窮匱也此明聖人祿位充盈恭儉自牧不為盈滿故若沖虛所謂有若無實若虛故其運用而無窮匱也義曰不矜其有故盈而若虛不恃其盈故用而無乏主有餘德民有餘財周流六虛放曠四極為國則民自富理身則德自充其用無涯何窮匱之有也大直若屈注直而不肆故若屈也疏直正也屈曲也前四句兼明體用下三句但出其體不書其用略文以見義類可知也夫潔己而垢人舉直而措枉小直也不執是以辨非不正己以矯物大直也曲隨物宜故云若屈注云直而不肆此卷之經文也義曰道以和氣順物物自生成君以大道化人人自貞正上士體道與物逶迤物感其和各從其直此直廣博旁該萬殊可謂大矣此化隨順忘功不宰可謂若屈矣舉直措枉者論語為政篇魯哀公問孔子曰何為則民服孔子對曰舉直措諸枉則民服舉枉措諸直則民不服哀公魯目春秋隱公第十二君名奬諡曰哀時哀公失德民不服從哀公患之故問孔子求民服從之法也直謂正直之人措置也枉謂邪曲之人若舉正直之人為官則邪枉之人廢置民服君德矣若舉邪佞之人廢正直之人則民不服矣此孔子譏哀公捨賢任佞欲使改之為理也直而不肆此卷第二十一章經文也大巧若拙注巧不蕩於分外故若拙也疏矜粉繪之工逞鈎繩之妙小巧也因材致用任物成功不失其宜大巧也無所栽割不見其功似若朴拙爾莊子稱造化刻雕衆形而不為巧義曰天地大化陰陽大鈞吹萬流形不見其用人君端拱垂教萬方各盡其能萬物各施其用方圓曲直盡得其宜貴賤賢愚各宣其力大巧之謂也天地為而不宰陰陽施而不有人君化而不恃故若拙焉粉繪之工者論語八佾篇云繪事後素言以五色畫成文謂之繪五色既具然後以素分市其間以成其文素者粉也是謂粉繪焉鈎繩者莊子馬蹄篇云陶者曰我善治埴圓者中規方者中矩匠人曰我善治木曲者應鉤直者應繩夫埴木之性豈欲中規矩鉤繩哉然且世世稱之此言土之性也種之得五穀掘之得甘泉木之性也曲則為輪直則為桶今陶者以規矩匠者以鈎繩圓者則矩之使方方者則規之使圓曲者繩之使直直者鈎之使曲此失其真性誠至小巧爾造化刻雕衆形者莊子大宗師篇意而子問許由曰願遊於至道之藩由答曰噫吾師也𩐎萬物而不為義澤及萬世而不為仁長於上古而不為老覆載天地刻雕衆形而不為巧此所遊已此謂吾師自然之道無心自爾莊子師之吾師之遊自然而已大辨若訥注不飾小説故若訥疏合譬飾詞結繩竄句小辨也行不言之教辨雕萬物窮理盡性大辨也至言去言無所抑揚如謇訥爾義曰合譬者引事合意譬諭殷繁非真理也結以華文竄擇詞句非至言也聽言則對小説也夫聖人之旨上士之行出名言之域超語默之津無述作而萬彙區别無稱喻而重玄了悟此辨之大也無言無説默識無為此若訥也聖人鶉居以撫伐上士凝拱而通玄真化自流不知其力可以臻於清靜矣躁勝寒靜勝熱疏舉此諭以示教也以執成者必敗持滿者必傾故聖人功濟天下不見成功其如缺所以無弊位尊萬乘不視成位其若沖所以不窮也恐人不曉故寄陽氣動靜以喻之躁動也勝極也言春夏陽氣發於地上萬物因之以生陽氣動極則寒寒則萬物以衰死明躁為死本盛為衰源喻功成不缺者必敗持盈不沖者必傾有為剛躁者必死靜勝熱者謂秋冬陽氣靜於黃泉之下靜極則熱熱則和氣發生也萬物因之以生生託靜而起故知靜為生本亦為躁君取喻大成大滿而能缺能沖所以無弊無窮至致生爾夫能無為清靜者則趣生之本此勸人當務靜以析生不當輕躁而赴死也義曰至理之君修道之士革惡除患虛心嗇神猶躁能勝寒靜能勝暑躁體春夏極則萬物凋落靜喻秋冬極則品彙發生矣禮經曰春者蠢也萬物蠢然而生夏者極也萬物得陽而盛此則仲冬既至一陽漸萌陽動而生故謂之躁躁極則凋落而死矣秋愁也物將凋落故謂之愁冬藏也物則閉藏陽氣潛伏潛伏未動未動故謂之靜靜極則煦嫗而生矣二氣則靜為生之本躁為死之根陰符所謂生者死之根死者生之根是陰陽相勝之義終始之機也天元經曰立夏之後日行於地北入也少故夜短而晝長為熱立秋之後日行地南入地多故夜長而晝短為涼日行去極遠近不同故有暄涼寒暑之異是則寒暑躁靜陽氣之所運也若夫用道之君無為致理政靜而物泰國安而人康四表來王五兵不用清虛凝寂澄默恬和姦詐不敢侵強梁不敢暴烽燧不起鼙柝不驚海內晏如此靜而勝矣及其化之至則謳歌洽敬讓興九族雍和四門穆穆制禮作樂舉賢用能梯航屬望而來庭書軌順規而稟化八表麏至群方駿奔天地感通人神交暢熙熙然一變於道內絶窺窬之孽外無伺隙之鄰歌之詠之舞之蹈之此靜理無為之所致也若其君以躁辨臣以詐欺動搖甲兵振耀威福強師百萬北登單于之臺旌旗千里來涉浿遼之岸老弱被勞役婦女助轉輸四海沸騰六合搔擾及其人之弊也户口凋耗生靈轉移野絶人煙晝間鬼哭此躁勝之所故也前以靜理而勝則煦然而人和此以躁強而勝則寂然而寒薄可不戒哉清靜為天下正注於躁勝者則寒寒薄也於靜勝者則熱熱和也故若屈者大直清淨者為正疏此結明前義也夫聖人有以觀陽氣之進退知躁為趣死之源靜為發生之本理人事育群生持本以統末以務清靜之道則可為天下之正爾義曰聖人知沖缺之行可以持盈澄靜之方可以制動成其動則清靜自著抑其躁則柔和自彰可以率天下於無為歸萬方於貞正法陰陽寒暑之運見生死得失之源於兹明矣道德真經廣聖義卷之三十四
