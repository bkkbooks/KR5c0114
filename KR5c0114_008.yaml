front:
  text: 道德真經廣聖義卷之七羔七
  hash: sha256:601378b19b4e09a3cb2ccd0e6086f20fff06cb84afd388b3ecb5c00150fe4678
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0114_HFL_008-001a, image: hfl/0441/0441-054.png}
body:
  text: 唐廣成先生杜光庭述天下皆知章第二疏前章明妙本生化入兩觀之不同此章明朴散異名因萬殊而逐境逐境則流浪善化則歸根故首標美善妄情次示有無傾奪結以聖人之理冀速還淳之由義曰夫悠悠衆趣蠢蠢羣生涉境起情去道逾遠聖人憫其忘返啓此妙門前明兩觀之殊無而入有此標六者之惑因事以相傾能知逐境之非不隨流浪之變則可以言虛心實腹之漸己矣天下皆知美之為美斯惡已皆知善之為善斯不善已注美善者生於欲心心苟所欲雖惡而美善矣故云皆知己之所美為美所善為善美善無主俱是妄情皆由分執有無分别難易神奇臭腐以相傾奪大聖較量深知虛妄故云惡已疏天下者舉大凡言凡在天覆之下也美者心所甘美也善者身所履行也言天下之人皆知己心所甘美者為美己身所履行者為善故論甘則忌辛好丹則非素共相傾奪競起是非皆由興動於欲心所以遞成乎美惡聖人知美惡無主俱是妄情妄則不常故云惡已已語助也注云神奇臭腐者莊子云所美為神奇所惡為臭腐是也義曰天下之人知道者稀常俗者衆知修身者寡徇物者多皆知美善為是而莫能為皆知不善與惡為非而莫能改聖人歎之故云惡已不善已夫載仁伏義抱道守謙忠孝君親友悌骨肉乃美善之行也皆知之矣而不能為反於此者乃不善之行也皆知之矣而不能革況於修無為之道乎故可歎也妄者非真實之義也因境起念隨物生情不守道循常即為妄矣神奇臭腐者莊子北遊篇黃帝謂知曰萬物一也是其所美者為神奇所惡者為臭腐臭腐復化為神奇神奇復化為臭腐故曰通天下之一氣耳聖人貴一也此明神奇臭腐物之偏性百氏殊學九流異名遞執是非互生臧否理身理國者能無為任物一以貫之臭腐神奇自然無二矣故有無之相生疏此明有無性空也夫有不自有因無而有凡俗則以無生有無不自無因有而無凡俗則以有生無故云相生而有無對法本不相生相生之名由妄執亦如美惡非自性生是皆空故聖人將欲救其迷滯是以歷言六者之惑義曰老君歎彼常徒迷乎正道妄生封執滯此幻情故明此義以祛其執夫執者著也執有即斥無執無即斥有執難即斥易執易即斥難執短即斥長執長即斥短執高即斥下執下即斥高執後即斥前執前即斥後有此執故皆非究竟故經云執者失之但無偏執自契中道便入玄妙正觀之門矣難易之相成疏此明難易法空也此以難故彼成易此以易故彼成難亦如工者易於木而難於埴陶匠易於埴而難於木故云難易於成若同其所難則無易同其所易則無難難易無實妄生名稱是法空故能了之者巧拙兩忘則難易名息亦如美惡無定故也義曰夫難因於易非易無以知其難易因於難非難無以彰其易循環倚伏遞為之用審而明之於難無滯於易無執即可以語其齊物通乎中道矣工者巧伎之稱也陶者和土為器也各擅其伎則為易更而使之為難也長短之相形疏此明長短相空也以長故形短以短故形長故云長短之相形亦如鳧脛非短以鶴之長故續之則憂鶴脛非長因鳧脛之短故斷之則悲見短長相形猶如美惡既無定體是皆妄情形相既空名亦空故特未定也義曰夫物之形也有短長之相事之興也有難易之法化之起也有有無之變俱自然也若拘常俗之見則長者不得不長短者不得不短有無難易亦在兹乎滯之則為執通之則為道惟有道者能無滯爾鳧鶴之喻亦莊子駢拇篇之辭也謂各自有正不可以此正彼而損益也此斥世人不任自然之㫖也高下之相傾疏此明高下名空也高下兩名互相傾奪故稱高必因於下又有高之者稱下必因於高又有下之者又高則所高非高又下則所下非下如彼代間凡諸名位遞為臣妾亦復無常是皆空故故無定位義曰夫高下之設名形勢位性智才業萬殊之中皆有高下則不獨拘於名位也但高忘其高下忘其下各安其分守以天常則無傾奪之事矣臣者男子之卑稱妾者女子之卑稱卑伏於人故稱臣妾疏指名位之說蓋以廣戒羣情也言尊卑之道各安其分不相傾奪則保其始終若棄卑而慕其尊名厭下而圖其高位不安素分禍敗隨之故經曰知足不辱知止不殆可以長久可不戒乎音聲之相和疏此明和合空也五音相和成曲者誰總彼衆聲則能度曲如代間法皆和合成即體非真是皆空故將欲定其美惡豈云達觀之談義曰夫天地噫氣而衆籟作焉律吕合和而衆樂生焉聲之作也美惡隨之故有安樂怨怒哀思𢛈悶之别也然此别者人事强而隨之政化因而應之於達觀之士忘其善惡矣隨變責實謂之妄情美惡都忘方為達道達道之士雖天地之大萬物之殷猶無有也樂記曰凡音之起由人心生心感於物而形於聲聲相應故成變變成方謂之音比音而樂之及干戚羽旄謂之樂故哀心感者其聲噍以殺樂心感者其聲嘽以緩喜心感者其聲發以散怒心感者其聲粗以厲敬心感者其聲直以廉愛心感者其聲和以柔是以先王慎其所以感故禮以導其志樂以和其心政以壼其行刑以防其姦禮樂刑政其極一也聲音之道與政通矣宫為君商為臣角為民徵為事羽為物五者不亂則為之音也理世之音安以樂其政和亂世之音怨以怒其政乖亡國之音哀以思其民困宫亂則荒其君驕商亂則陂其官壞角亂則憂其民怨徵亂則哀其事勤羽亂則危其財匱五者皆亂遞相凌謂之慢鄭衛者亂世之音比於慢桑間濮上者亡國之音其政散其民流夫知聲而不知音者禽獸也知音而不知樂者衆庶也唯君子能知樂審聲以知音審音以知樂審樂以知政不知聲者不可以言音不知音者不可與言樂知樂者幾於禮矣子夏對魏文侯曰鄭音好濫淫志宋音燕安溺志衛音趣數煩志齊音傲假驕志四者害其德非正聲也春秋晏子對齊景公曰先王之濟五味以和五聲以平其心以成其政聲亦如味矣一曰氣須氣以動也二曰體舞象文武也三曰類風雅頌也四曰物以四方之物成器也五聲者宫商角徵羽也六律者黃鍾太簇姑洗蕤賔夷則無射也六吕者夾鍾林鍾仲吕應鍾南吕大吕也律主於陽吕主於陰也七音武王伐紂所制也自午及子製七日為七音八風八方之風也東方曰明庶東南曰清明南曰景風西南曰凉風西方曰閶闔西北曰不周北方曰廣漢東北曰融風也九歌者六府三事九功之歌也清濁小大短長疾徐哀樂剛柔遲速高下出入周疏以相成也以相濟也君子聽之以平其心心平德和而後幾於道矣舜作五絃之琴以歌南風䕫始製樂以賜諸侯理國之道以音而知理亂故吳公子季札歷聽三代古今之樂而知其興廢也修身之士閉視反聽以聽無聲然後可與言道矣前後之相隨注六者相達遞為名稱亦如美惡非自性生由是妄倩有此名故疏此明三時空也日夜相代代故以新如彼投足孰為前後則前後之稱由相隨立名名由妄立誰識其神過去未來及以見在三時空故旋旋遷改亦美惡無定名也義曰前後之别生於變動也不變不動誰後誰先既有相隨乃分前後達觀之士泯爾都忘世間之法彰其别爾投足者舉步之謂也步之舉也孰後孰初明於此者乃絶前後之競矣老君傷憫世俗流蕩不還爭起妄情忘其中道歷指六事以化愚迷耳夫中道者非陰非陽無偏名也處天地之間傲然自放所遇而安了無功名而反乎道本雖堯桀之殊生死之變是非之别壽夭之異榮賤之隔哀樂之感動古今之遞代皆忘之也不知堯桀之殊忘美惡也不知生死之變忘有無也不知是非之别忘難易也不知壽夭之異忘長短也不知榮賤之隔忘高下也不知哀樂之感動忘音聲也不知今古之遞代忘前後也處乎無是之鄉立乎不疾之途遭之而不違過之而不守調而應之以道也益之而不加益損之而不加損此了乎中道之士忘前後之别忘變動之機矣是以聖人處無為之事行不言之教注無為之事無事也寄以事名故云處不言之教忘言也寄以教名故云行疏是以者說下以明上也夫飾智詐者雖拱默非無為也任其素者雖終日指揮而未始不宴然矣故聖人知諸法性空自無矜執則理天下者當絶浮僞任用純德百姓化之各安其分安分則不擾豈非無為之事乎言出於己皆因天下之心則終身言未嘗言豈非不言之教邪義曰夫聖人者與天地合其德日月合其明四時合其序鬼神合其吉凶謂之聖人也略而言之凡有五種一曰得道之聖太上老君諸天大聖是也二曰有天下之位兼得仙之聖伏羲黃帝顓頊少昊堯舜是也三曰有天下之位而無得仙之聖殷湯文武是也皆廓清六合不言升天矣四曰博贍之聖無天下之位周公孔子制作禮樂垂範百王而無九五之位而皆具天地合德之美也五曰有獨長之聖而無博贍之名亦不具上衆美者謂伯牙師文為鼓琴之聖子卿綏明能碁之聖鐘期延州知音之聖韓娥秦青謳歌之聖龔叔文摯智洞之聖離朱師曠視聽之聖張芝鍾繇草書之聖今經中明者指言理天下之聖也理天下之聖垂衣裳恭己南面而已矣何為哉所謂處無為之事也原天地之美達萬物之理順四時之行君無為於上物自化於下可謂行不言之教也理國如此則人安其居樂其俗與道合矣萬物作而不辭注令萬物各自得其動作而不辭謝於聖人也疏作猶動作也辭謂辭謝也言聖人善化無事無為百姓不知爰遊爰豫各自得其動作而不辭謝於聖人故擊壤鼓腹而忘帝力此人忘聖功也義曰聖人之於萬物也萬物自古而固存豈待為之而後存哉物自得其生育動作也爰遊爰豫太玄經之詞言上既無為其下自遂故間暇也擊壤者壤土也莊子馬蹄篇云赫胥氏之時民含哺而嬉鼓腹而遊也不知帝力者王充論衡曰堯之為君蕩蕩乎人無得而名有年五十者擊壤於路鼓腹而遊歌曰鑿井而飲耕田而食日出而作日入而息帝力何有於我此衆庶之忘聖功也生而不有為而不恃功成不居注令物各遂其性不為己有各得所為而不負恃如此太平之功成矣猶當日慎一日不敢寧居疏令物各得成全其生理聖人不以為己有令物各得其營為聖人不恃為己功如此太平之功弘濟日遠猶宜慎終如始不敢寧居此聖人自忘其功也注云日慎一日尚書文也義曰夫聖人處物不傷於物物遂其生物遂其生聖人不有之而恃其功任自然也處至順也夫功者王功曰勳輔成王業若周公也國功曰功保全國家若伊尹也民功曰庸施法於民若后稷也事功曰勞以勞定國若夏禹也理功曰績制法成理若咎繇也戰功曰多尅敵出奇若韓信也生成萬物者玄功也其功深遠曰玄也功成而不居所以全無為之功也日慎一日以具疏解言聖人有反物之功不自伐自恃惟恐失其所以隳其功故日加畏慎不敢寧息爾寧安也慎謹也聖人無為其功廣大物遂其性不失其宜天清於上地寧於下四海平一泰然而寧是太平之謂也夫唯不居是以不去注夫唯不敢寧居而增修其德者則忘功而功存故不居而不去疏彼聖人者稠直如髮慎終如始本末不衰未嘗寧居而逸豫是以日新其盛德忘功而功不去光宅而天下安故云夫唯不居是以不去義曰夫唯者發句之語也謂上不有不居之事也夫聖人威加四夷而不為有澤被萬物而不為惠功濟天下而不為己德冠四海而不為主忘懷於至道合志於虛無處上而人不重處前而人不害天下樂推而不厭故其德不去矣王者不妄於喜怒則刑賞不濫金革不起矣不妄於求取則賦斂不厚供億不繁矣不妄於愛惡則用捨必當賢不肖别矣不妄於近侍則左右前後皆正人矣不妄於土地則兵革不出士卒不勞矣不妄於萬姓則天下安矣物得其分不恃其功無為不恃之利信哉博矣稠直如髮者詩小雅都人士篇之詞也言情性密緻操行正直如髮之本末無降殺也道德真經廣聖義卷之七
