front:
  text: 道德眞經廣聖義卷之四十七行十
  hash: sha256:2f0d78d320120a38d32f377b29c18aa007fa96bdc7cd6e62d2f23113efd611bf
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0114_HFL_048-001a, image: hfl/0448/0448-090.png}
body:
  text: 唐廣成先生杜光庭述勇於敢章第七十三䟽前章明迷妄之病有可畏之威此章明勇敢之爲成殺身之咎初標敢與不敢利害之殊次明天道謙柔戒人勇敢後歎天網之報以勸善士之修義曰前明去見貴之外行取知愛之内修此乃勸勇退以謹身戒勇進以傷德用明利害遣復謙柔成善勝善應之功弘不言不爭之㫖示以天網俾之競修然標以死懼之令畏司殺之咎勇於敢則殺勇於不敢則活注敢謂果敢言人勇於果敢從事失於謙柔退讓必害於身故云則殺不敢者則可以理身矣䟽剛决爲勇必果爲敢言强梁之人無所畏忌失於謙柔决於果敢犯上作亂者則是殺身之道也故云勇於敢則殺勇於不敢則活者人若於事靜慎歛身知退所决在於不敢强梁犯患則是活身之道也故云勇於不敢則活義曰强梁者銳志而前自投禍患謙慎者奉身而退必保安眞殺活二途昭然可驗矣犯上作亂者論語學而篇云不好犯上而好作亂者未之有也言强梁之人干犯已之上者而孝悌之人必恭順好欲犯其上者少也知此兩者或利或害䟽兩者敢與不敢也言人能知勇敢則殺而有害不敢則活而有利當須勇於不敢此兩者在勇雖同所施則異故云或利或害義曰剛决於心俱謂之勇勇强梁而進則害至勇謙柔而退則利來利來則生害至則死生死起乎心感利害歸乎妄情若能勇退葆身謙光約修道之要也雖妄情所起而吉凶利害不常故皆云或爾天之所惡孰知其故注兩者敢與不敢或有也能知不敢者有利敢者有害當須勇於不敢此勇敢之人動有灾害天之所惡孰能知其故哉䟽孰誰也故猶竟故也勇敢於有爲之人動則有害乃天道之所惡而代俗之人誰能知其意故者乎義曰天之道惡殺而好生惡惡而好善勇於進則有殃而必殺勇於退則有利而必生自然而然豈知其故此戒人當勇於謙退以保其生也夫王赫斯怒以整其旅此文王之勇以安天下也逸書曰惟我在天下曷敢有越厥志此武王之勇亦以安天下也匹夫勇敢傷於人而喪其身何足貴乎是以聖人猶難之注聖人猶難爲勇敢之事䟽此舉聖以勵凡也夫以聖人之明猶難於勇敢懼其爲害況於凡人欲爲勇敢焉得無害乎義曰聖人不爲勇敢之事此約聖人以戒代人爾言聖人尚慮有害不爲此勇敢强梁之事況於凡俗乎此愛人之心戒之至矣天之道不爭而善勝注此下言天道謙虚以戒人事勇敢天不與物爭四時盈虚物無違者故善於勝䟽因上言天之所惡故此下四句廣明天道謙虚以戒人事勇敢人懷勝勇所以有爭天道平施唯善是與物莫之違故云善勝義曰天道任於自然因無勝負四時代謝不令而行六氣推遷不言而信物不違天則爲善勝也惟善是與者此經第四十三章云天道無親常與善人也天道平施者易謙卦云君子以裒多益寡稱物平施是也不言而善應注天何言哉福善禍淫曾無差忒故云善應也䟽天何言哉但福善禍淫吉凶感應故曰不言而善應也義曰天無言而四時行地無言而萬物生得時而興感物而應此自然之理也西昇經曰爲善善氣至爲惡惡氣至自然之勢影響不差也福善禍淫者尚書湯誥曰福善禍淫言國之政教人之所修有善有惡善者天福之惡者天禍之天降譴以告之謫見以警之而不寤者禍乃及之此吉凶所應人所召也不召而自來注天道不乃物使從己物不能違自來順天爾䟽凡物之來皆由命召今天不召於物而使從已而萬物自來而順之則負陰抱陽春生夏長皆非召而來也義曰春秋左傳曰禍福無門惟人所召爲惡召禍爲善致福理之常也今言天道不言而自應不召而自來言萬物自順於天也負陰抱陽者此經第五章之詞也繟然而善謀注天道玄遠繟然寬大垂象示變人可則之故云善謀也義曰天道運四時垂曆象循環順氣以示於人曆象不愆其常四時不爽其應寒暑晦明罔有差忒此寬緩而善謀繟寬大也緩也謀度也曆數也象法也變星辰差忒也天以運度之數垂文之象顯示於人聖人則天象而立教化故禮經序曰昔在唐堯曆象日月敬授人時是也天網恢恢疏而不失注天之網羅雖恢恢疏遠刑淫賞善毫分不失䟽恢恢寬大也此覆釋上天道等義也天道網羅雖復寬大而且遠賞善罰惡不失分毫也義曰古人結繩爲網爲羅以捕飛走之物網取其籠罩廣大之義也天道以吉凶之應陰陽之數善惡之報以平籠萬物物在其中無所逃隱爲善善報之爲惡惡酬之故謂之天網天道無傷於物是故網羅籠罩掩獲於物乎此約體爲喻爾夫天以氣禀之於物物則受氣於天生形於地是則天地爲萬物之本物之善惡生死皆受命於天天無網羅機械以制於物但恢恢廣遠無不包容飛行動植風雲氣象陰陽寒暑晝夜生死皆在包羅之内無所逃失故若網之所籠爾其氣之所應時之所推曆數昭然不差毫末毫者毛之細者也分者數之微者也天網所羅微細無隱矣民常不畏死章第七十四䟽前章明勇敢於有爲自成殺身之咎此章明有爲則輕死必犯司殺之誅首五句陳戒用刑次一句指明司殺後四句舉用刑代殺必有愆咎義曰夫賞善以德罰惡以刑猶寒暑以無私譬陰陽之必應此天之道也人君無爲御極民知自勸之方有道修身天錫無疆之壽各安素分必享大年在乎畏慎於心戒懼於禍不觸陷身之網豈罹司殺之殃於國則寬宥用刑哀矜察獄不施代殺之法必無傷平之非不行代斲之權必無傷和之怨然後去厚歛有爲之事循不爭勇退之規以繼前後章之大㫖楅於人也民常不畏死柰何以死懼之注縱放情欲動之死地習以爲常曾無畏者人君當以清靜化之奈何更立刑法以誅殺恐懼之乎䟽言人不能守道清靜而放縱情欲動之死地積習爲常曾無畏者人君當以清靜爲化而教導之柰何更以刑法誅殺而恐懼之義曰人君雖懸象順天垂法御極在於開物成務用道教人若民侮法亂常冒刑于禁自投于網不慎其身亦當悟之以革慮洗心捨惡從善使其悛省許以自新不當遽用五刑不開三面此恐失於慈恕也若使民常畏死而爲奇者吾得執而殺之孰敢注若使代人皆從清靜之化不敢溺情縱欲常畏於死而有獨爲奇詐者假令吾勢得執殺此奇詐之人孰敢即殺故下文云疏此明人君化以無爲而人皆少欲各全其生常畏於死而獨有爲於奇詐不善之行者適令吾勢得執而殺之亦誰敢即殺所以不殺爲自有天網司殺之也故下文云義曰既以慈恕教人人知其教謹身畏法潔行修生盡祛欲情俱畏於死而或獨有肆懷從欲干法犯刑人君亦當戒以自新使之悔過而開道之若之若迷而不返者亦不遽執而殺之以俟天之司殺此所以示其善誘也常有司殺者殺注如此奇詐之人天網不失是常有天之司殺者殺之䟽司主也天鑒孔明無所不察奇詐之人不得其死是有天之司殺者殺之矣義曰天之養人也厚矣愛人也至矣南宫丹籙賞善而司生北宫黑簿紀過而主死天地萬神司察善惡以懲以勸俾其革惡而遷善也故有功者延年有罪者奪筭毫分無失如陽官之考校焉天有司命四司之星在虚危之間人星之側以司於人司命二星主人之功過年壽賞奪司禄二星主人之禄秩衣食司危二星主人之憍佚不正司非二星主人之邪忒多私此四星者三元經所謂天之司殺也糺察罪福使世人知修善戒惡焉人君以善教人動懷慈恕其獨不善者天之司殺當自殺之言天之照鑒甚明無有不察天網寬大疏而不漏違天反道何逃其辜孔甚也夫代司殺者殺是謂代大匠斲注人君好自執殺必不得天理猶如拙夫代大匠斲木矣䟽言不善之人司殺自殺人君若勢得執殺而使殺之是代殺者殺人不得天理猶如拙夫代大匠斲木矣義曰設有不善之人必俟天之所殺人君執而便殺是代天殺之權下爽哀矜上乖天理若拙夫代大匠斲木所失當如下文代大匠斲希有不傷其手矣注拙夫代斲豈但傷材亦自傷其手人君任刑代彼司殺豈唯殘害百姓抑亦自喪天和䟽大匠斲木動合方圓拙夫代之必失繩約惡得不損其材而傷其手乎天網不失神理昭明人君任刑代彼司殺惡得不害其人而喪天和乎奈何以死懼之斯之謂也義曰大匠之巧也運斤成風所斲無失拙夫代斲材手俱傷亦猶人君執得不善之人輕肆刑殺雖云用鉞實慮傷和故首文之意有不畏死者當開之以善教之以道豈得以死而懼之乎尚書曰與其殺不辜寧失不經好生之德洽于民心是也道德眞經廣聖義卷之四十七
