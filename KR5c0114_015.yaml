  text: 道德眞經廣聖義卷之十四羊三
  hash: sha256:8b7f67b19fba2b26b02454654df58d1c38eb41fe52d622c49ab1642621cebeb5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0114_HFL_015-001a, image: hfl/0442/0442-080.png}
body:
  text: 唐廣成先生杜光庭述視之不見章第十四䟽前章明貴身爲患令兼忘而不有此章明妙本無象故在用而皆通首三句言不可求之於色聲次六句尋責必歸於無物又五句示妙用之難測後四句結引古以證今義曰前示忘身忘患爲修證之基此表非色非聲宣至道之妙既視聽之不得乃混一以指名雖皦昩難窺隨迎不睹執之以理身理國爲成化之根源矣視之不見名曰夷注此明道也夷平易也道非色故視不可見以其於無色之中能色故名之曰夷聽之不聞名曰希注希者聲之微也道非聲故聽之不聞以其於無聲之中獨能和焉故名之曰希搏之不得名曰微注搏執持也微妙也道無形故執持不得以其於無形之中而能形焉故名之曰微䟽此明道也夫視之者以色求道聽之者以聲求道搏之者以形求道道非聲色形法故竟求不得以不得故欲謂之無乃於無色之中能應衆色無聲之中能和衆聲無形之中能狀衆形是有無色之色無聲之聲無形之形故謂之夷希微矣夷者所謂明道而非道也夷者平易也希者聲之微妙也搏者執持也義曰目之所視者但見平易而不能見道道無色也耳之聽也但惟希寂而不能聞道道無聲也手之搏也但惟微妙不能得其形道無形也以神視之見無色之色以氣聽之聞無聲之聲以慧照之識無形之形而衆色之具衆聲之和衆形之立非道不能生非道不能成道也者獨能應衆色和衆聲狀衆形故强名之曰希夷微爾道不可言言之非矣所以明道皆强爲之容而非道也莊子曰無視之以目而視之以神無聽之以心而聽之以氣能以微妙而合於道矣此三者不可致詰故混而爲一注三者將以詰道道非聲色形法故詰不可得但得夷希微爾道非夷希微故復混而爲一也䟽三者夷也希也微也致得也詰責也混同也妙本微妙精一難名色聲形法焉得詰責欲以色聲形詰但得夷希微爾謂夷希微則三也夷希微但假名欲明道用道非色聲形等則夷希微復混同爲一矣義曰夷希微三者假標以名道亦皆無也三者凝化爲三境次爲三界下爲三才明爲三光於身爲三元於内爲三一皆大道分精運化之所成也混而爲一復歸於妙本之道也三境者三寳君之祖氣所凝其色青黄白亦名也玄元始三氣乃諸天之祖宗萬化之元本也三界者欲界六天以統九仙色界十八天以統九眞無色界四天以統九聖三才者天一地二人三沖虚眞經云清浮之氣爲天濁滓之氣爲地冲和之氣爲人謂之三才也三光者太陽之光爲日太陰之光爲月日月之餘光爲星辰謂之三光也三元者人身之中腦爲泥丸宫以主上元心爲絳宫以主中元臍下爲丹田以主下元三元尊神各統陰陽萬二千神氣以養於人三一者上元所主謂之元一中元所主謂之眞一下元所主謂之正一三一元神主運氣固精寳神留形上清有迴風混合修三一之道昔黄帝以寧先生所教詣峨眉山謁天眞皇人以受之遂精思千日與三一上眞統三萬六千神乘黄龍而昇天矣天浮於上地結於下人生其中三者互相生化未始有極列子云天積氣也地積塊也日月者氣中有光耀也三一乃有中之無三元乃無中之有以有無相感而爲精神氣三者共生於人故世人得之則生失之則死神者天之陽氣所生人之動靜對答運用計智是也精者地之氣百穀之實五味之華結聚而成是也氣者中和之氣也道一妙用降人身中呼吸温暖以養於人是也三者混合而成於身是謂混而爲一也其上不皦其下不昩注在上者必明在下者必昩唯道於上非上在上亦不明於下非下在下亦不昩䟽皦明也昩暗也夫形質之物皆有定方在上者則明在下者則昩惟妙本恍惚不可定名則在上亦不明在下亦不昩而能上能下能明能昩非天下之至賾其孰能與於此乎義曰其爲明也必皦然在上謂積陽也其爲暗也必昩然在下謂積陰也陰陽有定分明昩有定相是則有形有質皆有定方也惟夫大道處於上不皦然而明道非陽也處於下不昩然而暗道非陰也故曰非陰非陽而能陰能陽不可以定相睹不可以定分求天得道而能清是能上也地得道而能寧是能下也陽得道而能動是能明也陰得道而能靜是能昩也故爲天下之至賾易繫曰非天下之至賾其孰能與於此乎言至道功深如此若非天下萬事之至極精妙誰能叅與於此也繩繩不可名復歸於無物注繩繩者運動不絶之意不皦不昩運動無窮生物之功名目不得非物能物故常生物而未始有物妙本湛然故云復歸於無物矣䟽繩繩者運動不絶之意妙本生化運動無窮生物之功强名不得物物而不物生生而不生尋責不得妙本湛然未曾有物故云復歸於無物義曰道惟妙本生化萬殊運用生成繩繩不絶物物而不物物自物也生生而不生生自生也道之無迹不恃其功深妙湛然不可爲有是無物也物者象也是謂無狀之狀無物之象是謂惚恍注是謂無形狀之狀無物質之象不可名有不可名無無有難名故謂之惚恍疏狀形狀也象物象也言妙本混成本無形質而萬化資禀品物流形斯可謂有無狀之形狀有無物之物象不可名之爲有亦不可格之於無無有難名故謂恍惚義曰道以生育動植成形故能於無狀之中成其形狀無物之中作其物象謂其無也則狀象資生謂其有也則杳冥難睹非無非有爲恍惚焉恍惚者非有非無之謂也易乾卦彖曰雲行雨施品物流形言品類之物流布成形也迎之不見其首隨之不見其後注無始故迎不見其首無終故隨不見其後也䟽至精無形至大不可圍故迎之者不得其首隨之者不得其後無首則無始無後故無終無始無終故非隨迎所得義曰至道獨立無始無終既非前後可窮莫得隨迎之所故曰長於上古而不爲老生於末代而不爲少先萬物而不爲始後億劫而不爲終由此而言豈隨迎得也況充塞天地周遍虚無無處無道無往無來不今不古何者爲始何者爲終固非先非後矣凡物有往則隨之有來則迎之道無來往非隨迎可求矣執古之道以御今之有注執古無爲之道以御今有爲之事則還反淳樸矣䟽此明古先帝王常以無爲道化以化人故戒云今能執守古之所行無爲之教以御理今之有爲之事則不言而化也義曰御者制也古之化者無爲無事今之化者有體有名無爲故易理有體故難化若今之帝王執用古之大道無爲以理自速太平也玄古之君上德不德是無爲也季葉之化約名約器是有爲也以無理有庶可向方以有制有亂兹兆矣能知古始是謂道紀注能知古始所行是謂道化之綱紀䟽前云執古之道將引之使行此云能知古始明道行必化故重云帝王能知古始無爲而理當抱守淳樸爰清爰靜者是知爲理道之綱紀義曰恐帝王難於用古不遂執行無爲故重舉斯文再加勉勵能知無爲易化古道易行弘之在人豈惟澆淳之異理道綱紀其在兹乎故曰引其綱萬目張引其紀萬目起理身理國亦猶此歟爰清爰靜者太玄經之辭也理國執無爲之道民復樸而還淳理身執無爲之行則神全而氣王氣王者延年神全者昇玄理國修身之要也古之善爲士章第十五䟽前章明妙本無象則在用而皆通此章明玄通之人常不盈而能弊首標古之五句明善爲所以微妙次云豫若七句示德容所以難明孰能下兩句表進修之徐生保此下終篇結證成而不滯義曰將明前章執古之妙再叙古之爲道之人德行周深廣加喻說或豫兮猶兮而畏慎或儼兮涣兮而卷舒或敦兮曠兮而深廣或渾兮靜兮而清濁隨機應變其德如斯人能體而用之必無盈滿之失矣古之善爲士者微妙玄通深不可識注士事也言古之善以道爲事者於彼微言妙道無不玄鑒通照而德容深邃不可識知矣䟽古昔也士事也言古昔之人善以道爲事者精微要妙玄寂通達體道了言涣然無滯而其宇量冲邃不可識知矣義曰士者指古昔有道之人也有道之人行道之行凡有所立在野在朝皆謂之士刻意尚行離世異俗此山谷之士也語仁義忠信恭儉推讓此平世之士也語大功立大名正君臣明上下此朝廷之士也就藪澤居閑曠釣魚避世此江海之士也吹呴呼吸吐故納新熊經鳥伸此導引之士也若夫不刻意而高無仁義而脩無功名而理無江海而閑不導引而壽者爲道之士也前之五士其用可測其事可涯唯爲道之士道微妙應變玄通其用冲寂難以智察無不無也無不有也澹然無極而衆美從之是不可識也夫惟不可識故强爲之容注夫惟德量難識故强爲容狀以明之下文也䟽夫惟善士雖正容可以悟物而宇泰發於天光德量難窺故强爲容狀且求委順之迹將以引化凡愚義曰善爲道之人正其身而人化正其行而人隨睹其德容物自開悟德宇泰然而定其所發明者天光也非人曜矣天光自發則人見其人物見其物物各自見而不見彼則德宇泰然而定不可窺量示委心順物之方爲化俗引凡之行故莊子承答舜曰性命非汝有天地之委順也豫若冬涉川注豫閑豫也善士於代間法如涉冬川衆人貪著故畏懼今我不染故閑豫疏豫閑豫也若如冬川喻代間愛欲所以陷溺衆生善士雖處代間不爲愛欲所染如涉冬川故多閑豫所以閑豫者冬冰堅壯無陷墜之憂爾義曰疏解以閑豫無憂冬川可涉堅冰不能陷愛欲不能侵以喻善爲道之人此聖㫖也夫豫之言疑也猶豫皆疑難之象爾亂流而渡深曰厲淺而揭由膝以上爲涉冬月涉川寒沍侵骨將爲涉者固亦疑難冷既傷心冰仍痛足至人睹世俗貪求之事無益於身如冬涉川有疑難也且代之愛欲逐境生迷萬緒雲蒸千途蜂起功名聲色爭先鋭進之心厚利豐財競起貪求之跡或烹燔取樂或傷殺恣情投身於愛欲之川隨流不返溺性於漂沉之浪有去無歸豈獨冰痛爲難抑且報應明驗何者溺利欲之人涉遠營求有水陸邀劫之報淩抑於人有忿爭刑網之報上網於君有誅殛喪家之報下虐於民有召寇起讎之報況於傷生害己破國亡家之甚乎至道之人知此爲憂故設涉川之喻斯爲至戒信可寳焉猶若畏四鄰注猶豫疑難也上言善士不染故閑豫及觀行事甚疑難如今代人懼鄰戒也䟽猶疑難也夫善士無愛欲故多閑豫及難其行事舉動施爲恐不合道故多疑難如今之人有事畏四鄰之知而加戒慎義曰猶犬也壠右之人謂犬爲猶亦云古有良犬其名曰猶言犬隨主行必豫於其前偵邏疑有善惡須復來報其主故云猶則多豫狐則多疑故言狐涉河冰聽其下流水聲絶然後敢渡今北人渡河冰見有狐跡則車馬於冰上無所陷矣此則猶豫皆疑難之象也且常人不知修道恣欲任情無懼無疑動貽陷溺爲道之士知愛欲而不爲若冬將涉川有凝沍之憂畏居將爲事懼鄰里之聞知既暗室不欺每屬垣爲戒也此爲道之行也夫人爲惡於幽暗者鬼神知之爲過於明顯者鄰里知之得無戒慎矣論語曰毋與汝鄰里鄉黨乎此言十家爲鄰五鄰爲里萬二千五百家爲鄉五百家爲黨也儼若客涣若冰將釋注雖則儼然若客無所造爲而不凝滯於物涣然若春冰之釋散䟽善士於愛育無所造作如客對主人但儼然肅敬爾雖於愛欲如客對主而爲善之行不凝滯於物涣然若春冰之釋散無留礙爾義曰儼肅敬也涣散也釋解也出門如見大賔言主之敬客也儼兮其若客言客之敬主也賔主盡敬各慎禮容世之常也至人靜默戒慎檢身常如對主之恭固無肆情之欲爲善不滯散釋變通若泮春冰豈復膠固矣敦兮其若樸注雖涣然冰釋曾不自矜而能敦厚若質樸無所分别矣䟽敦敦厚也樸質樸也言雖不滯於物而絶浮競其德行敦厚若質樸無所分别義曰至人也外雖散釋通變縱横順物内則温柔敦質凝寂其心故無紛競之傷自得恬和之趣曠兮其若谷注其德量曠然寬廣無不含容有若彼空谷矣䟽曠寬也言善士懷道抱德宇量曠然寬大於物悉能含受如彼虚谷無不包容義曰德既敦實量乃寬弘善惡無所不容是非固當無撓曠然吞納若虚谷焉渾兮其若濁注和光混俗若濁而清䟽善士心照清淨而能容物和光同塵不自殊異渾然如濁物莫能知義曰水之清也能鑒物之善惡而物亦測水之淺深及其秋潦乍興濁波初鼓澶漫也牛馬莫辯汹湧也深淺難知望之茫然詎可揭涉至人和光接物混跡隨流不顯其機有同濁水其容可見其跡難窺人君理國乘時在於明德不爲察察之政示以淳淳之方使民不識不知順帝之則斯爲道化善莫大焉孰能濁以靜之徐清注孰誰也孰能於彼混濁以靜澄止之令徐徐自清乎䟽因上文云若濁便舉水之澄清以況善士之心無撓則自然靜止故云孰能於代間愛欲混濁之中而以清靜道性靜止之令愛欲不起亦如水之濁而澄靜之令徐徐自清乎孰誰也義曰至人外示混濁將明不異於常内本澄清固亦常同於道亦猶水之濁也而清明之體常存心之清也渾濁之塵不雜若世人能澄其塵染净彼心源如水可以徐清自入至人之境老君愍世之耽欲念俗之澆浮爭投跡於愛欲之津競鋭意於利名之浪渾是非之濁溺生死之河不務競修誰爲拯拔演兹法喻用救迷途善趨澄鍊之門冀速清虚之道孰能安以乆動之徐生注誰能安靜於此清以乆更求勝法運動修行令清淨之性不滯於法而徐動出也生猶動出也䟽此教法無滯也誰能以清淨之性靜止愛欲如水之性已得徐清若便安於此清而以乆滯滯則非悟未名了出當須更求勝法運動精修爲道既損之而又損按行亦次來而次滅則清靜之性不滯於法而徐徐動出也義曰大道好生誘人垂法千門鍊性萬行修心因悟乃修因修乃證修證之理泛舉其綱則有吐納元和咽漱雲液茹松食栢絶粒餌芝或隱朝上清密伺玄斗或五金八石或水玉流珠陰鼎陽鑪五華九轉或素文丹籙檄召鬼神金鈕青絲質盟天地則有正一道德昇玄洞神靈寳明眞三清衆法並革凡登道證品昇眞又有奔二景朝五辰據極攀魁騖綱飛紀吞日咽月制魄拘魂八道望雲九眞受事昇玄卧斗方諸洞房左右靈飛陰陽六甲三部八景二十四眞存服三元注想三一紫房黄闕絳景朱嬰紫虚南嶽之篇青童東海之訣内視五藏下制六天導引吞符御風養氣騰舉之道溢於眞經或修勵一門便可得道遂能拔玄祖於長夜飛我身於太虚瞬息而歷九陔那慙若士顧面而周六合豈讓鴻蒙而世之大迷不能耽味即曰神仙之事非積學可求又云得道之人皆有壽限運終數盡還至淪滑殊不知得道者自仙登眞從眞證聖登聖極果與道合眞無壽考之期無終盡之數斯須而經億劫指掌而越萬天文選曰少别千年暫遊萬里歩虚詞云八天如指掌六合何足遼皆其事也但修之既契即忘其修旋修旋忘無所滯著即爲妙矣夫法者所以詮道也悟道則忘法言者所以觀意也得意而忘言若滯於法則道不能通滯於言則意不可盡故令於法不滯轉更增修於言不滯旋新悟入次來次滅者西昇經云子能按行次來次滅此喻小乘有爲之法以教初門既得其門漸以中乘之法以熟其行既熟其行乃以大乘之法令忘其執則目凡而得證累證而階聖雖仙眞聖果二十七品而所修之行不可執滯斯謂徐生徐清次來次滅之㫖也保此道者不欲盈注欲保此徐清徐生之道當須無所執滯若執清求生是謂盈滿將失此道故云不欲盈爾䟽滯法安清是名盈滿故云若欲保全此徐清徐生之道當須無所滯著得無所得今復滯清求生是傷盈滿盈滿則妨道故云不欲盈義曰能明次來次滅之法是得徐清徐生之要保此要㫖不滯滿盈當契下句之理夫唯不盈故能弊不新成注夫唯不盈滿之人故能以新證之行爲弊薄不以其新成而滯著䟽夫能無欲凝滯以至無爲於法無住不盈滿者常以新證之法爲弊薄更求勝致不以爲新成而便滯著爾義曰既了舊法又證新法謂自小乘入中乘道也中乘之道或權或實猶滯於修又捨此權實有修之門求入大乘無爲之趣若執於修著不悟無爲是曰新成還爲盈滿故當損之又損階麤入妙矣其於國也則古之聖主賢臣謂之善爲士者玄通道德德不可稱猶復如冬涉川履冰爲懼畏鄰表戒若客無爲通變從民屈伸不滯而冰釋含容若谷懷抱樸素以訓人政昏昏而外濁心明明而内照無滿溢驕盈之變守弊薄不新之規祚必延洪人其清泰淳古之跡復何遠哉道德眞經廣聖義卷之十四
