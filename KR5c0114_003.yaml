front:
  text: 道德真經廣聖義卷之三羔三
  hash: sha256:a52a19c6a81771b0c6f2ca3c06080603703e3850e8b3e0b7c355af867d626249
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0114_HFL_003-001a, image: hfl/0440/0440-104.png}
body:
  text: 唐廣成先生杜光庭述釋御疏序上疏玄玄道宗降生伊毫義曰玄深妙也亦不滯也宗主也尊也言太上老君為深妙道之主也老君既不滯有亦不滯無因果兩遺粗妙雙遣先天後劫尊為教主故云玄玄道宗也降生伊亳者自上而下曰降言老君居三境之天為大道之主愍鑒下土降化人間運大慈心分形表瑞乘九龍之駕化旭日之精下入玄妙玉女夢中因而託孕寓生於世示見同凡有出生之相為立化之首故曰降生此明表應化迹也伊亳者伊即伊侯之墟是老君祖徵避桀難之所其地在苦相二城之間也亳者亳社之地古謂之亳後乃殷墟殷自湯受命至第十九王盤庚八度遷都方都於亳即殷之都也或云陳國者即太皡之後所居謂之陳墟在宛丘之側也按禹别九州苦縣是豫州之分武王伐紂既有天下乃封舜之後胡公滿於陳此即古有太皡之子孫已為陳國舜後亦已為胡國胡小而陳大胡在沈蔡之間陳在今潁川武王尊舜之德追奬其後故遷之於陳此陳國自胡公滿之後歷春秋時凡四十餘世為楚子所滅漢祖滅秦改陳為淮陽郡郡大縣小郡管於縣故有陽夏寧平若柘四縣隸為淮陽後漢章帝改淮陽為陳郡或云楚國者楚以熊繹為始封之君都於荆陳自淮之阻其地連楚春秋楚子滅陳因而縣陳故亦屬楚遂為楚地或云楚國或云楚縣或云陳郡春秋之日郡小縣大以郡屬縣故云楚縣秦並楚縣置三十六郡郡大縣小以縣屬郡或云譙國者今老君舊宅太清宫東北四十里有譙城是也或云相人者宫側有古相城也或云苦縣亦春秋統郡之縣也故苦縣城在瀨水東基址存焉其苦縣後改為谷陽縣大唐乾封元年高宗皇帝封禪東嶽回駕幸老君舊宅封册尊號改為真源縣中和三年癸卯毫州刺史潘稠上表於成都行在以太清宫纍有應見自黃巢大寇之後一十八度寇孽侵犯皆有迅雷烈風震擊其賊或顛沛而失道或因至敗亡侵宫宇不得遠近居人就宫避難者數千户皆保安全請移縣就宫安置奉勑移縣就宫必恐褻瀆所奏宜不允遂升真源縣為赤縣以太清宫在部內故也仍差使臣齎御詞修齊告謝雖時代遷貿名號不同其於處所由來一耳後漢桓帝夢見老君特詔陳相邊韶於生處舊宅修祠立碑祠側有李母廟祠內古有虛無堂堂之前有三檜及餘檜千株九龍井鍊丹井升天鹿跡樹古跡依然左帶靈溪右環渦水其地顯敞實惟勝所又瀨水在宫西以水為鄉名故為瀨鄉或為厲鄉文字訛也其宅纍代帝王每加修飾隋開皇六年文帝敕內史舍人薛道衡立碑修廟唐天寶七年戊子改為太清宫以汴州節度使為宫使亳州刺史為副使國朝高祖太宗高宗中宗睿宗玄宗六聖真容並列侍於老君左右焉疏肅肅皇祖命氏我唐義曰肅肅尊嚴莊敬也皇大也祖初也老君乃大唐尊嚴之祖也命氏者氏族也言得姓之由也我唐者言唐之立極自聖祖垂裕乃老君裔孫也始因老君誕生指李樹而為姓李氏之姓始於指樹已具在前解義中故云命氏我唐也薛道衡碑云感日再誕莫測受氣之由指樹為姓未詳吹律之本昔京房吹律而定其姓也疏垂裕之訓無疆之祉義曰裕福善也無疆者無邊廣遠之貌也祉福也老君垂善應之福流廣遠之裕光啓帝業聿興我唐也訓教也疏長發遠祥系本瓜瓞義曰長發商詩篇名也濬哲維商長發其祥祥善也言商家之德久發見其禎祥契布五教寬大之德始有王天下之萌兆歷虞夏之世而湯有天下也系本也系者單絲聯續之貌不絶之象也言聖系天枝長發不絶也瓜瓞者文王之什綿綿篇也綿綿者瓜紹也瓞匏也瓜本實繼先一歲之瓜必小狀似匏故謂之瓞綿綿然若將無長大時興者以喻后稷矣后稷帝嚳之胄封於邰其後公劉失職遷居豳于漆沮之地歷世亦綿綿然至大王而益盛得其民心而成王業舉殷周之二代興業久遠之事以眀老君垂裕久遠方興我唐業將明受命建國非一朝一夕人事之所能乃積德傳裕其來甚遠乃能奄有天下如殷周之興也疏其出處之跡方册備記義曰方謂方所也册者編竹為之長尺有二寸以記邦國之事春秋序曰大事書於册小事簡牘而已是也出處者出謂在朝即老君伏義之後代為國師或為藏史或為柱史或為太史儋或云伯陽父咸顯眀於朝廷也處謂隱逸即老君西導流沙東巡碧海幽演傳經等是也雖晦名隱世其行藏之迹化導之事國家正史簡册之中及諸子史道經之內無不具紀也易曰或出或處是也疏道家以為玉晨應號義曰道家者按太史司馬遷著六家之說先黃老而後六經道家居先最為通美馬遷曰陰陽者繁而致惑儒者博而損慮墨者苦而傷性名者華而少實法者酷而少恩唯道家之教為大道焉以其清虛無為使人精神專一動合無形贍足萬物其為術也因陰陽以大順與時推遷應物變化無所不宜指約而易操事少而功多其實易行其辭難知以虛無為本以因循為用無成勢無常形故能究萬物之情不為物先不為物後故能為萬物之主此所謂道家也淮南子曰道家者理性情理心術養以和持以適樂道而忘賤寧德而安貧聖賢之所貴家國之所賴故曰道家也玉晨者即太上大道君之别號也老君本紀云或號天尊或號太上或號大道或號老君即明玉晨君亦老君之應號也太上虛皇常居紫瓊宫在玄都玉京之上亦名紫晨宫亦名玉晨宫即玉晨道君乃老君之應號爾疏馬遷謂之隱君子義曰馬遷者司馬遷也遷字子長河內溫人中山王相司馬喜之孫太史令談之子顓頊之裔生于龍門年十歲誦古文尚書年二十遊江淮九疑禹穴之間仕漢為郎中使西蜀父卒歲餘為太史令而作史記遷嘗因言李陵非罪枉害其妻子遂為人所譖下獄受腐刑西京雜記云遷發憤而作史記先達稱有良史之才叙屈原賈誼詞㫖抑揚蓋一代之偉才也桓談新語曰遷修史記未行於代其後外孫楊惲題為太史公或為談為太史令遷繼為世官而身受腐刑恐辱先人我同太史家走使之人耳故題為太史公也遷為中書令卒有集二卷史記云老子或隱或顯二百餘年西入流沙不知其終蓋隱君子也子者有道之稱古人稱師為子如孔子列子是也君子者君師也禮記云為學者能博喻然後能為師能為師然後能為長能為長然後能為君為君為師其德光大故謂之君子又解云有德有道雖在衆庶之中為人所敬則為君子寡道鮮德雖居高位亦謂之小人故道比於君德比於師然後謂為君子凡世之人理猶若此況玄元老君為道德之主帝王之師號曰君子不亦宜乎潜龍卑秩故謂之隱也疏而仲尼師之義曰仲尼者孔子也孔子名丘字仲尼其先殷之後也按史記殷本紀云帝嚳之妃吞燕卵而生契為堯司徒有功封於商賜姓曰子契裔孫湯名天乙亦名履滅夏而為天子至湯孫三十七代其王名帝辛號之曰紂無道周武王起兵滅之封其庶兄微子之子啓於宋宋閔公有子弗父何長而當立讓其弟厲公何生宋父周周生勝勝生正考父考三命為宋正卿故其鼎銘云一命而僂再命而傴三命而俯循墻而走莫敢余侮三命益恭故春秋美其德焉考父生孔父嘉别為公族遂以孔為氏或云吞乙卵而生後賜姓子以子配乙為孔字乙即燕也此兩存焉或以滴溜穿石而為孔姓此尤不經今所不取孔父嘉為宋司馬生木金父木金父生皋夷父皋夷父生防叔防叔奔魯生伯夏伯夏生叔梁紇即孔子之父也孔子居魯國闕里鄒鄉周靈王二十一年魯襄公二十二年戊申十月十三日庚戌生至魯哀公十六年周敬王四十一年庚申歲四月十八日卒年七十三初昭公七年楚子成章華之臺欲與諸侯落之召昭公孟僖子仲孫玃為介遂如楚三月過鄭鄭伯勞之僖子不能相儀及楚不能答郊勞四月楚子享公于新臺九月至自楚僖子病不能相禮乃講學苟能禮者從之二十四年僖子將死召其大夫曰禮者人之幹也無禮無以立吾聞將有達者曰孔丘聖人之後也而滅於宋其祖弗父何以有宋而授厲公及正考父佐載武宣三命兹益恭其恭也如是臧孫紇有言曰聖人有明德者若不當世其後必有達人今其將在孔丘乎我若獲殁必屬說南宫敬叔也與何忌孟懿子也皆僖子之子於夫子使事之而學禮以定其位故何忌敬叔師仲尼仲尼謂敬叔曰吾聞老聃博古而達今通禮樂之原明道德之歸則吾師也敬叔言於魯君曰孔丘聖人之後將達者也受先臣之命屬臣必師之今孔子將適周觀先王之遺制考禮樂之所極斯大業也君盍以車乘賫之臣請與往魯君與車一乘二馬二竪子敬叔俱至周問禮於老聃訪樂於萇弘歷郊社之所考明堂之則察朝廷之度觀明堂四門之墉有堯舜桀紂之象而各有善惡之狀興廢之戒焉又有周公相成王抱之而負斧扆南面以朝諸侯之國歎曰吾乃今知周公之聖與周之所以王也將去周老君送之曰富者送人以財仁者送人以言吾竊仁者之號送子以言凡當世之士聰明深察而近於死者好議人之非也博辨閎大而危其身者好發人之惡也為人臣者無以有已為人子者無以惡已自周反魯道彌尊遠方弟子之進者蓋三千焉孔子歎曰自南宫敬叔之乘吾車也吾道加行不然吾道幾廢矣今禮記所引吾聞諸老聃皆是孔子師老君得禮之要也疏翻經中其太謾義曰翻㠾亂取也孔子西藏書於周室以老君曾為藏史因而問焉老君不許於是翻六經以悅老君老君曰太謾願聞其要孔子曰要在仁義老君曰仁義人性耶孔子曰然君子不仁則不成不義則不生仁義真人之性也老君曰噫幾乎後言夫蚊虻噆膚則通夕不寐今仁義憯然乃憒吾心亂莫大焉此斥孔子不宗大道而循有為也疏問禮歎乎龍德義曰孔子問禮於老君而語老君以仁義老君曰夫烏不日黔而黑鶴不日浴而白黑白之别不足以為辨名譽之勸不足以為廣泉涸魚相與處於陸相詬以濕相濡以沫不如相忘於江湖子之所言其人骨已朽矣獨其言在耳良賈深藏若虛君子盛德容貌若愚去子之驕氣與多欲態色與淫志是皆無益於子之身吾所以告子者若是也孔子歸三日不談弟子怪而問曰夫子見老聃亦將何規哉孔子曰吾與汝處於魯之時有人用意也浩如飛鴻者吾飾意以為弓弩而射之未嘗不及而加之也有人用意悠然如遊鹿者吾飾意以為走狗而逐之未嘗不及而頓之也有人用意若井魚之沒於九重之泉者吾飾意以為鈎繳而投之未嘗不得而制之也及吾見龍則不能知也夫龍者合則成體散則成章乘乎雲氣養乎陰陽遊乎泰清吾不能逐也吾今見老君其猶龍乎使子口張而不能嗋舌出而不能縮形窮神錯而不能知所居余又何規老聃哉疏在周室久之義曰老君自殷武丁九年庚辰生於楚國苦縣至紂二十一年丁卯居岐山之陽號燮邑子風伯前驅彭祖為從以觀西伯之化西伯聞之徵為守藏史作赤精經教以仁信之道西伯行之禮賢好義鳳集岐山故禮記云周之興也鸑鷟鳴於岐陽即此時也遂以岐山為州之名鳳翔為府之號乃其事矣老君所居去鳳翔城北一十八里唐既受命於其舊所置啓聖宫也武王克殷老君號育成子作璇璣經武王師之成王時號經成子康王時號郭叔子仍為柱下史潜龍卑秩以佐於周至昭王二十五年度關西化流沙自武丁庚辰年至昭王癸丑年二百一十五年即司馬遷所言老君在周二百餘年是也疏將開道西極義曰本相經云昔妙梵天王為貪快樂不修功德下生罽賔為煩陀力王復好畋獵殺害無道故老君以昭王時西入流沙授以浮屠之術而度之焉又西戎雜俗好淫多殺皆學邪幻之法好事邪神老君乃往歷化八十一國胡王及九十六種邪法外道等也故云開導開即開悟導即化導也西極者在中國之西乃流沙八十一國等也疏關令尹喜請著書義曰尹喜者天水人也明習五經天文緯候陰陽之書無不恢博仕周康王時為大夫至周昭王二十四年知有聖人西度請出為函谷關令遂遇老君傳經就此門中分為八别一曰示見禎祥者昭王之時天理星西行入昴東南真氣狀若龍蛇而西度漢融風三至紫雲浮關尹喜見之請出為關令以候老君也仙公序曰尹喜宿命合道預占見紫雲西邁知有聖人當度是也二曰託試尹喜者昭王二十四年壬子十二月二十五日老君乘青牛薄板車徐甲為御以來度關云吾家在關東田在關西明日當臘天寒取薪耳喜再拜稱弟子曰今日見君乃聖人也願少留焉又謂之曰竺乾之國有古先生吾欲升就皆寓託他事以試尹喜三曰傳授道德者道德序訣云老君謂尹喜曰爾應為此宛利天下棄賢世界傳弘大道子神仙者矣以其月二十八日中時授太上道德經則是以昭王癸丑年五月壬午去周十二月二十五日度關二十八日授經自殷武丁庚辰年生至紂二十一年丁卯文王受命凡一百八年至昭王二十五年癸丑又一百七年通前二百十五年乃西度關史記云老子在代二百餘年乃入流沙是也四曰示見神通者老君御車人徐甲本是枯骨曝露草中老君因見哀之以太玄生符投之遂化為人隨老君周遊二百餘年老君約云日雇百金往至大秦安息以黃金併償之甲至關悅一婦人不欲隨老君西去遂作牒詣喜以訟老君索日雇之直老君謂甲曰爾本枯骨我以太玄生符救爾所以為人今還我符當償爾金也言訖符從甲口中出甲復化為枯骨喜見之驚怖為叩頭請謝願乞恕之老君又以符投之甲乃復舊尹喜見此神變彌加勤敬也五曰同還樓觀者喜為關令即函谷關也在陜州桃林縣南十二里今有故關墟大唐天寶元年壬午正月七日老君於丹鳳樓降見告陳王府參軍田同秀出天寶靈符云在函谷古關尹喜舊宅敕道士及內臣往求之於枯桑下有紫雲白兔之瑞掘獲石函得天寶靈符於其地大赦天下改桃林縣為靈寶縣於其地置靈符觀御制御書碑銘今存焉尹喜以二十八日受道德二經後乃與老君同自函關歸盩屋終南山之陰尹喜所居之宅宅即喜結草為樓觀星望氣之所其宅尹喜升天之後相傳謂之樓觀周穆王招隱士杜冲與喜弟軏居之有老君車板及支革樹秦漢纍朝謁板始皇墨跡皆存焉六曰升入太微者老君與尹喜說經及授九丹諸訣畢以昭王二十六年甲寅四月於喜宅南山上升入太微西升經云說經畢忽失老君所在斯須館舍光炎五色玄黃喜出中庭叩頭曰願神人復一見示以一要得以守元忽見金人存亡恍惚老少無常重謂喜曰除垢止念靜心守一衆垢除萬事畢吾道之要也七曰約會青羊者老君將升太微謂尹喜曰千日功成求我於蜀青羊之肆也喜遂稱疾棄位除垢止念靜心守一至昭王二十九年丁巳入蜀見老君於青羊之肆也其青羊肆在成都縣西南五里前臨大江古老所傳常有靈應以中和二年壬寅僖宗皇帝駐蹕在蜀因獲靈磚古篆符瑞喜動行朝皇帝駕幸其所致禮瞻敬敕置青羊宫其磚篆文曰太上平中和灾六字自獲磚之後明年收復長安後年駕回京闕矣八曰俱化西極者君喜三年之後千日功成以丁巳年入蜀於青羊肆見老君老君與喜自蜀川乘雲駕遊天水升三洞歷九天然後西化流沙八十餘國矣中和二年九月十二日以獲磚符瑞下敕曰昔者聖祖玄元皇帝與弟子文始先生講真經於樓觀之臺約後會於青羊之肆共乘雲駕俱化流沙仙記傳聞地圖標載自周昭洎于此日曆數約二千年景象寂寥蹤基牢落今因翠華巡幸玄貺昭彰珠光跳躣於庭前靈篆申明於樹下磚含古色字驗休徵中和之灾害欲平厚地之禎符乃見足表玄穹降祉太上垂祥將殲大盜之兵戈永耀中興之事業宜摸勒文字告示諸道及軍前仍於其地賜內外行庫錢置青羊宫以旌符瑞編付史館者即流沙西化益彰明驗矣著者表記也亦述作之謂也今詳此經乃帝舜時說已曾授舜今重授喜非時著述也疏於是演二篇焉義曰於是者發句之端也演者廣暢之理也二篇者指道德二經也王子年拾遺記曰老君居景室之山與世人絶迹唯老叟五人或乘鳴鶴或著羽衣共談天地之數所撰書經垂十萬言有浮提國獻善書二人乍老乍少隱形則出影聞聲則藏形時出金壺器中有黑汁狀若淳漆灑木石皆成篆隸科斗之字記造化人倫之始老君所撰經皆寫以玉牒級以金繩貯以玉函及金壺汁盡二人乃欲刳心瀝血以代墨焉此乃洛州景山太室少室也所說九變長生等經有百萬篇多藏名山石室祕而未行今所出者約六千卷皆經國之微言濟生之大用則非止道德二篇而已今明此二經是函谷間所授尹喜之經耳疏明道德生畜之源罔不盡此義曰道生德畜為化之本也一切之法因道而生故云源也亦喻泉源能流其水無有窮竭罔無也言此經所載法源化本無所不盡而無窮也疏其要在乎理身理國義曰文子通玄真經曰道德者匡邪以為正振亂以為理化淫敗以為朴淳德復生天下安寧此道德之理國也道德務者百禍不能罹險阻不能危刑罰不能加謗讟不能隨代悖而不謬代泥而不污人惑而不疑人欺而不詐人善而不悅人懼而不怖內存其真外和其人享無窮之壽而上賔于天此道德理身也疏理國則絶矜尚棄華薄以無為不言為教義曰文子問老君曰理國之本如何老君曰本在理身也未聞身理而國亂身亂而國理者夫理國者靜以修身全以養生則下不擾下不擾則人不怨為理之本在於足用足用之本在於勿奪勿奪之本在於省事省事之本在於節用節用之本在於去就去就之本在於無為夫天致其高地致其厚日月照星辰期陰陽和非有為也正其道而物自然化也此乃絶矜尚棄華薄無為不言之㫖也下經首章曰大丈夫處其厚不處其薄居其實不居其華是也上經第二章曰是以聖人處無為之事行不言之教是也教者訓教於人可以垂訓於永久也論語云子以四教詩序云教以化之是也易云聖人以神道設教言教者以教於人而世之衆教皆以有執有為為本今老君此教以無為不言為化故為衆教所尊理道所貴也道德真經廣聖義卷之三
