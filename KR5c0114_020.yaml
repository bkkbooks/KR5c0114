front:
  text: 道德真經廣聖義卷之十九羊八
  hash: sha256:4a1c39279a133ca0a15a0b1fff5ba7f0d287fe9fd17564f0151c723dbbad3887
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0114_HFL_020-001a, image: hfl/0443/0443-036.png}
body:
  text: 唐廣成先生杜光庭述孔德之容章第二十一疏前章明畏絶俗學若昏故獨異於人此章明從順至道甚真則能閲衆甫首標孔德兩句明德人之順道次道之為物下十句暢妙本之精真自古下五句辨應用之名結生成之德義曰前以俗學為滯對持示棄絶之門此明至道非常恍惚表棲真之所窮衆甫之本始惟至道之可依爾孔德之容惟道是從注孔甚也從順也設問甚有德之人容狀如何言此德人所行唯虛極之道是順也疏孔甚也從順也容狀也欲明行人所以順合至道故云甚有德之人容狀若何言甚有德之人容狀唯虛極之道是順也義曰道無名也唯德是顯之德無本也自道而成之至人能順於道德乃彰矣故云甚有德之人唯能順於道夫帝王君臨天下資順道以居尊統御域中必抱道而立極故尚書堯典舜典皆云曰若稽古者言順考古道也道之為物惟恍惟惚注此明孔德所從之道不有不無冲用難名故云恍惚疏此明虛極妙本為物形狀即孔德所從之道也虛極妙本强名曰道道之為物其運動形狀若何言此妙本不有不無難為名稱欲謂之有則寂然無象欲謂之無則湛似或存無有難名故謂之為恍惚爾義曰恍惚者不無不有非有非無謂之有焉乃隨迎不得謂之無也乃應變多方義曰道者虛無之稱也以虛無而能開通於物故稱曰道無不通也無不由也若處於有則為物滯礙不可常通道既虛無為體無則不為滯礙言萬物皆由之而通亦况道路以為稱也寂然無體也而天覆地載日照月臨冬寒夏暑春生秋殺萬象運動皆由道而然不可謂之無也及乎窮其動用考彼生成豈見其所營為豈知其所運化不可謂之有也乃是無中之有有中之無不得指而定名故謂之為恍惚爾惚兮恍其中有象注惚無也恍有也兆見曰象自無而降有其中兆見一切物象疏此明降生本迹也惚無也恍有也兆見曰象妙本無物故謂之惚生化有形故謂之恍斯則自無而降有其中兆見一切物象從本而降迹也義曰自上而下謂之降妙本之道出乎虛無虛無之體清浮在上欲生化品物運道神功於妙無之中而生妙有妙有融化自上而下降於人間兆見物象妙無為本妙有為迹本則淡然常存迹乃資生運用由是言之一切物象皆由道生一切形類皆道之子矣恍兮惚其中有物注物者即上道之為物也自有而歸無還復至道故云其中有物疏物者即上道之為物謂妙本也妙本降生兆見物象修性返德則復歸無物無物即道也義曰物是妙無之本象為妙有之迹既從本而降迹則是道生萬法循迹歸本則萬法復宗於道言自妙有却歸妙無無始無終常生常化矣疏言人修性返德不離妙本自有歸無還冥至道故云其中有物言有妙物也此攝迹以歸本也義曰自道所禀謂之性性之所遷謂之情人能攝情斷念返性歸元即為至德之士矣至德之本即妙道也故言修性返德自有歸無情之所遷者有也攝情歸本者無也既能斷彼妄情返於正性正性全德德為道階此乃還冥至道也冥者契合也妙物為道故云攝迹歸本此乃攝有用之迹歸無為之本也沓兮冥兮其中有精注恍惚有無杳冥深昧也虛極降生修性返德攝迹歸本妙物存無杳冥深昧不可量測含孕變化中有至精故云其中有精者也義曰初則妙本降生自無而顯有次復攝迹還本自有而歸無明此二句强為終始恐世人迷惑言道不復存執有則必無執無則必有兩邊為滯不悟中道之門故示之曰其中有精甚真甚信則明妙道常在不始不終了悟玄言即契中道矣又就生成門解之則恍惚之象者清虛之氣也在上為天恍惚之物者厚濁之氣也居下為地杳冥之精者冲和之氣也此三氣交感而為人焉人者三才之中最靈之智用天法地無所不能亦自妙本分氣而生若失性任情則離本而湮滅若修性返德則得道而超騰其冲和之氣禀於身中修之則存甚真甚信也其精甚真其中有信注杳冥之精本無假雜物感則應應用不差故云有信疏至道妙物既本非假雜變化至精故其精甚真生成之功遍被羣有物感必應曾不差違故云其中有信義曰被及也差爽也違失也道之至也微妙玄通不可以有推不可以無喻去此之外不名為道豈有諸法可假雜乎可謂真矣垂變化之功功無不在彰感應之用用不可窮故為至精至信也尚書曰人心惟危道心惟微惟精惟一是也自古及今其名不去注言道自古及今生成萬物物得道用因用立名生成之用既今古是同應用之名故古今不去以閲衆甫注閲度閲也甫本始也言至道應用度閲衆物本始各遂生成之用疏閲度閲也甫本始也言道德生成之功本冥真精之信始終無極今古不渝義曰渝變也杳冥真道化育羣情物有始終道無今古常為物本而道本無為也疏故物得道用之名天清地寧之類自古至今常不去也故注云生成之用既今古是同應用之名故古今不去也以此真精之信度閲萬物本始令各遂生成之用也義曰前解云天覆地載日照月臨皆道與之用也天清地寧谷盈物生皆道與之名也此名此用則今古不移至信至精則古今常在不稱功於萬有各被其生成但著用於羣情羣情豈睹其終始為化之主玄哉妙哉吾何以知衆甫之然哉以此注以此令萬物皆禀道妙用生成故耳疏又詳質云吾何以知萬物本始皆資禀於道道必度閲之令遂其生成之用而然哉答云以此以此者以此甚真甚信凡今萬物皆禀妙用生成故知之爾義曰道之生育萬殊度閲衆類為物之本為化之先天以之清地以之寧萬物以之生日月以之明其既然矣何以知其然哉以其甚精甚信今古不移物禀道生道為物本故也然則甚大之德者天地也至明之象者日月也用道法天者帝王也帝王富有天下尊居域中子育萬靈首出庶物安靜以象地被衮以象天職官以象四時明賞罰以象秋夏而能體道清淨法道無為撫之以至仁示之以至信使衆生知道為本始各捨末而歸元知道為祖宗慕還淳而復朴洪圖克固玄化克昌矣曲則全章第二十二疏前章明從順至道甚真故能閲衆甫此章明抱一為式不爭則所以曲全首六句示誠全之行是以下兩句標聖行以明次四句覆釋曲全至弊新夫惟下結不爭必全而歸爾義曰前既彰明妙道廣弘生化之功此則標示全和教以修行之行曲枉窪弊皆因謙而益光抱一為法將明少能統衆棄自見自是之迹除自矜自伐之非克致誠全孰於爭者曲則全注曲己以應務則全疏曲者委曲從順也言人能委曲從順不與物逆則可以全身故云曲則全義曰理身之道先理其心心之理也必在乎道得道則心理失道則心亂心理則謙讓心亂則交爭謙讓則曲己而順物交爭則飾躬而非過曲己順物者不與物逆物亦順之曲己全人人必全之不與物爭乃全身之道也尚書曰萬方有過在余一人余一人有過無以汝萬方此帝王曲己責躬之道也枉則直注枉己以申人則直疏枉者受屈於物直者可以正曲也春秋曰正曲曰直言人雖不與物逆物來枉己已能受屈彼必慚懼而自修整則是已之直可以正曲故云枉則直義曰得道之心不與物逆物來枉已己能受之彼必知慚及自修整者如廉頗藺相如同仕於趙頗位在相如之下因怒曰吾有功於國而居相如之下吾所恥也塗見相如吾必辱之相如知其言常引車以避之其從者怪而問之曰相國不畏强秦而懼廉頗何也相如曰秦所以不敢輕趙者畏吾與廉將軍耳吾若與廉將軍相遇兩虎即鬥勢不俱全趙國之危秦之利也吾所以避者存國耳豈私於身乎頗聞之負荆肉袒而謝焉此乃彼必懼而自修整以已之直能正於曲之效也正曲曰直者春秋襄公七年冬十月晋卿韓獻子厥告老其子穆子無忌有廢疾將立之辭曰詩云豈不夙夜謂行多露又曰弗躬弗親庶人弗信無忌不才讓其可乎請立起也與田蘇游而曰好仁詩曰靖恭爾位好是正直神之聽之介爾景福恤民為德正直為正正己心也正曲為直正人曲也三和為仁德正直三者備為人也如是則明神聽之介福降之立之不亦可乎庚戌使韓起朝獻子遂請老晋侯謂韓無忌仁使為公族大夫焉窪則盈注執謙德則常盈疏窪坳下也盈滿也此喻說也夫地之坳下水必流滿人守撝謙德便光大能曲能枉坳下也則全則直滿盈也故云窪則盈義曰地道變盈而流謙者謂丘陵川谷之屬也高者漸下則下者益高是故變其盈者而流布謙者也盈則被變高不可恃也謙則流布下可以守也地坳下水則就之以致盈滿人謙下德則歸之以致光益矣撝謙者指撝揖讓無非謙謹不違法度動合卑柔德乃歸之亦如地坳水聚矣能曲能枉窪者皆謂下其心也則全則直則盈者皆謂益其德也理國之君納汙含垢下士禮賢遠近歸之國乃昌大也弊則新注守弊薄則日新疏弊薄惡之謂也曲枉窪等皆自處弊薄也能處弊薄人必推先故其德行日新矣故云弊則新義曰薄惡之處弊屈之事人所不取今我取之自處薄惡則為衆人所歎美矣修道之士行人之所不行學人之所不學安人之所不安樂人之所不樂為人之所不為得人之所不得所行所為無非謙靜淡泊故能德光而道成可謂德行日新矣少則得注抱一不離則無失矣多則惑注有為多門則惑亂也是以聖人抱一為天下式注聖人抱守淳一故可為天下法式疏謂少自取也夫少自取者則無失故云得多自與者必爭故云惑修身既爾修道亦然當須抱守淳一自全真素若欲廣求異門則招亂惑故亡羊必因岐路喪生諒在多方是以聖人抱一不離可為天下法式矣式法也義曰廉士可以分財言其自取必少也自取其少者無貪心無貪心者人不爭人不爭故得矣自取多者必不平不平則爭起為人所奪反乃失之故惑矣此舉喻以明修道也修道之法則有萬殊其致道者在於守一爾守一不失者理身則得道理國則無為無為化物物自寧泰故聖人抱一為天下法矣理身不欲多其事修道不欲多其門多其事者萬慮營營以害一生生能無傷乎萬人彎弧以射一鵠鵠能無中乎多其門者玄教萬途丹經萬卷以一人之心兼纍聖之道形疲於外神亂於內故去道愈遠矣理國多事者晋政多門故諸侯不附秦網煩密故四海心離一國三公自然難理十羊九牧詎可化人亡羊者歎於多岐喪生者由其多事理故然矣不自見故明注人能不自見其能常曲己以應務則德全自明矣疏此覆釋曲則全也言人能不自見其美常委順於物則其全德日益明白故云以故明義曰自見不美必有爭尚之心故不能委曲順物矣能委曲順物不自見己美者是以德全而益明也夫德全則形全形全則氣全氣全則神全神全之人表裏無隔洞見八極則不自見之明其明廣矣不自是故彰注人能不自以為是而枉己申人則其直自彰矣疏此覆釋枉則直也言人能為物受枉不自申說以己為是是必無尤故其直自彰著也故云故彰義曰自是其事者必有執著之心故不能枉己從屈矣能枉己從屈不自執是其事故直顯而益彰也夫直彰則善彰善彰則德彰德彰之人則萬物歸之德益光大則不自是之彰其彰明矣不自伐故有功注人能不自伐取則其功歸己疏此覆釋窪則盈也言人不自伐取當為謙讓則人不與競其功歸己如地坳下水必盈焉故云有功義曰自稱己善曰伐也人好自伐必有貪競之心則不能坳下守謙矣坳下守謙不自伐其善者故善著而有功矣有功之人人荷其惠物受其賜善功所及孰不悅隨則不自伐之功其功大矣顔回曰願無伐善尚書曰汝惟不伐天下莫與汝爭功此之謂也不自矜故長注人能長守弊薄不自矜衒則人推其長疏此覆釋弊則新也人能守弊薄不自矜衒則人必讓善行能益長故曰故長義曰矜恃也自恃己長之人必有誇衒之心則不能自處弊薄矣能處弊薄則人必共推而美之則其不矜恃之美益長矣尚書曰爾惟不矜天下莫與汝爭能是也夫唯不爭故天下莫能與之爭注不與物爭誰與爭者疏夫唯曲全等行皆是委順不爭柔弱既勝於剛强謙虛自歸於是直則天下人物誰能與不爭者爭乎故云莫能與之爭義曰夫好爭之人故非道矣不爭之德德之大焉前舉曲全枉直窪盈弊新四者為因修之行覆明不自見自是自伐自矜四者彰果應之功行四行之人謙虛柔弱不與物爭故天下莫能與之爭而得故明故彰故有功故長四善之報矣古之所謂曲則全者豈虛言哉誠全而歸之注古有曲全之言豈虛妄哉實能曲者則必全理歸之疏此引古以結曲全也言自古有此曲全之言豈虛有此言而無實者哉若能曲順不逆者信有全理歸之於己爾故云誠全而歸之誠信也義曰此所明曲者是柔順屈曲之曲非回邪之曲也聖人抱此曲全之道以垂法於天下天下既理聖人不自見其美不自是其行不自伐其功不自矜其能萬物歸宗於聖德聖人謙順而處之則曲全之德自然歸矣自古及今此言久著行而必效信實非虛但人君抱一撝謙歸根安靜必顯誠全之德臻乎太平矣道德真經廣聖義卷之十九
