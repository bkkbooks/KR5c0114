front:
  text: 道德眞經廣聖義卷之八羔八
  hash: sha256:efa2e02768efe61c8a2c07ede78f18cf4a349ad205d07216cbf2457f991f5ba4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0114_HFL_009-001a, image: hfl/0441/0441-082.png}
body:
  text: 唐廣成先生杜光庭述不尚賢章第二䟽前章明萬殊逐境善化則歸根此章明貴上不行無爲則至理首標不尚絶矜徇之跡次云聖理示立教之方結以無爲明化成而復樸也義曰夫聖人爲理賢人輔之魚水相資安得不用上自三五之主至于霸王之君開國建功仗賢爲本不尚者矜徇誇衒之行也賢人用則人自理矜衒用則怨爭興不尚矜誇自無怨爭不貴乎麗容珍貨則人無貪求乃合乎聖人虚心實腹無知無欲之尚矣不尚賢使民不爭注尚賢有迹徇迹則爭興使賢不肖各當其分則無爭矣疏尚崇貴也賢才能也人君崇貴才能則有徇迹徇迹則失眞失眞必是尚賢之由徇迹起交爭之弊不若陶之玄化任以無爲使雲自從龍風常從虎則唐虞在位不乏元凱之臣伊吕昇朝自得台衡之望各當其分人無覬覦則不爭也義曰徇迹者矯妄之謂也尚賢之㫖既興矯妄之人必至何者賢難知也詐而疑信佞而疑忠豈易辯哉經云智慧出有大偽是則上好智下應之以偽上好賢下應之以妄不若正身率下無爲御人陶以太和化以清靜則佐理之賢則爲其用矣乃雲龍風虎之謂也雲從龍風從虎者易乾卦孔子解九五之辭九五飛龍在天能廣感衆物故叙水流濕火就燥雲從龍風從虎各隨其類自相應感以況帝王昇九五之位萬國來庭云聖人作而萬物睹本乎天者親上本乎地者親下此言水是陰若流於地必就濕處火是陽若焚於薪必就燥處言此二物無識無情爲氣相感尚猶如此又龍是水畜雲是水氣龍吟則景雲起虎是威猛之獸風是振動之物虎嘯則谷風生此二物是有識有情與無識無情者因氣類同亦相感如此況聖人降世飛龍在天聖賢相須萬物交感故廣陳其事爾唐堯在位者帝堯號陶唐氏姓伊祁名放勛帝嚳之子母曰慶都帝嚳之次妃感赤龍而有孕十四月而生堯幼有聖德十六歲以唐侯即位七十年都於冀年八十六知子丹朱不肖明揚側陋廣求有德遂舉舜而歷試之聘以二女用觀其德二年禪舜舜即位二十八年而堯崩堯壽一百一十七歲葬於濟陰成陽里中謚法曰詡善傳聖曰堯帝舜有虞氏顓頊之後喬牛之孫瞽叟之子母曰握登見大虹意感而孕生舜於姚丘因爲姚氏名重華以孝聞舉用歷試二年乃即帝位二十八年而堯崩舜年三十而徴用歷試二年攝位二十八年服喪三年爲天子五十年巡狩南方死於蒼梧之野壽一百一十二年命禹嗣位葬於九疑之零陵舜以其子商均不肖不傳位於子舜既入蒼梧不返二妃望之蒼梧九峰處處相似不知求舜之處望皆疑之泣竹皆斑故號其山爲九疑書云舜陟方乃死史云舜登遐蓋言舜昇於高遠之處而遂不迴道學傳云堯爲太微眞君舜爲太極眞君九疑山記云舜時降於山中此乃皆證位高眞差肩大聖是則得道登遐而爲神仙明矣昔魚鳧遊於湔山飄然飛翥望帝居於石紐遽致超騰軒皇昇龍於鼎湖夏禹乘飆於鏡水莊子大宗師云狶韋氏得之以挈天地伏義氏得之以襲氣母黄帝得之以登雲天顓頊得之以處玄宫所以神農司於南極殷湯莅於北玄武丁位爲紫府陽甲位爲蒼元文王位爲太虚武王位爲太平康王位爲少華穆王位爲九元漢景位爲太一漢文位爲通玄八帝位爲八魁漢武位爲玄成此皆理國之君登眞得道上列眞官之任則堯舜登仙固其宜矣元凱之臣者即八元八愷也昔高辛氏有才子八人伯奮仲堪叔獻季仲伯虎仲熊叔豹季狸忠肅恭懿宣慈惠和天下之人謂之八元肅敬也懿美也宣遍也元善也高陽氏有才子八人蒼舒隤鼓擣戭大臨龍降庭堅仲容叔達齊聖廣淵明允篤誠天下之人謂之八凱齊中也淵深也允信也篤厚也愷和也此十六族世濟其美不隕其名堯不信用舉舜爲堯臣舉八元使布五教於四方五教者父義母慈兄友弟恭子孝内平外成高辛帝之後八元其苗裔也乃稷契朱虎熊羆之倫也舉八愷使主后土乃揆百事莫不時叙地平天成高陽顓頊之號八愷其苗裔也及倕禹咎繇益之倫也咎繇字庭堅是矣卨作司徒五教在寬卨在八元中矣禹作司空平水土后土地官禹在八愷中也内平者内諸夏也外成者外戎狄也舜舉十六族而天下理外内和平此春秋文公十八年莒僕弑其君而奔魯季孫行父使史克引此事以諫魯宣公也伊吕者伊即伊尹生於伊水之上空桑之中佐殷爲相以輔太甲謂之阿衡其先伊摯佐湯立杜稷致太平伊尹之子伊陟佐太甲之孫太戊三臣之勣著於殷朝也吕者太公望也姓姜字子牙釣於磻磎獲大魚剖之得玉璜中有兵鈐子牙習之年逾八十周文王卜畋渭濱其繇曰非熊非羆唯王者師遂畋獲子牙載之以歸後以兵謀佐武王克殷肇興周業初封於吕或封於甫故尚書穆王之畤有吕侯或云甫侯是其後也太公既克紂乃封國於齊召康公命太公曰五侯九霸汝實征之以夾輔周室賜太公之履東至于海西至于河南至于穆陵北至于無埭後桓公小白爲諸侯盟主至春秋之末其臣田和遂遷齊康公于海上乃奪其國焉台衡之望者天子置三公之官以象三台三台六官者太尉司徒司空太師太傳太保也三台六星上中下台各二星在紫微之南以拱衛帝座起文昌抵太微天階主三公九卿士庶九州色明而行列相類則君臣和法令平從上台至中台十六度中台至下台十六度二星間相去半度拆則爲奢狹則爲迫又上星主天子中星主伯子男狄人下星主卿大夫小匀而明白吉摇動變色爲兇一星去天下危二星去天下亂三星去天下不可理矣太師者師範一人儀刑萬國太傳教以德義太保保衛其身太尉掌武統兵司徒敬敷五教司空主平水土謂斯三公上應三台也阿衡者阿倚也衡平也天子倚三公以平正天下尚書云伊尹佐殷爲阿衡也覬覦者希望也不貴難得之貨使民不爲盜注難得之貨謂性分所無者求不可得故云難得夫不安本分希效所無既失性分寧非盜竊欲使物任其性事稱其能則難得之貨不貴性命之情不盜矣䟽人之受生所禀有分則所禀材器是身貨寳分外妄求求不可得故云難得夫不安性分希慕聰明且失天眞盡成私盜今使賢愚襲性能否因情既無越分之求自輕難得之貨皆得性分誰爲盜乎故莊子曰不仁之人决性命之情而饕貴富又解云以人君不貴珠犀寳貝則其政清靜故百姓化之自絶貪取人各知足故不爲盜矣義曰人之生也禀天地之靈得清明冲朗之氣爲聖爲賢得濁滯煩昩之氣爲愚爲賤聖賢則神智廣博愚昩則性識昏蒙由是有性分之不同也老君謂孔子曰易之生人及萬物鳥獸昆蟲各有奇偶謂氣不同而凡人莫知其情唯達道德者能原其本焉文子云清氣爲天濁氣爲地和氣爲人於和氣之間有明有暗故有賢有愚愚欲希賢即越分矣暗欲代明即妄求矣此爲决性命之情而饕貴富莊子駢拇篇之詞也夫貴富所以可饕猶有尚之者若乃無可尚之迹則人安其分將量力受任豈直决己效彼以饕竊非望哉人君不貴珠犀寳貝之貨下息貪人人各自足斯可謂不爲盜也不見可欲使心不亂注既無尚賢之迹不求難得之貨是無可見之欲而心不惑亂也疏希慕聰明是見可欲欲心興動非亂而何今既不崇貴賢能亦不妄求越分則不見可欲之事而心不惑亂也義曰希慕羡望也性識有限而羡望聰明是爲越分名之爲欲又修道之士初階之時願行未周澄鍊未熟畏見可欲爲境所牽乃栖隱山林以避囂雜及心泰志定境不能誘終日指揮未始不晏如也所謂小隱於山大隱於廛未能絶欲恐境所牽仍栖遁山林以避所見及其澄心息慮想念正眞外無撓惑之縁内保恬和之志雖營營朝市名利不關其心碌碌世途是非不介其意混迹城市何損於修眞乎是以聖人之治䟽說聖人理國理身以爲教本夫理國者復何爲乎但理身爾故虚心實腹絶欲忘知於爲無爲則無不理矣義曰天眞皇人謂黄帝曰未聞身理而國不理者夫一人之身一國之象也胸腹之位猶宫室也四肢之别猶郊境也骨節之分猶百官也神猶君也血猶臣也氣猶民也知理身則知理國矣愛其民所以安國也吝其氣所以全身也民散則國亡氣竭則身死亡者不可存死者不可生所以至人銷未起之患理未病之疾氣難養而易濁民難聚而易散理之於無事之前勿追之於既逝之後子勖之焉虚其心注心不爲可欲所亂則虚矣䟽夫役心逐境則塵事汩昏靜慮全眞則情欲不作情欲不作則心虚矣莊子云虚室生白謂心虚則純白自生也故曰虚其心也義曰惟道集虚虚心則道集於懷也道集於懷則神與化遊心與天通萬物自化於下聖人自安於上可謂至理之代矣虚室生白者莊子人間世篇之詞也室者心也視有若無即虚心也心之虚矣純白自生純白者大通明白之貌也内觀經云夫心者非青非赤非白非黄非長非短非圓非方大包天地細入毫芒制之則止放之則狂清淨則生濁躁則亡明照八表暗迷一方人之難伏惟在於心所以教人修道即修心也教人修心即修道也心不可息念道以息之心不可見因道以明之善惡二趣一切世法因心而滅因心而生習道之士滅心則契道世俗之士縱心而危身心生則亂心滅則理所以天子制官僚明法度置刑賞懸吉兇以勸人者皆爲心之難理也無心者令不有也定心者令不惑也息心者令不爲也制心者令不亂也正心者令不邪也净心者令不染也虚心者令不著也明此七者可與言道可與言修其心矣實其復注道德内充則無矜徇亦如屬厭而止不生貪求矣䟽腹者含受之義足則不貪欲使道德内充不生貪愛故云實其腹注云屬厭而止者春秋傳閻没汝寬諫魏武子之詞也欲以小人之腹爲君子之心屬厭則足而不貪也義曰夫心者嗜好無窮腹者含受有足心無窮故虚之腹有足故實之心虚則衆慾不生腹實則貪求自止懷忠信抱質樸可謂德充於内矣春秋者魯史記之名也記事者以事繫日以日繫月以月繫時以時繫年年有四時故錯舉以爲名也天子有史官諸侯有國史楚謂之檮杌晋謂之乘魯謂之春秋孔子述經左丘明爲傳起周平王四十八年魯隱公元年太歲丁已歲星在降婁當晋鄂侯二年衛桓公完十三年蔡宣公考父二十八年鄭莊公寤生二十二年曹桓公終生三十五年齊僖公禄父九年楚武王達十九年秦文公四十四年宋穆公和七年陳桓公鮑二十三年燕穆公十八年乃春秋之始年至魯哀公十四年周敬王三十九年太歲戊午凡二百四十二年歷周一十四王魯一十二公行事當晋定公午三十一年衛出公輒十二年蔡成公怡十年鄭聲公勝二十年齊簡公嘉四年楚惠王章八年秦悼公十一年宋景公頭曼三十六年陳閔公越二十一年燕敬公六年吴夫差十五年乃春秋獲麟絶筆之年也其書凡三十卷三十五萬二千二十五言十九萬四千五百九十字本十五萬七千九百六十六字解晋征南將軍杜預字元凱註閻没汝寬諫者春秋昭公二十八年晋魏獻子舒爲政以其子戊爲梗陽大夫今晋陽也冬梗陽有獄戍不能斷以其獄上於獻子訟人之太宗以女樂爲賂魏子將受之戊謂魏子二大夫閻没汝寬曰主以不賄聞于諸侯若受梗陽之賄貪莫甚焉吾子必諫皆許諾退朝待于庭饋入魏子召二大夫食比置三歎既食使坐魏子曰吾聞諸伯叔諺曰惟食忘憂吾子置食之間三歎何也同辭而對曰他人賜二小人酒不夕食饋之始至恐其不足是以一歎中置自咎曰豈將軍食之而以不足是以再歎及饋之畢願以小人之腹爲君子之心屬厭而止是以三歎魏子辭梗陽之賄獻謚也疏云武子則武子名顆謚曰武閻没汝寬二大夫諫武子之言願以小人之腹爲君子之心腹則易足心則難滿欲其息貪不受梗陽之賂小人腹飽猶知厭足君子之心亦宜然矣春秋美之魏氏納諫所以興也弱其志注心虚則志弱䟽志者心之事事在心曰志欲令心有所行皆守柔弱故知心虚則志弱矣義曰詩序曰在心爲志夫心之所起爲志所行爲事心既柔弱則無險躁紛競之事皆處和平矣事和平則爲理之本矣强其骨注腹實則骨强疏骨者體之幹既其道德内充常無貪取不貪則腹實腹實則骨强也義曰弱其志則廉柔不犯於外强其骨則堅固有備於内爲道之者筋骨堅强百疾不能侵矣腹實則骨强和氣充也理國者政清則民靜費省則力豐民靜者志弱之謂也力豐者骨强之謂也常使民無知無欲注常使人無爭尚之知無貪求之欲䟽聖人所以虚心實腹之教者常欲使百姓無爭尚之知貪求之欲令其自化爾義曰貪求則爭起有知則事興爭欲既無清靜自化矣使夫知者不敢爲也注清靜化人盡無知欲適有知者令不敢爲也䟽無知無欲者已清靜矣則使夫有知者漸陶淳化不敢爲循迹貪求而無爲也義曰下化於上猶風之偃草淳和普洽則皆返無爲也爲無爲則無不治矣注夫於爲無爲而人得其性是則淳化有孚矣疏夫得其性而爲之雖爲而無爲也且絶尚賢之迹不求難得之貨人因本分物必全眞於爲無爲復何矜徇既無聲而無臭人固不識而不知淳風大行誰云不理義曰無爲之理其大矣哉無爲者非謂引而不來推而不去迫而不應感而不動堅滯而不流捲握而不散也謂其私志不入公道嗜欲不枉正術循理而舉事因資而立功事成而身不伐功立而名不有若夫水用船砂用𨲂泥用橇山用樏夏瀆冬陂因高而田因下而池故非吾所謂爲也乃無爲矣聖人之無爲也因循任下責成不勞謀無失策舉無遺事言爲文章行爲表則進退應時動靜循理美醜不好憎賞罰不喜怒名各自命類各自用事由自然莫出於己順天之時隨地之性因人之心是則羣臣輻輳賢與不肖各盡其用君得所以制臣臣得所以事君此理國無爲之道也無聲無臭者詩大雅文王篇也言大道難知耳不聞聲音鼻不聞臭芳儀法文王之事則天下自信而順也不識不知者詩大雅皇矣篇言人不識古不知今順天之法而行之者此言天道尚誠實貴性於自然不尚賢貴貨即合於此矣道冲而用之章第四䟽前章明貴尚不行無爲則至理此章明妙本之用在用而無爲首標道冲示至虚之宗本次云挫解明冲用之釋紛結以象帝之先欲令盡知其趣爾義曰大道之用其用不窮廣包天地細入毫髮澹然自得無虧無盈行之於身則光塵混一運之於内則紛鋭和平綿乎億劫之前乃居象帝之首萬法之内惟道可宗故爲萬有所歸趣矣趣向也道冲而用之或似不盈注言道動出沖和之氣而用生成之功曾不盈滿云或似者於道不敢定言淵兮似萬物之宗注淵深靜也道常生萬物而不盈滿妙本淵兮深靜故似爲萬物之宗主也疏冲虚也謂道以沖虚爲用也夫和氣沖虚故爲道用用生萬物物被其功論功則物疑其光大語冲則道曾不盈滿而妙本深靜常爲萬物之宗注云或似者道非有法故不正言爾他皆倣此義曰道常謙虚而不盈滿沖和澄澹處乎其中深玄寂靜爲物之主故物失沖和之道必致害亡人失冲和之道則至死滅君失沖和之道則政擾民離臣失沖和之道則名亡身辱是以知沖和之道萬物恃之以安爲萬物之宗矣語其及物之功則光明遠大求其妙本則深靜常虚道非有法者不可正言其有而物皆有道也倣准傚於此不敢定言也挫其鋭解其紛注道以沖和故能抑止銛利釋散紛擾若俗學求復則彌結矣䟽挫抑止也鋭銛利也解釋散也冲虚之用物莫之違故銛利之心多擾之事念道沖和自抑止釋散矣此則約人以明道用注云俗學求復者莊子繕性篇云繕性於俗俗學以求復其初言銛利紛擾因欲而生故念道則挫解俗學則彌結矣義曰理國用沖和之道則無銛鋭之情以傷於物無勞擾之事以傷於人不傷於物則萬國來庭四夷嚮化兵革不起怨爭不興不尚於拓土開疆凌弱暴寡矣不傷於人則使之以時賦役輕省家給人足矣理身者解紛挫鋭外無侵競内抱清虚神泰身安恬然自適矣約人以明道者明人必資於道也莊子繕性篇云俗學以求復其初者言人既理性於俗矣而欲以俗學復性命之本所以求者愈非其道也俗學則彌結者銛鋭之心紛擾之事不以道挫而解之則拘於俗學彌加結固不可解也俗學者徇俗之學非日損之道也和其光同其塵注道無不在所在常無在光在塵皆與爲一一光塵爾而非光塵淇兮似或存注和光同塵而妙本不雜故湛兮似有所存也疏道之沖用於物不匱在光則與光爲一在塵則與塵爲一無乎不在所在常無冲用則可混光塵妙本則湛然不雜故云似或存也義曰沖和之道散被羣生汎然坦然物無不在可謂和光同塵矣光者明净也塵者混亂也有道之士不介然標異與衆同也匱乏也道雖散被羣生至妙之本凝寂沖虚常不乏絶故云常存也吾不知誰子象帝之先注吾不知道所從生明道非生法故無父道者似存乎帝先爾帝者生物之主宰象似也䟽吾者老君自稱也象似也老君云吾見至道沖用生成萬物尋責所以不測由來既無父道之人故莫知道爲誰子生物必資道故似在乎帝先注云帝者生物之主易云帝出乎震輔嗣云帝者生物之主興益之宗也又解云兆見曰象言此生物之帝能兆見物象故謂之象帝爾義曰帝者萬化厥初即有主宰形象肇立牧之以君故言象帝大道沖用能生萬化故在象帝之先也老君大聖豈不知至道之宗本耶設此疑似之詞用曉迷方之俗爾亦如上大道不可正言義也帝出乎震易繫辭也震東方卦也少陽之氣生化之源今以太子居東宫少陽之位御極爲出震之期蓋取象天地生育萬物之始也兆見曰象者無形曰氣兆形曰象生物之首也萬物之首象帝居先大道復在象帝之先言其高遠也然夫至道不終不始孰知其先哉亦强爲之容爾易曰帝出乎震萬物生也齊乎巽萬物潔齊也相見乎離聖人南面向明而理也致役乎坤萬物致養也說言乎光萬物所悦也戰乎乾陰陽相薄也勞乎坎萬物所歸也成言乎艮萬物終始也夫萬物出乎震而終乎艮終而復始循化無窮而象帝者在此出震之先道復先於象帝故能爲生化之主天地之元也人君體道用心志無滿溢泉然澄靜以御萬方外無銛鋭之爭下絶紛擾之事和天光而燭物含塵垢而居尊其無爲之化可齊乎象帝矣道德眞經廣聖義卷之八
