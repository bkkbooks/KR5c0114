front:
  text: 道德真經廣聖義卷之二十四羊十三
  hash: sha256:e9c2992e15be09daa9cb4d98996714eb79ce6a079bb68e92cbcbbe9682f0ed88
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0114_HFL_025-001a, image: hfl/0443/0443-182.png}
body:
  text: 唐廣成先生杜光庭述知其雄章第二十八疏前章明言行不執常善所以救人此章明雌辱為行常德於焉復朴首標知雄等三段明行修則漸造於極次云朴散下兩句示造極則必有成終云大制一句論聖功之御用以結成其深㫖義曰夫前明善行善言既為不執救人救物所以行慈皆外助之行也此標知雄知白以全和氣復嬰復朴所以成功即內修之要也行於外五善之應也如上文修於內三知之極也如下說修既復朴可不守朴而不移然後散布萬殊以彰玄功廣大唯聖人能宰制其器無所割傷也知其雄守其雌為天下溪疏知辨識也雄剛躁也雌柔靜也夫物貴全和法求中道雄則過亢雌則卑弱俱未適中於善行必當緣篤以為經故知其雄躁則當守其雌靜守其雌靜亦當知其雄躁守雌則可知雄則敗敗則妨行持戒守雌能守雌柔是為謙德物所歸往如水歸溪矣義曰夫於內修也辨識剛躁知必敗傷故以雌柔之道制之矣亢極也篤厚也性剛躁而雄則多亢極亢極則尤過生焉所以厚其柔靜之心制其雄剛之性乃無亢極之敗溪者衆流所歸以其謙下故也人謙下則物歸地謙下則水聚上清有雌一之道又有三奔五雌之法皆柔弱其志和靜其神以致長生也理國以謙靜則萬物從順如水之赴溪矣為天下溪常德不離復歸於嬰兒注雄者患於用壯故知其雄則當守雌謙德物歸是為天下溪谷則真常之德不離其身抱道含和復歸於嬰兒之行疏知雄守雌是為善行物所歸往為天下溪能如此者則真常之德曾不離散常德不散即是全和全和之人少思寡欲泊然未兆乃如嬰兒故云復歸於嬰兒也義曰理國在於謙靜理身在於雌柔萬物順從衆德歸凑則常享其祚克全其身嬰兒者未分善惡未識是非和氣常全泊然凝靜以喻有德之君全道之士其德若此乃合道真理身則神所歸理國則民交會之也知其白守其黑為天下式疏白昭明也黑暗昧也式法也夫能守雌靜則德行昭明德雖昭明不以矜物當如暗昧自守淳和能如此則可以為天下法式矣義曰為君有獨見之明為道有昭顯之德皆當若昏若晦不衒不矜則氓庶攸歸淳和內足以此為天下法式也史記老君謂孔子曰君子盛德容貌若愚是也夫有德不矜有明不衒豈唯內充道行固亦克俱聲光矣為天下式常德不忒復歸於無極注能守雌靜常德不離德雖明白當如暗昧如此則為天下法式常德應用曾不差違德用無窮故復歸於無極也忒差也疏忒差忒也極窮極也知白守黑是謂德全德全之人可為天下法式則真常之德隨應而用應無差忒用亦不窮故云復歸於無極義曰為君為道外晦其明內積其德淳和既著天下化之於國則聖德無窮於身則長生無極知其榮守其辱為天下谷疏榮尊榮也辱卑辱也夫為天下法式則其德尊榮德雖尊榮常守卑辱以和為量無不含容如彼空谷物來斯應故云天下谷也義曰人君富有八極君臨九圍是尊榮也自稱孤寡不穀是卑辱也名號所設則古之制也能當理思亂居安懼危戒慎卑躬晝乾夕惕則德廣體弘如虛谷矣為道之人外其德譽自守卑柔如庚桑避㟪㠥之祠莊子歎擁腫之木則其材德不顯心虛德全若空谷矣為天下谷常德乃足復歸於朴注德雖尊榮常守卑辱物感斯應如谷報聲虛受不窮常德圓足則復歸於道矣疏朴道也虛受應物如彼谷神真常之德是乃圓足足則復歸於朴矣夫道為德體德為道用語其用則云常德乃足語其體則云復歸於朴歸朴則妙本清淨常德則應用無窮非天下之至通其孰能與於此義曰既富於德則合於道道為德體則淡寂無為德為道用則施行有作人君以五善之化誘民於無為以廣濟之德積功而合道故云復歸於朴夫道無為而無不為也通生萬物應變無方故謂天下之至通也易曰形而上者謂之道推而行之謂之通是也夫聖人之理國至士之修身當知其雄强明白尊榮三者非持久之益乃當執雌柔暗昧卑辱三行而制之則前五善外以化人此三行內以修己人化則道彌廣己修則德愈昌道廣德昌理國理身之至要矣朴散則為器聖人用之則為官長注含德內融則復歸於朴常德應用則散而為器既涉形器必有精粗故聖人用之則為羣材之官長疏器形器也自知雄下論性修德反則復歸於道此云朴散為器者明德全合道即能應用應用迹粗涉於形器故云朴散則為器聖人弘濟則為羣材之官長矣義曰形而上者謂之道形而下者謂之器道惟無非是可見可博之質乃是虛寂之妙本也器涉有乃是可知可稱之用非是質礙之常形也聖人理天下用材用德委以牧人共振玄風以弘道化故云為官長也夫四海之廣兆庶之繁不可下人以為理故立羣官師長各司其任在昔唐虞建官惟百夏啇周漢所立愈多以德居官以材蒞任各當其器而萬方理焉若為道之士則布德施惠救物立功亦猶器用以利於人爾為國則用材化物為道則施功濟人合於道朴之化也尚書曰學古入官左傳曰能官人則民無覦心是也春秋昭公十七年秋郯子朝魯對昭子曰黃帝以雲紀官炎帝以火紀官共工以水紀官太皥以龍紀官少昊以鳥紀官以鳳鳥為司曆玄鳥為司分伯趙為司至青鳥為司啓丹鳥為司閉祝鳩為司徒睢鳩為司馬尸鳩為司空爽鳩為司寇鶻鳩為司事五鳩以鳩民五雉為五工正九扈為九農正扈止也止民使不淫放也自顓頊以來不能紀遠乃以民師而命民為官設官分熾止尚矣蓋以宣道行德以教於人者也官非其人物罹其害豈可輕授哉書曰官不必備惟其人斯之謂也故大制不割注聖人用道大制羣生暄然似春蒙澤不謝動植咸遂曾不割傷疏此明聖人用道也夫聖人德全大制羣有法乾坤之施灑雨露之恩各暢其和不知其力令動植之物咸遂其生曾不割傷以為己用故云大制不割義曰聖君臨極宰制萬方德被羣生各遂其性故動物植物有情無情自生自成不宰不割所以玄德之世太上之君不言不化惟清惟靜下知其上有君而不聞其制令之法此所謂大為主宰而無所制割也修道之士不察察於存祝不孜孜於漱咽無為無欲自全其和可階於道矣將欲取天下章第二十九疏前章明雌辱之行常德必歸於朴此章明矜執必失故神器不可為首標將欲下六句明實位之有所在以戒姦亂之臣次執者之一句示曆數之不干常將警淫昏之主故物下辨物倚伏之數是以聖人下戒人君甚泰之尤義曰前明聖人宰制羣物此恐臣下非妄亂常故舉此文戒其姦宄又慮人君執有神器凌虐於民明倚伏不常以亡在德去奢去泰可保延洪故云下戒姦亂之臣上警淫昏之主也將欲取天下而為之吾見其不得已注天下者大寶之位也有道者必待曆數在躬若暴亂之人將欲以力取而為之主者老君戒云吾見其不得已疏天下者大寶之位也夫皇天命帝大制羣生必待曆戴在躬然後君臨萬宇而姦亂之賊凶暴之夫將欲力取天下而為之主既誅夷之不暇何天祿之可望故老君戒云吾見其斯人必不得所為之事已語助也義曰普天之下人君統之人君之位皆上天降命曆數所歸應天之心順人之望而後君臨四海子育羣生而為之主也莫不世傳積德身有殊祥履巨跡而誕伏羲感神龍而孕炎帝軒轅乃電光繞斗少昊乃星彩流虹顓頊高辛生資睿聖唐堯虞舜天表神奇堯火運於赤龍舜土德於虹瑞月精命禹燕卵降湯紫氣靄於碭山赤光照於漢室此並身有殊祥也積玄勳而黃軒受命禀前功而顓頊叶符黃帝十七世而祚有殷湯后稷十三世而興西伯此皆積世纍功也或生而神聖或誕而能言日角犀文龍顔鵠步重瞳八采反羽奇毫玉斗橫身鱗文遍體或全於囹圄之內或逃於溝竇之中而復兆應天文德諧人願然後驅雄駕傑拯溺救焚康濟黎元克昌帝業斯可謂生靈徯望曆數在躬者也尚書曰天之曆數在爾躬是矣若乃器非神授才乏天資積善不顯於先人鐘異靡聞於奇兆恃水草之力縱豺狼之心假狐媚而竊國權因佞幸而窺神器興問鼎之計運胠篋之謀王莽董卓則梟戮於前侯景桓玄則敗亡於後流惡名於萬古取大笑於四方欲以力而為之其可得也况劍聞神授力可拔山喑嗚則鬼伏神驚叱吒則堅摧敵潰終乃艤舟莫濟刎頸陰陵不聞聚井之祥徒益五侯之賞苟不及於此者又何矯竊而欲非望哉老君戒曰吾見其不得已大寶之位已具前解天下神器不可為也為者敗之注大寶之位是天地神明之器故不可以力為也故曰為者敗之此戒姦亂之臣也疏天下大寶之位所以不可力為也者為是天地神明之器將以永終聖德之君而令流布愷悌之化豈使凶暴之夫力為而得毒螫天下乎是知必不可為為亦必敗此戒姦亂之賊臣也義曰天神曰神地神曰祇日月之照曰明言天地日月之間森羅萬象必有主宰而司牧之故天地神明以此司牧之大位授於聖德之君而令布和平悅樂之化以養民也愷樂也悌易也詩大雅洞酌篇召康公戒成王曰愷悌君子民之父母言樂强教於民易以悅安於民民敬愛其君父之尊如母之親故云愷悌之化若凶之夫力取天下必以强兵殘忍誅害於如吳國為封豕長蛇項羽比狼貪羊狠則生民罹其蠆毒矣毒出於口曰螫毒出於尾曰蠆明此凶暴之夫毒螫天下必不得其大寶之位而自致敗亡故云為者敗之矣執者失之注曆數在躬已得君位而欲執有斯位凌虐神主天道禍淫亦當令失之此戒帝王者也疏人君者或撥亂反正或繼體守文皆將昭德塞違恤隱求瘼若執有斯位凌虐神主坐令國亂無象遂使天道禍淫神怒人怨是生灾沴亂離斯作誰奉為君亦當失斯位矣此戒帝王也義曰人君繼體承乾不以其德毒流海內禍起寰中號令不行戈鋋內向天下既亂海嶽沸騰真主應運救人撥亂反正如夏禹殷湯周武漢祖創業之君也天下既定授於子孫故嗣主繼明守文承統如夏桀殷紂周赧漢獻為繼體之君也且創業之君必資聖德塞違補過明德顯仁招懷隱淪求採瘼病初有大寶罕及敗亡蓋其勵精求理故也而繼體之君不知稼穡長於婦人之手生於深宫之中八音五色亂其心麗服淫聲溺其性或窮兵四境流毒九州視赤子若仇讎顧生人如草芥動致芟刈不循憲章反道違天凌虐神主神主者民也於是干戈四起水旱不時神怒衆離鬼哭人怨遂有南巢放逐牧野梟夷殞身黔庶之中失政姦雄之手洪圖一去大業不歸此明執者失之足為後王之戒昭德塞違者春秋桓公二年宋華督殺孔嘉父而弒殤公立公子憑是為莊公以郜鼎賂於魯恆公公納之於廟大夫臧哀伯諫曰君人者將昭德塞違以臨百官猶懼失之今置其賂器於太廟明示百官百官象之又何誅焉昔武王克啇遷九鼎于雒邑義士猶或非之而况將昭違禮之賂器於太廟其君之何瘼病也沴妖氣也內起曰眚外起曰灾亦天火曰灾也故物或行或隨或詬或吹或强或羸或載或隳注明為則敗執則失故物或行之於前或隨之於後或詬之使暖或吹之使寒或扶之則强或抑之即弱有道則載事無德則隳廢疏此明凡物不常事亦倚伏也詬暖氣也吹寒氣也强壯也羸弱也載事也隳壞也且夫為之則敗執之則失亦如凡物或行之於前或隨之於後或詬之使暖或吹之使寒或扶持之使强或抑損之令弱或有引而載事或推之而隳壞且同糾纆不可凖繩唯當以欲從人方可樂推不猒坙其義曰物之倚伏固以不常人事推移安能長保是以為者敗之執者失之或後者居前或前者反後或寒者變暖或暖者反寒或弱者為强或强者為弱或成者致壞或隳者獲全如糾纏之縈紆無準繩之正定矣纆大索也準的也繩正也無道之君以人從欲有道之主以欲從人以欲從人者天下悅樂而推尊之不猒其德也以人從欲者春秋僖公二十年宋襄公欲合諸侯臧文仲聞之曰以欲從人則可以人從欲鮮濟言屈己之欲從衆之善也明年秋宋公與楚陳蔡鄭許曹盟于孟諸侯執宋公以伐宋言宋公無德爭盟衆共執之如文仲之言也文仲魯大夫也是以聖人去甚去奢去泰注聖人睹或物之行隨知執者之必失故去其過分耳疏是以理天下之聖人睹行隨之不常知矜執之必失故約己檢身割貪制欲去造作之甚者去服玩之奢者論名戴且分為三目徵其實乃同於一條甚奢泰者皆謂之過分耳義曰聖人之於天下也觀倚伏之勢見推移之機於施為之中不使過分知甚者必極奢者必貪泰者必盛極則必反貪則必怨盛則必哀有一於此必為亡敗故皆去之為道之士明執失之理知奢泰之非謙抑自居冲虛內保則可以參真矣道德真經廣聖義卷之二十四
