front:
  text: 道德真經廣聖義卷之二十羊九
  hash: sha256:efe7891608e8c5dd3690670a53b876d79a136c7e02add9683a8f3a6b7b2883b6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0114_HFL_021-001a, image: hfl/0443/0443-068.png}
body:
  text: 唐廣成先生杜光庭述希言自然章第二十三疏前章明抱一為式不爭故所謂曲全此章明契道忘言執滯則自同於失首一句標宗以明理次五句舉喻以申教故從下理喻結成義曰夫言教不繁必契自然之道風雨為暴固非長久之資希言將漸於忘言舉暴戒令其息暴息暴歸靜道必應之信不足則民違應之以不信天為暴而不久風雨豈能常責夫忘言之言漸契自然之理爾且器莫大於天地權莫重於神明暴雨飄風尚不能久人君恃尊怙貴侮蕩寰區信非久長之道夫何故哉秦皇併吞四海平一九州豕畜黔黎草視氓庶深宫復道自侈自尊縱暴為昏極奢極貴祚傾運滅曾不崇朝項籍叱吒中原吞噬六合無君於其上無敵於其前為江之敗亦不旋踵老君戒其強暴令守無為自然之至道云爾希言自然注希言者忘言也不云忘言而云希者明因言以詮道不可都忘悟道則言忘故云希爾若能因言悟道不滯於言則合自然之理矣疏此眀言教不可執滯也希言者忘言也夫言者在理執滯非悟教之人理必因言都忘失求悟之漸則明因言以詮理不可都忘悟理則言忘故云希爾若能因彼言教悟證精微不滯筌蹄則合於自然矣故曰希言自然義曰教必因言言以明理執言滯教未曰通途在乎忘言以祛其執既得理矣不滯於言是了筌蹄之用也筌蹄者莊子曰筌者所以在魚得魚而忘筌蹄者所以在兔得兔而忘蹄言者所以在意得意而忘言吾安得夫忘言之人而與之言哉筌者以竹為之取魚之器也蹄者以繩為之取兔之器也魚兔既得則筌蹄可忘若執筌蹄乃非魚兔矣若執於言又非教意矣飄風不終朝驟雨不終日注風雨飄驟則暴卒而害物言教執滯則失道而生迷疏飄風狂疾之風也驟雨暴急之雨也夫風者所以散物雨者所以潤物若狂疾暴急則害物而不久義曰此風雨者喻也夫狂疾之風暴急之雨理身理國於教為喻其别有三何者風之散物雨之潤物若其狂疾暴急反害於物也氣者所以生身也心之所以總神也若其狂疾暴急反以害於身矣政之所以理民也令之所以齊民也若政嚴而狂疾令峻而暴急則民散而國危矣言之所以明理理之所以宣教也若執滯局守則於教不行於道不通矣疏以況言教所以詮理者若執言滯教則無由了悟必失道而生迷故風雨不可飄驟言教不可執滯欲明忘言即合自然故舉飄風驟雨之喻義曰夫執滯於言教則致不通失至道之宗迷言教之説能明筌蹄之用則無封執之迷亦無飄驟之害而彰散潤之德孰為此者天地天地尚不能久而況於人乎注天地至大欲為暴卒則傷於物尚不能久以況於人執言滯教則失於道欲求了悟其可得乎疏孰誰也設問云誰為此飄風驟雨者答云天地天地至大欲為狂暴尚不能久况於凡人執滯言教而為卒暴不能虛忘漸致造極欲求了悟其可得乎義曰老子欲明飄風暴雨不久之義以喻理國修身之人恐人未曉此意託以發問因自答之以彰其理言天地有形之大也為狂暴之事尚不能終日人君統臨邦國之大也而為狂暴必傷於民修道之士而為狂暴必傷其行皆不可矣凡人乃欲恣性縱心狂猛躁急以為政執言滯教以修道了無通變但局一隅而能致國泰身安可得乎必不得矣故從事於道者注故從事於道之人當不執滯言教疏從順也虛極至道沖用無方在物則通未嘗凝滯故凡人欲體斯妙而順事者不當有所執滯爾故云從事於道者義曰大道圓通物感則應由謙和柔順可以致之君剛狠躁戾之人如飄風暴雨之行即失道矣所以人君執道以理民也事來而循之物動而因之萬物之性無不順也大行之大得福小行之小得福深淺之應由人感通爾如下文焉道者同於道注體道者悟道忘言則同於道疏順事於道之人故謂之道者謂能順事於道則不凝滯了悟言教一無封執可與道同故云同於道爾義曰道者虛無平易清靜柔弱淳粹素朴此六者道之形體也虛無者道之舍也平易者道之素也清靜者道之鑒也柔弱者道之用也淳粹素朴者道之幹也行此六者謂之道人行與道同故曰能順事而不滯悟言教而同道也德者同於德注德者道用之名人能體道忘功則其所施為同於道用疏德者道用之名也謂其功用被物物有所得故謂之德爾謂體悟之人順事於道豈惟自能了出抑亦功濟蒼生蒼生被其德德者忘其功凡所施為同於道用故云德者同於德義曰德為道用故次於道所謂大行之大得福者指上同道之行也次行於代則恩及生靈功濟邦國上未階於至道下復越於仁義物得遂性各得所得故謂之德有德及物鄰於道乎蒼者廣遠之色衆同之貌莊子曰天之蒼蒼其正色邪遠而視之則有色象近而觀之與庶物同言庶物資道而生有情無情有識無識動植飛走皆曰蒼生矣失者同於失注執言滯教無由了悟不悟則迷道故曰同於失疏失者謂執滯言教而失道也夫言教者道理之筌蹄也筌蹄者乃取魚兔也今滯守筌蹄則失魚兔矣執滯言教則失妙理矣失理則無由得道自同於失也故云失者同於失義曰取魚之器曰筌以竹為之取兔之器曰蹄以繩為之取魚則器包其身故謂之筌言其可生全而致之也取兔則繩束其足故謂之蹄言可致足而致之也愚人不知筌蹄可取魚兔執筌蹄以為魚兔失之遠矣言者所以宣理教者所以告人道不可無言而悟因言以宣之法不可不告而悟故立教以告之愚人不知言教所以悟道執言教以為道亦失之遠矣夫至虛至靜方能集道滯言束教何以契真至虛以忘言至靜以忘教不可執矣經云執者失之是也同於道者道亦得之同於德者德亦得之同於失者失亦得之注方諸挹水陽燧引火類族辨物斷焉可知矣疏此明氣同則應也故虎嘯風起鶴鳴子和性殊則肝膽楚越道合則夷夏同人以類相從物無違者故同道則道應同失則失來義曰夫習靜則道降積功則德充氣之相從其來尚矣故彈宫則宫應彈角則角應者聲相感也枯桑動而天風暑雨降而礎潤氣相感也龍吟雲起虎嘯風生有情感於無情也銅山崩而鐘應類相感也葭灰鈌而暈虧事相感也鶴鳴子和性相感也積善餘福積惡餘殃行相感也同舟共濟胡越不患於異心勢相感也流濕就燥無情感於無情也西升經曰行善善氣至行惡惡氣至同於失者固當矢之矣肝膽楚越者性分異也夷夏同人者所志同也君子千里同風小人隔陌異俗此之謂乎疏猶方諸挹月而水流陽燧照日而火就爾故云同於道者道亦得之義曰東海方諸之間有巨蚌焉長尺有二寸者因名方諸取其殼以柔帛拭之良久以月照之以器承之則得水焉陽燧者範金為器其形若杯或類鏡焉以玄繒潔之以日照之以艾承之則得火焉此二者因日月之光以氣類相感而能生水火古者祭法尚潔必以方諸之水陽燧之火薦於神明焉物之無情猶資感應況人之最靈道之通變而豈不能感致乎言可致也信不足有不信注執言滯教不能了悟是於信不足也自同於失失亦樂來是有不信也疏言人之所以不能體了證理忘言謂於信悟不足而生惑滯既生惑滯則執言求悟執言求悟則却生迷倒是有不信應之故云有不信也義曰道既無形無狀在精感而致之但云精感則人無由可悟故廣敘應感之事以勸於人欲使世人知物有感通事有因應然後能推誠於道爾能推心篤信靜默恬愈道豈不應哉所以不應者由世人不能靜默其心恬愈其志知者則執言局教疑者則若存若亡信既不足了無感應是有不信也其有初則鋭精於習道中乃懈惰於修行一念退心前功并棄不能專精勤久而謂大道我欺若知道能行行之勤久玄鑒非遠寧無應乎人君法道化人以信御下推誠待物布德如春上有推誠之君下無不信之士跂者不立章第二十四疏前章眀理契言忘執滯則同於失者此章明自見自是矜伐則物或惡之首二句舉喻示難求次四句明雖求亦不得其於道下將申戒勸令有道之人不處爾義曰上文以不信不足於道有不信之疑此復跨而求行跂而求久自是自見自伐自矜去道逾遠喻如餘食贅行豈可致玄同之道乎故有道之人不處於此修真之士以斯為戒焉跂者不立跨者不行注跂舉踵而望也跨以跨挾物也以喻自見求明明終不得何異夫跂求久立跨求行履乎疏跂舉踵而望也跨以跨挾物也此舉喻也夫延頸舉踵欲求遠望翹跂則危故不可立以跨挾物物必為礙挾物為礙必不可行亦如衆生自見自是等也故跂則不立跨則不行自見則不明自是則不彰斷可知矣義曰以足指躡地謂之跂暫有延望或可為之而希久立斯為難矣延頸舉踵者陳后長門賦望幸之辭也跨挾於物而求久行亦不可得也喻人不能推心信真懷疑於道暫興一念便望有成無冥心淡寂之功無隳體黜聰之漸而欲振衣汗漫接軫崆洞亦如跂立跨行欲希長久爾自見者不明注露才揚己動而見尤故不明疏夫自見之人失之殷鑒露才揚己欲以自明殊不知動則見尤物無與者己之事業終於昧然故云自見者不明義曰聖人之明也精神四達無所不極上際於天下蟠於地猶泛然若無不以為有也凡人以己之見蔽人之光露其微才揚其片善以此為明其可得乎自是者不彰注是己非人直為怨府故不彰疏言人不能曲全而自為是且欲大誇諸己而以出衆為心求彰名迹以自光大直為怨府人所不堪衆毁日聞故難彰著故云自是者不彰義曰聖人之行也內修其本外抑其末屬其精神偃其知見漠然無為而無不為猶怕然若虛不以為是也凡人以己之行蔽人之善鋭於出衆務於矜誇以此為是其可彰乎自伐者無功注專固伐取物所不與故無功也疏夫謙者德之柄讓者禮之文苟失斯道無從而行况自專固伐取以求其功不讓則爭功斯濫矣故云自伐者無功義曰聖人之業也操天為蓋無不覆也以地為車無不載也四時為馬無不使也陰陽為御無不備也而猶因自然之用不以為功也凡人以己之美掩人之能內懷專伐外無謙讓以此為功其可全乎春秋襄公二十九年齊放其大夫高止于北燕傳曰高止好以事自為功且專故及於難也春秋趙簡子與鄭戰為鄭人所擊踣於車中失其蜂旗公孫龍率徒五百人助之宵攻鄭師取峰旗鄭師大敗既戰簡子曰吾伏韜嘔血鼓音不衰今日我上也衛太子蒯聵為右曰吾救主於車退敵於下我右之上也御者卸良曰我兩鞃陳將絶吾能止之我御之上也此言簡子不讓故其下皆自伐其功故不克和矣此乃自伐者之無功也自矜者不長注矜衒行能人所鄙薄故不長矣疏盛德若愚昔賢通議矜衒名器醜行則多人所鄙薄坐招嗤誚自矜雖欲求益胥怨物不推長故云自矜者不長義曰聖人之德也不以身役物不以欲滑和不謀而當不慮而得其為樂也不欣欣其為憂也不惋惋是以高而不危安而不傾而猶超然不居不以為大也凡人以己之短易人之長緣醜飾非衒耀名器以此為長其可久乎盛德若愚者史記云君子盛德容貌若愚是也論語云回也終日如愚斯之謂矣胥相也其於道也曰餘食贅行疏餘食者殘餘之食也贅行者疣贅之行也殘餘食之穢疣贅身之病以此自見自是等行其於道而論之如殘餘疣贅人所共惡也義曰自見自是自伐自矜四者之弊妨於修道比之於物如殘餘之食取之於身如疣贅之病疣者結病也贅者餘肉病也亦如餘食為衆所惡也疏謂為贅行者自見自是等為德行之疣贅故云贅行春秋曰人將不食吾餘莊子曰附贅懸疣出乎形哉而侈於性義曰纍仁為德景迹為行自見自是非纍積之仁自伐自矜非景善之行其以此於德行愈於疣贅之病乎不食吾餘者春秋莊公六年楚文王伐申過鄧鄧祁侯曰吾甥也止而饗之祁侯之三甥騅甥聃甥養甥請殺楚子祁侯不許三甥曰亡鄧國者必此人也若不早圖後若噬臍其及圖之乎圖之此為時矣祁侯曰人將不食吾餘言自害其甥必為人所賤也對曰若不從三臣之言抑社稷實不血食而君焉取餘弗從伐申還遂伐鄧十六年復伐鄧滅之即莊公十六年也附贅懸疣者莊子外篇曰附贅懸疣出乎形哉而侈於性言物長者不為有餘短者不為不足駢贅皆出於形性非假物也於衆為多故曰侈也侈多也物或惡之故有道者不處注自見等行於道而論是曰殘餘之食疣贅之行凡物尚或惡之故有道之人不處斯事矣疏此自見自是等既如餘食贅行凡物尚或惡之而不為故有道之君子不處身於此事義曰纍仁為德習善為行有道之士修行纍德及其證果了出乃復忘之以合乎大通而歸乎無有況四者之弊如附贅餘食豈肯安而處之哉此四者理身處之則隳德傷性理國用之則拒諫矜己亂政害民亡之本也豈餘食疣贅毫芒之醜而可比方哉道德真經廣聖義卷之二十
