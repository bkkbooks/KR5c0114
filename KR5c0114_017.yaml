front:
  text: 道德真經廣聖義卷之十六羊五
  hash: sha256:e05f2e987ef44eb810346a7c2b7fc23bc9814dc1dd6972c17edc957620df8e98
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0114_HFL_017-001a, image: hfl/0442/0442-140.png}
body:
  text: 唐廣成先生杜光庭述太上下知章第十七疏此章上論淳古之風下逮澆漓之俗欲眀失道之漸將辨致弊之由故前章明守靜則致虛此章示無為則復朴朴散則親譽遂作無為則謂我自然庶夫道化之君專此不言之教義曰太古上古無事無為君任自然人懷大朴太古者乃天地之初也列子云昔者聖人因陰陽以統天地故有形生於無形則天地之前有太易未見氣也有太初氣之始也有太始形之始也有太素質之始也通謂太極故云五太者即太古也氣形質具而未相離故曰混沌言萬物相渾沌而未分判也既而渾沌分判輕清為天重濁為地而上下分焉陰陽定焉人禀天地陰陽冲和之氣居于天地之中日月照之氣象成之陰陽輔之寒暑循之與天地並號為三才則上三皇中三皇下三皇迭理其化司牧於人此謂上古也天職生覆地職形載聖職教化物職所宜而展轉生化初以道德次則仁義故親譽畏侮恩信不孚須資復古之風冀返淳和之化春秋僖公二十四年周王欲以狄師伐鄭富辰諫曰太上以德撫民無親疏也其次親親以相及也言先親以及疏推恩以成義爾太上下知有之注太上者淳古之君也下知者臣下知上有君尊之如天而無施教有為之迹故人無得而稱焉疏太上者淳古之君也謂太上者尊之也言太上之君處無為之事行不言之教臣下但知有君尊之如天大而在上被四時生育之義不知何以稱其德是故云下知有之義曰太者大也上者高也至高至大以表其名上古之君無有諡號行淳厚之化以化於人任物無為不言而信不施典法以蕩物心故臣下知其上有君而不聞其教令其卧居居其起于于其行填填其視顛顛山無蹊隧澤無舟梁耕而食織而衣四時自行其上萬物自行其下至德玄遠不可名稱故曰太上或云上古太古之君者昔有容成氏大庭氏柏皇氏中央氏栗陸氏麗連氏軒轅氏赫胥氏無懷氏昊英氏尊盧氏葛天氏陰襄氏祝融氏列山氏伏羲氏神農氏皆結繩無為之代黃帝乃垂衣裳造書契有作有法漸以化民矣三皇者以道理人無制令無刑罰謂之皇有制令無刑罰謂之帝所以三古異宜步驟斯變矣太上之化不其遠歟其次親之譽之注逮德下衰君行善教仁見故親之功高故譽之疏太上之君殁黃帝堯舜氏作施教行善仁及百姓故親之柔服致平功高天下故譽之親譽生前人之迹矯徇為後代之患義曰譽褒美也矯妄也以身從物曰徇也殁死也謂前太古上古之君相次死殁也作起也黃帝者有熊國君少典之次子也姓公孫氏生而神靈弱而能言長而敦敏成而聰眀母有喬氏曰附寶見電光繞北斗樞星照野感而有孕十四月而黃帝生焉神農德衰蚩尤暴橫諸侯侵伐黃帝修德振兵殺蚩尤於涿鹿之野天下尊之立為天子曰黃帝焉以代神農之位師廣成子於崆峒山問理國之道取天地之精以養兆民造書契服牛馬舟車杵臼宫室弧矢調律吕鑄鼎制琴其所居有縉雲之瑞或號縉雲氏以雲紀官禮樂既作其臣大撓造曆容成造算倉頡造文字風后造五兵而萬慮興焉名迹顯焉帝乘飛龍周遊四海名山大川皆有其跡於是採首山之銅鑄鼎於荆山以合九丹丹成有龍垂胡髯而下迎之黃帝乘黃龍而升天其大臣同升者七十二人其小臣有攀斷龍髯而墮抱帝之弓而號故號曰烏號弓其升天處今在虢州閿鄉縣皇天原亦名鼎湖是也帝堯睦九族親百姓師務成子定歲時正律度以化天下帝舜師尹壽子以孝德彰聞代堯為天子其解具在第三章中言黃帝堯舜制作法度天下化之民乃親其德而譽其功乃真親真譽也非黃帝堯舜使民親譽而民自親譽之後代則不然覬覦前跡而有矯親矯譽所以矯竊之患生之矣疏故莊子曰吾語汝大亂之本必生堯舜之間何也以其迹存乎千歲之後故爾義曰親譽之迹起於黃帝堯舜千載之後人慕其迹而生矯徇莊子庚桑楚謂其弟子曰夫堯舜又何足以稱揚哉以其揖讓相禪而後世法也且舉賢則人相軋任智則人相盜固不足以厚民子有弒父臣有弒君正晝為盜日中穴阫大亂之本必生乎堯舜之間其末存乎千世之後必有人與人相食者此言尊賢任能遂至大弊更相蠶食起自唐虞之間人矯徇不休失其真性故至於大亂也其次畏之侮之注德又下衰君多弊政人不堪命則驅以刑罰故畏之懷情相欺明不能察故侮之疏黃帝堯舜氏殁下及三王五霸浸以陵遲嚴刑峻制故畏之明不能察故侮之下議罪而求功上賞姦而生詐相蒙若此可為寒心義曰堯舜既殁三王繼之三王者夏殷周也夏禹姓姒名文命高陽氏之孫也母曰修己於石紐山下泉中得月精如雞子吞之而孕生禹左手有水字右手有台字合為治字禹父鯀為堯治水九年績用不成舜殛鯀於羽山舉禹代父使之治水通九江濬百川百谷既同四海無壅手足胼胝鑿龍門闢伊闕濬九河所經者七百餘國乘四載而奠名山大川靡不周遍其為人也其仁可親其言可信聲為律身為度師真行子得太上靈寶五符檄召鬼神移山塞川治水既畢天錫玄圭以告成功舜遂禪位作九鼎立九州五嶽名山皆刻石科斗篆文以表其高下在位四十一年年一百歲子孫十六代都平陽起癸亥終己巳四百八十七年禹既禪位自以德不及堯舜去帝稱王即三王之一也其後夏桀無道殷湯以諸侯起兵伐桀而代其位焉殷湯契之後也黃帝十七代孫子名履一名天乙佐夏征葛伯有功開三面之網歸其仁者三十六國夏桀暴虐天下叛之湯征桀於鳴條之野放之於南巢有白狼之瑞師錫則子以伊尹為相大旱七年以身為牲天乃大雨四海美之在位十三年年一百一十九歲子孫二十一代三十王都於亳起庚午伐桀即位終乙酉年紂滅周興共六百五十六年三王之二也其後殷紂無道斫朝涉之脛剖比干之心置炮烙之刑刳剔孕婦天下叛之周西伯以丁卯年霸於邠岐武王以己卯年嗣位至乙酉年代紂於牧野克之遂興周業而代殷位焉周后稷之後姬姓后稷名棄母曰姜嫄帝嚳之元妃出野見巨人之迹悅而踐之感而有孕期年而生以為不祥棄之陋巷牛馬避之遷於冰上蜚鳥以其翼覆薦之姜嫄以為神遂收而養因名曰棄為兒時吃好相地之形善耕農帝堯聞之舉為農師天下得其利封於邰號曰后稷其十世孫古公亶父積德行義國人戴之亶父娶大姜生季歷季歷娶大任生文王昌昌為西伯殷紂疑其賢囚於羑里其臣閎夭求有熊之馬有莘之女異方珍怪以獻於紂紂赦西伯賜以弓矢斧鉞得專征伐師老君於岐山之陽鸑鷟為瑞天下之人歸周德者三有其二焉西伯以丁卯年受弓矢之錫當紂二十一年也武王以乙酉年克紂正位放牛於桃林之野歸馬於華山之陽倒載干戈示不復用有亂臣十人而天下大理在位九年文王年九十七武王年九十三子孫三十七代四十一王起乙酉終赧王壬子共八百六十八年此三王之三也五霸者在三王之內諸侯之間以兵服四方為盟會之主內扶天子外威諸侯以禮樂征伐權於當代不及於王故謂之霸夏之霸者有昆吾黃帝之後也殷之霸者有大彭豕韋帝堯之後也周之霸者有齊桓僖公之庶子名小白魯莊公九年立管仲相之九合諸侯一匡天下周惠王襄王之時也晋文公者獻公之子名重耳母曰狐姬以魯僖公二十二年立文公以僖公四年避驪姬之禍奔于齊歷曹衛陳楚鄭秦諸國凡十八年秦伯以師納之于晋周襄王加九錫賜彤弓彤矢圭瓚秬鬯得專征諸侯教民二年欲用之子犯請教之以義於是出定襄王入務利民伐原以示信大搜以示禮而後用之出穀戍釋宋圍一戰而霸言其能任禮智征伐以取霸盛興兵得衆盟謂之霸霸者把也謂把攬英雄以致强大也夫仁義禮智征伐之道也嚴刑以束人心峻法以鉗人口法愈細而民愈亂網愈密而罪愈多禍起而不知奸生而不悟上下相詐故或畏之或侮之有道之士見其危跡為之悚栗所謂寒心也冲虛真經孔子對商太宰曰三皇善因時順物而理五帝善任仁義彰善而成功三王善任智勇智以决之勇以行之五霸善任機權因勢以制宜託機以成務而猶檢之以禮約之以信禮信或虧即霸道隳矣信不足有不信注畏之侮之者皆由君信不足故令下有不信之人疏此覆釋畏之侮之百姓畏君之刑法侮君之教令者皆為君信不足於下故令下有此不信之人爾義曰言著而不欺曰信賞及無功罰及無罪則為不信教令失信民得欺之矣形曲則影邪源混則流濁上行下效其應若斯春秋宣公十一年楚子伐鄭及櫟鄭大夫子良曰楚晋不務德而兵爭與其來者可也晋楚無信我焉得有信乃從楚夏及楚子盟于辰陵陳鄭服也此乃信不足焉有不信焉猶其貴言注親之譽之者猶君有德教之言故貴其言而親之譽之也疏此覆釋親之譽之也百姓所以親愛君之仁善稱譽君之功業者由君有德教之言故貴重君之言而稱譽之爾古猶字與由字通用義曰君教令不一民畏侮之君教令仁善民親譽之書曰民靡常懷懷于有仁又曰撫我則后虐我則讎故賤其苛暴之令而貴其仁善之教猶者尚也從也古文或少故通用之功成事遂百姓謂我自然注功成而不執事遂而無為百姓日用而不知謂我自然而成遂則所以太上下知有之也疏此覆釋太上下知也夫淳朴不殘孰為犧樽道德公行親譽焉設故太上之代下忘帝力適令功成事遂百姓皆以為自然合爾不知所以親譽報施也義曰首標太上之化次述澆淳不同末以此句覆釋太上無為之理當太上之代窊地為樽抔抔步侯反水而飲不親其親不子其子上有生成遂長之功不矜於下下見物得其所不知上化所為以為自然而然也淳朴不殘者莊子馬蹄篇曰淳朴不殘孰為犧樽白玉不毁孰為圭璋道德不廢安取仁義情性不離安用禮樂五色不亂孰為文采五聲不亂孰應六律夫殘朴以為器工匠之罪也毁道德以為仁義聖人之過也梁書劉香答沈約曰古者彝器皆刻木為鳥獸形鑿頂及背以出納酒魏朝有人於魯郡野中耕得齊大夫子尾送女器有犧樽作犧牛形晋永嘉中賊曹嶷於青州發齊景公冢得二樽形亦為牛乃知皆古犧樽之制也夫太古上古之時大道之行上德不德人知其上有君長焉中古之時大道既隱仁德可見恩惠及人故有親譽之美焉下古之衰道德皆隱教令鬱興信義漓薄其上失信下則以不信應之故見其峻令則畏之聞其失信則侮之老君所戒欲使後代帝王棄禮智之末跡慕道德之古風遺功忘名復歸大朴矣親譽者有仁愛之跡則親之有美善之跡則譽之報施者上加其恩曰報下立功勞曰施春秋僖公二十四年周襄王使狄伐鄭有功富辰諫王曰報者倦多施者未猒言施功勞也有勞則望報過甚也此為周王怨鄭使狄伐之狄有功而王欲以其女為后大夫富辰諫王之辭也百姓日用而不知者周易之辭也道德真經廣聖義卷之十六
