front:
  text: 道德真經廣聖義卷之九羔九
  hash: sha256:25e94668706d31087e4a2a859e42f15db78c35944f25ccf80d5f8d5232cca24f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0114_HFL_010-001a, image: hfl/0441/0441-124.png}
body:
  text: 唐廣成先生杜光庭述天地不仁章第五疏前章明妙本沖用在用而無為此章明偏愛成私遍私則難普首標芻狗萬物示天地之兼忘次喻橐籥罔窮明用虛而不撓結以多言數窮欲令必守中和義曰夫以仁為仁則有執不以仁為仁則無私帝王之視群生猶天地之視萬物萬物自生自化天地不以為功羣生爰居爰處帝王不以為惠任妙氣以鼓舞任玄化以生成乃為至化矣若言其仁惠理或自窮何者天地之仁大矣草木有冬榮夏枯帝王之仁大矣刑法有投荒用鉞未若不以仁為仁之大也運彼沖和守其清靜為理身之要妙矣天地不仁以萬物為芻狗聖人不仁以百姓為芻狗注不仁者不為仁惠也芻狗者結草為狗也犬以守禦則有弊蓋之恩今芻狗徒有狗形而無警吠之用故無情於仁愛也言天地視人亦如人視芻狗無責望爾嘗試論之曰夫至仁無親孰為兼愛愛則不至適是偏私不獨親其親則天下皆親矣不獨子其子則天下皆子矣是則至仁之無親乃至親也豈兼愛之乎疏仁者兼愛之目也芻草也謂結草為狗以用祭祀也莊子曰師金謂顔回曰夫芻狗之未陳巾以文繡及其已陳則庖者取而爨之今天地至仁生成羣物亦如人結草為狗不責其吠守之用不以生成為仁恩故云不仁也則聖人在宥天下視彼百姓亦當如此注云弊蓋之恩者禮記孔子云弊蓋不棄為埋狗也不獨親其親禮運文者也義曰古之祭法有為人用者皆象其形以列籩豆之間故有芻狗之設矣莊子天運篇孔子西遊於衛顔回字子淵孔子弟子魯人也小孔子三十歲二十九而髮白孔子曰自吾有顔回也門人日益回以德行著名居四科之首孔子所以稱其賢也三十二而早死孔子哭之慟故曰苗而不秀秀而不實不幸短命死矣回顔路之子也回問師金夫子之行奚如師金曰惜乎而夫子其窮乎顔回曰何謂也師金曰夫芻狗之未陳也盛以篋衍巾以文繡尸祝齊戒以將之及其已陳行者踐之樵者爨之而已將復收於篋衍必反為怪今夫子取先王已陳之芻狗聚弟子而寶之故伐樹於宋削跡於衛窮於商周圍於陳蔡是亦將鄰乎行者之踐樵者之爨也惜哉夫犬以吠守今芻狗無吠守之用天地之視萬物聖人之視百姓亦如芻狗不責其吠守之能不以仁恩之為仁不責其報不彰其仁是以不仁矣人於狗也有弊蓋瘞埋之恩今於芻狗亦無此恩矣明聖人不以兼愛為仁也弊蓋者禮記檀弓篇曰仲尼之畜狗死使子貢埋之曰吾聞之弊帷不棄為埋馬也君之路馬死埋之以帷弊蓋不棄為埋狗也丘也貧無蓋於其封也亦與之席無使其首陷焉恐其首直委於土也不獨親其親者禮運篇云大道之行天下為公不獨親其親不獨子其子泛愛於物推公而行不為偏愛也天地之間其猶橐籥乎注橐者鞴也籥者笛也橐之鼓風笛之運吹皆以虛而無心故能動而有應則天地之間生物無私者亦以虛無無心故也虛而不屈動而愈出注橐籥虛而不屈撓動之而愈出聲氣以況聖人心無偏愛則無屈撓之時應用不窮可謂動而愈出也疏橐也謂以皮囊鼓風以吹火也籥笛也言天地能芻狗萬物者為其間空虛故生成無私而不責望亦由橐之鼓風笛之運吹常應求者於我無情故能虛之而不屈撓動之愈出聲氣以況人君虛心玄默淳化均一則無屈撓日用不知故動而愈出也義曰橐乃皮囊以鼓風籥乃竹管以運氣橐鼓風無籥不能運籥運氣無橐不能鼓兩者相須而行以明天地為橐五氣為籥含虛運動以生萬殊而無屈竭矣人君虛心用道臣佐體君行化如天地運五氣以不竭則政無屈撓四海和平也動之愈出聲氣言無窮也淳化均一者淳和之德周被萬品日用不知者易繫辭云百姓日用而不知言百姓日日賴用此道以得生而不知道之功力蓋道冥昧不以功為功故百姓用之而不知也屈竭也多言數窮不如守中注多言則不酬故數窮屈兼愛則難遍便致怨憎故不如抱守中和自然皆足矣疏多言者多有兼愛之言也多有兼愛之言而行則難遍故數窮屈不遂是知不如忘懷虛應抱守中和則自然皆足矣注云不酬者酬答也謂空有其言而行不酬答者也義曰多言多敗多事多害言之多也謂或不應故有窮屈矣理國多言謂政令政令多出朝令夕改則謂數窮也理身多言其失可知也故一言之失駟馬不追況多言之失寧無辱乎夫言者離堅合異反白為黑防人之口甚於防川不可不慎也不如默守中和於國不煩其政令於身不招其恥辱愛氣希言守德於中行不言之教斯為美善矣谷神不死章第六疏前章明兼愛咸私偏私則難普此章明至虛而應其應則不窮首標谷神寄神用以明道次云玄牝辨玄功之母物結以綿綿微妙示虛應則不勤勞也義曰神者陰陽不測之謂也虛而能應感而遂通或以谷養為言養神則契乎不死或以響應為說應物則如神不窮玄牝則吐納元和鍊神鍊氣形氣長久天地齊靈綿綿永存長生之道也谷神不死注谷者虛而能應者也神者妙而不測者也死者休息也谷之應聲莫知所以有感則應其應如神如神之應曾不休息欲明至道虛而生物妙用難名故舉谷神以為喻說也是謂玄牝注玄深也牝母也谷神應物沖用無方深妙不窮能母萬物故寄谷神玄牝之號將明大道生畜之功也疏谷神者明谷神之應聲如道之應物有感即應其應如神神者不測為名死以休息為義不測之應未嘗休息故云谷神不死玄深也牝母也谷神之應深妙難名萬物由其茂養故云是謂玄牝義曰谷神之義響應若神分為三别第一謂谷神之含虛有聲則應道之體無修之則得第二謂神無形有祈則赴感道無象修之則長存第三謂響在谷無聲則不應道在身不修則不成不死者非謂死生之死是休息之死若謂養身解之則為死生之死一謂養神則長生不死二謂響應無休歇為休歇之死夫玄天也於人為鼻牝地也於人為口元和之氣慧照之神在人身中出入鼻口呼吸相應以養於身故云谷神也又天之五氣從鼻而入其神曰魂上與天通地之五味從口而入其神曰魄下與地通言人食氣則與天為徒久而不已可以長生陽鍊陰也食味則與地為徒久而不已生疾致死陰鍊陽也老君令人養神寶形絶穀食氣為不死之道故云玄牝門天地根也玄牝之門是謂天地根注深妙虛牝能母萬物萬物由出是謂之門天地有形故資禀為根本矣疏玄牝之用有感必應應物由出故謂之門天地有形之大者爾不得玄牝之用則將分裂發泄故資禀得一以為根本故云是謂天地之根根本也義曰非獨人資玄牝運氣乃得長生天地之大亦須資道氣運養乃能清寧無改矣下經云天無以清將恐裂地無以寧將恐發天地失道尚有傾淪發泄之變況於人身而不守中存一乎綿綿若存用之不勤注虛牝之用綿綿微妙應用若存其用無心故不勤勞也疏綿綿者微妙不絶之意也虛牝之用應物無私微妙則稱其若存無私故用不勤倦爾義曰天地任氣自然故長存也人鼻口呼吸當綿綿微妙若可存復若無有不當煩急勞倦也理國之道政令所行亦當寬以濟猛猛以濟寬所以政寬則民怠令猛則民殘能以清寧之道以理天下人無動用勤勞之事則下民親附祚曆廷長綿綿常存若瓜瓞葛虆之長永也故云綿綿若存用之不勤也天長地久章第七疏前章明谷神虛應虛應即不窮此章明天地無私無私故長久首則標天地以為喻次則舉聖人以轉明結以無私成私蓋將欲勸勤此行義曰前章明玄牝運氣天地任之以自然此標天長地久以契任自然之用聖人之理亦當體天地之用則人安國寧天地不以其私故能長久聖人無私用道萬物歸矣天長地久注此標天地長久者欲明無私無心則能長能久結喻成義在乎聖人後身外身無私成私爾疏此標章問也天以氣象故稱長地以形質故稱久義曰老君將明天地長久之義以教理世之君故於章首自舉其問天以氣象者列子云天積氣也無處無氣地積塊也無處無塊積氣為象象虛也積塊為形形實也易繫辭曰在天成象在地成形變化見矣上象下形故能變化孳生萬物也天地所以能長且久者以其不自生故能長生注天地生物德用甚多而能長且久者以其資禀於道不自矜其生成之功故爾疏前句標問此假答云天地所以能長且久者以其覆載萬物長養羣材而皆資禀於妙本不自矜其生成之功用以是之故長能生物又解云不自生者言天地但生養萬物不自饒益其生故能長生義曰老君將明此長久之義自設其問亦如文章家亡是公子烏有先生東郭主人之例也立理發問因自答之以顯其事爾為前句既問天長地久此句方答云以天地運元和沖用之氣生育羣品羣品得生天地不恃其德不有其功故能長久若恃其功則功細矣若恃其德其德薄矣不恃故德廣功大萬物歸宗而天地長久也人君理國當法天行化任物無為衆庶熙熙自臻平泰理身無勞心役慮之事無矜名徇欲之功神安於中氣和於內如此則國祚長遠身壽遐延亦如天地無私乃能長久也是以聖人後其身而身先外其身而身存注後身則人樂推故身先外身則心忘淡泊故身存疏是以聖人效天地覆載必均養而無私故推先與人百姓欣賴為下所養故身先也不自矜貴而外薄其身天下歸仁則無畏害故身存也義曰理國不矜貴以有為不勞人以自奉所謂後身外身也太古之君志包天地澤及天下而不知其誰氏其生無爵不有其位也其死無諡不多其功也其實不聚其名不立天下樂推萬物欣戴可謂後身而身先外身而身存也代之衰也其君則不然恣身之欲而役於人殫人之力以奉其己人勞政弊天下去之此所謂失外身後身之道也豈若碎琥珀之枕焚雉頭之裘罷一臺之費却千里之馬德垂當代名光竹帛乎修身之士不嗜榮爵外其身也不為躁進後其身也如此則身存而德充德充則人服可謂身先身存矣反於此者道遠乎哉非以其無私邪故能成其私注天地忘生養之功是無私而能長且久是成私聖人後外其身是無私而能先能存是成其私也疏天地所以長久聖人所以先存者非以其無自私之心故能成此長久先存之私已乎義曰聖人之理也任自然之化無獨見之專不厚其生不伐其善不為天下之先故能處人之上不為天下之貴故能享祚久長所以億兆宅心夷蠻稽顙干戈止息宗廟安寧此之為私也大矣由其不以私為私故成此光大理身則德充人服道契神明享壽長生其私大矣亦由其不以徇私逐欲成此大私也靈寶經云居世之人貪歡逐欲前樂後苦何哉極而逸樂而墜於三塗也學道之士絶利忘名寒栖鍊行終得仙道先苦後樂何者積其功行升乎九天也道德真經廣聖義卷之九
