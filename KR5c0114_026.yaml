front:
  text: 道德真經廣聖義卷之二十五景一
  hash: sha256:616c35e905700079856cb3bc63f5ed21d80ebadc28fbf0ae6bf5a57ce7c80835
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0114_HFL_026-001a, image: hfl/0444/0444-004.png}
body:
  text: 唐廣成先生杜光庭述以道佐人主章第三十疏前章明矜執則失是以去其甚奢泰此章明兵強好還不可果其矜伐首云以道戒臣不以兵為輔佐師之所處下明好兵必致不祥故善者下示不得已而用果物壯下論恃強而必敗義曰前明人主理國去奢泰而為君此戒人臣事君用文德而匡佐若怙兵尚武必誘敵起爭是眀兵強好還不可以矜伐為事也首章直戒人臣次言用兵非善妨農害歲是有凶年然後果於勿強強必喪敗強壯非道宜速止之也以道佐人主者不以兵強天下其事好還注人臣能以道輔佐人主者當柔服以德不用兵甲之威取強於天下何則兵者凶器戰者危事抗兵加彼彼必應之其事既好還報則勝負之事未可量矣疏以用也佐輔也還報也言為人臣者當用道化無為輔佐人主致君堯舜是曰股肱舞干羽於兩階修文德於四海令執大象而天下往太階平而寰海清若震耀戈甲之威窮瀆侵伐之事抗兵以加彼彼必應之其事能還報則勝負之事誰能預尅也哉義曰夫臣之事主以道為先所宜清靜匡君勿以兵謀輔國化既清靜君遂無為平泰可圖堯舜何遠致君者言臣以道德助化則君德自齊於堯舜也股者足也肱者手也君為元首臣為股肱猶一身耳君臣之道其可忽乎書云元首明哉股肱良哉是也舞干羽者尚書大禹謨曰舜以禹之功命之嗣位時有苗之民數干王誅命禹徂征之於是會諸侯之師誓衆而往奉辭伐罪三旬苗民逆命益謂禹曰惟德動天無遠不屆至誠感神况於有苗乎禹班師振旅誕敷文德舞干羽于兩階七旬而有苗格有苗左洞庭右彭蠡在荒服之例去京師二千五百里征之不服不征自來言以文德道化撫之也干楯也羽翳也舞者所執之物既還師振旅不用干戈乃修文德以文舞舞於賔主兩階之間以抑武事而苗人來格格至也禮曰舞者所以飾喜也執其干戚習其俯仰屈伸容貌得莊焉行其綴兆要其節奏行列得正焉羽籥干戚舞之器也屈伸俯仰舞之容也綴兆舒疾舞之列也故天子八佾八人為列六十四人也諸侯六佾大夫四佾士二佾佾列也二人為列矣執大象者第三十五章之詞也太階者三台六星為太階六符起文昌抵太微以主三公君臣和法令平則其星光明行列相類星或明或暗或狹或闊或變色或亡失不見皆為災凶若三星亡失革命易姓六階勻明天下太平也今若大臣以兵謀輔主不能以文德懷人侵伐圖功加兵於彼彼必還報則勝敗之勢未可知也或自焚焉負敗也抗以手抗拒也瀆亂也師之所處荆棘生焉大軍之後必有凶年注軍師所處戰則妨農農事不修故生荆棘兵氣感害水旱繼之農廢於前災隨其後必有凶荒之年矣疏師軍師也又易曰師衆也夫興師動衆則人勞於役行齎居送則妨工害農農事不修故生荆棘大軍之後積費既多和氣致祥兵氣感害水旱相繼稼穡不生故必有凶荒之年以報窮兵之怨爾義曰人臣以兵輔主主則習用其兵主貪不急之功臣冒無猒之賞或憑凌下國侵伐鄰封危器一施生民受弊行者有齎糧之苦居者有轉饋之勞男廢耕農女妨蠶績所以云懸軍十萬日費千金杼軸其空挽輸莫息田生荆棘人遂飢荒設無水旱之侵已有耕耘之闕夫和氣結則祥瑞降兵氣盛則災害生疾疫流亡由斯而作窮兵之弊可勝言哉惟君惟臣所宜深戒也修身之士以嗜欲交侵猶國有兵戈也真氣耗散猶生民疲弊也所以嗜好不節則神氣散亡神氣散亡則疾疹交構氣亡疾作何福善之可冀乎何延益之可希乎於國於身俱可深戒也故善者果而已不敢以取強疏春秋傳曰殺敵為果今明殺敵者令不相侵止其為暴是知殺敵為果即止敵也老君云事不得已而欲用兵用兵之善但求止敵令不為寇必不以衆暴寡凌人取強取強則事好却還是以戒令不敢故云不敢以取強義曰王者化人貴乎道德道德未洽恩信未孚或有外敵來侵不得已而方應應變制敵豈在殺人能取勝於伐謀自可期於止殺故於文曰止戈為武但止其敵不在殺人可謂止戈矣其若封尸流血白刃相交或勝之於前或敗之於後好却還報非曰能軍不敢取強是合天道矣殺敵為果者春秋宣公二年春鄭公子歸生受楚之命伐宋宋華元禦之戰于大棘宋師敗績囚華元獲司空樂莒甲車四百六十乘俘二百五十人馘百人宋大夫狂狡逆鄭人鄭人入於井倒戟而出之獲狂狡君子曰失禮違命宜其為擒也戎昭果毅以聽之謂禮常存於耳著於心想聞其政令殺敵為果致果為毅易之戮也言易而反之必為戮矣果而勿矜果而勿伐果而勿憍注善輔相者果於止敵蓋在安人和衆不敢求勝取強故雖果於止敵不敢為寇慎勿矜功伐取以自憍盈憍則敗亡故以為深戒也疏夫用兵之善果於止敵止敵自矜未名善勝故雖能止敵慎勿矜誇矜誇則傷於取功故雖果於止敵戒云勿伐其功伐取其功是則自為憍泰憍泰則樂殺故敗不旋踵此為炯戒可不慎乎義曰矜誇大也伐自稱己善也憍慢也安人和衆者春秋宣公十二年楚子圍鄭三月克之鄭伯肉袒牽羊以逆楚子將舍之左右曰不可許也得國無赦楚子曰其君能下人必能信用其民矣退三十里而許之平潘尪入盟子良出質夏六月晉師救鄭荀林父將中軍先縠佐之趙括趙嬰齊為大夫士會上軍郤克佐之鞏朔韓穿為大夫趙朔將下軍欒書佐之荀首趙同為大夫韓厥為司馬及河聞鄭及楚平林父欲還曰無及於鄭而勦民焉用之楚歸而動不後士會曰善會聞用軍觀釁而動德刑政事典禮不易不可敵也不為是狂楚君討鄭怒其二而哀其卑叛而伐之服而舍之德刑成矣伐叛刑也柔服德也二者立矣昔歲入陳今兹入鄭民不疲勞君無怨讟政有經矣荆尸陳法也而舉商農工賈宰擇楚國之令典軍行右轅左追蓐前茅慮無中權後徑百官象物而動軍政不戒而備能用典矣其君之舉也內姓選於親外姓選於舊舉不失德賞不失勞老有加惠旅有施舍君子小人物有服章貴有常尊賤有等威禮不逆矣德立刑行政成事時典從禮順若之何敵之見可而進知難而退軍之善政也兼弱攻昧武之善經也子姑整軍而經武乎先縠曰不可晉之所以霸師武臣力也今失諸侯不可謂力有敵不從不可謂武由我失霸不如死且成師以出聞敵而退非失也命為軍帥而卒以非失唯群子能我弗為也以中軍佐濟荀首曰此帥殆哉易有之師出以律否臧凶順成為臧逆為否有帥而不從臨孰甚焉果遇必敗先縠尸之雖免而歸必有大咎韓厥林父帥軍遂濟楚子北師次於郔聞晉師濟王欲還嬖人伍參欲戰令尹叔敖不可參曰若事之捷孫叔為無謀矣令尹南轅返斾伍參言於王曰晉之從政者新未能行令其佐先縠剛愎不仁未肯用命其二帥者專行不獲衆誰適從此行也晉師必敗且君而逃臣若社稷何王病之告令尹改轅而北之次於管以待之晉帥敖鄗之間鄭皇戍使如晉師曰鄭之從楚社稷之故也未有二心楚師驟勝而驕其師老矣而不設備子擊之鄭師為承楚師必敗先縠曰敗楚服鄭於此在矣必許之欒書曰楚自克庸以來其君無日不討國人而訓之于民生之不易禍至無日戒懼之不可以怠在軍無日不討軍實而申警之民生在勤勤則不匱不可謂驕先大夫子犯有言曰師直為壯曲為老我則不德而激怨於楚我曲楚直不可謂老其君之戎分為二廣廣有一卒卒偏之兩右廣初駕數及日中左則受之以至于昏內宫序當其次以待不虞不可謂無備師叔楚之崇也入盟于鄭子良鄭之良也在楚楚鄭親矣來勸我戰我克則來不克遂往以我卜也鄭不可從趙括趙同曰帥師以來唯敵是求克敵得屬又何俟智焉莊子曰趙括趙同咎之徒也趙朔曰欒伯善哉實其言必長晉國楚少宰如晉師曰寡君少遭閔凶不能文此行也將鄭是訓定豈敢求罪于晉二三子無淹久隨會對曰昔平王命我先君文侯曰與鄭夾輔周室無廢王命今鄭不率寡君使群臣問諸鄭豈敢辱候人敢拜君命之辱先縠以為諂使趙括從而更之曰行人失辭寡君使群臣遷大國之迹於鄭曰無避敵群臣無所逃命楚子又求成于晉晉人許之盟有曰矣楚許伯御樂伯攝叔為右以致晉師晉魏錡使於楚請戰而還趙旃請入楚召盟二子皆欲晉敗郤克曰二憾往矣不備必敗先縠曰鄭人勸戰不敢從也楚人求成弗能好人師無成命多備何為士會曰備之善若二子怒楚楚人乘我喪師無日矣楚若無惡除備而盟先縠不可士會使鞏朔韓穿師七覆于敖前故上軍不敗趙嬰齊具舟于河潘黨逐魏錡楚子乘左廣逐趙旃晉師使鈍車逆二子楚人懼王之入晉軍也遂出陳孫叔曰進之寧我薄人無人薄我車馳卒奔疾進乘晉軍林父不知所為鼓於軍中曰先濟者有賞中軍下軍爭舟舟中之指可掬晉師右移上軍未動工尹齊將右拒逐下軍潘黨唐侯從上軍郤克欲待之士會曰楚師方壯若萃於我必盡不如收而去之殿其卒而退不敗及昏楚師於邲晉之餘師不能軍宵濟亦終夜有聲潘黨曰君盍築武軍而收晉尸以為京觀臣聞克敵必示子孫以無忘武功楚子曰非爾所知也夫文止戈為武武王克啇作頌曰載戢干戈載櫜弓矢我求懿德肆于時夏允王保之又作武其卒章曰耆定爾功其三曰鋪時繹思我徂惟求定其六曰綏萬邦屢豐年夫武禁暴戢兵保大定功安人和衆豐財者也故使子孫無忘其章令我使二國暴骨暴矣觀兵以威諸侯兵不戢矣暴而不戢安能保大猶有晉在焉得定功所違民故猶多民何安焉無德而強爭諸侯何以和衆利人之幾而安人之亂以為己榮何以豐財武有七德我無一焉何以示子孫其為先君宫以告成事而已武非吾功也古者明王伐不敬取其鯨鯢而封之以為大戮於是乎有京觀以懲淫慝今罪無所而民皆盡忠以死君命又可以為京觀乎祀于河作先君宫告成事而還是役也鄭石制入楚將以分鄭而立公子魚臣辛未鄭殺石制魚臣君子曰無恬亂者謂是類也且夫伐謀而得勝彼敵敢侵止殺濟危信為善矣若矜伐其善自衒其功身享功名心必憍泰憍泰則淩物凌物則怨生禍敗可期功名難保韓信見擒於雲夢白起齒劍於杜郵矜伐生憍因憍致禍不可不戒也果而不得已是果而勿強注前敵來侵不得休止故用兵以止之如是則果在於應敵非果以取強疏夫果於止敵者非好勝而凌人也但前敵來侵事不得已故云果而不得已已止也用兵應敵是非求勝能如此者勝不恃強故云果而勿強物壯則老是謂不道不道早已注物之用壯猶兵之恃強物壯則衰兵強則敗是謂不合於道當須早止不為疏凡物壯極則老兵強極則敗故兵之恃強猶物之用壯物用壯適足以速其衰老兵恃強則不可全其善勝兹二事者是謂不合於道賢臣明主知其不合於道為須早止不為故云不道早已已止也義曰兵之恃強必致死敗符堅壽春之役李密洛口之師王尋昆陽之兵煬帝征遼之衆皆號百萬信為多焉而非道恃強敗不旋踵兵強故也亦如物壯則老用壯必傷矣昔秦吞七國一統九州力盛兵強天下莫敵土崩瓦解曾不踰時扶蘇死於長城子嬰降於軹道鷹揚鶚視夫何足云聖人以為非道之基不如早止理身則嗜欲復性亦猶兵焉若制欲捐情澡神滌慮止其妄想守彼虛玄自無物壯之譏可謂全和之要師亦有老春秋曰師曲為老謂出師無名不以其理理屈於敵亦為老焉故曰師直為壯曲為老也道德真經廣聖義卷之二十五
