front:
  text: 道德真經廣聖義卷之二十七景三
  hash: sha256:2fc038b1d2e2a9cffba9160e498a15fe2cec130871830b421e78dd5a0342091b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0114_HFL_028-001a, image: hfl/0444/0444-064.png}
body:
  text: 唐廣成先生杜光庭述道常無名章第三十二疏前章明佳兵不祥故有道不處此章明侯王守道則萬物下賔首標無名將以明道次舉守道而能降瑞始制下廣其制用譬道下將示結成義曰兵之佳也為天下之凶朴雖小也為天下之大王侯能守萬物所宗道化既行天地降瑞不煩教令民自和平君保制御之功物得依歸之所萬國親附如水朝宗于海焉以兹善化之君不在兵強之美也道常無名注道以應用為常常能應物其應非一故於常無名疏應用不窮惟感所適道之常也常在應用其應非一故於常無名故云常無名義曰道之為用無為焉而無所不為統御陰陽包羅覆載乾以之動坤以之寧其通生也為天下之至通焉其幽奧也為天下之至賾焉應用無窮周流不極纖芥得之而生植天地得之以圓方而真常之道淡然冥寂不可得而名也名言理絶故常無名朴雖小天下不敢臣注朴妙本也妙本精一故云小而應用匠成則至大故無敢以道為臣者疏朴妙本也語其通生則謂之道論其精一則謂之朴妙本精一故云小耳而應用匠成通生一切則至大也故無敢以道為臣者爾義曰端寂無為者道之真也故謂之朴生成應變者朴之用也故謂之道道朴一耳非一而一是謂真一真一者杳冥之精真中之真也一非多法故云小以此真一生化萬殊其大無大其上無上孰敢以道為臣乎臣者下於君者也春秋曰天有十日人有十等下所以事上也上所以供神也男曰臣女曰妾故王臣公公臣大夫大夫臣士士臣皂皂臣輿輿臣隸隸臣僚僚臣僕僕臣臺馬有圉牛有牧以待百事普天之下莫非王土率土之濱莫非王臣而自古及今無敢以道為臣也侯王若能守萬物將自賔注侯王若能守道精一無為而化則萬物將自賔服矣疏言王侯若能抱守妙本精一無為無事則八埏仰化四海歸仁沐德飲和將自賔服矣義曰王者四海之尊侯者五等之二周設五等之爵公侯伯子男也先王制法則有天子諸侯卿大夫士亦有五等而兼王焉其制服土地禮節降殺亦有五等則以王統天下諸侯各理其國卿大夫士以為陪臣佐王者也言侯王能守道者舉其有土之尊能守道化物則八埏四海之人仰其道德歸其至仁沐其盛德飲其和煦而自賔服矣埏封域邊陲也賔順也外國順化謂之賔服要荒之外來附中國則客禮而賔附率服也天地相合以降甘露疏侯王守道以致和平則無淩沴災害地平天成二氣交泰以相和合降灑甘露善瑞侯王也義曰諸侯守道於其國王守道於天下則能致天地和平無災害氛沴之變地平天成不失其序天地二氣交泰和合而能降瑞也易泰卦彖云天地交泰又云天地交而萬物通也上下交而其志同也夫天地之道陰陽相感寒暑相循氣交則萬物生化各得其宜萬物得宜和氣交合則禎祥降焉甘露者美露也神靈之精仁瑞之澤其凝如脂其甘如飴一名甘露一名天酒禮斗威儀曰人君乘土王其政太平則甘露降稽命徵云稱諡正名則甘露降於竹柏孝經援神云德至天則甘露降甘露者中和之氣也鶡冠子云聖人之德上及太清下及太寧中及萬靈則甘露降而物無不盛也得而飲之壽八百歲天文録云天乳一星在氐宿北主甘露星明則甘露降也逸書曰地平天成稱也言地平其化天成所施上下相稱為宜也淩者氣相亂也沴妖氣也災禍也害傷也瑞祥符也致者不召而至也人莫之令而自均注侯王抱守精一則地平天成交泰致和故降灑甘露夫甘露之降蕭蘭俱澤不煩教令而自均平取譬侯王稱物平施者矣疏莫無也言天降甘露惠施無心人無命令自均若一亦如侯王稱物平施無偏無黨既惠化而大同自東自西亦何思而不服又解云言侯王守道以致善瑞則人自和平無煩命今自然均一爾義曰蕭艾蒿也蘭香草也澤潤也侯王以道化人天賜嘉瑞國既有道人自和平不煩施令自然均普尚書洪範曰王道平平無黨無偏王道蕩蕩無偏無黨民既和平無偏曲之私黨附之勢也稱物平施者易謙卦象曰君子裒多益寡稱物平施言物之多與寡皆得其施裒其多者以益於寡是曰均平矣惠化仁化也大同者天下為公也自東自西者詩文王之什文王有聲篇云自東自西自南自北無思不服言武王作邑鎬京行辟雍之禮四方來觀者皆感其德心無不歸伏自從也用也謂有道侯王天致善瑞人自和平東西南北無不率服不煩教令均一平普亦如四方之人樂文武之化也始制有名名亦既有注人君以道致平始能制御有名之物故有名之物亦盡為侯王所有矣既盡也疏制御也有名者天下有名之物也既盡也言侯王抱守精一則天降善瑞惠化無心均平若一如此始能制御有名之物物歸有道故有名之物亦盡為王侯所有矣義曰有道侯王天地合德善瑞應之上下無間四海歸之有名之物皆歸善化矣四海者侯王所統也弘道建德人皆化之境寓之內率土之濱孰非侯王之物亦猶山林非欲於飛鳥虎狼茂盛深密飛鳥虎狼自來歸之江湖非欲於魚鱉蛟龍廣大渺漫魚鱉蛟龍自來歸之王侯非欲於有名之物道德仁惠有名之物自來歸之修身非欲於道虛無沖寂道自歸之萬物感致在於所修也均一周普天下和平在於所化也善之歸己道之感通物之從順在於崇德也夫亦將知止知止所以不殆注若侯王能制有名之物則夫有名之物而將知依止於侯王知依止有道之君所以無危殆之事疏殆危殆也侯王守道而化萬物自賔服則夫有名之物亦將依止於侯王能依止有道之君所以無危殆之事矣故云知止所以不殆義曰侯王道化合天中外寧一疆域之內動植有名之物皆隨其疆土為王侯所有物依有道之境故無殆壞之危任春夏以生成隨秋冬之搖落不天不殰無北無瘥不為外敵所侵不為淫刑所及一一遂性何危殆之有乎此聖旨也今釋侯王以道化人應天降瑞人歸其化天下均平侯王當守道撝謙膺受符瑞知止畏慎以副天心則無危殆之事若睹其天瑞束此人和縱大其心改易其志矜功伐善則祥不勝驕其身危殆矣昔紂宫中小鳥生大鳥以為國興之瑞矜憍肆欲造作多端以至亡滅老君恐後之帝王恃有祥瑞因此憍矜故戒之云知止所以不殆譬道之在天下猶川谷之與江海注天降甘露以瑞有道之君在宥天下天則應之猶川谷與江海通流爾疏此結侯王守道則天必應之故云譬有道之君在理天下陶以仁德則自致太平和氣感天天瑞必應猶川谷之水而與江海通流爾義曰守道侯王德與天應善化和合以感太平天應之禎祥如川谷之通海此聖旨也今釋云若侯王上感天瑞下得人心四海萬方率為臣妾復能因其感瑞夕惕兢修翼翼乾乾日慎一日既無危殆之事遠人慕其善化重譯來賔如川谷之朝宗江波之赴海遠近歸往國祚繁昌矣理身者以心為帝王藏府為諸侯若安靜心王抱守真道則天地元精之氣納化身中為玉漿甘露三一之神與己飲之混合相守內外均和不煩吐納存修各處玉堂瓊室陰陽三萬六千神森然備足栖止不散則身無危殆之禍命無殂落之期超登上清泛然若川谷之赴海而無滯著也知人者智章第三十三疏前章明侯王守道則萬物自賔此章明以賔服有道之君皆由自知自勝自知則明了自勝則全強結以死而不亡戒令不違天理爾義曰侯王所以守道化行萬物歸宗者以其能了自知之明自勝之強知足不貪勤行於道所以道合天地不失其常得全分理之終不為夭枉之喪故能允合不違天理之戒也知人者智自知者明注智者役用以知物明者融照以鑒微智則有所不知明則無所不照疏知識察也夫心與境合是以生知生知之心識察前事是名知法義曰心之惠照無不周遍因境則知生無境則知滅所以役心用智者因境而起也境正則心與知皆正境邪則心與知皆邪苦樂死生吉凶善惡皆由於此也故心者入虛室則欲心生入清廟則敬心生萬境所牽心隨境散善之與惡得不戒而慎之乎夫知人者為智尚書所謂知人則哲也知人者昔宋宣公捨其子與夷而立其弟如是為穆公春秋隱公三年秋宋穆公疾召大司馬孔父而屬之曰先君捨與夷而立寡人寡人弗敢忘若以大夫之靈得保首領以沒先君若問與夷其將何辭以對請子奉之以主社稷寡人雖死亦無悔焉孔父曰群臣願奉公之子憑也穆公曰不可先君以寡人為賢使主社稷若棄德不讓是廢先君之本也豈曰能賢光昭先君之令德可不務乎吾子其無廢先君之功乃以其子憑出居鄭以讓與夷而立是為殤公君子曰宋宣公可謂知人矣立穆公而其子享之命以義夫商頌曰受殷命咸宜百祿是荷其是之謂乎斯知人之至也疏言人役心生智知前人之美惡者則俗謂之智爾若反照內察無聽以心了觀其心不生知法能如此者是謂明了故云知人者智自知者明義曰世人因境役心乃至分别察他人之善惡考身外之短長不求所以知而求所不知捨己效人以衒其智是捨種種之民而悅夫役役之佞釋夫恬淡無為而悅夫啍啍之意以亂天下者智之過也故上悖日月之明下鑠山川之精中隳四時之施端蠕之蟲蛸翹之物莫不失其性矣孔子謂顔回曰無聽之以耳而聽之以心無聽之以心而聽之以氣於智忘智在知忘知觀妙守無是為明了此莊子云孔子語顔回心齋也勝人者有力自勝者強注能制勝人者適可謂有力能自勝其心使柔弱者方可全其強矣疏勝人者謂以權智制勝於人如此之人適可謂之有力爾自勝者謂自能制勝其心使心柔弱柔弱之道物不能加故可全其強爾故下經云守柔曰強又曰柔勝剛弱勝強故云自勝者強義曰人或持君之權以制於物運其威勢以臨於人人望而畏之是為有力矣而不知自以無為之道內伏其心心既無為志則柔弱心虛志弱物不敢侵是為強矣勝人者力盡勢移則歸於死自勝者心冥道契必至乎仙知足者富強行者有志注知止足者無貪求可謂富矣強力行者不懈怠可謂有志節矣疏知足在心心若知足則無貪求雖簞食瓢飲傲然自足可謂富矣強勉力行曾不懈怠自知自勝終久不渝可謂有志節矣義曰貪之與廉由心而已矣心足者雖顔子一瓢之飲楊雄十金之産不改其樂而常足焉心不足者雖申侯之專利不猒駟泰之車服滿庭而未嘗足矣則顔子楊雄可謂富也強力為善守道不回可謂自勝而強有不渝變之節矣夫強者在用道也強大有道不戰而剋小弱有道不爭而得信可強行於道而堅其志節也易曰君子以自強不息簞食者論語云賢哉回也一簞食一瓢飲處陋巷人不堪其憂回也不改其樂簞小筐也以簞為食器以瓢為飲器陋巷隘巷也言顔回固貧而守道以自樂也不失其所者久注知足強力不失其所恆則是久於其道疏知足強力等行人所常行若不失所恆即是久能行道者矣又解云動不失所者則可以長久義曰知足不貪安貧樂道力行趣善不失其常舉動通時自得其所者所適皆安可以長久易曰不恆其德或承之羞是則人之操行務於恆久不失其所也失其所者必蹈禍患如鄭太叔段寵而無猒大夫祭仲諫莊公曰不如早為之所無使滋蔓難圖也蔓草猶不可除况君之寵弟乎莊公不從既而太叔命西鄙北鄙二于己侵地至于廪延乃完城郭聚人民繕甲兵具卒乘將襲鄭公命大夫子封帥車三百乘以伐京太叔入鄢公伐諸鄢五月太叔奔恭遂克之初以莊公之母武薑寤寐而生莊公名之為寤生遂惡莊公而愛太叔段及段欲襲鄭武薑將啓之至是既克段乃置武薑於城潁誓之曰不及黃泉無相見也既而悔之潁谷封人考叔因食捨肉而諫莊公納之掘地及泉與武薑隧而相見為母子如初春秋書曰鄭伯克段于鄢譏其失教也此言縱太叔之過使其貫盈而後殺之是不早為其所失所之致也若太叔不失其所安及此禍哉死而不亡者壽注死者分理之終亡者夭枉之數壽者一期之盡夫知人勝人必招殃咎知足強力動得天常得天常者死而不亡是一期之盡可謂壽矣疏死者分理之終亡者夭枉之數壽者一期之盡言委順得常不失天理頽然任化而去者得一期之盡可謂壽矣若不鞭其後生理不全雖單豹有嬰兒之色張毅有豐高之貴不終天理焉得謂之壽乎故莊子曰天下莫壽乎殤子而彭祖為天義曰人生天地間有生則必有死生者天地之委和死者天地之委順安其和而處其順是得其常也反此者庸非夭乎河圖曰人之生也天與之算四萬三千二百算主日也與之紀一百二十紀主年也此為生人一期之數矣得金丹不死之道者則延而過之無修養之益有減奪之過者則不足而夭枉之矣黃庭經云百二十年猶可還過此守道誠為難唯待九轉八瓊丹要復精思存七元日月之華救老殘此明修之可以延益也若守其素分委任天和乘化而來任化而往生也若浮死也若休盡所稟之一期亦謂得其壽矣不及此者夭枉而亡也莊子達生篇田開之謂周威公曰祝腎云善養生者若牧羊然視其後而鞭之魯有單豹者巖居而水飲不與人共利行年七十而有嬰兒之色不幸為餓虎食之有張毅者高門懸箔無不走也行年四十以內熱之病死豹養其內而虎食其外毅養其外而病攻其內此二子者皆不鞭其後也謂其守一方之事至於過理者不及於會通之適者也鞭其後者去其不及耳是二子不終天理為夭枉而亡也達生化之旨當生不樂將死不懼則殤子為壽彭祖為夭也莊子齊物篇云天下莫大於秋毫之末而太山為小莫壽乎殤子而彭祖為夭天地與我並生而萬物與我為一兔秋生毛曰秋毫也凡人年十九已下為殤此明道與俗反爾人世之情小則企尚大則驕盈以道觀之無盈無企其致一也死者天子曰崩諸侯曰薨卿大夫曰卒士曰不祿庶人曰死人之死生雖賦以天命然亦繫其所履君子察其所履而知其壽夭易履卦云視履考祥是也春秋楚伐宋還師鄭人享之九獻用周人上公之禮也庭實旅百加籩豆六品享畢夜出取鄭文芊之女二姬以歸叔詹曰楚王其不以壽終乎為禮卒於無别不可謂禮將何以服諸侯是以知其不遂霸也其後果敗於城濮終為啇臣所弒焉春秋僖十一年周襄王使內史過賜晉惠公之命惠公受王命而墮史過歸告王曰晉侯其無後乎王賜之命而墮於受瑞先自棄也已其何繼之有夫禮國之幹也敬禮之輿也不敬則禮不行禮不行則上下昏何以長世十四年惠公與秦戰於韓原為秦所擒二十三年卒皆如史過叔詹之言是則君子察人所履之行則知壽夭况於修至道餐元和而不能長生乎道德真經廣聖義卷之二十七
