front:
  text: 道德真經廣聖義卷之四十八行十一
  hash: sha256:1009717f0c820814576b7eb42310f5737178a818730a0faa9349796ab571e596
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0114_HFL_049-001a, image: hfl/0448/0448-112.png}
body:
  text: 唐廣成先生杜光庭述民之饑章第七十五疏前章眀有為則輕死必犯司殺之諫此章明厚斂則人貧是生有為之弊初三段迭明所以為弊夫唯下結歎令其貴生義曰致理者何道德為本任道則無為澄靜用德則有裕和寧素一臺而不為惜十家而屬念以儉以約俗人阜豐奈何聚斂無厭誅求莫己男力耕而腹歉女勤織而身寒若彼有為使其輕死一至於此夫何痛哉惟能不厚其生各全其分天和不喪是曰貴生示以柔弱堅强俾體之而修勵爾民之饑以其上食稅之多是以饑注天下之所以饑乏不足以其君上食用賦稅之太多故爾疏夫人國之本也若政煩賦重而人貧乏則國本斯弊弊則危矣是以下人不足由君上食用賦稅之太多是以令其饑乏爾義曰立法垂憲古有明文食也充君之庖稅也輸國之賦什一之稅務在其輕賦重則人貧賦輕則人足人足則國泰人貧則國危理在酌中法無太酷所以鑄刑書而物怨作兵賦而邦貧齊侯以重斂致亡田氏以厚施威霸皎然在目居之鑒焉民之難治以其上之有為是以難治注天下之人所以難化者以其君上之有為有為則多雜多雜則詐興是以難理疏蠢爾蒼生資君以理為理之本諒在無為故我無為而人自化今人所以難理者由君上之有為有為則政煩而人擾動生大僞是以難理義曰君之理人本乎清靜不作無益之事不興無用之功不矜威武之能不尚淫奢之巧無為自化恬淡居先則詐僞不生禍亂不作法作而人去之殷人作誓而民始叛周人作盟而人始疑今其外施威武有挽運之勞內事淫奢有誅求之苦上有玉食繁華之猒下有糟糠不足之悲綱密令苛求理難矣人之輕死以其求生之厚是以輕死注天下之人所以輕死者以其違分求生太厚之故是以輕死疏人之所以輕入死地喪其生者皆以其違分求生養生太厚不顧刑網以徇所求是以輕死義曰皇天育人生有定分降年有永有不求必在養之得所任以自然但虛心則道臻窒欲則心守泰定然後發乎天光則不求其永自延永矣若厚於奉養力以求生或餌金石以毒其中或因鼓怒而傷其氣但營難得之貨或求過分之能本欲希生反之於死是生生之厚也所以栖鳥於火林之上未念其寒養魚於沸鼎之中本哀其冷養之失理及以傷生世愚之情斯可哀矣聖人欲去其厚而適其分則道可得矣夫唯無以生為者是賢於貴生注自然之分足則生全若過養其分分過則生亡故夫唯無以厚其生為者是賢於矜貴其生也疏夫生也有涯安分則足貺不可違亦不可加若營生於至富之外則惑矣故不厚其生而生全求厚其生而生喪故知夫無以生為憂者是賢勝於矜貴其生之人義曰禀生有分賦命有常守其分則可以永全失其常必之死地是以聖人垂戒不欲厚以求生賢士知微自可任於天授此所以戒人君違分則國傷人弊守文則物泰時康順道循常斯為當矣可謂賢於貴生明於用道也民之生章第七十六疏前章明厚斂則人貧是生有為之弊此章明有為則心欲故喪和氣之柔初標生死之二徒次舉草木之兩喻結以强大處下戒令必守和柔義曰前以賢於貴生不為過分之養此乃資於用弱可以保其和柔明堅强不可以執持謙下所宜於從事兵强必為國害木槁由其氣衰勸守沖和戒為强大示以張弓之喻欲明舉下抑高此其㫖也人之生也柔弱其死也堅强疏人之生也和氣流行百骸以之柔弱人之死也和氣流散四支以之堅强言此者示柔弱堅强為生死之戒義曰人禀沖氣百骸以之和柔百神衛於百關六氣行於六府所貴者存神養氣體道懷柔著生品於南宫削死名於北府延生久視其在兹乎如其神魄潜飛沖和稍散遽同草木委化泥沙失彼至柔斯為痛矣萬物草木生也柔脆其死也枯槁疏此舉喻也萬物草木氣聚而生故枝葉敷榮而柔脆氣竭而死則條幹變衰而枯槁前明有識此舉無情無情者以氣聚散為榮枯有識者以道存亡為生死義曰萬物與人同資於道道以運氣氣以致和雖有識無情肖形各異生之與死禀受不殊而道在則能生道去則為死故經冬之草覆之可以延期夭脆之年修之何妨降永所要服勤於鍊餌豈宜甘委於幽泉違道强梁可為之戒故堅强者死之徒柔弱者生之徒注生之柔弱和氣全也死之堅强和氣散也欲明守柔弱者全生保年為强梁者亡身失性疏此結前義也言草木生則柔脆死則堅强知人為堅强之行者是入死之徒為柔弱之行者是出生之類義曰聖人念彼强梁重為戒訓舉草木生死之喻為人倫强弱之規强梁為入死之階所宜授革柔弱為出生之要必務堅持無曠精修自投死地是以兵强則不勝注見哀者勝故知恃强者必敗疏此下轉結前義也用兵有言以慈為主故云恃强則敗欲明人恃强則死矣義曰夫興師問罪薄伐禦戎先之以三令五申教之以六韜金版貺定前偏後伍仍資地利人和蓋不獲已而行豈欲矜於剿戮符堅百萬秦繆二崤匹馬不回隻輪莫返此兵强侮敵敗也宜乎木强則共注木本强大故處於下枝條柔弱共生於上蓋取其柔弱者在上强梁者在下也疏木本强大故處於下枝條柔弱共生於上蓋取其柔弱者在上强梁者在下也義曰木以本大居下固其宜然末大於本固非其稱諺曰尾大不掉國之所戒趙氏以之傾晋田氏以之易齊子之致疑於燕太叔見敗於鄭豈非末大於本臣强於君守理非順也合手曰拱昔桑縠生於殷朝七日大拱秦伯怒於蹇叔墓木拱矣皆木大合拱之謂也强大處下柔弱處上疏結上文木根本强大則枝葉共生其上之義欲明强梁之人常在柔弱之下矣義曰人以謙讓能制猛毅之夫枝惟纖柔遂居大本之上所宜克崇謙靜深戒剛强吞七國之羸秦竟亡匕鬯統千夫之盜跖終喪形軀然後止水瑩心清恬養性處不爭之地居自得之鄉翥景乘風斯可得矣天之道章第七十七疏前章明有為則心欲是喪和氣之柔此章明强梁必招損故舉天道之喻初一句標天以申戒次五句舉喻以明天又八句總合前義是以下舉聖德以結勸爾義曰共木垂喻以柔是而强非張弓之道蓋抑高而舉下是則有餘招損虧盈益謙終以慎靜為基不尚高强為勝續以攻堅之理益明顯戒之文天之道其猶張弓乎注天道玄遠非喻不明故舉張弓以彰其用疏此法喻雙舉也夫天道玄遠非喻不明故舉張弓以昭天德張弓之法其如下文義曰夫蒼旻在上廣覆原缺七宇虛無之氣指喻斯見可明高下之規蓋以人道乖真滅不足而為事天道惟正損有餘而表均所以舉下抑高類彼遏强撫弱不居不恃晦智韜賢法喻雙標此其㫖矣天道遠人道邇者子産語祀竈欲禳火之詞也且天道雖遠而曆象可觀將戒於人舉天道以為喻蓋欲世人遵仰上玄稽考天意禀而為戒理在必行爾高者抑之下者舉之有餘者損之不足者與之注張弓如此乃能命中是猶天道虧盈益謙欲令人君法天字人故示舉下抑高之道疏夫弓之為用當合材定體弛張調利高者抑之下者舉之者為架箭之時準的也有餘者損之不足者與之為發矢之時遠近也如此則能命中矣天道亦然日月寒暑一往一來來者損其有餘往者與其不足則成歲功矣人君者當法於天道抑强扶弱損有利無故舉虧盈益謙欲令稱物平施爾義曰天道玄微也而陰陽自運清濁皎分寒暑晦明靡差於晷度緯候躔次無爽於洪纖大則橐籥萬殊牢籠海嶽細則推遷黍纍通貫毫氂誠哉信哉不紊不忒其比喻也以天道惡盈滿張弓之抑高人道好謙和若張弓之舉下欲使人挫减高亢執守謙卑爾夫為弓者必品乎木性審以騂文合輕重之宜無偏邪之失然後貞金鏃矢神膠拂弦中則主皮射無虛發所謂舉下抑高為準也天道君德上下相應故當法天之用如弓之法焉人君所以振滯燭凶者抑高也如此則賞刑允當名器不愆幽興滅繼絶者舉下也曷强禁暴挫鋭摧下無偏黨之非上叶太平之化矣周禮弓人為弓聚幹角筋膠絲漆六材以其時六材既聚巧者和之相幹欲赤黑而陽聲射遠者用勢射深者用直相角欲青白而豐末凡角秋殺者厚春殺者薄稚牛之角直而澤老牛之角彌而碏三色貺具戴者為良則可以冬扸幹夏理筋春液角秋合絲膠漆寒定體則張之不流材美工巧為之以時謂之三均均三謂之九和上制六尺六寸中制六尺三寸下制六盡於是控引有往來之體遲速有安危之名故有危弓安矢安弓危矢焉荆幹燕角材之美也和弓垂矢古之寶也矢之法凡矢人為矢兵矢田矢二前三後三分其長而殺其一五分其長而羽其一水之以辨陰陽夾陰陽以設其比夾其比以設其羽三分其羽以設其刀夾而搖之視其豐殺之節撓之視其鴻殺之稱茀矢三分一前二後殺矢七分三前四後前弱則勉後弱則翔中弱則紆中强則揚羽豐則遲殺則躁笴欲生而搏材美工巧雖疾風亦不之憚矣弓矢之製選材俟時因工施巧乃能命中況於人乎虧盈益謙者易謙卦云天道虧盈而益謙謂减損盈滿增益謙退亦如日昃月虧是抑高舉下之義也又稱物平施亦謙卦之詞言物之先多者而得其施物之先者亦得其施多之與少皆得其益亦云多者用謙以裒之少者因謙以益之謙之施與皆不失平也天之道損有餘補不足人之道則不然損不足以奉有餘注天道平施裒多益寡人則違天翻損不足也疏此明人道不能同天損益注云裒多益寡者易謙卦之詞也義曰天道均平有餘必損不足必與人道反此滅不足而奉有餘所以富室飫其珍鮮貧者歉其藜藿則違於道矣裒多益寡者易謙卦之象地中有山謙君子裒多益寡裒聚也寡少也益與也多者得謙物更裒聚彌益其多寡者用謙物更進益是謂均平之道亦云裒取也减取多者益於寡者乃合舉下抑高虧盈益謙之義理國和民之要修身合道之規此其特也孰能以有餘奉天下惟有道者注誰能以己之有餘以奉天下之不足者乎獨有道者能也疏孰誰也老君疾時不能同天道下濟以恤於人光大其德故舉天道以勸云誰能同天之道損其有餘以賙奉不足者乎惟有道之君乃能然爾義曰恤賑救也損抑减也賙贍也天道下濟者易謙卦彖詞也世人所行反於天道减其不足奉彼有餘豈獨害人況乃違道誅斂無已凍餒莫哀老君涣發聖言愍其無告曰孰能滅己有餘恤人不足順天育物者惟有道之君乎是以聖人為而不恃注聖人法天稱物均施施平於物而不恃其功疏此引聖人以證上有道之義恃猶矜恃也聖人法天平施德被於物不見其功故云不恃義曰聖人圓通智慧因物為心猶天地之發生不言其德類陽和之煦嫗不恃其恩雖不恃不處而其道愈廣矣稱物平施已見上解也功成不處注推功於物不恃其成者賢能也疏聖人知功成而處天必損之故雖道洽寰區功濟天下歸美名於群材而不處其功績爾義曰舉聖人之德況有道之君皆以法道為順天平施澤及物而不恃功配天而不居道德巍巍與天並矣其不欲見賢注聖人所以推功不處者不欲令物見其賢能也疏此結釋不恃不處之意也其不欲見賢者聖人雖盛德內充而嘉聲外隱所以不恃為不處功者正欲隱德晦名不欲令物見其賢能爾此亦損有餘之意也義曰大聖之德冥合玄功而內照應微外混於物蓋恐德彰則慈愛立慈著則功用存將欲隱功行於已成潜德化於不宰符舉下抑高之㫖契正言若反之文也道德真經廣聖義卷之四十八
