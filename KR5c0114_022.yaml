front:
  text: 道德真經廣聖義卷之二十一羊十
  hash: sha256:523db90905b4f11b00273e6711581d1a24f46ecdccae0f4dfc1f7b5b611e03dd
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0114_HFL_022-001a, image: hfl/0443/0443-100.png}
body:
  text: 唐廣成先生杜光庭述有物混成章第二十五疏前章明自見自是於道為餘食贅行末云有道不處此章明大曰逝質道乃先天混成終令法道自然首標有物混成六句將明妙本之緣起物被其功次云吾不知下六句表強名之由緒名亦不可得故道下六句示知四大之生育申戒人君之法下至終篇教以法道自然無為清靜爾義曰在昔三氣未分一元未立形質猶隱恍惚莫窮混然首出者惟虛極之妙本爾泊乎孕神布化天地生焉萬物育焉生之成之故為化母然後定以名實顯其功用或大或逝或遠或返包三才而運氣首四大而居尊遞為憲章以施法度方復混融不宰默體自然宣大道沖用之功功成復歸於道本也有物混成者道之宗也先天地生者道之元也寂兮寥兮者道之質也獨立而不改者道之常也周行而不殆者道之用也可以為天下母者道之功也吾不知其名者道之無也字之曰道者道之有也強為之名曰大者道之體也大曰逝者道之微妙也逝曰遠者道之深玄也遠曰返者道之常存也道大天大地大王大者道之統三才也域中有四大而王居其一者此明王為最靈之首當用道也三才相法明王當法天行道契乎自然也故疏云申戒人君用道法天而當宗清靜也有物混成先天地生注將欲明道立名之由故云有物混然而成含孕一切尋其生化乃在天地之先也疏有物者有妙物也即虛極妙本也將欲申明強名所由不可即稱道故云有物爾言有此妙物混然而成含孕衆象尋其生化乃在乎天地之先故曰先天地生義曰道之起也無宗無祖無名無形沖而用之漸彰於有其初也示若無狀之狀無象之象無物之物無名之名天地未立陰陽未分清濁未判混沌圓通含衆象於內而未明藏萬化於中而未布不可以名詰不可以象言故云有物混成先天地生也九天經曰天地未有而先有道氣謂之玄元始三氣而生三清三清各生三氣合為九氣而成九天自此而分方有圓清方濁之别陽日陰月之異三才於是乎生焉萬類於是乎立焉衆經之中皆明此理斯則先天地生者大道也其五太之次具在第八卷中解之太上下知章矣寂兮寥兮獨立而不改周行而不殆疏寂寥者歎有物之體寂寥虛靜妙本湛然故獨立而不移改物感必應應用無心遍於羣有故周行而不危殆義曰寂寥者無之謂也無聲可聞無色可見無形可執無象可求無名可稱無法可擬故云寂兮寥兮也獨立者道一無侣也周行者道氣旁通也不殆者在高非高在大非大無窮無竭玄妙常存不危殆也殆危也可以為天下母注有物之體寂寥虛靜妙本湛然常寂故獨立而不改應用遍於羣有故周行而不危而萬物資以生成被其茂養之德故可為天下母疏妙本生化遍於羣有羣有之物無非匠成萬物被其茂養之德故可以為天下母爾母以茂養為義也義曰於至無之中而妙氣旁通生育萬物萬物非道無以生成以其生物故為天下之母然道之生成於物有形有類皆從道生故不拘於天上天下今言天下者舉其大也而道之生化無所不生矣字林云茂養於物故謂之母吾不知其名字之曰道強為之名曰大注吾見有物生成隱無名氏故以通生表其德字之曰道以包含目其體強名之曰大也疏字者表其德名者定其體老君云妙本生化應用莫窮寂寥虛靜不可定其形狀先天地生難以言其族氏故云吾不知其名但見其大通萬物欲表其通生之德故字之曰道義曰夫名物者以其體字物者以其德物生而名立事之常也未有無名之物矣唯大道之用居乎物先物象未彰乾坤未闢而道在其先也運道之用施道之功而後有天地萬物也以此功深用廣無形無狀不可以氏族求不可以名字得老君取其通生萬物之美字之曰道道者通生之謂也道之為通也無所不通西升經云夫道也者包裹天地秋毫之細道亦居之莊子云道在稊稗道在衆物無不在也故有形有生者道皆居之失道則死矣疏見其包含無外將欲定其至無之體故強名曰大凡物先名而後字者以其字小而成大以道先字而後名是以從本而降迹焉義曰夫物有體則能包含於物故大能容小外能藏內者物之常也今道無體而能包含萬物者以其無體之體體大無邊也以其體大因體立名故名曰大大者無不包也無不容也有形無形皆在道體之內矣凡物先名而後字者禮男子生三日以桑弧一蓬矢六以射天地四方以示男子有事於四方也既三月妻以子見其夫入門升自阼階妻抱子出自升階父執之右手孩而名之撫其首焉二十而冠謂之成人冠適子於阼階以著代也醮於客位有成人之道也三加其冠始以緇布次以皮辨次以爵辨言益尊之冠而字之敬其名也女子十五而笄笄而字之故冠禮者禮之始也嘉事之重也此則先名而後字取其自小而成大也人倫之道始則有終故自小而成大自大而復終也春秋桓公六年九月丁卯子同生公問名於申繻大夫也對曰名有五有信有義有象有假有類以名生為信唐叔虞魯公子友是也以德命為義文王昌武王發是也以類命為象若孔子像尼丘山是也取於物為假如伯魚生有人饋魚因名曰鯉是也取於父為類若子同生與父同日生是也不以國以國則廢名不以官以官則廢職不以山川以山川則廢主不以畜牲以畜牲則廢祀不以器弊以器弊則廢禮不以隱疾故名終將諱之故晉以僖侯廢司徒宋以武功廢司空先君獻武廢二山具教二山也是以大物不可以命公曰是其生也與吾同物命之曰同氏族者春秋隱公八年冬公子無駭卒公子羽父請諡與族公問族於衆仲對曰天子建德因生以賜姓胙之以土而命之氏諸侯以其王父字或以諡因以為族官有世功則有官族謂取舊官舊邑為族也邑亦如之公命以字為展氏無駭即公子展之孫也夫道也先字而後名言道無所始亦無所終示用降迹故字曰道妙體廣遠故名曰大無始無終也而此名此字其強立焉大道之妙名言路絶也大曰逝逝曰遠遠曰返注妙用無方強名不得故自大而求之則逝而往矣自往而求之遠不及矣若能了悟則返在於身心而證之也疏夫滯於一方者非天下之至通也故天職生覆而不能形載地職形載而不能生覆唯妙本之用用無定方雖強名曰大而復不繼於大義曰天下之至通者道也滯於一方者天地也夫天地日月春夏秋冬皆天之所運也天運氣廣大焉生物周普焉能覆而不能載能清而不能濁能上而不能下也地布氣周遍焉載物廣厚焉能載而不能覆能濁而不能清能下而不能上日主晝而不能於夜月主夜而不能於晝春職於生而無長養收藏之功夏職於長而無收藏發生之力秋主於成而無生長閉藏之用冬主於藏而無生長肅殺之效風職於散而不能於潤雨主於潤而不能於散若此局於一方者衆矣唯大道能覆載照臨能生成長育能寒暑散潤能陰能陽能柔能剛能今能古能圓能方能清能濁能短能長無不可也無不能也故用無定方雖名曰大而不拘於大此可謂天下之至通乎疏自大而求之則逝而往矣自往而求之則遠不及矣自遠而求之則復返在人之身心矣故云遠曰返莊子曰大道於大不終於細不遺義曰求之於大則彌大矣故曰逝而往也求之於逝則彌遠矣故曰遠不及也求之於遠不離乎身故曰返也人之起居運動上下屈伸不離於道道豈遠乎於大不終者莊子天道篇老君謂士成綺曰夫道也於大不終於細不遺故物備矣廣乎其無不容也淵乎其不可測也形德仁義神之末也非至仁其孰能定之此言天地形之大者也秋毫形之小者也物之至大道復大之其大無極故不終也物之至細道之在焉故不遺也道無不在何足以測之哉匪一方之可拘豈四者能詰矣故道大天大地大王亦大注因其所大而明之得一者天地王天大能覆地大能載王大能法地則天行道故云亦大疏因強名曰大所以次大者故天能顛玄在上垂覆萬物地能凝靜於下厚載萬物王能清靜無為而化萬姓此三大也者吾道一以貫之義曰天之清也積氣於上體乎純陽運動不息剛健而文明故次於道也地之濁也積形於下體乎純陰寂然不動柔順而安貞故次於天王之正也總二氣之柄居萬靈之首順陰陽之序法天地之宜仰觀俯察順考古道清以則天靜以應地故清靜其化無為其心而齊於三大也此三大皆局於一方之德無圓通沖用之能故我妙道通貫三大而為之主矣一以貫之者論語仲尼謂曾參曰參乎吾道一以貫之顛頂也玄遠也域中有四大而王居其一注王者人靈之主萬物繫其興亡將欲申其鑒戒故云而王居其一欲以警王令有所法謂下文也疏域者限域也今云域中之大道不只在域中若云約所見而言則天地自為限域亦不在域中矣夫遺語以存玄理亦不必曲生異義申文以防疑難衆説皆未盡通義曰夫限域之域理自多途大約有四其一生化之域二氣之內陰陽所陶之所也其二妙有之域在二氣之外妙無之間也其三妙無之域居妙有之外絪緼始凝將化於有也其四妙無之外謂之道域非有非無不窮不極也此域中者言道之所化自無生有分别二氣而天地生焉天地之中而萬兆形列而君王統焉亦如道大而有天地有天地後有王也則四大之名遞相統攝自無入有自有歸無終始包含也況下文云人法地地法天天法道此既遞相法象則四大互相統攝矣疏今明域者名也名為體域物無名外之體故曰域中若舉道名則道在其中矣舉天名則天無遺體矣故云域中即有名之中有此四大云而王居一者王為人靈之首有道即萬物被其德無道則天地蒙其害故特標而王居其一欲令法道自然義曰聖旨以名為體域者則包統衆義復為妙焉此亦以道為名體外包天地天地之中以王為首其義同也夫王者有道則日月如合璧五星如連珠甘露降醴泉出河不滿溢海不揚波景星見卿雲生神龍遊於沼麟鳳來其庭四氣調和而為玉燭萬物遂性而洽太平也人君無道則天返時為災地返物為妖人返德為亂沴氣咎徵時見於上物妖形怪或出於下星亡日鬥冬雷夏霜天裂石霣川竭山崩事興於人而氣感於天是天地蒙其害也王之為大繫天地之安危豈可不抱自然而法天任無為而體道耶人法地地法天天法道道法自然注人謂王也為王者先當法地安靜既爾又當法天運用生成既生成已又當法道清靜無為令物自化人君能爾者即合道法自然之性也疏人謂王者也所以謂人者謂人能法天地生成法道清靜則天下歸往是以為王若不然則物無所歸往故稱人以戒爾為王者當法地安靜因其安靜又當法天生化功被物矣又當法道清靜無為忘功於物令物自化人君能爾則合道法自然義曰道職生成天職包覆地職厚載而乾坤之象著品物之形列王居其間行道之化順天之時法地之宜民則安靜而自理生化而有常清靜而無擾合大道自然之理也疏言道之為法自然非復倣法自然也若如惑者之難以道法倣於自然則是域中有五大非四大也又引西升經云虛無生自然自然生道則以道為虛無之孫自然之子妄生先後之義以定尊卑之目塞源拔本倒置何深義曰疑惑之人不達經理乃謂大道倣法自然若有自然居於道之上則是域中兼自然有五大也又以道為自然之子無為之孫皆為妄見故具下文以解之塞源拔本者春秋昭公九年晉梁丙張躍率陰戎伐潁以周甘人與晉閻嘉爭閻田故也周景王使大夫詹桓伯辭於晉曰我自夏以后稷魏駘芮岐畢吾西土也巴濮楚鄧吾南土也及武王克啇蒲姑啇奄吾東土也肅慎燕亳吾北土也吾何邇封之有文武成康之建母弟以藩屏周亦其廢墜是為豈如辨髦因而以敝之先王居檮杌于四裔以禦魑魅故允姓之姦居于瓜州伯父惠公歸自秦而誘之以來使逼我諸姬入我郊甸則戎焉取之戎有中國誰之咎也后稷封殖天下今戎制之不亦難乎伯父圖之我在伯父猶衣服之有冠冕水木之有本源民人之有謀主也伯父若裂冠毁冕拔本塞源專棄謀主雖戎狄其何有余一人叔向謂宣子曰文之霸也豈能改物翼戴天子而加之以恭自文以來世有衰德而暴蔑宗周以宣示其侈諸侯之二不亦宜乎且王辭直子其圖之宣子説王有姻喪使趙成如周弔且致閻田與襚反潁俘王亦使賔滑執甘大夫襄以説於晉晉人禮而歸之也疏且嘗試論之曰虛無者妙本之體體非有物故云虛無自然者妙本之性性非造作故曰自然道者妙本之功用所謂強名無非通生故謂之道約體用名即謂之虛無自然道爾所以即一妙本復何相倣法乎則知惑者之難不詣乎玄鍵矣義曰鍵關鍵也此明大道以虛無為體自然為性道為妙用散而言之即一為三合而言之混三為一通謂之虛無自然大道歸一體耳非是相生相法之理互有先後優劣之殊也非自然無以明道之性非虛無無以眀道之體非通生無以明道之用熟詳兹妙可謂詣於深玄之關鍵也道德真經廣聖義卷之二十一
