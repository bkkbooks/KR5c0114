front:
  text: 道德真經廣聖義卷之三十景六
  hash: sha256:7f282843452fd78b019fcb3f6789583dca992a193fdc3faa8bf72646c634da13
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0114_HFL_031-001a, image: hfl/0445/0445-004.png}
body:
  text: 唐廣成先生杜光庭述疏老子德經義曰老子者太上老君之內號具如上卷所解德者道之用也道不立則德無以生德不崇則道無以明道以虛通為義德以尅獲受名道能通物物能得道物得其所得故謂之德或云道道也德德也如孔子解易卦云需須也晉晉也剝剝也嚴君平云不道之道不德之德正之元也道德相須不可散也古文道字從元從首謂為諸法之元衆聖之首也德字從直從心謂正觀直心為虛忘上德也其餘道德相關之義具在上卷然此經下卷法陰象地其數偶故四十四章也夫道以虛無無形法陽而象天德以證實有困故法陰而象地或有移上經末章居下卷之末以取上卷四九三十六章法陽下卷五九四十五章法陰此亦後人妄為其意穿鑿將恐乖失玄聖之本旨也上德不德章第三十八疏此章首標道用之名將明德全之化德全則淳朴不散代無濡沫之迹道廢則仁義遂行俗有澆漓之弊將欲變而更化以令求復其初故先述上德之無為次述仁義之流遁結以去華居實使其復朴還淳義曰道為德之體德為道之用故云首標道用之名指上德也上德乃不德之德所以德今上德既全則淳朴不散淳朴不散則德化混同如魚相忘於江湖各遂其性故無相詬相濡之迹也次言失德則仁義乃行仁有偏愛之私義有裁制之斷故民化其上而澆漓焉及至前識為華上禮為亂華亂益甚紛爭必興故聖人使復其初乃遣去華居實去華居實是塞亂之源而復朴之門也故云使其復朴還淳爾上德不德是以有德疏上者舉時也德者辨用也謂上古淳朴無為而理體道之主任物自然是上古之淳德故云上德至德潛運人無能名故云不德淳風和暢物遂生成德用常全故云有德注云物得以生之謂德者莊子雜篇之文義曰舉上古全德之君不以德為德而有德也將明其次下衰故舉上德為首夫至道之代德亦不彰矣上德之君亦猶上經太上之君也潛融至化物自生成不彰其德德益光大是以有德也然天地萬物之所稟受者道為之元德為之始道有深淺故有可道常道德有厚薄故有上德下德則道之與德不獨在於帝王但行道者為道人行德者為德人行有深淺故有上下之殊也莊子曰虛無無為開道萬物謂之道人清靜因應謂之德人德有優劣世有盛衰故上德之君神與化淪體道而存德動玄冥天下歸之莫見莫聞德歸萬物皆曰自然所以云太上貴德也莊子雜篇云萬物任自然而各得其生所以為德也故執道者德全德全者形全形全者神全神全者聖人之道也下德不失德是以無德注德者道之用也莊子曰物得以生謂之德時有醇醨故德有上下上古淳朴德用不彰無德可稱故云不德而淳德不散無為化清故云是以有德速德下衰功用稍著心雖體道迹涉有為執德可稱故云不失迹涉矜有比上為粗故云是以無德也疏此言淳風漸散德亦下衰故聖人美無為之風而百姓尚無為之迹尚迹為劣故云下德迹著則有德可稱故云不失稱德不失迹涉矜有矜有之弊淳朴不全故云是以無德義曰下德之君體德而行德既昭著上配於天下民知之或見或聞德及於物物歸其德可稱可顯故不失其德矣執而不失矜德有為有矜有執去道甚遠以有迹處比於上德之君是無德矣上德無為而無以為注知無為而無為者非至也無以無為而無為者至矣故上德之無為非徇無為之美但含孕淳朴適自無為故云而無以為此心迹俱無為也疏覆釋上德也夫上德潛運無為而理淳朴不散故無名迹今言上德之無為者但含孕淳朴適自無為非知無為之美而為此無為故云而無以為豈唯無迹可矜抑亦無心自化故注云此心迹俱無為也義曰上德之君性合乎道而命合乎一體自然為用運太和為神動合乎天靜合乎地與道相得而無所為也神無思志無慮者此心之無為也不顯其功而功若天地不彰其明而明並日月此迹之無為也夫此無為非效學無為而為於無為是無以為也陰陽為之使鬼神為之謀進退推移與化無極玄默寂寥而與化俱此謂心迹俱無為矣然德以包育於物亦所以彰其迹也下德為之而有以為注下德為之者謂心雖無以功用彰著迹涉於有為故云為之言下德無為有所以為之此心無為而迹有為也疏此覆釋下德也下德為之者謂心美無為之化而為此無為故云為之語心雖曰無為論迹即涉矜有故云而有以為言下德之為有所以為之也故注云心無為而迹有為也義曰下古德衰心迹明著其君知有為為非知無為為是有為則澆薄無為則淳和有此分别故韜心藏用行此無為之事制彼有為之為故云為之心欲於無為遊行無為於迹乃涉矜有也知無為為美有為為惡捨惡從善慕此無為以分别故是有所以而為也上仁為之而無以為注仁者兼愛之名下德衰而上仁見所以為兼愛之仁故云為之行仁而忘仁亦欲求無為故云而無以為此則心有為而迹無為也且上仁稱無為者據迹欲無為而方止義未可以語下德之有為也疏此下明道廢則仁義遂行言上仁者謂以仁為上他皆倣此仁者兼愛之名也大道之行物無私惠淳風漸散兼愛遂存今明所以為兼愛之仁故云上仁為之行仁而忘仁雖有施而不求報兼愛則難遍終是小惠未孚是以語心常為有事故云為之論迹則近無為故云而無以為注云此則心有為迹無為也義曰兼愛萬物薄施無極謂之仁也素書曰仁者人之所親有慈惠惻隱之心以遂其生成是也仁者博施於物乃所以生偏私也比夫德則劣矣夫至道之代兼包諸行無所偏名故冥寂玄寥通生而不宰者道也物稟其化各得其得者德也成之熟之養之育之者仁也飛行動植各遂其宜者義也有情無情各賦其性者智也時生而生時息而息者信也順天地之節固四時之制禮也鼓天地之和以悅萬物者樂也故恬淡無為無所不為矣及大道既隱而德化行焉至德之化亦兼之以大仁大義大禮大智大樂大信而共化焉泊乎德之廢也仁獨為仁義獨為義不能兼而化矣夫何故哉行仁者以慈愛為心故無剛斷之用是則義缺矣行義者以決斷裁非有取有捨是則仁缺矣所以仁獨為仁義獨為義故不能兼化也然上仁者雖有兼愛偏私之迹能於仁忘仁則忘其迹其迹雖無心有博施之念周旋憫物皆欲其安故心涉有為也上仁忘迹故迹無為也小惠未孚者春秋莊公十年魯人曹劌對魯公之語也是歲正月公敗齊師于長勺將戰曹劌請見其鄉人曰肉食者謀之又何聞焉劌曰肉食者鄙未能遠謀乃入見問何以戰公曰衣食所安弗敢專也必以分人對曰小惠未遍民弗從也公曰犧牲玉帛弗敢加也必以信對曰小信未孚神弗福也公曰小大之獄雖不能察必以情對曰忠之屬也可以一戰戰則請從公與之乘戰于長勺公將鼓之劌曰未可齊人三鼓劌曰可矣齊師敗績公將馳之劌曰未可下視其轍登軾而望之曰可矣遂逐齊師即剋公問其故對曰夫戰勇氣也一鼓作氣再而衰三而竭彼竭我盈故尅之夫大國難測懼有伏焉吾視其轍亂望其旗靡故逐之此言小惠未遍小信未孚故皆不廣况兼愛之人必不周普雖力於行仁其去道德也遠矣上義為之而有以為注義者裁非之義故云為之有以裁非斷割令得其宜故云而有以為此則心迹俱有為也疏義者宜也謂裁非斷割令物得宜夫淳朴已殘是非斯起將欲裁非就是令得所宜故云上義為之謂心欲裁非就是有所以為之故而有以為注云此則心迹俱有為也義曰理名正實處事之宜謂之義也素書曰義者人之所宜賞善罰惡以立功立事淳朴之代則無是非是非生而淳朴散矣辨是與非裁制斷割者義也故知其是而明之知其非而制之明是制非則心迹俱有為也然義者所以立節行亦所以成華偽也理國理身偏執仁義而無道德何異乎鑽冰求火北轅適楚乎上禮為之而莫之應則攘臂而仍之注六紀不和則為禮以救故云為之禮尚往來不來非禮行禮於彼而彼不應則攘臂而怒以相仍引疏禮履也謂可履而行也莊子曰以禮為翼所以行於世也夫制禮者所以救衰弊也故禮經三百威儀三千曲為之防事為之制淳源一失衆務事馳且存檢外之迹非曰由中之數故揖讓崇其禮文玉帛昭其報施往而不來非禮來而不往亦非禮今上禮為之而莫之應則攘臂而怒以相仍之故云攘臂而仍之義曰謙退辭讓敬以守和謂之禮素書曰禮者人之所履夙興夜寐以成人倫之緒禮以成謹敬亦所以生惰慢也夫摘辟為禮澶漫為樂而天下始分矣徒得形表而不由中也威儀者言其恭肅矜莊有威可畏謂之威進退俯仰有儀可法謂之儀詩曰威儀棣棣不可選也又曰朋友攸攝攝以威儀是也禮經三百威儀三千皆進退恭敬屈伸俯仰之容舉其大數爾禮之大者婚冠喪祭邦國之本動靜容止孰非禮哉禮者敬之體也如首之在上足之在下尊卑自列不乘天理故君臣父子猶一體也上下相忘道之實也後之為禮者外備容儀內懷欺侮忠信不足則更相誅責玉帛以表其志揖讓以飾其情施而不報往而不來則怨怒起爭因以為亂故攘臂仍引曷若大禮與天地同節之美哉以禮為翼者莊子大宗師篇曰古之真人也其狀義而不朋若不足而不承以刑為體以禮為翼以刑為體者綽乎其殺也以禮為翼者所以行於世也道德既失仁義公行仁失則兼愛之迹乖義失則是非之儀亂君子犯禮小人犯刑聖人觀事觀時以行禮法夷狄知逆命之誅臣子識尊嚴之敬因人情而設教斯之謂歟報施者樂記曰樂者施也禮者報也樂以彰德禮以報情往來之謂也曲為之防者防記曰子言之君子之道辟則防與防民所不足者也大為之防民猶踰之故君子禮以防德刑以防淫命以防欲子曰小人貧斯約富斯驕約斯盜驕斯亂禮者因人之情而為之節文以為民防者也故聖人之制富貴也使民富不至以驕貧不至於約貴不慊於上故亂益亡故制國不過千乘都城不過百雉家富不過百乘以此防民諸侯猶有叛者子云夫禮者所以章疑别微以為民防者也故貴賤有等衣服有别朝廷有位則民有所讓天無二日土無二王家無二主尊無二上示民有君臣之别也君不與同姓同車與異姓同車示民不嫌也以此防民民稱得同姓以弒其君子云利祿先死者而後生者則民不偕先亡者而後存者則民可以託以此防民民猶偕死而號無告子云修宗廟敬祀事教民追孝以此防民民猶忘其親殷人吊於壙周人吊於家示民不借子云死民之卒事也吾從周以此防民諸侯猶薨有不葬者升自客階受吊於賔位教民追孝也未沒喪不稱君示民不爭也以此防民子猶有弒其父者喪父三年喪君三年示民不疑也故天子四海之內無客禮莫敢為主焉父母在不敢有其身餽獻不及車馬示民不敢專也以此防民民猶忘其親而二其君子云先財而後禮則民利無辭而行情則民爭以此防民民猶有貴祿而賤行君子仕則不稼田則不漁食時不力珍大夫不坐羊士不坐犬以此防民民猶忘義而爭利以亡其身禮者防民之淫章民之别使民無嫌以為民紀故男女無媒不交無幣不相見恐其無别也以此防民民猶有自獻其身子云娶妻不娶同姓以厚别也故買妾不知其姓則卜之以此防民春秋猶去其夫人之姓曰吳其死曰孟子卒昭公娶太伯之後同姓也禮非祭男女不交爵以此防民陽侯猶殺繆侯而竊其夫人故大饗廢夫人之禮子云寡婦之子不有見焉則弗友也君子以避遠胡朋友之交主人不在不有大故不入其門以此防民民猶以色厚於德故君子遠色以為民紀男女授受不親男女不自席而坐寡婦不夜哭婦人疾不問其所疾以此防民淫泆猶有亂於族者子云婚禮娶親迎於舅姑舅姑承子以授娶恐事之違也以此防民婦猶有不至者斯皆嚴斯禁尚不能止况不禁乎此所以明道德既喪仁義又隳世亂而存禮禮極而為亂去無為之化日以遠矣理世之君豈可背道德而專於禮哉故失道而後德失德而後仁失仁而後義失義而後禮注失道者失上德也上德合道故云失道夫道德仁義者時俗夷險之名也故道衰而德見德失而仁存仁亡而義立義喪而禮救斯皆適時之用爾故論禮於淳朴之代非狂則悖忘禮於澆漓之日非愚則誣若能解而更張者當退禮而行義退義而行仁退仁而行德忘德而合道人返淳朴則上德之無為矣疏此却明智弊之由也失道者失上德也上德合道故云失道爾上經云大道廢有仁義莊子云道隱於小成道無不在而此亡大者約人而言爾故時淳則大道公行俗澆則小成遂作小成作而大道隱仁義行而至德衰此則代俗淳醨之殊聖人適時之務爾故淳朴漸散則失道而後德德又衰則失德而後仁兼愛迹存則失仁而後義裁非不足則失義而後禮且論禮於淳朴之代非狂則悖忘禮於澆漓之日非愚則誣是故聖人救代之心未嘗有異而夷險之迹不得一爾義曰五者之失隨代澆淳而然也大朴既散全德守之德既下衰仁愛繼之仁愛不足義以制之義之不行禮以救之夫禮以救亂亦所以生亂何者禮煩則俗薄俗薄則交爭交爭則亂生矣然而理國之急禮為之上春秋昭公二十六年晏子對齊景公曰禮之為國與天地並君令臣恭父慈子孝兄愛弟敬夫和妻柔姑慈婦聽禮也君令而不違臣恭而不二父慈而教子孝而針兄愛而友弟敬而順夫和而義妻柔而正姑慈而從婦聽而婉謂之善物也公曰善哉寡人而今而後聞此禮之上也對曰先王所稟於天地以為其民也是以先王上也則理世之道禮為急矣道德既喪禮復不行其異類乎道德仁義日以喪矣禮所以救亂理民可不矜乎故君子撙節以明禮斯之謂也非從天降非從地出酌在人情而已矣天禮者忠信之薄而亂之首注制禮為忠信衰薄而以禮為救亂之首爾用禮者在安上理民豈玉帛云乎哉疏夫者發語之端也言末代聖人所以行於禮教者由救忠信之衰薄爾若使人懷忠信復奚假於禮法乎而亂之首者以禮防亂則但可為理亂之首爾而非道德之化也義曰亂者理也如周有亂臣乃理國之臣也忠信既薄上下離心聖人設禮以教之約法以檢之明尊卑上下以勸之著降殺等倫以節之雖忠衰信薄人不敢為亂者由行禮以理之矣四者既失而不以禮節之則民無所措其手足矣上文所謂曲為之防民猶或踰之斯禮所以救亂致理之大務也禮經曰安上理民莫善於禮移風易俗莫善於樂故王者功成作樂理定制禮各因時而垂教歷代以沿革不可執古之道守常不移矣子曰達於禮樂者民之父母也能達禮樂之原以致五至而行三無志氣塞乎天地禮樂通乎神明所以樂云樂云鍾鼓云乎哉禮云禮云玉帛云乎哉斯可以施及四海以畜萬邦故禮之救亂致理先王之所以急也若反淳朴敦太和復道德然後禮可廢矣前識者道之華而愚之始注識者人性之識也謂在人性識之前而制此檢外之禮雖欲應時實喪淳朴故云道之華禮以救亂所貴和同而失禮意者則將矜其玉帛貴其拜跪如此之人故為愚昧之始疏前識者制禮之人也謂之前識者言在人識性之前制此檢外之禮道順人性禮存外迹以之此道乖失質素所以為道之華也而愚之始者夫禮以靜亂因亂救之貴在協和歸於淳朴而代之行禮者不務由中之性唯務形外之飾敬愛不足幣帛有餘非達觀所存誠為愚之首故云而愚之始也義曰制禮之意所以救弊也夫何故哉道德既喪仁義復衰不制之以禮則姦亂生矣故制禮以救其弊焉於人識性之間制禮以節之進退動靜未始不拘於禮矣謂聖人達知其事預為之防也故云在識性之前謂之前識道以敦素禮徇容儀澆淳想懸故為道之華矣華者不實之謂也失禮生弊弊極則亂救弊而亂息故云靜亂也禮得其所謂之協和矯貌飾容內無其實則為愚之首也夫因親以教愛因嚴以教敬愛所以事親敬所以事君愛敬不由於心玉帛以表其外非愚而何禮之作也敘尊卑明上下别同異正人倫使君臣父子不失其序今之為禮者中外相違華盛而實毁末隆而本衰禮薄於忠權輕於信威不及義德不逮仁為理之末為亂之首詐偽所起忿爭所因也有其禮無其心動不由中者其救弊也不足於致亂也有餘何者禮之繁也則進退盤躃一成規一成矩從容逶迤一如龍一如虎其諫人也如子其導人也如父習之變也以質為鄙以文為高賈以風聲擅其虛飾作巧以誇競尚華以檢束此謂禮煩則亂智變則詐所以丹朱非咸池所化啇均非九成所變是禮樂雖設不克救之矣故俗之亂也禮何為哉詠歌雅頌而風不能移也鍾鼓絲簧而俗不能變也謙退辭讓而天下不之信也守柔復雌而天下不之親也懸爵設賞而賢人不至也攘臂執手而君子不來也貌謹辭豐而心誠不施者徒有禮容無益於救世矣是知感天地動鬼神盡敬於心推心於道明德惟馨神饗之矣潢汙行潦之水蘋繁藴藻之菜筐筥錡釜之器可羞於王公可薦於神明斯由中之禮也苟不及此所謂愚之始矣是以大丈夫處其厚不處其薄居其實不居其華注有為者道之薄禮義者德之華故聖人處無為之事其厚也不處其薄矣退禮義之行其華也自居其實也疏大丈夫者有道之君子即前上德之君也道德無為謂之厚實禮義有為謂之薄華言聖人先道德之化故云處厚處實後禮義之教故云不居華薄義曰有道之君體真之士志趣廣大道德弘深之謂也大者言道德之大丈夫者數極於十人之長大極十之數十尺為丈故云丈夫舉其全與大也所以老君十號亦號大丈夫大聖師是也夫抱道之君行上德之化無為無事惟精惟微以道教人人宗於道居其實也以德育物物宗於德處其厚也不以前識之華弊薄之禮而化於人故云不居其華薄矣通玄真經曰大丈夫恬然無惠淡然無慮行乎無路遊乎無怠出乎無門入乎無房屬其精神偃其知見漠然無為而無不為也故去彼取此注去彼華薄取此厚實疏彼謂禮義也此謂道德也聖人去禮義之浮華取道德之厚實故云去彼取此推論聖人百慮同歸二際俱泯豈有彼此而去取耶設教引凡託言之爾義曰此自大丈夫已下謂欲令行化之君尊道尚德復朴還淳去禮義之末迹變浮薄之華態使處於道德之厚不處禮義之薄居淳朴之實不居玉帛之華驅有識於玄同躋含靈於道域而言去彼禮義取此道德也所謂設教垂戒非聖人實有去取之分别矣若人君能捨禮而行義去義而行仁除仁而尚德違德而適道去末之華薄歸本之實華以兹為化豈不至哉道德真經廣聖義卷之三十
