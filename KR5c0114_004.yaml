front:
  text: 道德眞經廣聖義卷之四羔四
  hash: sha256:5fda371eeae7f0c4c4d5291209ae0fe12b78f89b533fa2132a986afe6a26cc45
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0114_HFL_004-001a, image: hfl/0440/0440-146.png}
body:
  text: 唐廣成先生杜光庭述釋御疏序下䟽理身則少私寡欲以虚心實腹爲務義曰少私寡欲虚心實腹者上經第十九章云見素抱朴少私寡欲上經第三章云虚其心實其腹也及上所引經文並解在正經中向下當辯務者總事之名也君子有常務論語云君子務本是也䟽此其要㫖可得而言也義曰要謂機要㫖謂指歸此經乃理身之指歸理國之機要可以言述固得而言也疏及乎窮理盡性閉縁息想義曰易云窮理盡性以至於命窮者窮極萬物深妙之理究盡生靈所禀之性物理既窮生性又盡以至於一也又解云窮理者極其玄理盡性者究其眞性玄理眞性考幽洞深可以神鑒不可以言詮也閉縁息想者隨境生欲謂之縁因心繫念謂之想於此門中分爲四别一曰意隨善境而生善欲謂之善縁二曰意隨惡境而生惡欲謂之惡縁三曰心繫善念而生善想四曰心繫惡念而生惡想雖同因境所起分爲善惡夫初修道者既閉惡縁又息惡想以降其心心澄氣定想念眞正稍入道分善縁善想亦復忘之窮達妙理了盡眞性想縁俱忘乃可得道故云窮理盡性閉縁息想也䟽處實行權義曰處者居也實者眞諦玄微所謂妙本之道也大乘之趣也權者因事制宜隨俗立教謂中乘之道以誘開悟亦猶理國理身之㫖先資權教後入大道實教者上經第三十五章云執大象天下往又云吾將鎮之以無名之樸又云自古及今其名不去是也權教者上經第三十六章云將欲歙之必固張之將欲廢之必固興之是也疏坐忘遺照義曰坐忘者隳肢體黜聰明遺形去智以至乎大通謂之坐忘至道深微不可以言宣止可以心照既因照得悟其照亦忘故曰坐忘遺照此皆大乘之道也䟽損之又損玄之又玄殆不可得而言傳者也義曰爲道之人遺麤達妙損之又損漸入玄微玄之又玄即階眞趣下經第四十八章云損之又損之以至於無爲上經首章云玄之又玄衆妙之門是也此乃得之於玄會契之於無爲非文字能詮非言句能述老君曰道若可獻則臣獻於君道若可傳則父傳於子斯固非可言傳也損者毁滅之謂也玄者深微之謂也疏其教圓義曰行有五教分爲五别一曰挫鋭解紛和光同塵初教也二曰見素抱朴虚心實腹漸教也三曰外其身而身存後其身而身先半教也四曰損之又損之以至於無爲無爲而無不爲則無不理滿教也五曰澹然常存用之不勤天地有終大道無變圓教也合此爲教五者俱備萬行總包故曰其教圓圓者圓通一切道無不在之謂也䟽其文約義曰約限也省也不出二篇包羅萬法不曰約乎䟽其㫖暢義曰暢通也吾言甚易知甚易行言有宗事有君不曰暢乎䟽其言邇義曰邇近也以身觀身以家觀家不出户知天下不窺牖見天道不曰邇乎疏故遊其廊廡者自以爲昇堂睹奥義曰廊步廊也廡堂下也奥内也西南隅謂之奥言世儒之士習道之人始睹此經自謂窮理盡性以極玄微耳疏及其研精覃思然後知其於秋毫之端萬分未得其一也義曰沉研鑽極考情運思探道之奥極道之源箋註詮疏以求聖人之㫖所得之理逾少聖人之意逾深郭象曰秋毫之端細矣又未得其萬分之一也秋毫者兔秋所生之毛也端者末也䟽經曰有物混成先天地生吾不知其名字之曰道强爲之名曰大義曰此引上經第二十五章以證妙道之名也有物者無中之有恍惚之物也混成者天地未分謂之混沌天包於地混混無端天地浮載於水中積聚於氣内謂曰混元以其道氣化生分布形兆乃爲天地而道氣在天地之前天地生道氣之後故云有物混成先天地生也莊子曰大道者未有天地自古以固存吾者老君自稱也混成之狀怳惚之象先天先地混然獨立名號未彰言語路絶所以老君强爲立字字之曰道强爲立名名之曰大其道廣博包裹天地貫穿萬物故名大道也疏故知大道者虚極妙本之强名語其通生也義曰夫道有情有信無爲無形可傳而不可授可得而不可見在太極之表而不爲高在六極之下而不爲深故謂爲虚極之妙本也以其生天生地神鬼神帝故言其通生也道者通也虚者至無也極者至高也妙者至玄也本者化源也䟽莊子曰太初有無無有無名者未立强名也故經曰無名天地之始義曰莊子姓莊名周宋國蒙邑人也當趙文王齊宣王梁惠王時師長桑公子受其微言隱於抱犢山服大丹昇天署位爲太極韋編郎入侍帝晨嵇康云又師涓子居世時爲漆園吏著書三十三篇皆言大道放曠無爲之理大唐天寳四載四月封爲南華眞人所著書爲南華眞經此則引第十二天地篇也太初者未見氣也有無無有無名者無有故無名號也此名未立强名之道以前大道無名强而名之謂之道强名之初天地之始也疏强名通生曰道故經曰有名萬物之母義曰道通也通以一氣生化萬物以生物故故謂萬物之母母茂養之稱也經云者指此經首章之詞也引此首章以證大道之名爾䟽莊子又曰物得以生謂之德義曰莊子天地篇之文也虚無不能生物明物得虚無微妙之氣而能自生是自得也任其自得故謂之德也䟽德得也言天地萬變旁通品物皆資妙本而以生成得生爲德義曰德者人之所得是也夫三才萬物資道妙用各得生成無不遂性故謂之德旁通者周遍之謂也品物者衆物也資者取也用也妙本者道也疏故經曰道生之德畜之義曰此下經第十四章文也引此正文重明道德生畜之義用合莊子物得以生之理此明有以無爲本無以有爲用道德相須爲上下二經之目也疏則知道者德之體德者道之用也義曰眞實凝然之謂體應變隨機之謂用杳冥之道變化生成不見其迹故謂之體也言妙體也莊子曰其來無迹其去無涯無門無旁四達之皇皇是也因此妙體展轉生死生化之物任乎自然有生可見而不爲主故謂之用此妙用也莊子曰昭昭生於冥冥有倫生於無形是也䟽而經分上下也義曰冥冥之道上也昭昭之德下也大聖說經本無道上德下之别而詮釋之家强爲箋解言道非德無以顯德非道無以明道無爲無形故居化物之先德有用有爲故在生化之後道居先故處於上德居後故處於下由是分上下二經亦猶天清而居上地濁而處下爾疏先明道而德次之義曰妙無生妙有由精以至麤次者亞也先後之謂也疏然體用之名可散也義曰精麤先後可兩言之體精而爲本樸也用麤而爲末器也故言散爾疏體用之實不可散也義曰同契乎無故不可散散者分别之謂也雖因用而有分别在生化終始倚伏相須詣理源實故不可散言萬形之殊含妙道也䟽故經曰同出而異名同謂之玄義曰妙體妙用生於妙無是同出也由精而麤是異名也混而爲一是同謂之玄也䟽語其出則分而爲二咨其同則混而爲一義曰分而爲二者體與用也混而爲一者歸妙本也莊子曰巍巍乎其終則復始也疏故曰可散而不可散也義曰體用雖異是何散也相資而彰不可散也疏則上經曰是謂玄德又曰孔德之容又曰德者同於德又曰常德不離義曰道經之中明此德者則明道資於德也疏下經曰失道而後德又曰反者道之動又曰道生一又曰大道甚夷義曰德經之中明此道者則明德宗於道也䟽是其體用互陳遞明精要義曰道資於德德宗於道是互陳也互者交也差也陳者布也互觀其理皆達精微斯所謂不可散也䟽不必定名於上下也義曰外分道德之殊而經有互陳之義不可以道經爲上德經爲下今異之者强而異之非玄理精要之㫖也䟽經者徑也義曰習道之蹊路登眞之徑門左丘明曰經者不刊之書也精要之道由徑而通疏又常也言通徑常行之道也義曰因經通道斯道常明故曰常也因凡悟仙自仙極果垂文永劫普度無窮太平長生皆由兹教故云通徑常行之道也疏每惟聖祖垂訓貽厥孫謀義曰每數也惟思也訓教也貽與也厥其也謀圖也數思者虔奉之義也虔奉聖祖老君垂教之㫖與及聖孫詩文王之什文王有聲篇云貽厥孫謀以燕翼子言武王能廣文王之聲大其成功而傳國於子孫言玄元聖祖垂此無爲清靜之訓以及我唐子孫與此帝圖傳弘道化也䟽聽理之餘伏勤講讀義曰天子垂拱南面以聽天下之政理亦政也聽政之暇講讀二經亦猶乙夜觀書之義爾臨文曰讀演義曰講既宣其文復講其義遂爲註疏焉伏勤者尋繹不輟之義也餘暇也疏今復一二詮疏義曰詮評也講暢眞義評考玄微一二敷陳蓋得其理國修身無爲清靜之㫖也疏其要妙者書不盡言義曰要精要也妙玄妙也精要玄妙非書可傳理絶於言議之間故云書不盡言矣易曰書不盡言言不盡意蓋無言之言窮理之理庶乎神洞幽賾了悟忘言此故非文字可詮評也疏粗舉大綱以禆助學者爾義曰粗不精也麤也略也禆益也助佐也綱紘繩也網之上下有紘繩以總之故張羅網者整其綱猶衣之舉領耳淮南子曰舉其綱萬目張斯乃總衆目之稱也舉其大綱衆目可見矣言此疏可以佐益講學之人開廣其聞見耳竊惟天章煥赫揭曰月以齊光聖藻精微與乾坤而並運深入自然之室宏開衆妙之門竦崑閬於詞峰濬滄瀛於義海滯邪者望風而懸解忘返者悟教而知歸眞祖闡至妙於前睿孫讚玄微於後二聖垂作萬古無倫而猶申裨助之言示謙冲之訓益明聖㫖矣疏凡六卷義曰凡者凡例之言汎舉之謂也春秋序曰發凡以言例也上下二經疏各三卷亦粗明一生三之意六者陰數也三者陽數也三以象乾合乾爲坤離之則爲陽合之則爲陰言此疏包天地乾坤之要窮陰陽變化之微故成六卷爾又凡者生上起下之名也
