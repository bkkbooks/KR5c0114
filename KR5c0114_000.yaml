body:
  text: 道德眞經廣聖義序羔一序曰珠韜玉札云太上老君降跡行教遠近有四其一歷劫禀形隨方演化即千二百號百八十名散在諸經可得徴驗矣其二此劫開皇之始運道之功孕育乾坤胞胎日月爲造化之本爲天地之根播氣分光生成品彙自五太之首逮殷周之前爲帝王師代代應見即鬱華録圖廣成尹壽因機表號是也三皇迭往五帝不歸雲紀龍師時遷數革鳥官火運川逝風移步驟不同澆淳漸變雖揖讓斯在而干戈屢興阪泉有翦戮之師丹浦有專征之旅智詐行而大樸隱仁愛顯而孝慈生玄默希夷日以寢薄陶唐以耄昏猒位虞舜以歷試登庸憂軫萬方服勤庶政老君號尹壽子居于河陽以道德眞經降授于舜經之㫖也道以無爲居先德以有稱爲次亦猶三皇之書言大道也五帝之書言常道也其下薄裁非之義節兼愛之仁損俯仰之禮挫銛巧之智斥用兵之暴抑譎詐之謀使人復朴還淳以無爲無事爲理舜雖力而行之竄凶舉相明目達聰敦睦九族平章百姓而恬和清靜之道莫能致也故禹湯之後天下爲家各親其親各子其子大道既隱玄化不流禮樂滋繁政刑大用矣其三老君以商陽甲之代降神寓胎武丁之年誕生於亳即今眞源縣九龍井太清宫是其地也或隱或顯潜化羣方當周昭王癸丑之年以此二經授關令尹喜傳於天下世得而聞焉其四將化流沙與尹喜期會於西蜀青羊之肆示現降生即昭王丁巳之年也此道德經自函關所授累代尊行哲后明君鴻儒碩學詮疏箋註六十餘家則有節解上下老君與尹喜解内解上下尹喜以内修之㫖解注想爾二卷三天法師張道陵所注河上公章句漢文帝時降居陜州河濱今有廟見存嚴君平指歸十四卷漢成帝時蜀人名遵山陽王弼注字輔嗣魏時爲尚書郎南陽何晏字平叔魏駙馬都尉河南郭象字子玄向秀弟子魏晋時人潁川鍾會字士季魏明帝時人隱士孫登字公和魏文明二帝時人晋僕射太山羊祜字叔子注爲四卷沙門羅什本西胡人苻堅時自玉門關入中國注二卷沙門圖澄後趙時西國胡僧也注上下二卷沙門僧肇晋時人注四卷梁隱居陶弘景武帝時人貞白先生注四卷范陽盧裕後魏國子博士一名白頭翁注二卷草萊臣劉仁會後魏伊州梁縣人注二卷吴郡徴士顧歡字景怡南齊博士注四卷松靈仙人隱青溪山無名氏年代晋人河東裴楚恩注二卷秦人京兆杜弼注二卷宋人河南張憑字長宗明帝太常博士注四卷梁武帝蕭衍注道德經四卷證以因果爲義梁簡文帝蕭綱作道德述義十卷清河張嗣注四卷不知年代梁道士臧玄靜字道宗作䟽四卷梁道士孟安排號大孟作經義二卷梁道士孟智周號小孟注五卷梁道士竇略注四卷與武帝羅什所宗無異陳道士諸糅作玄覽六卷隋道士劉進喜作䟽六卷隋道士李播注上下二卷唐太史令傅奕注二卷並作音羲唐嵩山道士魏徴作要羲五卷爲太宗丞相法師宋文明作義泉五卷仙人胡超作義䟽十卷西山得道道士安丘作指歸五卷道士尹文操作簡要義五卷法師韋録字處玄注兼義四卷道士王玄辯作河上公釋義一十卷諫議大夫肅明觀主尹愔作新義十五卷道士徐邈注四卷直翰林道士何思遠作指趣二卷玄示八卷衡嶽道士薛季昌作金繩十卷事數一卷洪源先生王鞮注二卷玄珠三卷口訣二卷法師趙堅作講䟽六卷太子司議郎楊上善高宗時人作道德集注眞言二十卷吏部侍郎賈至作述義十一卷金鈕一卷道士車弼作䟽七卷任眞子李榮注上下二卷成都道士黎元興作注義四卷太原少尹王光庭作契源注二卷道士張惠超作志玄䟽四卷龔法師作集解四卷通義郡道士任太玄注二卷道士冲虚先生殿中監申甫作䟽五卷岷山道士張君相作集解四卷道士成玄英作講䟽六卷漢州刺史王眞作論兵述義上下二卷道士符少明作道譜策二卷玄宗皇帝所注道德上下二卷講䟽六卷即今所廣䟽矣所釋之理諸家不同或深了重玄不滯空有或溺推因果偏執三生或引合儒宗或趣歸空寂莫不並探驪室競掇珠璣俱陟鍾山爭窺珪瓚連城在握照乘盈懷敷則光燦縑緗演暢則彩文編簡語内修則八瓊玉雪雰靄於丹田九轉琅膏晶熒於絳闕盡六氣迴環之妙臻五靈夾輔之功忘之於心息之於踵得無所得而了達化元矣語品證也則擺落細塵超登上秩遊八外而放曠指三境而躋昇蹈太一之位矣而𤙹内外之要兼人天之能者未有其倫我開元至道昭肅孝皇帝降神龍變接統象先戡内難以乘乾咨中興而御極無爲在宥四十五年汾水襄城靡勞轍迹具茨大隗自得朋遊廓八溟爲仁壽之庭普萬㝢爲華胥之國至道至德超哉明哉欽若尊經本朝家教象繫不足以擬議風雅不足以指陳横亘古今獨立宇宙雖諸家染翰未窮衆妙之門多士研精莫造重玄之境凝旒多暇屬想有歸躬注八十一章製疏六卷内則修身之本囊括無遺外即理國之方洪纖畢舉宸藻遐布奪五雲之華天光煥臨增兩曜之色固可以季仲十翼輝映二南若親禀於玄元信躬傳於太上冠九流而首出垂萬古而不刊則大風宋雁之謌誠難接武典論金樓之作詎可同年但以疏註之中引經合義周書魯史互有發明四始漆園或申屬類後學披卷多瞢本源輒採摭衆書研尋篇軸隨有比况咸得備書纂成廣聖義三十卷大明在上而爝火不休巨澤溥天而灌浸不息誠不知量粗備闕文天復元年龍集辛酉九月十六日甲子序
